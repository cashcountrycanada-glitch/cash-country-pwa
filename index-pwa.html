            if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });

              const newSW = reg.installing;
              if (!newSW) return;
              newSW.addEventListener('statechange', () => {
                if (newSW.state === 'installed') newSW.postMessage({ type: 'SKIP_WAITING' });
              });
            });
            // Recharger automatiquement quand le nouveau SW prend le contrôle
            // ⚠️ Seulement sur iOS (PWA) — sur Mac ce reload crée une boucle infinie

            // Écouter les messages du SW
            navigator.serviceWorker.addEventListener('message', function handler(e) {
                if (e.data.type === 'REPAIR_PROGRESS') {
                    const pct = Math.round((e.data.repaired / e.data.total) * 100);
                    document.getElementById('repair-bar').style.width = pct + '%';
                    document.getElementById('repair-status').textContent = `Réparation ${e.data.repaired}/${e.data.total}...`;
                }
                if (e.data.type === 'REPAIR_DONE') {
                    navigator.serviceWorker.removeEventListener('message', handler);
                    if (e.data.complete) {
                        document.getElementById('repair-status').textContent = '✅ Réparation complète — rechargement...';
                        document.getElementById('repair-bar').style.width = '100%';
                        document.getElementById('repair-bar').style.background = '#22c55e';
                        setTimeout(() => window.location.reload(), 1200);
                    } else {
                        document.getElementById('repair-status').textContent = `⚠️ ${e.data.failed} fichier(s) inaccessible(s) — Mac allumé ?`;
                        document.getElementById('repair-bar').style.background = '#f59e0b';
                        btn.disabled = false;
                        btn.textContent = '🔧 Réessayer';
                    }
                }

            if (sw) {
                sw.postMessage({ type: 'REPAIR_CACHE' });

                window.location.reload();

        async function s6_require(relativePath, fromDir = "") {

        function normalizePath(p) {

            const stack = [];

                if (part === '..') stack.pop();
                else stack.push(part);
            }
            return stack.join('/');

        function showMacBanner(mode) {

                    : 'background:#1c0a0a;color:#f87171;border-bottom:1px solid #7f1d1d',

            const dot = document.createElement('span');
            dot.style.cssText = 'width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;background:'

            // Bouton collapse ▲/▼
            const collapseBtn = document.createElement('button');
            collapseBtn.textContent = '▲';

            collapseBtn.style.cssText = 'margin-left:auto;padding:2px 8px;background:transparent;color:inherit;border:none;font-size:10px;cursor:pointer;opacity:0.6;font-family:monospace;line-height:1';
            let collapsed = false;
            collapseBtn.onclick = () => {
                collapsed = !collapsed;

                    if (n !== collapseBtn) {
                        if (collapsed) { n._origDisplay = n.style ? n.style.display : ''; if (n.style) n.style.display = 'none'; }

        // ── Indicateur de cache ───────────────────────────────────────────────
        // Interroge le SW via CHECK_CACHE, affiche le % dans la bannière iOS.
        async function checkCacheStatus() {
          return new Promise(resolve => {
            if (!navigator.serviceWorker || !navigator.serviceWorker.controller) {
              resolve({ percent: 0, complete: false, missing: 0, total: 0 });
              return;
            }

            const timeout = setTimeout(() => resolve({ percent: 0, complete: false, missing: 0, total: 0 }), 3000);

            navigator.serviceWorker.addEventListener('message', function handler(e) {
              if (e.data && e.data.type === 'CACHE_STATUS') {
                clearTimeout(timeout);
                navigator.serviceWorker.removeEventListener('message', handler);
                const { missing, total, complete } = e.data;
                const cached = total - missing.length;
                const percent = total > 0 ? Math.round((cached / total) * 100) : 0;
                resolve({ percent, complete, missing: missing.length, total });
              }
            });

            navigator.serviceWorker.controller.postMessage({ type: 'CHECK_CACHE' });
          });
        }

        function updateCacheBadge(percent, complete) {

          const old = banner.querySelector('#cache-badge');
          if (old) old.remove();

          const badge = document.createElement('span');
          badge.id = 'cache-badge';
          const color = complete ? '#22c55e' : percent > 50 ? '#eab308' : '#ef4444';
          badge.style.cssText = [
            'margin-left:8px',
            'padding:1px 7px',
            `background:${color}22`,
            `color:${color}`,
            `border:1px solid ${color}44`,
            'border-radius:10px',
            'font-size:8px',
            'font-weight:900',
            'font-family:monospace',
            'letter-spacing:0.05em',

          badge.textContent = complete ? '✓ CACHE 100%' : `CACHE ${percent}%`;
          banner.appendChild(badge);
        }

        function watchConnectivity() {

                        window.MAC_MODE = 'offline';
                    }
                    return;
                }
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 2000);
                let current;
                try {
                    const r = await fetch(`${macUrl}/api/songs`, { method: 'HEAD', signal: controller.signal, cache: 'no-store' });
                    clearTimeout(timeout);
                    current = r.ok ? 'online' : 'offline';
                } catch {
                    clearTimeout(timeout);
                    current = 'offline';
                }
                if (current !== lastMode) {
                    lastMode = current;
                    window.MAC_MODE = current;
                    if (isIOSDevice) {
                      showMacBanner(current);
                      // Rafraîchir le badge cache après changement d'état
                      if (navigator.serviceWorker) {
                        navigator.serviceWorker.ready.then(async () => {
                          const status = await checkCacheStatus();
                          updateCacheBadge(status.percent, status.complete);

                    // Mac revenu en ligne → repair silencieux du cache SW
                    if (current === 'online') {
                        const sw = navigator.serviceWorker && navigator.serviceWorker.controller;
                        if (sw) sw.postMessage({ type: 'REPAIR_CACHE' });
                    }
                    // Notifie l'app React si elle écoute
                    window.dispatchEvent(new CustomEvent('mac-mode-change', { detail: { mode: current } }));
                }
            }, 30000);
        }

            try {

                diag(`🗄️ Caches: ${cacheKeys.join(', ') || 'aucun'}`);
                if (cacheKeys.length > 0) {
                    const cache = await caches.open(cacheKeys[0]);
                    const cachedReqs = await cache.keys();
                    diag(`📦 Entrées cache: ${cachedReqs.length}`);
                    // Vérifier Babel spécifiquement
                    const babelCached = cachedReqs.some(r => r.url.includes('babel'));
                    const reactCached = cachedReqs.some(r => r.url.includes('react'));
                    diag(`⚙️ Babel: ${babelCached ? '✅ cache' : '⚠️ absent'}`);

                } else {

                }
            } catch(e) { diag(`❌ Cache erreur: ${e.message}`); }

            // ── PHASE 3 : Détecter le Mac ─────────────────────────────────
            diag('── Détection Mac...');
            diag('MAC_DETECT_START');
            macOnline = await detectMac();
            diag(macOnline ? '✅ MAC_ONLINE — mode connecté' : '📵 MAC_OFFLINE — mode autonome');
            if (isIOSDevice) {
              showMacBanner(macOnline ? 'online' : 'offline');
              // Vérifier le cache après que le SW soit prêt
              if (navigator.serviceWorker) {
                navigator.serviceWorker.ready.then(async () => {
                  const status = await checkCacheStatus();
                  updateCacheBadge(status.percent, status.complete);

                  // Si cache incomplet et Mac accessible → repair automatique
                  if (!status.complete && macOnline) {
                    const sw = navigator.serviceWorker.controller;
                    if (sw) sw.postMessage({ type: 'REPAIR_CACHE' });
                  }

                  // Écouter la progression du repair
                  navigator.serviceWorker.addEventListener('message', async (e) => {
                    if (e.data && e.data.type === 'REPAIR_DONE') {
                      const refreshed = await checkCacheStatus();
                      updateCacheBadge(refreshed.percent, refreshed.complete);
                    }
                    if (e.data && e.data.type === 'REPAIR_PROGRESS') {
                      const p = Math.round((e.data.repaired / e.data.total) * 100);
                      updateCacheBadge(p, false);
                    }
                  });
                });
              }
            }
            watchConnectivity();
            bootstrap(); // démarre TOUJOURS — cache ou réseau
        });

  "services/StudioOfflineDB.ts": "/**\n * StudioOfflineDB.ts — Stockage persistant Studio Mobile iPhone v3\n *\n * CORRECTIFS v3 :\n * - OPFS (Origin Private File System) comme stockage PRIMAIRE pour les blobs audio\n *   → Stable sur iOS 17+, pas affecté par le bug IndexedDB AVAudioSession\n *   → Quota basé sur le disque total (38+ Go sur iPhone)\n *   → Écriture directe fichier .mp4/.wav sans passer par IDB transactions\n * - IndexedDB conservé pour les MÉTADONNÉES légères uniquement (pas de ArrayBuffer)\n * - Fallback automatique vers IndexedDB si OPFS indisponible\n * - Récupération au démarrage des prises OPFS non encore indexées\n * - init() robuste avec retry si la DB est bloquée\n */\n\nconst DB_NAME    = 'CashCountryStudio';\nconst DB_VERSION = 1;\n\nconst STORE_SONGS = 'songs';\nconst STORE_AUDIO = 'audio';\nconst STORE_STATE = 'state';\n\n// Détecter iOS pour le type MIME par défaut\nfunction isIOS(): boolean {\n  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||\n    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);\n}\n\n// ── OPFS via Web Worker (Safari iOS) ──────────────────────────────────────────\n// Safari iOS ne supporte PAS createWritable() sur le thread principal.\n// La seule API OPFS d'écriture supportée par Safari est createSyncAccessHandle(),\n// mais uniquement dans un Web Worker dédié.\n// Solution : Worker inline créé via Blob URL — aucun fichier externe requis.\n\nconst OPFS_WORKER_SRC = `\nself.onmessage = async (e) => {\n  const { id, op, filename, buffer, mimeType } = e.data;\n  try {\n    const root = await navigator.storage.getDirectory();\n    if (op === 'write') {\n      const fh = await root.getFileHandle(filename, { create: true });\n      const acc = await fh.createSyncAccessHandle();\n      const buf = buffer instanceof ArrayBuffer ? buffer : await new Response(buffer).arrayBuffer();\n      acc.truncate(0);\n      acc.write(new Uint8Array(buf), { at: 0 });\n      acc.flush();\n      acc.close();\n      self.postMessage({ id, ok: true });\n    } else if (op === 'read') {\n      const fh = await root.getFileHandle(filename);\n      const file = await fh.getFile();\n      const ab = await file.arrayBuffer();\n      self.postMessage({ id, ok: true, buffer: ab, mimeType: file.type || mimeType || 'audio/mp4', size: ab.byteLength }, [ab]);\n    } else if (op === 'delete') {\n      try { await root.removeEntry(filename); } catch {}\n      self.postMessage({ id, ok: true });\n    } else if (op === 'exists') {\n      let exists = false;\n      try { await root.getFileHandle(filename); exists = true; } catch {}\n      self.postMessage({ id, ok: true, exists });\n    } else if (op === 'list') {\n      const names = [];\n      for await (const [name] of root.entries()) names.push(name);\n      self.postMessage({ id, ok: true, names });\n    }\n  } catch (err) {\n    self.postMessage({ id, ok: false, error: err && err.message ? err.message : String(err), errorName: err && err.name ? err.name : 'Error' });\n  }\n};\n`;\n\nlet _opfsWorker: Worker | null = null;\nlet _opfsWorkerReady = false;\nlet _opfsMsgId = 0;\nconst _opfsPending = new Map<number, { resolve: (v: any) => void; reject: (e: any) => void }>();\n\nfunction getOPFSWorker(): Worker | null {\n  if (_opfsWorker) return _opfsWorker;\n  try {\n    const blob = new Blob([OPFS_WORKER_SRC], { type: 'application/javascript' });\n    const url = URL.createObjectURL(blob);\n    _opfsWorker = new Worker(url);\n    URL.revokeObjectURL(url); // libérer immédiatement — le Worker a déjà chargé le script\n    _opfsWorker.onmessage = (e) => {\n      const { id, ok, error, ...rest } = e.data;\n      const p = _opfsPending.get(id);\n      if (!p) return;\n      _opfsPending.delete(id);\n      if (ok) p.resolve(rest);\n      else {\n        const e2 = new Error(error || 'OPFS worker error');\n        if (rest.errorName) e2.name = rest.errorName;\n        p.reject(e2);\n      }\n    };\n    _opfsWorker.onerror = (e) => {\n      console.error('[OPFS Worker] Erreur:', e.message);\n      _opfsWorker = null; // Reset pour recréer au prochain appel\n    };\n    _opfsWorkerReady = true;\n    return _opfsWorker;\n  } catch (e) {\n    console.warn('[OPFS Worker] Impossible de créer le worker:', e);\n    return null;\n  }\n}\n\nfunction opfsCall(op: string, params: Record<string, any>, transfer?: Transferable[]): Promise<any> {\n  return new Promise((resolve, reject) => {\n    const worker = getOPFSWorker();\n    if (!worker) { reject(new Error('OPFS worker indisponible')); return; }\n    const id = ++_opfsMsgId;\n    _opfsPending.set(id, { resolve, reject });\n    const msg = { id, op, ...params };\n    if (transfer && transfer.length > 0) worker.postMessage(msg, transfer);\n    else worker.postMessage(msg);\n    // Timeout 15s pour éviter un hang silencieux\n    setTimeout(() => {\n      if (_opfsPending.has(id)) {\n        _opfsPending.delete(id);\n        reject(new Error(`OPFS ${op} timeout (${params.filename})`));\n      }\n    }, 15000);\n  });\n}\n\nasync function opfsAvailable(): Promise<boolean> {\n  try {\n    if (!navigator.storage || !navigator.storage.getDirectory) return false;\n    const worker = getOPFSWorker();\n    if (!worker) return false;\n    // Test avec timeout court (2s) — si le Worker est bloqué par Safari CSP, on passe vite en fallback\n    await Promise.race([\n      opfsCall('list', {}),\n      new Promise<never>((_, reject) => setTimeout(() => reject(new Error('OPFS timeout')), 2000)),\n    ]);\n    return true;\n  } catch { return false; }\n}\n\nasync function opfsWrite(filename: string, blob: Blob): Promise<void> {\n  const ab = await blob.arrayBuffer();\n  // IMPORTANT : inclure 'buffer' dans params ET dans transfer.\n  // Le Transferable dans postMessage(msg, [ab]) ne place PAS ab dans e.data.buffer\n  // si la clé 'buffer' est absente de msg — le Worker lit e.data.buffer = undefined.\n  await opfsCall('write', { filename, mimeType: blob.type, buffer: ab }, [ab]);\n}\n\nasync function opfsRead(filename: string): Promise<Blob | null> {\n  try {\n    const result = await opfsCall('read', { filename });\n    if (!result.buffer || result.buffer.byteLength === 0) return null;\n    return new Blob([result.buffer], { type: result.mimeType || 'audio/mp4' });\n  } catch { return null; }\n}\n\nasync function opfsDelete(filename: string): Promise<void> {\n  try { await opfsCall('delete', { filename }); } catch {}\n}\n\nasync function opfsExists(filename: string): Promise<boolean> {\n  try {\n    const result = await opfsCall('exists', { filename });\n    return result.exists === true;\n  } catch { return false; }\n}\n\nasync function opfsListFiles(): Promise<string[]> {\n  try {\n    const result = await opfsCall('list', {});\n    return result.names || [];\n  } catch { return []; }\n}\n\n// ── Classe principale ──────────────────────────────────────────────────────────\n\nclass StudioOfflineDatabase {\n  private db: IDBDatabase | null = null;\n  private initPromise: Promise<void> | null = null;\n  private _opfsAvailable: boolean | null = null;\n\n  // Queue d'écriture séquentielle — évite les transactions readwrite simultanées sur iOS\n  private writeQueue: Promise<any> = Promise.resolve();\n\n  private enqueueWrite<T>(fn: () => Promise<T>): Promise<T> {\n    const next = this.writeQueue.then(() => fn()).catch(e => { throw e; });\n    this.writeQueue = next.catch(() => {});\n    return next;\n  }\n\n  // Vérifie OPFS une seule fois et met en cache le résultat (promesse partagée)\n  private _opfsCheckPromise: Promise<boolean> | null = null;\n  async checkOPFS(): Promise<boolean> {\n    if (this._opfsAvailable !== null) return this._opfsAvailable;\n    if (!this._opfsCheckPromise) {\n      this._opfsCheckPromise = opfsAvailable().then(ok => {\n        this._opfsAvailable = ok;\n        if (ok) console.log('[DB] ✅ OPFS disponible — stockage audio primaire');\n        else    console.warn('[DB] ⚠️ OPFS indisponible — fallback IndexedDB uniquement');\n        return ok;\n      }).catch(() => {\n        this._opfsAvailable = false;\n        return false;\n      });\n    }\n    return this._opfsCheckPromise;\n  }\n\n  static async requestPersistence(): Promise<void> {\n    try {\n      if (navigator.storage && navigator.storage.persist) {\n        const granted = await navigator.storage.persist();\n        console.log('[DB] Stockage persistant:', granted ? '✅ accordé' : '⚠️ quota limité');\n      }\n    } catch(e) { console.warn('[DB] persist() erreur:', e); }\n  }\n\n  async init(): Promise<void> {\n    if (this.db) return;\n    StudioOfflineDatabase.requestPersistence().catch(() => {});\n    // Éviter les initialisations parallèles\n    if (this.initPromise) return this.initPromise;\n\n    this.initPromise = new Promise((resolve, reject) => {\n      const req = indexedDB.open(DB_NAME, DB_VERSION);\n\n      req.onupgradeneeded = (event) => {\n        const db = (event.target as IDBOpenDBRequest).result;\n        if (!db.objectStoreNames.contains(STORE_SONGS)) {\n          db.createObjectStore(STORE_SONGS, { keyPath: 'id' });\n        }\n        if (!db.objectStoreNames.contains(STORE_AUDIO)) {\n          const audioStore = db.createObjectStore(STORE_AUDIO, { keyPath: 'key' });\n          audioStore.createIndex('songId', 'songId', { unique: false });\n        }\n        if (!db.objectStoreNames.contains(STORE_STATE)) {\n          db.createObjectStore(STORE_STATE, { keyPath: 'key' });\n        }\n      };\n\n      req.onsuccess = () => {\n        this.db = req.result;\n        this.db.onclose = () => { this.db = null; this.initPromise = null; };\n        this.db.onerror = (e) => console.warn('[StudioDB] Erreur DB:', e);\n        resolve();\n      };\n\n      req.onerror = () => {\n        this.initPromise = null;\n        reject(req.error);\n      };\n\n      req.onblocked = () => {\n        console.warn('[StudioDB] DB bloquée — attente...');\n      };\n    });\n\n    return this.initPromise;\n  }\n\n  private async getDB(): Promise<IDBDatabase> {\n    if (!this.db) await this.init();\n    if (!this.db) throw new Error('[StudioDB] DB non disponible après init');\n    return this.db;\n  }\n\n  private async tx(store: string, mode: IDBTransactionMode = 'readonly') {\n    const db = await this.getDB();\n    return db.transaction([store], mode).objectStore(store);\n  }\n\n  // ── Audio — OPFS en primaire, IndexedDB en fallback ────────────────────────\n\n  /**\n   * saveAudio : tente OPFS d'abord, puis IndexedDB en fallback.\n   * Pour les prises (key commence par \"rec_\"), OPFS est fortement préféré.\n   */\n  async saveAudio(key: string, blob: Blob, meta: object = {}): Promise<void> {\n    return this.enqueueWrite(() => this._saveAudioImpl(key, blob, meta));\n  }\n\n  private async _saveAudioImpl(key: string, blob: Blob, meta: object = {}): Promise<void> {\n    const useOPFS = await this.checkOPFS();\n\n    if (useOPFS) {\n      try {\n        // Nom de fichier OPFS : \"rec_REC-1234567890.mp4\"\n        const ext = blob.type.includes('mp4') ? 'mp4' : blob.type.includes('wav') ? 'wav' : 'webm';\n        const filename = `${key}.${ext}`;\n        await opfsWrite(filename, blob);\n        // Stocker les métadonnées légères dans IndexedDB (sans le buffer)\n        try {\n          await this.init();\n          const store = await this.tx(STORE_AUDIO, 'readwrite');\n          await this.idbOp(store.put({\n            key,\n            opfsFilename: filename,\n            size: blob.size,\n            type: blob.type || (isIOS() ? 'audio/mp4' : 'audio/webm'),\n            savedAt: Date.now(),\n            storageBackend: 'opfs',\n            ...meta,\n          }));\n        } catch (idbErr) {\n          // Métadonnées IDB échouées — pas grave, OPFS file est là\n          console.warn('[DB] saveAudio: métadonnées IDB échouées (OPFS OK):', idbErr);\n          // Sauvegarder les métadonnées en localStorage comme backup\n          try {\n            const lsMeta = JSON.parse(localStorage.getItem('__opfs_index') || '{}');\n            lsMeta[key] = { opfsFilename: filename, size: blob.size, type: blob.type, savedAt: Date.now(), ...meta };\n            localStorage.setItem('__opfs_index', JSON.stringify(lsMeta));\n          } catch {}\n        }\n        console.log(`[DB] ✅ OPFS saveAudio(${key}) → ${filename} (${(blob.size/1024).toFixed(0)} Ko)`);\n        return;\n      } catch (opfsErr) {\n        console.warn('[DB] OPFS write échoué, fallback IDB:', opfsErr);\n      }\n    }\n\n    // Fallback IndexedDB (comportement original)\n    await this._saveAudioIDB(key, blob, meta);\n  }\n\n  private async _saveAudioIDB(key: string, blob: Blob, meta: object = {}): Promise<void> {\n    // Vérifier l'espace disponible AVANT d'écrire\n    try {\n      const est = await this.getStorageEstimate();\n      const needed = blob.size;\n      const available = est.quota - est.used;\n      if (available < needed + 2 * 1024 * 1024) {\n        try { await this.freeSpaceForSize(needed); } catch {}\n        const est2 = await this.getStorageEstimate();\n        if (est2.quota - est2.used < needed + 2 * 1024 * 1024) {\n          const usedMB  = (est.used  / (1024 * 1024)).toFixed(1);\n          const quotaMB = (est.quota / (1024 * 1024)).toFixed(1);\n          const needMB  = (needed    / (1024 * 1024)).toFixed(1);\n          throw new DOMException(\n            `QUOTA_FULL: utilisé ${usedMB} Mo / ${quotaMB} Mo, besoin ${needMB} Mo`,\n            'QuotaExceededError'\n          );\n        }\n      }\n    } catch (e: any) {\n      if (e.name === 'QuotaExceededError') throw e;\n    }\n\n    const buffer = await blob.arrayBuffer();\n    const store  = await this.tx(STORE_AUDIO, 'readwrite');\n\n    try {\n      await this.idbOp(store.put({\n        key,\n        buffer,\n        size:    blob.size,\n        type:    blob.type || (isIOS() ? 'audio/mp4' : 'audio/webm'),\n        savedAt: Date.now(),\n        storageBackend: 'indexeddb',\n        ...meta,\n      }));\n    } catch (e: any) {\n      if (e.name === 'QuotaExceededError' || (e.message && e.message.includes('quota'))) {\n        const est = await this.getStorageEstimate().catch(() => ({ used: 0, quota: 50 * 1024 * 1024, pct: 0 }));\n        throw new DOMException(\n          `QUOTA_FULL: IndexedDB plein (${(est.used/1024/1024).toFixed(1)} Mo / ${(est.quota/1024/1024).toFixed(1)} Mo)`,\n          'QuotaExceededError'\n        );\n      }\n      throw e;\n    }\n  }\n\n  /**\n   * getAudio : cherche d'abord dans OPFS, puis IndexedDB.\n   */\n  async getAudio(key: string): Promise<Blob | null> {\n    const useOPFS = await this.checkOPFS();\n\n    if (useOPFS) {\n      // Chercher dans l'index IDB d'abord pour avoir le nom exact du fichier\n      try {\n        const store = await this.tx(STORE_AUDIO);\n        const rec = await this.idbOp(store.get(key));\n        if (rec?.opfsFilename) {\n          const blob = await opfsRead(rec.opfsFilename);\n          if (blob && blob.size > 0) {\n            // Re-typer le blob avec le bon type MIME\n            const mimeType = rec.type || (isIOS() ? 'audio/mp4' : 'audio/webm');\n            return new Blob([await blob.arrayBuffer()], { type: mimeType });\n          }\n        }\n      } catch {}\n\n      // Fallback : chercher dans l'index localStorage\n      try {\n        const lsMeta = JSON.parse(localStorage.getItem('__opfs_index') || '{}');\n        if (lsMeta[key]?.opfsFilename) {\n          const blob = await opfsRead(lsMeta[key].opfsFilename);\n          if (blob && blob.size > 0) {\n            return new Blob([await blob.arrayBuffer()], { type: lsMeta[key].type || 'audio/mp4' });\n          }\n        }\n      } catch {}\n\n      // Fallback : chercher le fichier OPFS par nom deviné\n      for (const ext of ['mp4', 'wav', 'webm']) {\n        const blob = await opfsRead(`${key}.${ext}`);\n        if (blob && blob.size > 0) {\n          return new Blob([await blob.arrayBuffer()], { type: `audio/${ext}` });\n        }\n      }\n    }\n\n    // Fallback IndexedDB (comportement original)\n    return this._getAudioIDB(key);\n  }\n\n  private async _getAudioIDB(key: string): Promise<Blob | null> {\n    const attempt = async (): Promise<Blob | null> => {\n      const store = await this.tx(STORE_AUDIO);\n      const rec   = await this.idbOp(store.get(key));\n      if (!rec) return null;\n      if (!rec.buffer || rec.buffer.byteLength === 0) {\n        console.error(`[DB] ❌ getAudio IDB(${key}) buffer vide`);\n        return null;\n      }\n      const storedType = rec.type || 'audio/mp4';\n      return new Blob([rec.buffer], { type: storedType });\n    };\n\n    try {\n      return await attempt();\n    } catch (e) {\n      console.warn(`[DB] getAudio IDB(${key}) échoué, retry...`, e);\n      this.db = null;\n      this.initPromise = null;\n      await new Promise(r => setTimeout(r, 200));\n      try {\n        return await attempt();\n      } catch (e2) {\n        console.error(`[DB] getAudio IDB(${key}) échec définitif:`, e2);\n        return null;\n      }\n    }\n  }\n\n  async hasAudio(key: string): Promise<boolean> {\n    const useOPFS = await this.checkOPFS();\n\n    if (useOPFS) {\n      // Vérifier via index IDB\n      try {\n        const store = await this.tx(STORE_AUDIO);\n        const rec = await this.idbOp(store.get(key));\n        if (rec?.opfsFilename) {\n          return await opfsExists(rec.opfsFilename);\n        }\n      } catch {}\n      // Vérifier directement dans OPFS\n      for (const ext of ['mp4', 'wav', 'webm']) {\n        if (await opfsExists(`${key}.${ext}`)) return true;\n      }\n    }\n\n    // Fallback IDB\n    try {\n      const store = await this.tx(STORE_AUDIO);\n      const rec   = await this.idbOp(store.get(key));\n      return !!rec && !!rec.buffer && rec.buffer.byteLength > 1000;\n    } catch { return false; }\n  }\n\n  async deleteAudio(key: string): Promise<void> {\n    const useOPFS = await this.checkOPFS();\n\n    if (useOPFS) {\n      // Supprimer le fichier OPFS\n      try {\n        const store = await this.tx(STORE_AUDIO);\n        const rec = await this.idbOp(store.get(key));\n        if (rec?.opfsFilename) await opfsDelete(rec.opfsFilename);\n      } catch {}\n      for (const ext of ['mp4', 'wav', 'webm']) {\n        await opfsDelete(`${key}.${ext}`);\n      }\n      // Nettoyer l'index localStorage\n      try {\n        const lsMeta = JSON.parse(localStorage.getItem('__opfs_index') || '{}');\n        delete lsMeta[key];\n        localStorage.setItem('__opfs_index', JSON.stringify(lsMeta));\n      } catch {}\n    }\n\n    // Supprimer aussi l'entrée IDB (métadonnées)\n    try {\n      const store = await this.tx(STORE_AUDIO, 'readwrite');\n      await this.idbOp(store.delete(key));\n    } catch {}\n  }\n\n  /**\n   * Récupération des prises OPFS orphelines au démarrage de l'app.\n   * Si des fichiers \"rec_*.mp4/wav\" existent dans OPFS mais ne sont pas\n   * dans IndexedDB (crash pendant la sauvegarde des métadonnées), on les retrouve.\n   */\n  async recoverOrphanOPFSRecordings(): Promise<string[]> {\n    const useOPFS = await this.checkOPFS();\n    if (!useOPFS) return [];\n\n    try {\n      const allFiles = await opfsListFiles();\n      const recFiles = allFiles.filter(f => f.startsWith('rec_') && /\\.(mp4|wav|webm)$/.test(f));\n      if (recFiles.length === 0) return [];\n\n      const recovered: string[] = [];\n      for (const filename of recFiles) {\n        // Clé IDB = filename sans l'extension\n        const key = filename.replace(/\\.(mp4|wav|webm)$/, '');\n        try {\n          const store = await this.tx(STORE_AUDIO);\n          const existing = await this.idbOp(store.get(key));\n          if (!existing) {\n            // Fichier OPFS sans entrée IDB — recréer les métadonnées\n            const blob = await opfsRead(filename);\n            if (blob && blob.size > 1000) {\n              const ext = filename.split('.').pop() || 'mp4';\n              const mimeType = `audio/${ext === 'wav' ? 'wav' : 'mp4'}`;\n              try {\n                const wStore = await this.tx(STORE_AUDIO, 'readwrite');\n                await this.idbOp(wStore.put({\n                  key,\n                  opfsFilename: filename,\n                  size: blob.size,\n                  type: mimeType,\n                  savedAt: Date.now(),\n                  storageBackend: 'opfs',\n                  recovered: true,\n                }));\n              } catch {}\n              recovered.push(key);\n              console.log(`[DB] 🔄 Récupéré OPFS orphelin: ${filename} (${(blob.size/1024).toFixed(0)} Ko)`);\n            }\n          }\n        } catch {}\n      }\n      return recovered;\n    } catch (e) {\n      console.warn('[DB] recoverOrphanOPFSRecordings erreur:', e);\n      return [];\n    }\n  }\n\n  private idbOp<T>(req: IDBRequest<T>): Promise<T> {\n    return new Promise((res, rej) => {\n      req.onsuccess = () => res(req.result);\n      req.onerror   = () => rej(req.error);\n    });\n  }\n\n  // ── Chansons ──────────────────────────────────────────────────────────────\n\n  async saveSongs(songs: any[]): Promise<void> {\n    try {\n      const existing = await this.idbOp((await this.tx(STORE_SONGS)).count());\n      if (existing === songs.length) return;\n    } catch {}\n    const store = await this.tx(STORE_SONGS, 'readwrite');\n    await this.idbOp(store.clear());\n    for (const s of songs) {\n      await this.idbOp(store.put(s));\n    }\n  }\n\n  async getAllSongs(): Promise<any[]> {\n    const store = await this.tx(STORE_SONGS);\n    return this.idbOp(store.getAll());\n  }\n\n  async listAllAudioKeys(): Promise<string[]> {\n    const useOPFS = await this.checkOPFS();\n    const keys: string[] = [];\n\n    if (useOPFS) {\n      const files = await opfsListFiles();\n      for (const f of files) {\n        if (f.startsWith('rec_') || f.startsWith('inst_') || f.startsWith('vocal_')) {\n          const key = f.replace(/\\.(mp4|wav|webm)$/, '');\n          const blob = await opfsRead(f);\n          keys.push(blob && blob.size > 1000 ? key : `${key} ⚠️VIDE`);\n        }\n      }\n    }\n\n    // Ajouter les clés IDB non déjà trouvées\n    try {\n      const store = await this.tx(STORE_AUDIO);\n      const idbKeys = await this.idbOp(store.getAllKeys()) as string[];\n      for (const k of idbKeys) {\n        if (!keys.some(existing => existing === k || existing.startsWith(k))) {\n          keys.push(k);\n        }\n      }\n    } catch {}\n\n    return keys;\n  }\n\n  async verifySongCache(songId: string): Promise<{ inst: boolean; vocal: boolean; both: boolean }> {\n    const [inst, vocal] = await Promise.all([\n      this.hasAudio(`inst_${songId}`),\n      this.hasAudio(`vocal_${songId}`),\n    ]);\n    if (!inst && !vocal) {\n      await this.markSongUncached(songId);\n    }\n    return { inst, vocal, both: inst && vocal };\n  }\n\n  async deleteAllForSong(songId: string): Promise<void> {\n    const useOPFS = await this.checkOPFS();\n\n    if (useOPFS) {\n      const files = await opfsListFiles();\n      for (const f of files) {\n        if (f.includes(`_${songId}`) || f === `inst_${songId}.mp4` || f === `vocal_${songId}.mp4`) {\n          await opfsDelete(f);\n        }\n      }\n    }\n\n    // IDB\n    await this.init(); const db = this.db!;\n    await new Promise<void>((resolve, reject) => {\n      const tx = db.transaction([STORE_AUDIO], 'readwrite');\n      const store = tx.objectStore(STORE_AUDIO);\n      const req = store.getAllKeys();\n      req.onsuccess = () => {\n        const allKeys = req.result as string[];\n        const toDelete = allKeys.filter(k =>\n          k === `inst_${songId}` ||\n          k === `vocal_${songId}` ||\n          (k as string).includes(`_${songId}_`)\n        );\n        let pending = toDelete.length;\n        if (pending === 0) { resolve(); return; }\n        for (const k of toDelete) {\n          const d = store.delete(k);\n          d.onsuccess = () => { if (--pending === 0)  mixedDataUrl?: string; sections?: any[]; suggestedKey?: string;\n}\nconst STORAGE_KEY = 'cash_studio_recordings';\n\nfunction isIOS(): boolean {\n  return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);\n}\n\nfunction getBestMimeType(): string {\n  if (MediaRecorder.isTypeSupported('audio/webm;codecs=pcm')) return 'audio/webm;codecs=pcm';\n  if (MediaRecorder.isTypeSupported('audio/mp4;codecs=pcm'))  return 'audio/mp4;codecs=pcm';\n  if (MediaRecorder.isTypeSupported('audio/mp4;codecs=alac')) return 'audio/mp4;codecs=alac';\n  if (isIOS()) return 'audio/mp4';\n  if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) return 'audio/webm;codecs=opus';\n  if (MediaRecorder.isTypeSupported('audio/webm')) return 'audio/webm';\n  if (MediaRecorder.isTypeSupported('audio/mp4')) return 'audio/mp4';\n  return '';\n}\n\n// ── Pitch Shift via WSOLA (Waveform Similarity Overlap-Add) ─────────────────\n// Méthode professionnelle : change la hauteur SANS changer la durée\n// Bien meilleur que playbackRate seul qui accélère/ralentit le signal\nfunction wsolaShift(inputData: Float32Array, semitones: number, sampleRate: number): Float32Array {\n  if (semitones === 0) return inputData;\n  const rate = Math.pow(2, semitones / 12);\n  // Taille de frame adaptative : plus petite = meilleurs transitoires, plus grande = moins d'artefacts\n  // Pour les petits intervalles (<= 5ST) : frames plus petites pour mieux gérer les attaques vocales\n  const frameSize  = Math.abs(semitones) <= 5 ? 1024 : 2048;\n  const overlap    = Math.floor(frameSize * 0.80); // 80% overlap pour réduire les artéfacts\n  const hop_a      = frameSize - overlap;\n  const hop_s      = Math.round(hop_a / rate);\n  const outputLen  = inputData.length;\n  const output     = new Float32Array(outputLen);\n  const window     = new Float32Array(frameSize);\n  // Fenêtre de Hann\n  for (let i = 0; i < frameSize; i++) window[i] = 0.5 * (1 - Math.cos(2 * \n\n// Double tracking 100% JS pur — zéro OfflineAudioContext\n// Traite les Float32Array directement : fonctionne sur iOS peu importe la durée\n// Technique : 3 couches mixées (centre 70%, gauche +0.08ST délai 12ms 60%, droite -0.07ST délai 23ms 60%)\nasync function doubleTrackBuffer(buffer: AudioBuffer): Promise<AudioBuffer> {\n  const sr  = buffer.sampleRate;\n  const len = buffer.length;\n\n  // Lire le canal mono (ou moyenne L+R si stéréo)\n  const srcL = buffer.getChannelData(0);\n  const srcR = buffer.numberOfChannels > 1 ? buffer.getChannelData(1) : srcL;\n  const mono = new Float32Array(len);\n  for (let i = 0; i < len; i++) mono[i] = (srcL[i] + srcR[i]) * 0.5;\n\n  // Pitch shift léger par resampling linéaire (pas d'OfflineAudioContext)\n  const resample = (src: Float32Array, ratio: number): Float32Array => {\n    const outLen = Math.floor(src.length / ratio);\n    const out = new Float32Array(outLen);\n    for (let i = 0; i < outLen; i++) {\n      const pos = i * ratio;\n      const idx = Math.floor(pos);\n      const frac = pos - idx;\n      const a = src[idx] ?? 0;\n      const b = src[idx + 1] ?? 0;\n      out[i] = a + (b - a) * frac;\n    }\n    return out;\n  };\n\n  // Couche gauche : +0.08 ST → ratio 1/2^(0.08/12), délai 12ms\n  const ratioL   = 1 / Math.pow(2, 0.08 / 12);\n  const delayL   = Math.floor(0.012 * sr);\n  const shiftedL = resample(mono, ratioL);\n\n  // Couche droite : -0.07 ST → ratio 1/2^(-0.07/12), délai 23ms\n  const ratioR   = 1 / Math.pow(2, -0.07 / 12);\n  const delayR   = Math.floor(0.023 * sr);\n  const shiftedR = resample(mono, ratioR);\n\n  // Buffer de sortie stéréo — longueur = len + délai max + petit padding\n  const outLen = len + Math.floor(0.030 * sr);\n  const outL   = new Float32Array(outLen);\n  const outR   = new Float32Array(outLen);\n\n  // Centre (voix originale) gain 0.70 — dans les deux canaux\n  for (let i = 0; i < len; i++) {\n    outL[i] += mono[i] * 0.70;\n    outR[i] += mono[i] * 0.70;\n  }\n\n  // Couch n// Intervalles dans un accord (en semitones depuis la fondamentale)\nconst CHORD_TONES: Record<string, number[]> = {\n  '':    [0, 4, 7],        // Majeur : fondamentale, tierce M, quinte\n  'm':   [0, 3, 7],        // Mineur : fondamentale, tierce m, quinte\n  '7':   [0, 4, 7, 10],    // Dom 7  : + septième mineure\n  'maj7':[0, 4, 7, 11],    // Maj 7  : + septième majeure\n  'm7':  [0, 3, 7, 10],    // Min 7\n  'sus2':[0, 2, 7],        // Sus 2\n  'sus4':[0, 5, 7],        // Sus 4\n  'dim': [0, 3, 6],        // Diminué\n  'aug': [0, 4, 8],        // Augmenté\n  'add9':[0, 4, 7, 14],    // Add 9\n  '6':   [0, 4, 7, 9],     // Sixte\n  '9':   [0, 4, 7, 10, 14],// Neuvième\n};\n\n// Parser un symbole d'accord → { root: number, tones: number[] }\n// Supporte : lettres (C, Dm, G7, F#m, Bb, Ebmaj7) + Nashville (1,4,5,2m,6m)\nfunction parseChord(symbol: string, songKey: number = 0): { root: number; tones: number[] } | null {\n  if (!symbol || symbol === 'N.C.' || symbol === '?' || symbol === '') return null;\n\n  // Notation Nashville (chiffres romains/arabes relatifs à la tonalité)\n  const nashville = symbol.match(/^([b#]?)([1-7])(.*)/);\n  if (nashville && !symbol.match(/^[A-G]/)) {\n    const [, acc, deg, qual] = nashville;\n    const MAJOR_SCALE = [0, 2, 4, 5, 7, 9, 11];\n    let root = (songKey + MAJOR_SCALE[parseInt(deg) - 1] + (acc === 'b' ? -1 : acc === '#' ? 1 : 0) + 12) % 12;\n    const quality = qual.replace(/^m(?!aj)/, 'm').replace(/7$/, '7').trim();\n    const tones = CHORD_TONES[quality] || (qual.includes('m') ? CHORD_TONES['m'] : CHORD_TONES['']);\n    return { root, tones: tones.map((t: number) => (root + t) % 12) };\n  }\n\n  // Notation alphabétique — parser correctement les bémols AVANT de remplacer\n  const rootMatch = symbol.match(/^([A-G][#b]?)/);\n  if (!rootMatch) return null;\n  let rootStr = rootMatch[1];\n  // Table de correspondance bémols → dièses (ordre important : 2 chars avant 1 char)\n  const flat2sharp: Record<string, string> = {\n    'Cb':'B','Db':'C#','Eb':'D#','Fb':'E','Gb':'F#','Ab':'G#','Bb':'A#'\n  };\n  rootStr = flat2sharp[rootStr] || rootStr;\n  const root = NOTES.indexOf(rootStr);\n  if (root === -1) return null;\n  // Extraire le type d'accord (enlever basse optionnelle ex: G/B)\n  const quality = symbol.slice(rootMatch[0].length).replace(/\\/.*$/, '').trim();\n  const tones = CHORD_TONES[quality] || CHORD_TONES[''] || [0, 4, 7];\n  return { root, tones: tones.map((t: number) => (root + t) % 12) };\n}\n\n// Trouver la meilleure note d'harmonie pour une note mélodique donnée\n// sur un accord donné, dans une direction (vers le haut ou le bas)\nfunction bestHarmonyNote(\n  melodyNoteSemitone: number,  // note chantée (absolu, ex: 60 = C4)\n  chord: { root: number; tones: number[] },\n  intervalTarget: number,      // intervalle visé en semitones (+3, +7, -12, etc.)\n  key: number                  // tonalité de la chanson\n): number {\n  const melodyClass = ((melodyNoteSemitone % 12) + 12) % 12;\n  const direction = intervalTarget >= 0 ? 1 : -1;\n  const absTarget = Math.abs(intervalTarget);\n\n  // Candidats : notes de l'accord + notes de la gamme penta country\n  const countryPenta = [0, 2, 4, 7, 9]; // pentatonique majeure relative à la tonalité\n  const candidates = [...new Set([\n    ...chord.tones,\n    ...countryPenta.map(n => (key + n) % 12),\n  ])];\n\n  // Trouver la note candidate la plus proche de l'intervalle cible\n  let bestNote = melodyNoteSemitone + intervalTarget;\n  let bestDist = Infinity;\n\n  for (const candidate of candidates) {\n    // Trouver toutes les octaves de ce candidat proches de la cible\n    for (let oct = -2; oct <= 2; oct++) {\n      const note = melodyNoteSemitone + direction * (absTarget + oct * 12 - absTarget % 12);\n      const noteClass = ((note % 12) + 12) % 12;\n      if (noteClass === candidate) {\n        const dist = Math.abs(note - (melodyNoteSemitone + intervalTarget));\n        if (dist < bestDist) {\n          bestDist = dist;\n          bestNote = note;\n        }\n      }\n    }\n  }\n\n  return bestNote;\n}\n\n// Convertir realPartition en map timestamp→accord\nfunction buildChordMap(realPartition: any[], songKey: number = 0): Array<{ time: number; chord: ReturnType<typeof parseChord> }> {\n  const map: Array<{ time: number; chord: ReturnType<typeof parseChord> }> = [];\n  for (const section of realPartition) {\n    for (const beat of (section.beats || [])) {\n      if (beat.timestamp !== undefined && beat.chord) {\n        const parsed = parseChord(beat.chord, songKey);\n        if (parsed) map.push({ time: beat.timestamp, chord: parsed });\n      }\n    }\n  }\n  return map.sort((a, b) => a.time - b.time);\n}\n\n// Obtenir l'accord au timestamp t\nfunction chordAt(map: Array<{ time: number; chord: ReturnType<typeof parseChord> }>, t: number): ReturnType<typeof parseChord> | null {\n  if (map.length === 0) return null;\n  let last = map[0].chord;\n  for (const entry of map) {\n    if (entry.time > t) break;\n    last = entry.chord;\n  }\n  return last;\n}\n\n// Parser la tonalité de la chanson\nfunction parseKey(keyStr: string): number {\n  if (!keyStr) return 0;\n  const clean = keyStr.replace(/\\s*(Major|major|Majeur|maj)\\s*/gi, '').replace('m','').trim();\n  const idx = NOTES.indexOf(clean.replace('b','#').replace('Db','C#').replace('Eb','D#').replace('Gb','F#').replace('Ab','G#').replace('Bb','A#'));\n  return idx >= 0 ? idx : 0;\n}\n\n// ── PITCH SHIFT INTELLIGENT par segment ──────────────────────────────────────\n// Divise le buffer en segments de ~50ms, applique le meilleur interval pour chaque accord\nasync function smartHarmonyBuffer(\n  buffer: AudioBuffer,\n  targetInterval: number,  // intervalle visé (+3, +7, +5, -12)\n  chordMap: Array<{ time: number; chord: ReturnType<typeof parseChord> }>,\n  songKey: number\n): Promise<AudioBuffer> {\n  // Si pas de données d'accord → fallback WSOLA classique\n  if (chordMap.length === 0) {\n    return pitchShiftBuffer(new (window.AudioContext scontinuités)\n      const fadeLen = Math.min(128, shifted.length);\n      for (let i = 0; i < shifted.length && pos + i < len; i++) {\n        if (i < fadeLen && lastInterval !== interval) {\n          const fade = i / fadeLen;\n          outData[pos + i] = outData[pos + i] * (1 - fade) + shifted[i] * fade;\n        } else {\n          outData[pos + i] = shifted[i];\n        }\n      }\n\n      lastInterval = interval;\n      pos += segmentSamp; // avancer de 50ms\n    }\n\n    // Normalisation douce\n    let peak = 0;\n    for (let i = 0; i < len; i++) peak = Math.max(peak, Math.abs(outData[i]));\n    if (peak > 0.92) { const g = 0.88 / peak; for (let i = 0; i < len; i++) outData[i] *= g; }\n  }\n\n  // EQ final\n  const eqCtx = new OfflineAudioContext(channels, len, sr);\n  const eqSrc = eqCtx.createBufferSource(); eqSrc.buffer = outBuf;\n  const eq1   = eqCtx.createBiquadFilter();\n  const eq2   = eqCtx.createBiquadFilter();\n  const gn    = eqCtx.createGain();\n\n  if (targetInterval > 0) {\n    eq1.type = 'highpass';  eq1.frequency.value = 100;\n    eq2.type = 'highshelf'; eq2.frequency.value = 5500; eq2.gain.value = -Math.min(targetInterval * 0.25, 2.0);\n    gn.gain.value = 0.90;\n  } else {\n    eq1.type = 'lowpass';  eq1.frequency.value = 7000;\n    eq2.type = 'peaking';  eq2.frequency.value = 900; eq2.gain.value = 2.0; eq2.Q.value = 1.0;\n    gn.gain.value = 1.05;\n  }\n  eqSrc.connect(eq1); eq1.connect(eq2); eq2.connect(gn); gn.connect(eqCtx.destination);\n  eqSrc.start(0);\n  return safeStartRendering(eqCtx);\n}\n\n// Encodage WAV instantané depuis AudioBuffer — zéro MediaRecorder, zéro attente temps réel\n// Format : PCM 16-bit little-endian stéréo interleaved\n/**\n * Encode un AudioBuffer en WAV par chunks de 2 MB max.\n * Évite l'allocation d'un seul ArrayBuffer de 30+ MB qui kill le tab iOS.\n * Retourne un Blob WAV assemblé de petits morceaux.\n */\nasync function audioBufferToWavBlobChunked(\n  buffer: AudioBuffer,\n  onProgress?: (pct: number) => void\n): Promise<Blob> {\n  const numCh   = Math.min(buffer.numberOfChannels, 2);\n  const sr      = buffer.sampleRate;\n  const numSamp = buffer.length;\n  const bytesPerSamp = 2;\n  const dataLen = numSamp * numCh * bytesPerSamp;\n\n  // ── En-tête WAV (44 octets) ──\n  const header = new ArrayBuffer(44);\n  const v = new DataView(header);\n  const ws = (off: number, s: string) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); };\n  ws(0, 'RIFF'); v.setUint32(4, 36 + dataLen, true);\n  ws(8, 'WAVE'); ws(12, 'fmt ');\n  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, numCh, true);\n  v.setUint32(24, sr, true); v.setUint32(28, sr * numCh * bytesPerSamp, true);\n  v.setUint16(32, numCh * bytesPerSamp, true); v.setUint16(34, 16, true);\n  ws(36, 'data'); v.setUint32(40, dataLen, true);\n\n  const chL = buffer.getChannelData(0);\n  const chR = numCh > 1 ? buffer.getChannelData(1) : chL;\n\n  // ── Encoder par chunks de ~1 MB (262 144 samples stéréo 16-bit = 1 048 576 octets) ──\n  const CHUNK_SAMPLES = 262144; // 1 MB par chunk\n  const blobs: Blob[] = [new Blob([header], { type: 'audio/wav' })];\n\n  for (let start = 0; start < numSamp; start += CHUNK_SAMPLES) {\n    const end  = Math.min(start + CHUNK_SAMPLES, numSamp);\n    const count = end - start;\n    let chunkData = new Int16Array(count * numCh);\n    for (let i = 0; i < count; i++) {\n      const sL = Math.max(-1, Math.min(1, chL[start + i]));\n      const sR = Math.max(-1, Math.min(1, chR[start + i]));\n      chunkData[i * numCh]     = sL < 0 ? sL * 0x8000 : sL * 0x7FFF;\n      chunkData[i * numCh + 1] = sR < 0 ? sR * 0x8000 : sR * 0x7FFF;\n    }\n    blobs.push(new Blob([chunkData.buffer], { type: 'audio/wav' }));\n    chunkData = new Int16Array(0); // libérer (let, réassignable)\n\n    // Yield au main thread + progress\n    const pct = Math.round((end / numSamp) * 100);\n    onProgress?.(pct);\n    await new Promise<void>(r => setTimeout(r, 0));\n  }\n\n n    // Pour les sentinelles opfs:, le blob est déjà dans OPFS sous la clé fx_xxx\n    // On sauvegarde seulement les métadonnées\n    const isOpfsSentinel = rec.dataUrl!.startsWith('opfs:') || rec.dataUrl!.startsWith('blob:');\n    const blob = isOpfsSentinel ? null : (() => { try { return this.dataUrlToBlob(rec.dataUrl!); } catch { return null; } })();\n    const MAX_ATTEMPTS = 5;\n    let lastError: any = null;\n\n    for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {\n      try {\n        // Réinitialiser la connexion IndexedDB si elle a été coupée par iOS\n        const db = getOfflineDB();\n        await db.init();\n\n        // Sauvegarder le blob audio (sauf pour les sentinelles opfs: — déjà dans OPFS)\n        if (!isOpfsSentinel && blob) {\n          await db.saveAudio(`rec_${rec.id}`, blob, {\n            songId: rec.songId,\n            songTitle: rec.songTitle,\n            type: 'recording',\n            savedAt: Date.now(),\n          });\n        }\n\n        // Sauvegarder aussi les métadonnées\n        const meta = { ...rec, dataUrl: undefined, blob: undefined };\n        const existing = await db.getState<any[]>('recordings', []);\n        await db.setState('recordings', [...existing.filter((r: any) => r.id !== rec.id), meta]);\n\n        // AUSSI dans localStorage — garantie absolue qui survit aux crashes iOS\n        // (localStorage n'est pas affecté par AVAudioSession ni par l'éviction IDB)\n        try {\n          const lsRecs: any[] = JSON.parse(localStorage.getItem('cash_studio_recordings') || '[]');\n          const updated = [...lsRecs.filter((r: any) => r.id !== rec.id), meta];\n          localStorage.setItem('cash_studio_recordings', JSON.stringify(updated));\n        } catch {}\n\n        console.log(`[Save] ✅ Prise sauvegardée (tentative ${attempt}) — ${(blob.size/1024).toFixed(0)} KB`);\n        return; // Succès — sortir\n\n      } catch (e: any) {\n        lastError = e;\n        console.warn(`[Save] ⚠️ Tentative ${attemp oject => ({\n      ...p,\n      // mixedDataUrl blob: non sérialisable → retirer\n      mixedDataUrl: p.mixedDataUrl?.startsWith('blob:') ? undefined : p.mixedDataUrl,\n      tracks: p.tracks.map(t => ({\n        ...t,\n        // dataUrl data: long (>50KB) → retirer, le blob est dans OPFS/IDB\n        dataUrl: t.dataUrl && t.dataUrl.length > 50000 && !t.dataUrl.startsWith('opfs:')\n          ? undefined\n          : t.dataUrl,\n      })),\n    });\n    const projects = this.getProjects().filter(p => p.id !== project.id);\n    projects.unshift(sanitize(project));\n    try {\n      localStorage.setItem('cash_studio_projects', JSON.stringify(projects.slice(0, 20)));\n    } catch (e) {\n      // localStorage plein — essayer avec seulement le projet courant\n      try {\n        localStorage.setItem('cash_studio_projects', JSON.stringify([sanitize(project)]));\n      } catch {}\n    }\n  },\n  deleteProject(projectId: string): void { const projects = this.getProjects().filter(p => p.id !== projectId); try { localStorage.setItem('cash_studio_projects', JSON.stringify(projects)); } catch {} },\n  getOrCreateProject(songId: string, songTitle: string): TrackProject {\n    const existing = this.getProjects().find(p => p.songId === songId);\n    if (existing) return existing;\n    const project: TrackProject = { id: `PROJ-${Date.now()}`, songId, songTitle, createdAt: Date.now(), tracks: [] };\n    this.saveProject(project); return project;\n  },\n  addTrackToProject(projectId: string, track: MobileRecording): TrackProject | null {\n    const projects = this.getProjects(); const project = projects.find(p => p.id === projectId);\n    if (!project) return null;\n    // Stocker seulement les métadonnées dans localStorage (dataUrl est dans IndexedDB)\n    const trackMeta = { ...track, dataUrl: undefined, blob: undefined };\n    if (track.takeSlot && track.trackIndex === 0) {\n      project.tracks = project.tracks.filter(t =>\n        !(t.trackIndex === 0 && !t.isGenerated && t.takeSlot === track.takeSlot)\n      );\n    } else {\n      project.tracks = project.tracks.filter(t => t.trackIndex !== track.trackIndex);\n    }\n    project.tracks.push(trackMeta as MobileRecording); this.saveProject(project);\n    // Retourner le projet avec le vrai track (dataUrl inclus) pour le state React en mémoire\n    const projectWithData = { ...project, tracks: [...project.tracks.filter(t => t.id !== track.id), track] };\n    return projectWithData;\n  },\n  async analyzeWaveform(dataUrl: string, points = 200): Promise<number[]> {\n    const ctx = new (window.AudioContext || (window as any).webkitAudioContext)();\n    try {\n      const blob = this.resolveBlob(dataUrl);\n      if (!blob) return []; // sentinelle sans blob en mémoire (session précédente)\n      const arrayBuffer = await blob.arrayBuffer();\n      const audioBuffer = await ctx.decodeAudioData(arrayBuffer); const data = audioBuffer.getChannelData(0);\n      const blockSize = Math.floor(data.length / points); const waveform: number[] = [];\n      for (let i = 0; i < points; i++) { let sum = 0; for (let j = 0; j < blockSize; j++) sum += Math.abs(data[i * blockSize + j] || 0); waveform.push(sum / blockSize); }\n      const max = Math.max(...waveform, 0.001); return waveform.map(v => v / max);\n    } finally { ctx.close(); }\n  },\n  async mixProject(\n    project: TrackProject,\n    onProgress?: (label: string, pct: number) => void\n  ): Promise<Blob> {\n    const yield_ = () => new Promise<void>(r => setTimeout(r, 40));\n    const activeTracks = project.tracks.filter(t => !t.muted && t.dataUrl);\n    if (activeTracks.length === 0) throw new Error('Aucune piste valide à mixer');\n\n    onProgress?.('Décodage des pistes…', 10);\n    await yield_();\n\n    const tmpCtx = new (window.AudioContext || (window as any).webkitAudioContext)();\n    const decoded: { track: MobileRecording; buffer: AudioBuffer }[] = [];\n    for (let i = 0; i < activeTracks.length; i++) {\n      const track = activeTracks[i];\n      onProgress?.(`Décodage piste ${i + 1}/${activeTracks.length}…`, 10 + Math.round((i / activeTracks.length) * 25));\n      await yield_();\n      try {\n        const blob = await this.resolveBlobAsync(track.dataUrl!);\n        if (!blob) { console.warn(`[Studio] Blob introuvable pour \"${track.trackLabel}\" — ignoré`); continue; }\n        const arrayBuffer = await blob.arrayBuffer();\n        const buffer = await tmpCtx.decodeAudioData(arrayBuffer);\n        decoded.push({ track, buffer });\n      } catch (e) { console.warn(`[Studio] Erreur décodage \"${track.trackLabel}\":`, e); }\n    }\n    await tmpCtx.close();\n    if (decoded.length === 0) throw new Error('Aucune piste décodable');\n\n    onProgress?.('Traitement pitch…', 38);\n    await yield_();\n\n    const shifted: { track: MobileRecording; buffer: AudioBuffer }[] = [];\n    for (const { track, buffer } of decoded) {\n      const semitones = track.pitchShift ?? 0;\n      if (semitones !== 0) {\n        try { const shiftedBuf = await pitchShiftBuffer(new (window.AudioContext || (window as any).webkitAudioContext)(), buffer, semitones); shifted.push({ track, buffer: shiftedBuf }); } catch { shifted.push({ track, buffer }); }\n      } else { shifted.push({ track, buffer }); }\n      await yield_();\n    }\n\n    onProgress?.('Rendu audio…', 50);\n    await yield_();\n\n    const maxDuration = Math.max(...shifted.map(s => s.buffer.duration));\n    const sampleRate = shifted[0].buffer.sampleRate;\n    const offline = new OfflineAudioContext(2, Math.ceil(maxDuration * sampleRate) + 4096, sampleRate);\n    for (const { track, buffer } of shifted) {\n      const src = offline.createBufferSource(); src.buffer = buffer;\n      const gainNode = offline.createGain(); gainNode.gain.value = track.gain ?? 1.0;\n      const panner = offline.createStereoPanner(); panner.pan.value = track.pan ?? 0;\n      src.connect(gainNode); gainNode.connect(panner); panner.connect(offline.destination); src.start(0);\n    }\n\n    // Animer la barre pendant le rendu OfflineAudioContext (durée inconnue, ~10-60s)\n    let renderPct = 52;\n    const renderTick = setInterval(() => {\n      renderPct = Math.min(74, renderPct + 1);\n      onProgress?.('Rendu audio…', renderPct);\n    }, 800);\n\n    let rendered: AudioBuffer;\n    try {\n      rendered = await safeStartRendering(offline);\n    } finally {\n      clearInterval(renderTick);\n    }\n\n    onProgress?.('Encodage du mix…', 76);\n    await yield_();\n\n    // Encodage en temps réel — animer la barre\n    const encDur = rendered.duration;\n    const encBlob = await audioBufferToBlob(rendered, (pct) => {\n      onProgress?.(`Encodage WAV… ${pct}%`, 76 + Math.round(pct * 0.22));\n    });\n\n    onProgress?.('Terminé ✓', 100);\n    return encBlob;\n  },\n  async mixComp(takes: Take[], gain = 1.0): Promise<Blob> {\n    const allRegions = takes.flatMap(take => take.regions.map(r => ({ ...r, recording: take.recording }))).sort((a, b) => a.startSec - b.startSec);\n    if (allRegions.length === 0) throw new Error('Aucune région sélectionnée');\n    const tmpCtx = new (window.AudioContext || (window as any).webkitAudioContext)();\n    const bufferMap = new Map<string, AudioBuffer>();\n    for (const take of takes) {\n      if (!take.recording.dataUrl || bufferMap.has(take.recording.id)) continue;\n      try { const blob = await this.resolveBlobAsync(take.recording.dataUrl); if (!blob) { console.warn(`[Comp] Blob introuvable prise ${take.recording.id}`); continue; } const ab = await blob.arrayBuffer(); const buf = await tmpCtx.decodeAudioData(ab); bufferMap.set(take.recording.id, buf); } catch (e) { console.warn(`[Comp] Erreur décodage prise ${take.recording.id}:`, e); }\n    }\n    await tmpCtx.close();\n    const totalDuration = allRegions.reduce((sum, r) => sum + (r.endSec - r.startSec), 0); const sampleRate = 44100;\n    const offline = new OfflineAudioContext(2, Math.ceil(totalDuration * sampleRate), sampleRate);\n    let cursor = 0;\n    for (const region of allRegions) {\n      const buf = bufferMap.get(region.takeId); if (!buf) continue;\n      const regionDuration = region.endSec - region.startSec; if (regionDuration <= 0) continue;\n      const source = offline.createBufferSource(); source.buffer = buf;\n      const gainNode = offline.createGain(); gainNode.gain.value = gain;\n      const fadeTime = Math.min(0.02, regionDuration / 4);\n      gainNode.gain.setValueAtTime(0, cursor); gainNode.gain.linearRampToValueAtTime(gain, cursor + fadeTime);\n      gainNode.gain.setValueAtTime(gain, cursor + regionDuration - fadeTime); gainNode.gain.linearRampToValueAtTime(0, cursor + regionDuration);\n      source.connect(gainNode); gainNode.connect(offline.destination); source.start(cursor, region.startSec, regionDuration);\n      cursor += regionDuration;\n    }\n    const rendered = await safeStartRendering(offline); return audioBufferToBlob(rendered);\n  },\n\n  async generateLayersFromVoice(mainVoice: MobileRecording, project: TrackProject, onProgress?: (label: string, pct: number) => void, songMeta?: { realPartition?: any[]; key?: string }, targetTrackIndex?: number): Promise<MobileRecording[]> {\n    const progress = (label: string, pct: number) => onProgress?.(label, pct);\n    progress('Décodage voix principale', 5);\n\n    // Récupérer le blob : priorité dataUrl en mémoire, sinon IndexedDB\n    // On essaie toujours IndexedDB si dataUrl manquant ou trop petit\n    let srcBlob: Blob | null = null;\n    const db = getOfflineDB();\n    if (mainVoice.dataUrl && mainVoice.dataUrl.length > 1000) {\n      srcBlob = await this.resolveBlobAsync(mainVoice.dataUrl);\n    }\n    if (!srcBlob || srcBlob.size < 1000) {\n      try {\n        progress('Chargement audio depuis le stockage local...', 3);\n        const dbBlob = await db.getAudio(`rec_${mainVoice.id}`);\n        if (dbBlob && dbBlob.size > 1000) srcBlob = dbBlob;\n      } catch (e) {\n        console.warn('[generateLayers] IndexedDB error:', e);\n      }\n    }\n    // Dernier recours : tenter la clé backup\n    if (!srcBlob || srcBlob.size < 1000) {\n      try {\n        progress('Tentative restauration depuis backup...', 4);\n        const backupBlob = await db.getAudio(`backup_voice_${mainVoice.id}`);\n        if (backupBlob && backupBlob.size > 1000) {\n          srcBlob = backupBlob;\n          console.warn('[generateLayers] ⚠️ Restauration depuis backup automatique');\n        }\n      } catch {}\n    }\n    if (!srcBlob || srcBlob.size < 1000) {\n      throw new Error(`Fichier audio introuvable (id: ${mainVoice.id}). Veuillez ré-enregistrer la voix principale.`);\n    }\n\n    // Réutiliser le buffer déjà décodé si disponible (mis en cache après l'enregistrement)\n    // Évite decodeAudioData sur un gros fichier — cause principale du freeze iOS\n    let srcBuffer: AudioBuffer;\n    const cachedBuf = (window as any).__lastRecDecodedBuf as AudioBuffer | undefined;\n    const cachedId  = (window as any).__lastRecDecodedId  as string | undefined;\n    if (cachedBuf && cachedId === mainVoice.id) {\n      progress('Buffer audio en cache ✅', 9);\n      srcBuffer = cachedBuf;\n    } else {\n      // Pas de cache — décoder maintenant (peut être lent sur iOS pour les gros fichiers)\n      progress('Décodage audio...', 6);\n      const srcAb = await srcBlob.arrayBuffer();\n      const tmpCtx = new (window.AudioContext || (window as any).webkitAudioContext());\n      try { srcBuffer = await tmpCtx.decodeAudioData(srcAb); } finally { tmpCtx.close(); }\n      // Mettre en cache pour les prochaines générations\n      (window as any).__lastRecDecodedBuf = srcBuffer;\n      (window as any).__lastRecDecodedId  = mainVoice.id;\n    }\n    // Construire la carte des accords depuis realPartition\n    const songKey  = parseKey(songMeta?.key || '');\n    const chordMap = songMeta?.realPartition ? buildChordMap(songMeta.realPartition, songKey) : [];\n    const hasChordData = chordMap.length > 0;\n    if (hasChordData) progress(`🎵 Analyse harmonique — ${chordMap.length} accords détectés`, 8);\n\n    // Helper : envoyer une couche au Web Worker et attendre le résultat WAV\n    const processLayerInWorker = (op: string, semitones: number, gain: number, pan: number): Promise<Blob> => {\n      return new Promise((resolve, reject) => {\n        const workerUrl = '/harmony-worker.js';\n        let worker: Worker;\n        try { worker = new Worker(workerUrl); } catch(e: any) {\n          reject(new Error('Worker non disponible : ' + e.message)); return;\n        }\n        const id = Date.now();\n        const channelL = srcBuffer.getChannelData(0);\n        const channelR = srcBuffer.numberOfChannels > 1 ? srcBuffer.getChannelData(1) : srcBuffer.getChannelData(0);\n        // Copier pour transfert (les buffers originaux ne doivent pas être détachés)\n        const transferL = channelL.slice();\n        const transferR = channelR.slice();\n        const timeout = setTimeout(() => {\n          worker.terminate();\n          reject(new Error('Worker timeout (>120s)'));\n        }, 120000);\n        worker.onmessage = (e) => {\n          const msg = e.data;\n          if (msg.id !== id) return;\n          if (msg.type === 'progress') {\n            progress(`${msg.label}`, -1); // -1 = pas de changement de %\n          } else if (msg.type === 'done') {\n            clearTimeout(timeout);\n            worker.terminate();\n            resolve(new Blob([msg.wavBuf], { type: 'audio/wav' }));\n          } else if (msg.type === 'error') {\n            clearTimeout(timeout);\n            worker.terminate();\n            reject(new Error(msg.message));\n          }\n        };\n        worker.onerror = (e) => { clearTimeout(timeout); worker.terminate(); reject(new Error(e.message)); };\n        worker.postMessage({ id, op, channelL: transferL, channelR: transferR, semitones, gain, pan, sampleRate: srcBuffer.sampleRate }, [transferL.buffer, transferR.buffer]);\n      });\n    };\n\n    const allLayers = [\n      { trackIndex: 1, trackLabel: 'Double tracking', pitch: 0, gain: 0.85, pan: -0.3, emoji: '🎵', isDouble: true, suggestedFxId: 'double_epic' },\n      { trackIndex: 2, trackLabel: 'Harmonie +3', pitch: 3, gain: 0.75, pan: 0.4, emoji: '🎶', isDouble: false, suggestedFxId: 'harmony' },\n      { trackIndex: 3, trackLabel: 'Harmonie +7', pitch: 7, gain: 0.70, pan: -0.4, emoji: '🎼', isDouble: false, suggestedFxId: 'harmony' },\n      { trackIndex: 4, trackLabel: 'Octave bas', pitch: -12, gain: 0.80, pan: 0.0, emoji: '🔉', isDouble: false, suggestedFxId: 'octave_deep' },\n      { trackIndex: 5, trackLabel: 'Harmonie +5', pitch: 5, gain: 0.72, pan: 0.3, emoji: '✨', isDouble: false, suggestedFxId: 'harmony' },\n    ];\n    // Si targetTrackIndex spécifié → générer seulement cette harmonie\n    const layers = targetTrackIndex !== undefined\n      ? allLayers.filter(l => l.trackIndex === targetTrackIndex)\n      : allLayers;\n    const generated: MobileRecording[] = [];\n\n    const yieldToMain = () => new Promise<void>(r => setTimeout(r, 80));\n\n    for (let i = 0; i < layers.length; i++) {\n      const layer = layers[i]; const pct = 10 + (i / layers.length) * 75;\n      await yieldToMain();\n      progress(`${layer.emoji} ${layer.trackLabel} — Worker en cours...`, pct);\n\n      let blob: Blob;\n      try {\n        blob = await processLayerInWorker(\n          layer.isDouble ? 'double' : 'pitch',\n          layer.pitch, layer.gain, layer.pan\n        );\n        progress(`${layer.emoji} ${layer.trackLabel} — OK (${(blob.size/1024).toFixed(0)} Ko)`, pct + 5);\n      } catch (workerErr: any) {\n        // Le Worker a échoué — pas de fallback main thread (crasherait iOS)\n        // Loguer et continuer avec les autres harmonies\n        progress(`⚠️ ${layer.trackLabel} échouée : ${workerErr.message}`, pct);\n        await yieldToMain();\n        continue;\n      }\n\n      await yieldToMain();\n\n      // Convertir en dataUrl seulement si < 5MB — sinon sentinelle opfs: pour éviter crash iOS\n      // Si blobToDataUrl échoue (quota mémoire iOS), fallback automatique vers sentinelle mémoire\n      let dataUrl: string;\n      const saveHarmonyBlob = async (b: Blob, trackIdx: number): Promise<string> => {\n        const harmKey = `harmony_${mainVoice.id}_t${trackIdx}`;\n        // 1. Garder en mémoire pour la session courante\n        if (!(window as any).__harmonyBlobs) (window as any).__harmonyBlobs = {};\n        (window as any).__harmonyBlobs[harmKey] = b;\n        // 2. Persister en OPFS/IDB pour les sessions futures\n        try {\n          await db.saveAudio(harmKey, b, { type: 'harmony', trackIndex: trackIdx, voiceId: mainVoice.id });\n        } catch (saveErr: any) {\n          const isQ = saveErr?.name === 'QuotaExceededError' || (saveErr?.message && saveErr.message.toLowerCase().includes('quota'));\n          if (!isQ) console.warn('[Harmony] Erreur persistance OPFS:', saveErr?.message);\n          // En cas de quota, le blob reste au moins en mémoire pour cette session\n        }\n        return `opfs:${harmKey}`;\n      };\n      if (blob.size < 5 * 1024 * 1024) {\n        try {\n          dataUrl = await this.blobToDataUrl(blob);\n          // Persister aussi en OPFS pour les sessions futures\n          await saveHarmonyBlob(blob, layer.trackIndex);\n        } catch (dataUrlErr: any) {\n          const isQuota = dataUrlErr?.name === 'QuotaExceededError'\n            || (dataUrlErr?.message && dataUrlErr.message.toLowerCase().includes('quota'));\n          if (isQuota) {\n            console.warn('[generateLayers] blobToDataUrl quota — fallback sentinelle mémoire:', dataUrlErr.message);\n            dataUrl = await saveHarmonyBlob(blob, layer.trackIndex);\n          } else {\n            throw dataUrlErr;\n          }\n        }\n      } else {\n        dataUrl = await saveHarmonyBlob(blob, layer.trackIndex);\n      }\n      const safeTitle = (mainVoice.songTitle || 'song').replace(/\\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');\n      const fileName = `${safeTitle}_T${layer.trackIndex}_GEN_${Date.now()}.wav`;\n      const rec: MobileRecording = {\n        id: `GEN-${layer.trackIndex}-${Date.now()}`, songId: mainVoice.songId, songTitle: mainVoice.songTitle, artist: mainVoice.artist,\n        duration: mainVoice.duration, recordedAt: Date.now(), dataUrl, transferred: false, fileName,\n        trackIndex: layer.trackIndex, trackLabel: layer.trackLabel, pitchShift: layer.isDouble ? 0 : layer.pitch,\n        gain: layer.gain, pan: layer.pan, projectId: project.id, isGenerated: true, fxPresetId: layer.suggestedFxId\n      } as any;\n      this.saveRecordingLocally(rec);\n      generated.push(rec as any);\n      progress(`✅ ${layer.trackLabel} sauvegardée (${i + 1}/${layers.length})`, pct + 6);\n      await yieldToMain();\n    }\n    progress('✅ Toutes les harmonies générées', 100); return generated;\n  },\n  async applyFxToTrack(dataUrl: string, fx: { lowGain: number; midGain: number; highGain: number; compThreshold: number; compRatio: number; compAttack: number; compRelease: number; compKnee: number; saturation: number; reverb: string; reverbMix: number; autotune?: number; autotuneSpeed?: string; }, onProgress?: (pct: number) => void): Promise<string> {\n    onProgress?.(5);\n    // Décoder — réutiliser le cache si disponible\n    let srcBuf: AudioBuffer;\n    const lastFxUrl = (window as any).__lastFxSourceUrl as string | undefined;\n    const cachedBuf = (window as any).__lastRecDecodedBuf as AudioBuffer | undefined;\n    if (cachedBuf && lastFxUrl === dataUrl) {\n      srcBuf = cachedBuf;\n    } else {\n      // Résoudre le blob source (dataUrl normale ou sentinelle opfs:)\n      let srcBlob: Blob;\n      if (dataUrl.startsWith('opfs:')) {\n        const key = dataUrl.slice(5);\n        const fxBlob    = (window as any).__lastFxBlob as Blob | undefined;\n        const fxKey     = (window as any).__lastFxKey  as string | undefined;\n        const harmBlobs = (window as any).__harmonyBlobs as   "components/StudioMobile.tsx": "/**\nStudioMobile.tsx — Orchestrateur v7.4\nCORRECTIFS MAJEURS :\n1. Warm-up : Crée UN SEUL AudioContext global (__warmContext), le démarre, \n   demande la permission, stoppe les tracks MAIS GARDE LE CONTEXTE OUVERT.\n2. Plus de double upload dans handleStemReady.\n3. Capture sèche forcée via recorder.\n*/\nimport React, { useState, useEffect, useRef } from 'react';\nimport { studioService, ReverbType, MobileRecording, TrackProject, Take } from '../services/StudioService';\nimport { studioOfflineDB } from '../services/StudioOfflineDB';\nimport { Song, SongType } from '../types';\nimport { Screen, TRACK_PRESETS, TrackPreset } from './StudioMobile/studio.types';\nimport { useStudioAudio }    from './StudioMobile/useStudioAudio';\nimport { useStudioOffline }  from './StudioMobile/useStudioOffline';\nimport { useStudioRecorder } from './StudioMobile/useStudioRecorder';\nimport SongSelector    from './StudioMobile/SongSelector';\nimport RecordScreen    from './StudioMobile/RecordScreen';\nimport MixerScreen     from './StudioMobile/MixerScreen';\nimport RecordingsList  from './StudioMobile/RecordingsList';\nimport CompEditor      from './StudioMobile/CompEditor';\nimport MasteringEngine, { MasteringProps } from './StudioMobile/MasteringEngine';\n\ninterface Props { songs?: Song[]; }\nconst BUILD_VERSION = 'v7.6.147';\n\nfunction ModeToggleButton() {\n  const [autonomous, setAutonomous] = React.useState<boolean>(\n    () => localStorage.getItem('cc_force_autonomous') === '1'\n  );\n\n  // Synchroniser si MacUrlConfig change le flag dans le même onglet\n  React.useEffect(() => {\n    const sync = () => setAutonomous(localStorage.getItem('cc_force_autonomous') === '1');\n    window.addEventListener('cc_mode_changed', sync);\n    return () => window.removeEventListener('cc_mode_changed', sync);\n  }, []);\n\n  const toggle = () => {\n    if (!autonomous) {\n      (window as any).__CC_MAC_URL_SAVED = (window as any).__CC_MAC_URL || localStorage.getItem('cc_mac_url') || '';\n      (window as any).__CC_MAC_URL = '';\n      localStorage.setItem('cc_force_autonomous', '1');\n      window.dispatchEvent(new Event('cc_mode_changed'));\n      window.location.reload();\n    } else {\n      localStorage.removeItem('cc_force_autonomous');\n      const saved = (window as any).__CC_MAC_URL_SAVED || localStorage.getItem('cc_mac_url') || '';\n      if (saved) localStorage.setItem('cc_mac_url', saved);\n      window.dispatchEvent(new Event('cc_mode_changed'));\n      window.location.reload();\n    }\n  };\n\n  return (\n    <button\n      onClick={toggle}\n      style={{\n        display: 'flex', alignItems: 'center', gap: 6,\n        padding: '6px 12px', borderRadius: 10, cursor: 'pointer',\n        background: autonomous ? '#1a1a2e' : '#1e3a1e',\n        border: `1.5px solid ${autonomous ? '#3b82f6' : '#16a34a'}`,\n        transition: 'all 0.2s',\n      }}>\n      <span style={{ fontSize: 13 }}>{autonomous ? '📡' : '💻'}</span>\n      <span style={{\n        fontSize: 10, fontWeight: 900, textTransform: 'uppercase', letterSpacing: 1,\n        color: autonomous ? '#60a5fa' : '#4ade80',\n      }}>\n        {autonomous ? 'Autonome' : 'Mac'}\n      </span>\n    </button>\n  );\n}\n\nfunction DebugPanel({ debugLog, onClear }: { debugLog: string[]; onClear: () => void }) {\n  const [minimized, setMinimized] = React.useState(true);\n  const ctxRate = (window as any).__warmContext?.sampleRate;\n  const ctxState = (window as any).__warmContext?.state;\n  const rateColor = !ctxRate ? '#71717a' : ctxRate >= 44000 ? '#22c55e' : '#f59e0b';\n  return (\n    <div style={{\n      position:'fixed', bottom:0, left:0, right:0, zIndex:9999,\n      background:'rgba(0,0,0,0.92)', padding:'8px',\n      maxHeight: minimized ? 'auto' : '40vh',\n      overflowY: minimized ? 'hidden' : 'auto',\n    }}>\n      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: minimized ? 0 : 4 }}>\n        <div styl
