font-black text-white flex-1\">\n                  {fmt(r.startSec)} → {fmt(r.endSec)}\n                </p>\n                <p className=\"text-[10px] text-zinc-500\">{(r.endSec - r.startSec).toFixed(1)}s</p>\n              </div>\n            ))}\n            <div className=\"mt-2 pt-2 border-t border-white/5 flex justify-between\">\n              <p className=\"text-[11px] text-zinc-600 font-black uppercase\">Durée</p>\n              <p className=\"text-[12px] font-black text-white\">{totalDuration.toFixed(1)}s</p>\n            </div>\n          </div>\n        )}\n\n        {/* Actions */}\n        <div className=\"space-y-3 pt-2\">\n          <button onClick={doComp}\n            disabled={totalRegions === 0 || isMixing}\n            className=\"w-full py-4 bg-red-600 rounded-2xl font-black text-[14px] uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all disabled:opacity-40\">\n            {isMixing\n              ? <><Loader2 size={18} className=\"animate-spin\"/> Génération...</>\n              : <><Scissors size={18}/> Générer le comp ({totalRegions} région{totalRegions !== 1 ? 's' : ''})</>}\n          </button>\n\n          {compUrl && (\n            <>\n              <button onClick={playComp}\n                className=\"w-full py-4 bg-zinc-900 border border-zinc-700 rounded-2xl font-black text-[14px] uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all\">\n                {playingComp ? <><Pause size={18}/> Arrêter</> : <><Play size={18}/> Écouter le comp</>}\n              </button>\n              <button onClick={() => compBlob && onCompReady(compBlob)}\n                className=\"w-full py-4 bg-emerald-700 rounded-2xl font-black text-[14px] uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all\">\n                <CheckCircle2 size={18}/> Utiliser ce comp\n              </button>\n            </>\n          )}\n        </div>\n      </div>\n\n      <audio ref={audioRef} playsInline className=\"hidden\"/>\n    </div>\n  );\n}\n",
  "components/StudioMobile/MasteringEngine.tsx": "/**\n * MasteringEngine.tsx — Masterisation & Export iPhone v2\n *\n * DEUX MODES :\n *\n * MODE A — \"Envoyer au Mac\" (stem vocal)\n *   Source : mix vocal seul (voix + harmonies + layers)\n *   Résultat : blob masterisé → uploadToServer → remplace STEM_VOCAL sur Mac\n *   Qualité : audio/mp4 AAC (format natif iOS)\n *\n * MODE B — \"Publication\" (Spotify / YouTube)\n *   Source : mix vocal + stem instrumental chargé depuis IndexedDB\n *   Résultat : mix complet masterisé → export MP3 320kbps via navigator.share()\n *   Qualité : MP3 320kbps (standard distribution)\n *\n * EXPORT iOS :\n *   - MP3 via lamejs (chargé depuis /lame.min.js ou CDN)\n *   - Partage via navigator.share({ files: [File] }) — seule méthode qui marche en PWA iOS\n *   - Fallback : ouvrir dans Safari → bouton Partage ⬆️ → Enregistrer dans Fichiers\n *\n * CORRECTIFS :\n *   - a.click() supprimé (bloqué en PWA iOS)\n *   - lamejs ajouté au cache SW pour fonctionner hors-ligne\n *   - decodeAudioData sur blob mp4 fonctionne sur iOS avec les corrections de format précédentes\n */\nimport React, { useState, useRef, useEffect, useCallback } from 'react';\nimport {\n  ChevronLeft, Play, Pause, Send, Share2,\n  CheckCircle2, Loader2, Zap, Mic, Music2, AlertCircle,\n} from 'lucide-react';\nimport { studioService, MobileRecording } from '../../services/StudioService';\nimport { studioOfflineDB } from '../../services/StudioOfflineDB';\n\n// ── Types ─────────────────────────────────────────────────────────────────────\n\ninterface MasterSettings {\n  lowGain:     number;   // -12..+12 dB\n  midGain:     number;\n  highGain:    number;\n  threshold:   number;   // -40..0 dB\n  ratio:       number;   // 1..20\n  attack:      number;   // ms\n  release:     number;   // ms\n  ceiling:     number;   // dB\n  targetLufs:  number;\n}\n\nexport interface MasteringProps {\n  // Le mix vocal (voix + harmonies, PAS l'instrumental)\n  vocalBlob:    Blob;\n  // L'instrumental à mixer pour l'export publication (null si non disponible)\n  instBlob:     Blob | null;\n  songTitle:    string;\n  songId:       string;\n  // Fonctions de retour\n  onBack:       () => void;\n  onStemReady:  (blob: Blob, fileName: string) => Promise<void>; // → Mac\n  isOnline:     boolean;\n}\n\n// ── Utilitaires audio ─────────────────────────────────────────────────────────\n\nfunction isIOS(): boolean {\n  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||\n    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);\n}\n\nfunction analyzeLoudness(buffer: AudioBuffer): number {\n  const data = buffer.getChannelData(0);\n  let sum = 0;\n  for (let i = 0; i < data.length; i++) sum += data[i] * data[i];\n  const rms = Math.sqrt(sum / data.length);\n  return rms > 0 ? 20 * Math.log10(rms) : -100;\n}\n\nasync function decodeBlob(blob: Blob): Promise<AudioBuffer> {\n  const ctx = new (window.AudioContext || (window as any).webkitAudioContext)();\n  try {\n    const ab  = await blob.arrayBuffer();\n    const buf = await ctx.decodeAudioData(ab);\n    return buf;\n  } finally {\n    ctx.close();\n  }\n}\n\n// Mixer deux AudioBuffers (vocal + instrumental) dans un OfflineAudioContext\nasync function mixVocalWithInst(\n  vocalBuf: AudioBuffer,\n  instBuf:  AudioBuffer,\n  instGain: number = 0.85, // instrumental légèrement en dessous de la voix\n): Promise<AudioBuffer> {\n  const sr       = Math.max(vocalBuf.sampleRate, instBuf.sampleRate);\n  const duration = Math.max(vocalBuf.duration, instBuf.duration);\n  const offline  = new OfflineAudioContext(2, Math.ceil(duration * sr), sr);\n\n  const vSrc = offline.createBufferSource();\n  vSrc.buffer = vocalBuf;\n  const vGain = offline.createGain();\n  vGain.gain.value = 1.0;\n  vSrc.connect(vGain); vGain.connect(offline.destination);\n  vSrc.start(0);\n\n  const iSrc = offline.createBufferSource();\n  iSrc.buffer = instBuf;\n  const iGain = offline.createGain();\n  iGain.gain.value = instGain;\n  iSrc.connect(iGain); iGain.connect(offline.destination);\n  iSrc.start(0);\n\n  return offline.startRendering();\n}\n\n// Masterisation EQ + Compresseur + Limiteur\nasync function masterAudio(buf: AudioBuffer, s: MasterSettings): Promise<AudioBuffer> {\n  const offline = new OfflineAudioContext(2, buf.length, buf.sampleRate);\n  const src     = offline.createBufferSource();\n  src.buffer    = buf;\n\n  const low  = offline.createBiquadFilter(); low.type  = 'lowshelf';  low.frequency.value  = 250;  low.gain.value  = s.lowGain;\n  const mid  = offline.createBiquadFilter(); mid.type  = 'peaking';   mid.frequency.value  = 2500; mid.Q.value = 0.8; mid.gain.value = s.midGain;\n  const high = offline.createBiquadFilter(); high.type = 'highshelf'; high.frequency.value = 8000; high.gain.value = s.highGain;\n\n  const comp    = offline.createDynamicsCompressor();\n  comp.threshold.value = s.threshold; comp.ratio.value = s.ratio;\n  comp.attack.value    = s.attack / 1000; comp.release.value = s.release / 1000; comp.knee.value = 6;\n\n  const limiter = offline.createDynamicsCompressor();\n  limiter.threshold.value = s.ceiling - 0.5; limiter.ratio.value = 20;\n  limiter.attack.value = 0.001; limiter.release.value = 0.1; limiter.knee.value = 0;\n\n  const lufs    = analyzeLoudness(buf);\n  const gainDb  = Math.min(s.targetLufs - lufs, 12);\n  const makeup  = offline.createGain();\n  makeup.gain.value = Math.pow(10, gainDb / 20);\n\n  src.connect(low); low.connect(mid); mid.connect(high);\n  high.connect(comp); comp.connect(limiter); limiter.connect(makeup);\n  makeup.connect(offline.destination);\n  src.start(0);\n  return offline.startRendering();\n}\n\n// Convertir AudioBuffer → Blob mp4 (iOS natif) — 256 kbps pour la qualité\nasync function audioBufferToBlob(buffer: AudioBuffer): Promise<Blob> {\n  const mimeType = isIOS() ? 'audio/mp4'\n    : MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'\n    : 'audio/mp4';\n\n  const ctx  = new (window.AudioContext || (window as any).webkitAudioContext)();\n  const dest = ctx.createMediaStreamDestination();\n  const src  = ctx.createBufferSource();\n  src.buffer = buffer; src.connect(dest);\n\n  const recOpts: MediaRecorderOptions = {};\n  if (mimeType) recOpts.mimeType = mimeType;\n  recOpts.audioBitsPerSecond = 256000; // 256 kbps — qualité maximale AAC\n  const recorder = new MediaRecorder(dest.stream, recOpts);\n  const chunks: Blob[] = [];\n  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };\n\n  return new Promise(resolve => {\n    recorder.onstop = () => {\n      ctx.close();\n      resolve(new Blob(chunks, { type: chunks[0]?.type || 'audio/mp4' }));\n    };\n    recorder.start();\n    src.start();\n    setTimeout(() => { recorder.stop(); try { src.stop(); } catch {} }, (buffer.duration + 0.5) * 1000);\n  });\n}\n\n// Encodeur MP3 via lamejs\nasync function encodeMP3(buffer: AudioBuffer, kbps = 320): Promise<Blob> {\n  // Charger lamejs depuis le serveur local (mis en cache SW) ou CDN\n  if (!(window as any).lamejs) {\n    await new Promise<void>((resolve, reject) => {\n      const tryLoad = (src: string, fallback?: string) => {\n        const s = document.createElement('script');\n        s.src = src;\n        s.onload  = () => resolve();\n        s.onerror = () => fallback ? tryLoad(fallback) : reject(new Error('lamejs introuvable'));\n        document.head.appendChild(s);\n      };\n      tryLoad('/lame.min.js', 'https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js');\n    });\n  }\n\n  const lamejs    = (window as any).lamejs;\n  const channels  = Math.min(2, buffer.numberOfChannels);\n  const sampleRate = buffer.sampleRate;\n  const encoder   = new lamejs.Mp3Encoder(channels, sampleRate, kbps);\n  const chL       = buffer.getChannelData(0);\n  const chR       = channels > 1 ? buffer.getChannelData(1) : chL;\n  const BLOCK     = 1152;\n  const mp3Data: Int8Array[] = [];\n\n  const toInt16 = (f32: Float32Array, out: Int16Array) => {\n    for (let i = 0; i < f32.length; i++)\n      out[i] = Math.max(-32768, Math.min(32767, Math.round(f32[i] * 32767)));\n  };\n\n  for (let i = 0; i < chL.length; i += BLOCK) {\n    const lSlice = chL.slice(i, i + BLOCK);\n    const rSlice = chR.slice(i, i + BLOCK);\n    const lInt   = new Int16Array(lSlice.length);\n    const rInt   = new Int16Array(rSlice.length);\n    toInt16(lSlice, lInt); toInt16(rSlice, rInt);\n    const chunk = channels > 1 ? encoder.encodeBuffer(lInt, rInt) : encoder.encodeBuffer(lInt);\n    if (chunk.length > 0) mp3Data.push(chunk);\n  }\n  const final = encoder.flush();\n  if (final.length > 0) mp3Data.push(final);\n\n  const totalLen = mp3Data.reduce((s, c) => s + c.length, 0);\n  const merged   = new Uint8Array(totalLen);\n  let pos = 0;\n  for (const chunk of mp3Data) { merged.set(chunk, pos); pos += chunk.length; }\n  return new Blob([merged], { type: 'audio/mpeg' });\n}\n\n// Encodeur WAV 24-bit PCM — qualité maximale pour distribution Spotify/DistroKid\n// WAV 24-bit/44.1kHz est le format de référence accepté par toutes les plateformes.\n// Safari iOS ne supporte pas l'export WAV natif via MediaRecorder — on construit\n// le fichier manuellement à partir des Float32Array de l'AudioBuffer.\nfunction encodeWAV(buffer: AudioBuffer): Blob {\n  const numChannels = Math.min(2, buffer.numberOfChannels);\n  const sampleRate  = buffer.sampleRate;\n  const bitDepth    = 24; // 24-bit pour qualité maximale (vs 16-bit standard)\n  const bytesPerSample = bitDepth / 8; // 3 bytes\n  const numSamples  = buffer.length;\n  const dataSize    = numSamples * numChannels * bytesPerSample;\n  const bufferSize  = 44 + dataSize; // 44 bytes header WAV standard\n\n  const arrayBuf = new ArrayBuffer(bufferSize);\n  const view     = new DataView(arrayBuf);\n\n  // ── Header WAV (RIFF/WAVE) ────────────────────────────────────────────────\n  const writeStr = (offset: number, str: string) => {\n    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));\n  };\n  const writeU32 = (offset: number, val: number) => view.setUint32(offset, val, true);\n  const writeU16 = (offset: number, val: number) => view.setUint16(offset, val, true);\n\n  writeStr(0,  'RIFF');\n  writeU32(4,  bufferSize - 8);\n  writeStr(8,  'WAVE');\n  writeStr(12, 'fmt ');\n  writeU32(16, 16);                               // chunk size\n  writeU16(20, 1);                                // PCM = 1\n  writeU16(22, numChannels);\n  writeU32(24, sampleRate);\n  writeU32(28, sampleRate * numChannels * bytesPerSample); // byte rate\n  writeU16(32, numChannels * bytesPerSample);     // block align\n  writeU16(34, bitDepth);\n  writeStr(36, 'data');\n  writeU32(40, dataSize);\n\n  // ── Données PCM 24-bit interleaved ───────────────────────────────────────\n  const chL = buffer.getChannelData(0);\n  const chR = numChannels > 1 ? buffer.getChannelData(1) : chL;\n  let offset = 44;\n\n  for (let i = 0; i < numSamples; i++) {\n    // Canal gauche\n    const sL = Math.max(-1, Math.min(1, chL[i]));\n    const iL = sL < 0 ? sL * 0x800000 : sL * 0x7FFFFF;\n    view.setUint8(offset,     iL & 0xFF);\n    view.setUint8(offset + 1, (iL >> 8) & 0xFF);\n    view.setUint8(offset + 2, (iL >> 16) & 0xFF);\n    offset += 3;\n    // Canal droit\n    const sR = Math.max(-1, Math.min(1, chR[i]));\n    const iR = sR < 0 ? sR * 0x800000 : sR * 0x7FFFFF;\n    view.setUint8(offset,     iR & 0xFF);\n    view.setUint8(offset + 1, (iR >> 8) & 0xFF);\n    view.setUint8(offset + 2, (iR >> 16) & 0xFF);\n    offset += 3;\n  }\n\n  return new Blob([arrayBuf], { type: 'audio/wav' });\n}\n\n// Partage iOS via navigator.share — seule méthode qui marche en PWA\nasync function shareFileIOS(blob: Blob, fileName: string, title: string): Promise<void> {\n  const file = new File([blob], fileName, { type: blob.type });\n\n  if (navigator.share && navigator.canShare?.({ files: [file] })) {\n    await navigator.share({ title, files: [file] });\n    return;\n  }\n\n  // Fallback : ouvrir dans Safari (iOS 13-14 ou navigateur sans share API)\n  const url = URL.createObjectURL(blob);\n  const a   = document.createElement('a');\n  a.href = url; a.download = fileName; a.click();\n  setTimeout(() => URL.revokeObjectURL(url), 10000);\n\n  if (isIOS()) {\n    setTimeout(() => {\n      alert(\n        `Fichier prêt.\\\n\\\nPour le sauvegarder :\\\n` +\n        `• Bouton Partage ⬆️ → \"Enregistrer dans Fichiers\"\\\n` +\n        `• ou AirDrop → Mac\\\n` +\n        `• ou \"Copier dans...\" → une app de musique`\n      );\n    }, 800);\n  }\n}\n\n// ── Presets ───────────────────────────────────────────────────────────────────\n\n// ── Presets de masterisation ─────────────────────────────────────────────────\n// Catégories : Distribution, Country, Style vocal, Live\nconst PRESET_CATEGORIES: { id: string; label: string; keys: string[] }[] = [\n  { id: 'distrib',  label: '🌐 Distribution', keys: ['spotify', 'youtube', 'podcast'] },\n  { id: 'country',  label: '🤠 Country',       keys: ['country', 'country_live', 'country_bright'] },\n  { id: 'vocal',    label: '🎤 Vocal',          keys: ['studio_vocal', 'velvet', 'airy'] },\n  { id: 'impact',   label: '💥 Impact',         keys: ['radio', 'punchy', 'vintage'] },\n];\n\nconst PRESETS: Record<string, { label: string; emoji: string; description: string; settings: MasterSettings }> = {\n  // ── Distribution ──\n  spotify: {\n    label: 'Spotify / Apple Music', emoji: '🎵',\n    description: '-14 LUFS · Streaming standard',\n    settings: { lowGain: 1.5, midGain: 0.5, highGain: 1.0, threshold: -18, ratio: 3, attack: 10, release: 150, ceiling: -1.0, targetLufs: -14 },\n  },\n  youtube: {\n    label: 'YouTube', emoji: '▶',\n    description: '-13 LUFS · Optimal YouTube',\n    settings: { lowGain: 2.0, midGain: 0.0, highGain: 1.5, threshold: -16, ratio: 4, attack: 8, release: 120, ceiling: -1.0, targetLufs: -13 },\n  },\n  podcast: {\n    label: 'Podcast / Voix', emoji: '🎙',\n    description: '-16 LUFS · Clarté maximale voix',\n    settings: { lowGain: -1.0, midGain: 3.0, highGain: 1.5, threshold: -20, ratio: 3, attack: 15, release: 200, ceiling: -1.5, targetLufs: -16 },\n  },\n  // ── Country ──\n  country: {\n    label: 'Country Warm', emoji: '🤠',\n    description: 'Son chaleureux, graves riches',\n    settings: { lowGain: 3.0, midGain: -1.0, highGain: 0.5, threshold: -20, ratio: 3.5, attack: 15, release: 200, ceiling: -1.5, targetLufs: -14 },\n  },\n  country_live: {\n    label: 'Country Live', emoji: '🎸',\n    description: 'Energie scène, présence naturelle',\n    settings: { lowGain: 2.0, midGain: 1.5, highGain: 1.0, threshold: -16, ratio: 4, attack: 8, release: 120, ceiling: -1.0, targetLufs: -12 },\n  },\n  country_bright: {\n    label: 'Country Bright', emoji: '☀️',\n    description: 'Aigus brillants, voix projetée',\n    settings: { lowGain: 1.0, midGain: 0.5, highGain: 3.5, threshold: -18, ratio: 3, attack: 12, release: 160, ceiling: -1.0, targetLufs: -13 },\n  },\n  // ── Vocal ──\n  studio_vocal: {\n    label: 'Studio Vocal', emoji: '🎤',\n    description: 'Voix présente, son pro',\n    settings: { lowGain: 1.0, midGain: 2.5, highGain: 1.5, threshold: -18, ratio: 3, attack: 10, release: 150, ceiling: -1.0, targetLufs: -14 },\n  },\n  velvet: {\n    label: 'Velvet', emoji: '🎼',\n    description: 'Son velouté, chaleureux',\n    settings: { lowGain: 2.5, midGain: -0.5, highGain: -1.0, threshold: -22, ratio: 3, attack: 15, release: 250, ceiling: -1.5, targetLufs: -14 },\n  },\n  airy: {\n    label: 'Airy & Bright', emoji: '✨',\n    description: 'Légèreté, aigus cristallins',\n    settings: { lowGain: -1.0, midGain: 0.5, highGain: 4.0, threshold: -20, ratio: 2.5, attack: 20, release: 200, ceiling: -1.0, targetLufs: -14 },\n  },\n  // ── Impact ──\n  radio: {\n    label: 'Radio / Loud', emoji: '📻',\n    description: '-13 LUFS · Fort et percutant',\n    settings: { lowGain: 0.0, midGain: 1.5, highGain: 3.0, threshold: -15, ratio: 5, attack: 5, release: 100, ceiling: -1.0, targetLufs: -13 },\n  },\n  punchy: {\n    label: 'Punchy', emoji: '💥',\n    description: 'Attaque forte, présence mix',\n    settings: { lowGain: 0.5, midGain: 3.5, highGain: 2.0, threshold: -15, ratio: 5, attack: 3, release: 80, ceiling: -1.0, targetLufs: -13 },\n  },\n  vintage: {\n    label: 'Vintage', emoji: '📯',\n    description: 'Chaleur analogique, son rétro',\n    settings: { lowGain: 4.0, midGain: -2.0, highGain: -1.5, threshold: -22, ratio: 2.5, attack: 20, release: 300, ceiling: -2.0, targetLufs: -16 },\n  },\n};\n\nfunction db(v: number) { return v >= 0 ? `+${v.toFixed(1)} dB` : `${v.toFixed(1)} dB`; }\n\n// ── Composant principal ───────────────────────────────────────────────────────\n\nexport default function MasteringEngine({\n  vocalBlob, instBlob, songTitle, songId, onBack, onStemReady, isOnline,\n}: MasteringProps) {\n\n  const [preset, setPreset]               = useState('country');\n  const [activeCategory, setActiveCategory] = useState('country');\n  const [settings, setSettings]           = useState<MasterSettings>(PRESETS.country.settings);\n  const [showAdvanced, setShowAdvanced]   = useState(false);\n  const [instGain, setInstGain]           = useState(0.85); // volume instrumental dans le mix publication\n\n  // État de rendu\n  const [isMastering, setIsMastering]     = useState(false);\n  const [progress, setProgress]           = useState(0);\n  const [progressLabel, setProgressLabel] = useState('');\n\n  // Résultats\n  const [vocalMastered, setVocalMastered]     = useState<AudioBuffer | null>(null); // Mode A\n  const [fullMastered, setFullMastered]       = useState<AudioBuffer | null>(null); // Mode B\n  const [inputLufs, setInputLufs]             = useState<number | null>(null);\n  const [outputVocalLufs, setOutputVocalLufs] = useState<number | null>(null);\n  const [outputFullLufs, setOutputFullLufs]   = useState<number | null>(null);\n\n  // Upload\n  const [sendingToMac, setSendingToMac]     = useState(false);\n  const [sentToMac, setSentToMac]           = useState(false);\n\n  // Export\n  const [exportingMp3, setExportingMp3]     = useState(false);\n  const [exportedMp3, setExportedMp3]       = useState(false);\n  const [exportingMp4, setExportingMp4]     = useState(false);\n  const [exportedMp4, setExportedMp4]       = useState(false);\n  const [exportingWav, setExportingWav]     = useState(false);\n  const [exportedWav, setExportedWav]       = useState(false);\n\n  // Lecture\n  const [playing, setPlaying]   = useState<'vocal' | 'full' | null>(null);\n  const playRef = useRef<HTMLAudioElement>(null);\n  const vocalUrlRef = useRef<string>('');\n  const fullUrlRef  = useRef<string>('');\n\n  // Analyser l'entrée au montage\n  useEffect(() => {\n    decodeBlob(vocalBlob)\n      .then(buf => setInputLufs(Math.round(analyzeLoudness(buf) * 10) / 10))\n      .catch(() => {});\n    return () => {\n      if (vocalUrlRef.current) URL.revokeObjectURL(vocalUrlRef.current);\n      if (fullUrlRef.current)  URL.revokeObjectURL(fullUrlRef.current);\n    };\n  }, []);\n\n  const applyPreset = (key: string) => {\n    setPreset(key);\n    setSettings({ ...PRESETS[key].settings });\n    setVocalMastered(null); setFullMastered(null);\n    setOutputVocalLufs(null); setOutputFullLufs(null);\n    setSentToMac(false);\n  };\n\n  // ── MASTERISATION ──────────────────────────────────────────────────────────\n\n  const runMastering = async () => {\n    setIsMastering(true); setProgress(0);\n    setVocalMastered(null); setFullMastered(null);\n    setSentToMac(false); setExportedMp3(false); setExportedMp4(false); setExportedWav(false);\n\n    try {\n      // 1. Décoder le mix vocal\n      setProgressLabel('Décodage de la voix...'); setProgress(10);\n      const vocalRaw = await decodeBlob(vocalBlob);\n\n      // 2. Masteriser la voix seule (Mode A)\n      setProgressLabel('Masterisation voix...'); setProgress(30);\n      const vocalM = await masterAudio(vocalRaw, settings);\n      setVocalMastered(vocalM);\n      setOutputVocalLufs(Math.round(analyzeLoudness(vocalM) * 10) / 10);\n\n      // Préparer l'URL de lecture pour le mix vocal\n      if (vocalUrlRef.current) URL.revokeObjectURL(vocalUrlRef.current);\n      const vBlob = await audioBufferToBlob(vocalM);\n      vocalUrlRef.current = URL.createObjectURL(vBlob);\n\n      setProgress(55);\n\n      // 3. Si instrumental disponible → mixer + masteriser (Mode B)\n      if (instBlob) {\n        setProgressLabel('Chargement de l\\'instrumental...'); setProgress(60);\n        const instRaw = await decodeBlob(instBlob);\n\n        setProgressLabel('Mixage vocal + instrumental...'); setProgress(70);\n        const fullRaw = await mixVocalWithInst(vocalM, instRaw, instGain);\n\n        setProgressLabel('Masterisation du mix complet...'); setProgress(80);\n        const fullM = await masterAudio(fullRaw, settings);\n        setFullMastered(fullM);\n        setOutputFullLufs(Math.round(analyzeLoudness(fullM) * 10) / 10);\n\n        if (fullUrlRef.current) URL.revokeObjectURL(fullUrlRef.current);\n        const fBlob = await audioBufferToBlob(fullM);\n        fullUrlRef.current = URL.createObjectURL(fBlob);\n      }\n\n      setProgressLabel('Terminé'); setProgress(100);\n\n    } catch (e: any) {\n      alert('Erreur masterisation : ' + e.message);\n    } finally {\n      setIsMastering(false); setProgressLabel('');\n    }\n  };\n\n  // ── LECTURE ────────────────────────────────────────────────────────────────\n\n  const playAudio = (type: 'vocal' | 'full') => {\n    if (!playRef.current) return;\n    if (playing === type) { playRef.current.pause(); setPlaying(null); return; }\n    const url = type === 'vocal' ? vocalUrlRef.current : fullUrlRef.current;\n    if (!url) return;\n    playRef.current.src = url;\n    playRef.current.load();\n    playRef.current.play().catch(() => {});\n    setPlaying(type);\n    playRef.current.onended = () => setPlaying(null);\n  };\n\n  // ── MODE A : Envoyer au Mac ───────────────────────────────────────────────\n\n  const sendToMac = async () => {\n    if (!vocalMastered || !isOnline) return;\n    setSendingToMac(true);\n    try {\n      const blob = await audioBufferToBlob(vocalMastered);\n      const safeTitle = songTitle.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40);\n      const fileName  = `VOCAL_${safeTitle}_${Date.now()}.mp4`;\n\n      const fakeRec: MobileRecording = {\n        id:          `STEM-${Date.now()}`,\n        songId,\n        songTitle,\n        artist:      '',\n        duration:    vocalMastered.duration,\n        recordedAt:  Date.now(),\n        dataUrl:     '',\n        transferred: false,\n        fileName,\n      };\n\n      const ok = await studioService.uploadToServer(fakeRec, blob);\n      if (ok) {\n        // ── Assigner automatiquement comme stem vocal sur le Mac ──────────────\n        // Sans cet appel, le fichier reste dans \"en attente\" dans l'inbox\n        // et nécessite un clic manuel. Avec cet appel, songs.json est mis à jour\n        // immédiatement et l'app Electron reçoit un événement 'stem-vocal-updated'.\n        try {\n          const assignRes = await fetch('/api/studio/assign-stem', {\n            method: 'POST',\n            headers: { 'Content-Type': 'application/json' },\n            body: JSON.stringify({\n              recId:    fakeRec.id,\n              songId,\n              fileName,\n            }),\n          });\n          const assignData = await assignRes.json().catch(() => ({}));\n          if (assignData.success) {\n            console.log(`[Mastering] Stem vocal assigné sur Mac : ${fileName} → ${assignData.songTitle}`);\n          } else {\n            console.warn('[Mastering] assign-stem échoué, fichier dans inbox Mac');\n          }\n        } catch (e) {\n          // Non-bloquant : le fichier est dans l'inbox, l'utilisateur peut assigner manuellement\n          console.warn('[Mastering] assign-stem non disponible:', e);\n        }\n\n        setSentToMac(true);\n        await onStemReady(blob, fileName);\n      } else {\n        alert('Échec du transfert — Mac allumé et WiFi même réseau ?');\n      }\n    } catch (e: any) {\n      alert('Erreur : ' + e.message);\n    } finally {\n      setSendingToMac(false);\n    }\n  };\n\n  // ── MODE B : Export MP3 (Publication) ─────────────────────────────────────\n\n  const exportAsMP3 = async () => {\n    if (!fullMastered && !vocalMastered) return;\n    setExportingMp3(true);\n    try {\n      const source    = fullMastered || vocalMastered!;\n      const safeTitle = songTitle.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40);\n      const fileName  = `${safeTitle}_MASTER_320.mp3`;\n\n      const mp3Blob = await encodeMP3(source, 320);\n      await shareFileIOS(mp3Blob, fileName, `${songTitle} — Master MP3`);\n      setExportedMp3(true);\n    } catch (e: any) {\n      if ((e as any).name !== 'AbortError') alert('Erreur export MP3 : ' + e.message);\n    } finally {\n      setExportingMp3(false);\n    }\n  };\n\n  // ── MODE B : Export MP4 natif iOS (AAC) ───────────────────────────────────\n\n  const exportAsMP4 = async () => {\n    if (!fullMastered && !vocalMastered) return;\n    setExportingMp4(true);\n    try {\n      const source    = fullMastered || vocalMastered!;\n      const safeTitle = songTitle.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40);\n      const fileName  = `${safeTitle}_MASTER.mp4`;\n\n      const mp4Blob = await audioBufferToBlob(source);\n      await shareFileIOS(mp4Blob, fileName, `${songTitle} — Master MP4`);\n      setExportedMp4(true);\n    } catch (e: any) {\n      if ((e as any).name !== 'AbortError') alert('Erreur export MP4 : ' + e.message);\n    } finally {\n      setExportingMp4(false);\n    }\n  };\n\n  // ── MODE B : Export WAV 24-bit (Qualité maximale Spotify/DistroKid) ────────\n\n  const exportAsWAV = async () => {\n    if (!fullMastered && !vocalMastered) return;\n    setExportingWav(true);\n    try {\n      const source    = fullMastered || vocalMastered!;\n      const safeTitle = songTitle.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40);\n      const fileName  = `${safeTitle}_MASTER_24bit.wav`;\n\n      const wavBlob = encodeWAV(source); // synchrone — pas de MediaRecorder nécessaire\n      await shareFileIOS(wavBlob, fileName, `${songTitle} — Master WAV 24-bit`);\n      setExportedWav(true);\n    } catch (e: any) {\n      if ((e as any).name !== 'AbortError') alert('Erreur export WAV : ' + e.message);\n    } finally {\n      setExportingWav(false);\n    }\n  };\n\n  const hasResult = !!vocalMastered;\n  const hasFullMix = !!fullMastered;\n\n  return (\n    <div className=\"min-h-screen bg-[#020202] text-white flex flex-col\">\n\n      {/* Header */}\n      <div className=\"shrink-0 flex items-center gap-3 px-5 pt-6 pb-4 border-b border-zinc-900\">\n        <button onClick={onBack} className=\"w-10 h-10 rounded-xl bg-zinc-900 flex items-center justify-center active:scale-90\">\n          <ChevronLeft size={20}/>\n        </button>\n        <div className=\"flex-1 min-w-0\">\n          <p className=\"font-bebas text-xl text-white tracking-widest leading-none\">MASTERING STUDIO</p>\n          <p className=\"text-[10px] text-zinc-500 font-black uppercase truncate\">{songTitle}</p>\n        </div>\n      </div>\n\n      <div className=\"flex-1 overflow-y-auto px-5 pt-4 pb-8 space-y-5\" style={{ WebkitOverflowScrolling: 'touch' }}>\n\n        {/* Explication des 2 modes */}\n        <div className=\"grid grid-cols-2 gap-2\">\n          <div className=\"bg-zinc-900/60 border border-zinc-800 rounded-2xl p-3\">\n            <p className=\"text-[10px] font-black text-zinc-400 uppercase mb-1 flex items-center gap-1\">\n              <Mic size={10}/> Mode A — Mac\n            </p>\n            <p className=\"text-[11px] text-white font-bold\">Voix + harmonies</p>\n            <p className=\"text-[9px] text-zinc-500 mt-0.5 leading-relaxed\">Remplace le stem vocal sur le Mac pour les spectacles</p>\n          </div>\n          <div className={`bg-zinc-900/60 border rounded-2xl p-3 ${instBlob ? 'border-zinc-800' : 'border-zinc-800/40 opacity-50'}`}>\n            <p className=\"text-[10px] font-black text-zinc-400 uppercase mb-1 flex items-center gap-1\">\n              <Music2 size={10}/> Mode B — Publication\n            </p>\n            <p className=\"text-[11px] text-white font-bold\">Voix + harmonies + instrumental</p>\n            <p className=\"text-[9px] text-zinc-500 mt-0.5 leading-relaxed\">\n              {instBlob ? 'Export MP3/MP4 → Spotify, YouTube' : 'Instrumental non disponible hors-ligne'}\n            </p>\n          </div>\n        </div>\n\n        {/* Niveaux */}\n        <div className=\"bg-zinc-950 border border-white/8 rounded-2xl p-4\">\n          <p className=\"text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3\">Niveaux</p>\n          <div className=\"grid grid-cols-3 gap-2\">\n            {[\n              { label: 'Entrée', value: inputLufs },\n              { label: 'Voix masterisée', value: outputVocalLufs, color: 'text-emerald-400' },\n              { label: 'Mix complet', value: outputFullLufs, color: 'text-blue-400' },\n            ].map(({ label, value, color }) => (\n              <div key={label} className=\"bg-zinc-900 rounded-xl p-2.5 text-center\">\n                <p className=\"text-[9px] text-zinc-600 font-black uppercase\">{label}</p>\n                <p className={`text-[20px] font-bebas mt-0.5 ${color || 'text-white'}`}>\n                  {value !== null && value !== undefined ? `${value > 0 ? '+' : ''}${value}` : '—'}\n                </p>\n                <p className=\"text-[8px] text-zinc-600\">LUFS</p>\n              </div>\n            ))}\n          </div>\n        </div>\n\n        {/* Presets par catégorie */}\n        <div>\n          <p className=\"text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3\">Style de masterisation</p>\n          {/* Onglets catégorie */}\n          <div className=\"flex gap-1.5 overflow-x-auto pb-2 mb-3\" style={{ scrollbarWidth: 'none' }}>\n            {PRESET_CATEGORIES.map(cat => (\n              <button key={cat.id} onClick={() => setActiveCategory(cat.id)}\n                className=\"shrink-0 px-3 py-1.5 rounded-xl font-black text-[10px] uppercase tracking-wider transition-all\"\n                style={{\n                  background: activeCategory === cat.id ? '#dc2626' : '#18181b',\n                  color: activeCategory === cat.id ? '#fff' : '#71717a',\n                  border: `1px solid ${activeCategory === cat.id ? '#dc2626' : '#27272a'}`,\n                }}>\n                {cat.label}\n              </button>\n            ))}\n          </div>\n          {/* Grille presets de la catégorie */}\n          <div className=\"grid grid-cols-1 gap-2\">\n            {(PRESET_CATEGORIES.find(c => c.id === activeCategory)?.keys || []).map(key => {\n              const p = PRESETS[key];\n              if (!p) return null;\n              const isActive = preset === key;\n              return (\n                <button key={key} onClick={() => applyPreset(key)}\n                  className=\"flex items-center gap-3 py-3 px-4 rounded-xl text-left transition-all\"\n                  style={{\n                    background: isActive ? '#dc262615' : '#18181b',\n                    border: `1px solid ${isActive ? '#dc262650' : '#27272a'}`,\n                  }}>\n                  <span className=\"text-2xl leading-none shrink-0\">{p.emoji}</span>\n                  <div className=\"flex-1 min-w-0\">\n                    <p className=\"text-[13px] font-black text-white\">{p.label}</p>\n                    <p className=\"text-[10px] text-zinc-500\">{p.description}</p>\n                  </div>\n                  <div className=\"text-right shrink-0\">\n                    <p className=\"text-[10px] font-black text-zinc-400\">{p.settings.targetLufs} LUFS</p>\n                    <p className=\"text-[9px] text-zinc-600\">{db(p.settings.ceiling)}</p>\n                  </div>\n                </button>\n              );\n            })}\n          </div>\n        </div>\n\n        {/* Volume instrumental pour le mix publication */}\n        {instBlob && (\n          <div className=\"bg-zinc-950 border border-white/8 rounded-2xl p-4\">\n            <p className=\"text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2\">\n              Volume instrumental (mix publication)\n            </p>\n            <div className=\"flex items-center gap-3\">\n              <span className=\"text-[10px] text-zinc-600 font-black uppercase w-12\">Inst</span>\n              <input type=\"range\" min=\"0.3\" max=\"1.2\" step=\"0.05\" value={instGain}\n                onChange={e => setInstGain(parseFloat(e.target.value))}\n                className=\"flex-1 h-1.5 rounded-full appearance-none cursor-pointer accent-blue-500\"\n                style={{ background: `linear-gradient(to right, #3b82f6 ${((instGain-0.3)/0.9)*100}%, #27272a ${((instGain-0.3)/0.9)*100}%)` }}/>\n              <span className=\"text-[10px] text-blue-400 font-black w-10 text-right\">{Math.round(instGain * 100)}%</span>\n            </div>\n            <p className=\"text-[9px] text-zinc-700 mt-1\">Voix toujours à 100% — ajuste l'instrumental en dessous</p>\n          </div>\n        )}\n\n        {/* EQ avancé */}\n        <div className=\"bg-zinc-950 border border-white/8 rounded-2xl overflow-hidden\">\n          <button onClick={() => setShowAdvanced(v => !v)}\n            className=\"w-full flex items-center justify-between px-4 py-3 active:bg-zinc-900\">\n            <span className=\"text-[11px] font-black text-zinc-400 uppercase tracking-widest\">EQ & Compresseur</span>\n            <span className=\"text-zinc-600 text-[11px]\">{showAdvanced ? '▲' : '▼'}</span>\n          </button>\n          {showAdvanced && (\n            <div className=\"px-4 pb-4 border-t border-white/5 space-y-3 pt-3\">\n              {[\n                { key: 'lowGain'  as const, label: 'Graves 250Hz',  color: '#f97316' },\n                { key: 'midGain'  as const, label: 'Mids 2.5kHz',   color: '#eab308' },\n                { key: 'highGain' as const, label: 'Aigus 8kHz',    color: '#22c55e' },\n              ].map(({ key, label, color }) => (\n                <div key={key} className=\"flex items-center gap-3\">\n                  <span className=\"text-[10px] text-zinc-500 font-black w-20 shrink-0\">{label}</span>\n                  <input type=\"range\" min=\"-12\" max=\"12\" step=\"0.5\" value={settings[key]}\n                    onChange={e => setSettings(s => ({ ...s, [key]: parseFloat(e.target.value) }))}\n                    className=\"flex-1 h-1.5 rounded-full appearance-none cursor-pointer\"\n                    style={{ accentColor: color, background: `linear-gradient(to right, ${color} ${((settings[key]+12)/24)*100}%, #27272a ${((settings[key]+12)/24)*100}%)` }}/>\n                  <span className=\"text-[10px] font-black w-14 text-right shrink-0\" style={{ color }}>{db(settings[key])}</span>\n                </div>\n              ))}\n              <div className=\"flex items-center gap-3 mt-1\">\n                <span className=\"text-[10px] text-zinc-500 font-black w-20 shrink-0\">Ceiling</span>\n                <input type=\"range\" min=\"-6\" max=\"0\" step=\"0.1\" value={settings.ceiling}\n                  onChange={e => setSettings(s => ({ ...s, ceiling: parseFloat(e.target.value) }))}\n                  className=\"flex-1 h-1.5 rounded-full appearance-none cursor-pointer accent-red-500\"/>\n                <span className=\"text-[10px] text-red-400 font-black w-14 text-right shrink-0\">{db(settings.ceiling)}</span>\n              </div>\n            </div>\n          )}\n        </div>\n\n        {/* Bouton Masteriser */}\n        <button onClick={runMastering} disabled={isMastering}\n          className=\"w-full py-4 bg-red-600 rounded-2xl font-black text-[14px] uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all disabled:opacity-60\">\n          {isMastering\n            ? <><Loader2 size={18} className=\"animate-spin\"/> {progressLabel || 'Masterisation...'}</>\n            : hasResult ? <><Zap size={18}/> Re-masteriser</> : <><Zap size={18}/> Masteriser</>\n          }\n        </button>\n\n        {isMastering && (\n          <div className=\"h-1.5 bg-zinc-900 rounded-full overflow-hidden\">\n            <div className=\"h-full bg-red-600 rounded-full transition-all duration-300\" style={{ width: `${progress}%` }}/>\n          </div>\n        )}\n\n        {/* ── RÉSULTATS ── */}\n        {hasResult && (\n          <div className=\"space-y-3\">\n\n            {/* Séparateur */}\n            <div className=\"flex items-center gap-3\">\n              <div className=\"flex-1 h-px bg-zinc-800\"/>\n              <p className=\"text-[10px] text-zinc-600 font-black uppercase tracking-widest\">Résultats</p>\n              <div className=\"flex-1 h-px bg-zinc-800\"/>\n            </div>\n\n            {/* ── MODE A : Voix masterisée ── */}\n            <div className=\"bg-zinc-950 border border-zinc-800 rounded-2xl overflow-hidden\">\n              <div className=\"flex items-center gap-3 p-4 border-b border-white/5\">\n                <div className=\"w-9 h-9 rounded-xl bg-red-900/30 flex items-center justify-center shrink-0\">\n                  <Mic size={16} className=\"text-red-400\"/>\n                </div>\n                <div className=\"flex-1 min-w-0\">\n                  <p className=\"text-[13px] font-black text-white\">Voix + harmonies masterisée</p>\n                  <p className=\"text-[10px] text-zinc-500\">→ Remplace le stem vocal sur le Mac</p>\n                </div>\n                <button onClick={() => playAudio('vocal')}\n                  className=\"w-9 h-9 rounded-xl bg-zinc-800 flex items-center justify-center active:scale-90 shrink-0\">\n                  {playing === 'vocal' ? <Pause size={14}/> : <Play size={14}/>}\n                </button>\n              </div>\n              {isOnline ? (\n                <button onClick={sendToMac} disabled={sendingToMac || sentToMac}\n                  className={`w-full py-3.5 font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all ${\n                    sentToMac ? 'bg-emerald-900/30 text-emerald-400' : 'bg-red-600 text-white'\n                  } disabled:opacity-60`}>\n                  {sendingToMac\n                    ? <><Loader2 size={14} className=\"animate-spin\"/> Transfert en cours...</>\n                    : sentToMac\n                    ? <><CheckCircle2 size={14}/> Stem vocal mis à jour sur le Mac</>\n                    : <><Send size={14}/> Envoyer au Mac → Stem vocal</>\n                  }\n                </button>\n              ) : (\n                <div className=\"px-4 py-3 flex items-center gap-2\">\n                  <AlertCircle size={13} className=\"text-amber-500 shrink-0\"/>\n                  <p className=\"text-[11px] text-amber-400\">WiFi requis pour envoyer au Mac</p>\n                </div>\n              )}\n            </div>\n\n            {/* ── MODE B : Mix complet ── */}\n            <div className={`bg-zinc-950 border rounded-2xl overflow-hidden ${hasFullMix ? 'border-blue-800/40' : 'border-zinc-800/40 opacity-50'}`}>\n              <div className=\"flex items-center gap-3 p-4 border-b border-white/5\">\n                <div className=\"w-9 h-9 rounded-xl bg-blue-900/30 flex items-center justify-center shrink-0\">\n                  <Music2 size={16} className=\"text-blue-400\"/>\n                </div>\n                <div className=\"flex-1 min-w-0\">\n                  <p className=\"text-[13px] font-black text-white\">Mix complet masterisé</p>\n                  <p className=\"text-[10px] text-zinc-500\">\n                    {hasFullMix ? 'Voix + harmonies + instrumental → Spotify / YouTube' : 'Instrumental non disponible hors-ligne'}\n                  </p>\n                </div>\n                {hasFullMix && (\n                  <button onClick={() => playAudio('full')}\n                    className=\"w-9 h-9 rounded-xl bg-zinc-800 flex items-center justify-center active:scale-90 shrink-0\">\n                    {playing === 'full' ? <Pause size={14}/> : <Play size={14}/>}\n                  </button>\n                )}\n              </div>\n\n              {hasFullMix && (\n                <div className=\"divide-y divide-white/5\">\n                  {/* Export MP3 320kbps */}\n                  <button onClick={exportAsMP3} disabled={exportingMp3}\n                    className=\"w-full py-3.5 font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all text-emerald-400 disabled:opacity-60\">\n                    {exportingMp3\n                      ? <><Loader2 size={14} className=\"animate-spin\"/> Encodage MP3...</>\n                      : exportedMp3\n                      ? <><CheckCircle2 size={14}/> MP3 320kbps partagé !</>\n                      : <><Share2 size={14}/> Exporter MP3 320kbps — Spotify / YouTube</>\n                    }\n                  </button>\n\n                  {/* Export WAV 24-bit — qualité maximale distribution */}\n                  <button onClick={exportAsWAV} disabled={exportingWav}\n                    className=\"w-full py-3.5 font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all text-purple-400 disabled:opacity-60\">\n                    {exportingWav\n                      ? <><Loader2 size={14} className=\"animate-spin\"/> Encodage WAV...</>\n                      : exportedWav\n                      ? <><CheckCircle2 size={14}/> WAV 24-bit partagé !</>\n                      : <><Share2 size={14}/> Exporter WAV 24-bit — Qualité maximale</>\n                    }\n                  </button>\n\n                  {/* Export MP4 natif iOS */}\n                  <button onClick={exportAsMP4} disabled={exportingMp4}\n                    className=\"w-full py-3.5 font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all text-blue-400 disabled:opacity-60\">\n                    {exportingMp4\n                      ? <><Loader2 size={14} className=\"animate-spin\"/> Export MP4...</>\n                      : exportedMp4\n                      ? <><CheckCircle2 size={14}/> MP4 partagé !</>\n                      : <><Share2 size={14}/> Exporter MP4 — AirDrop / iCloud</>\n                    }\n                  </button>\n                </div>\n              )}\n            </div>\n\n            {/* Note Spotify */}\n            <div className=\"bg-zinc-900/40 border border-white/5 rounded-2xl p-3\">\n              <p className=\"text-[10px] text-zinc-500 leading-relaxed\">\n                <span className=\"text-purple-400 font-black\">WAV 24-bit</span> — Meilleure qualité, recommandé pour DistroKid / TuneCore / CD Baby → Spotify, Apple Music.{'\\\n'}\n                <span className=\"text-emerald-400 font-black\">MP3 320kbps</span> — Compatible partout, taille réduite, qualité excellente.{'\\\n'}\n                <span className=\"text-blue-400 font-black\">MP4</span> — Pour YouTube avec photo de couverture.\n              </p>\n            </div>\n          </div>\n        )}\n      </div>\n\n      <audio ref={playRef} playsInline className=\"hidden\"/>\n    </div>\n  );\n}\n",
  "components/StudioMobile/SongSelector.tsx": "/**\n * SongSelector.tsx — Écran sélection chanson v3\n *\n * NOUVEAUTÉS v3 :\n * - Bouton \"Réessayer\" quand un téléchargement échoue (WiFi coupé, etc.)\n * - Bouton \"↺ Actualiser\" sur les chansons en cache pour forcer le re-téléchargement\n * - Compteur \"X / Y hors-ligne\" dans l'entête\n * - Barre de progression détaillée par stem avec badge conversion iOS\n */\nimport React, { useState, useEffect, useRef } from 'react';\nimport {\n  Mic, Music, Wifi, WifiOff, Radio, CheckCircle2,\n  Loader2, Download, Trash2, AlertTriangle, HardDrive,\n  ArrowDownToLine, RefreshCw, AlertCircle, RotateCcw,\n} from 'lucide-react';\nimport { Song, TrackType } from '../../types';\nimport { studioService } from '../../services/StudioService';\nimport { studioOfflineDB } from '../../services/StudioOfflineDB';\nimport { CacheProgress, CacheError } from './useStudioOffline';\n\ninterface StorageInfo { used: number; quota: number; pct: number; }\nfunction formatMB(b: number) { return (b / 1048576).toFixed(0) + ' MB'; }\n\ninterface Props {\n  songs:          Song[];\n  isOnline:       boolean;\n  isInstalled:    boolean;\n  httpsUrl:       string;\n  cachedSongs:    Set<string>;\n  cachedCount:    number;\n  cachingId:      string | null;\n  cacheProgress:  CacheProgress | null;\n  cacheError:     CacheError | null;\n  storage:        StorageInfo | null;\n  storageWarning: boolean;\n  pendingCount:   number;\n  cacheHealth:    'ok' | 'incomplete' | 'checking' | 'repairing';\n  missingModules: number;\n  repairProgress: number;\n  onSelect:           (song: Song) => void;\n  onInstall:          () => void;\n  onCache:            (song: Song) => void;\n  onForceRefresh:     (song: Song) => void;\n  onImportFile:       (song: Song, type: 'inst' | 'vocal', file: File) => Promise<void>;\n  onUncache:          (songId: string) => void;\n  onClearAll:         () => void;\n  onViewRecordings:   () => void;\n  onClearCacheError:  () => void;\n  onRepairCache:      () => void;\n}\n\n// ── Composant config URL Mac ─────────────────────────────────────────────────\n// Composant ligne de stem — défini au niveau module pour éviter la redéfinition à chaque render\ninterface StemRowProps {\n  songId: string;\n  type: 'inst' | 'vocal';\n  fileName: string | null;\n  inCache: boolean | null;\n  importing: string | null;\n  testingAudio: string | null;\n  onTest: (songId: string, type: 'inst' | 'vocal') => void;\n  onImport: (e: React.ChangeEvent<HTMLInputElement>) => void;\n}\nfunction StemRow({ songId, type, fileName, inCache, importing, testingAudio, onTest, onImport }: StemRowProps) {\n  const isInst   = type === 'inst';\n  const testKey  = `${songId}:${type}`;\n  const isTesting = testingAudio === testKey;\n  const isImporting = importing === `${songId}:${type}`;\n  return (\n    <div className=\"mb-4\">\n      <div className=\"flex items-center gap-1.5 mb-1.5\">\n        <span className=\"text-[9px] font-black uppercase tracking-widest text-zinc-500\">\n          {isInst ? '🎸 Instrumental' : '🎤 Vocal stem'}\n        </span>\n        {inCache === null  && <span className=\"text-[9px] text-zinc-600 animate-pulse\">…vérif</span>}\n        {inCache === true  && <span className=\"text-[9px] font-black text-emerald-400 bg-emerald-900/30 px-1.5 py-0.5 rounded-full\">✓ En cache</span>}\n        {inCache === false && <span className=\"text-[9px] font-black text-orange-400 bg-orange-900/20 px-1.5 py-0.5 rounded-full\">⚠ Absent</span>}\n      </div>\n      {fileName\n        ? <p className=\"text-[10px] font-mono text-zinc-300 bg-zinc-800/80 border border-zinc-700 rounded-lg px-2.5 py-1.5 mb-2 break-all leading-relaxed\">{fileName}</p>\n        : <p className=\"text-[10px] font-mono text-zinc-600 bg-zinc-900 border border-zinc-800 rounded-lg px-2.5 py-1.5 mb-2 italic\">Aucun fichier associé</p>\n      }\n      <div className=\"flex gap-2\">\n        <button\n          onClick={e => { e.stopPropagation(); onTest(songId, type); }}\n          disabled={!inCache}\n          className={`flex-1 flex items-center justify-center gap-1.5 py-2 rounded-xl font-black text-[11px] uppercase transition-all active:scale-95 ${\n            !inCache   ? 'bg-zinc-800 text-zinc-600 cursor-not-allowed opacity-40' :\n            isTesting  ? 'bg-amber-600 text-white' :\n            isInst     ? 'bg-blue-900/60 border border-blue-600/40 text-blue-300' :\n                         'bg-emerald-900/60 border border-emerald-600/40 text-emerald-300'\n          }`}>\n          {isTesting ? '⏹ Stop' : '🔊 Écouter'}\n        </button>\n        <label className=\"flex-1\">\n          <input type=\"file\" accept=\"audio/*,.flac,.wav,.mp3,.m4a,.mp4\" className=\"hidden\" onChange={onImport}/>\n          <span className={`flex items-center justify-center gap-1.5 py-2 rounded-xl font-black text-[11px] uppercase active:scale-95 cursor-pointer transition-all ${\n            isImporting ? 'bg-zinc-700 text-zinc-400' :\n            isInst      ? 'bg-blue-700 text-white' : 'bg-emerald-700 text-white'\n          }`}>\n            {isImporting ? '⏳ Import...' : '📂 Remplacer'}\n          </span>\n        </label>\n      </div>\n    </div>\n  );\n}\n\nfunction MacUrlConfig() {\n  const [macUrl, setMacUrl] = React.useState<string>(() => (window as any).__CC_MAC_URL || '');\n  const [editing, setEditing] = React.useState(false);\n  const [input, setInput] = React.useState('');\n  const [testing, setTesting] = React.useState(false);\n  const [testResult, setTestResult] = React.useState<'ok'|'fail'|null>(null);\n  const [autoDetecting, setAutoDetecting] = React.useState(false);\n\n  React.useEffect(() => {\n    const existing = (window as any).__CC_MAC_URL as string | undefined;\n    if (existing && existing.startsWith('http')) return;\n    setAutoDetecting(true);\n    fetch('/api/local-ip', { cache: 'no-store' })\n      .then(r => r.json())\n      .then(d => {\n        const url = d.studioUrl || d.httpsUrl;\n        if (url && url.startsWith('http')) {\n          const clean = url.replace(/\\?.*$/, '').replace(/\\/$/, '');\n          (window as any).__CC_MAC_URL = clean;\n          // Aussi stocker version HTTP pour les téléchargements (pas besoin SSL)\n          (window as any).__CC_MAC_HTTP_URL = clean.replace('https://', 'http://').replace(':8443', ':8080');\n          localStorage.setItem('cc_mac_url', clean);\n          setMacUrl(clean);\n        }\n      })\n      .catch(() => {})\n      .finally(() => setAutoDetecting(false));\n  }, []);\n\n  const save = async () => {\n    let url = input.trim().replace(/\\/$/, '');\n    if (url && !url.startsWith('http')) url = 'https://' + url;\n    setTesting(true); setTestResult(null);\n    try {\n      const controller = new AbortController();\n      const tid = setTimeout(() => controller.abort(), 5000);\n      const res = await fetch(`${url}/api/songs`, { signal: controller.signal, cache: 'no-store' });\n      clearTimeout(tid);\n      if (res.ok) {\n        (window as any).__CC_MAC_URL = url;\n        localStorage.setItem('cc_mac_url', url);\n        setMacUrl(url); setTestResult('ok');\n        setTimeout(() => { setEditing(false); setTestResult(null); }, 1500);\n      } else { setTestResult('fail'); }\n    } catch { setTestResult('fail'); }\n    finally { setTesting(false); }\n  };\n\n  const clear = () => {\n    (window as any).__CC_MAC_URL = '';\n    localStorage.removeItem('cc_mac_url');\n    setMacUrl(''); setEditing(false);\n  };\n\n  if (editing) return (\n    <div className=\"mx-5 mt-4 bg-blue-950/30 border border-blue-600/40 rounded-2xl px-4 py-3\">\n      <p className=\"text-[12px] font-black text-blue-300 mb-2\">⚙️ Adresse du Mac</p>\n      <input type=\"url\" placeholder=\"https://192.168.x.x:8443\" value={input}\n        onChange={e => { setInput(e.target.value); setTestResult(null); }}\n        className=\"w-full bg-zinc-900 border border-zinc-700 rounded-xl px-3 py-2 text-[13px] text-white font-black mb-3\" style={{ fontFamily: 'monospace' }}/>\n      {testResult === 'fail' && <p className=\"text-[10px] text-red-400 font-black mb-2\">❌ Mac non joignable</p>}\n      {testResult === 'ok'   && <p className=\"text-[10px] text-emerald-400 font-black mb-2\">✅ Mac connecté !</p>}\n      <div className=\"flex gap-2\">\n        <button onClick={save} disabled={!input.trim() || testing} className=\"flex-1 py-2 bg-blue-600 rounded-xl font-black text-[12px] text-white uppercase active:scale-95 disabled:opacity-50\">\n          {testing ? 'Test...' : 'Connecter'}\n        </button>\n        <button onClick={() => setEditing(false)} className=\"px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-xl font-black text-[12px] text-zinc-400 active:scale-95\">Annuler</button>\n      </div>\n    </div>\n  );\n\n  if (autoDetecting) return (\n    <div className=\"mx-5 mt-4 bg-zinc-900/40 border border-zinc-800 rounded-2xl px-4 py-2 flex items-center gap-3\">\n      <span className=\"text-lg animate-pulse\">💻</span>\n      <p className=\"text-[11px] font-black text-zinc-500 uppercase tracking-widest\">Détection Mac...</p>\n    </div>\n  );\n\n  if (macUrl) return (\n    <div className=\"mx-5 mt-4 bg-zinc-900/40 border border-zinc-800 rounded-2xl px-3 py-2\">\n      <div className=\"flex items-center gap-2\">\n        <span className=\"text-emerald-400 text-[11px]\">💻</span>\n        <div className=\"flex-1 min-w-0\">\n          <p className=\"text-[10px] font-black text-zinc-400 uppercase tracking-wider\">Mac connecté</p>\n          <p className=\"text-[9px] text-zinc-600 font-mono truncate\">{macUrl}</p>\n        </div>\n        <button onClick={() => { setInput(macUrl); setEditing(true); }} className=\"px-2 py-1 rounded-lg text-[10px] font-black text-zinc-500 active:text-zinc-300\">⚙️</button>\n        <button onClick={clear} className=\"px-2 py-1 rounded-lg text-[10px] font-black text-red-800 active:text-red-400\">✕</button>\n      </div>\n      <a href={`${macUrl}/api/songs`} target=\"_blank\" rel=\"noopener noreferrer\"\n        className=\"block mt-2 text-center py-1.5 bg-blue-900/40 border border-blue-700/40 rounded-xl text-[10px] font-black text-blue-300 active:scale-95\">\n        🔒 Approuver le certificat SSL (1 fois requis)\n      </a>\n    </div>\n  );\n\n  return (\n    <div className=\"mx-5 mt-4 bg-amber-950/30 border border-amber-600/30 rounded-2xl px-4 py-3 flex items-center gap-3\">\n      <span className=\"text-xl shrink-0\">💻</span>\n      <div className=\"flex-1 min-w-0\">\n        <p className=\"text-[12px] font-black text-amber-300\">Mac non configuré</p>\n        <p className=\"text-[10px] text-zinc-500 leading-relaxed\">Même WiFi que ton Mac requis.</p>\n      </div>\n      <button onClick={() => { setInput(''); setEditing(true); }} className=\"shrink-0 px-3 py-2 bg-amber-600 rounded-xl font-black text-[11px] text-white uppercase active:scale-90\">Configurer</button>\n    </div>\n  );\n}\n\nexport default function SongSelector({\n  songs, isOnline, isInstalled, httpsUrl, cachedSongs, cachedCount,\n  cachingId, cacheProgress, cacheError, storage, storageWarning, pendingCount,\n  cacheHealth, missingModules, repairProgress,\n  onSelect, onInstall, onCache, onForceRefresh, onImportFile, onUncache, onClearAll,\n  onViewRecordings, onClearCacheError, onRepairCache,\n}: Props) {\n  const [confirmUncache, setConfirmUncache]       = useState<string | null>(null);\n  const [showRefreshMenu, setShowRefreshMenu]     = useState<string | null>(null);\n  const [showImport, setShowImport]               = useState<string | null>(null);\n  const [importing, setImporting]                 = useState<string | null>(null);\n  // Cache status pour le panneau d'import: { inst: bool|null, vocal: bool|null }\n  const [stemCacheStatus, setStemCacheStatus]     = useState<Record<string, { inst: boolean|null; vocal: boolean|null }>>({});\n  const [testingAudio, setTestingAudio]           = useState<string | null>(null); // 'songId:inst' | 'songId:vocal'\n  const audioTestRef                              = useRef<HTMLAudioElement | null>(null);\n  const stemBlobCache                             = useRef<Record<string, Blob>>({});\n\n  const handleFileImport = async (song: Song, type: 'inst' | 'vocal', e: React.ChangeEvent<HTMLInputElement>) => {\n    const file = e.target.files?.[0];\n    if (!file) return;\n    setImporting(`${song.id}:${type}`);\n    try {\n      await onImportFile(song, type, file);\n      // Pré-charger le blob fraîchement importé\n      const fresh = await studioOfflineDB.getAudio(`${type}_${song.id}`).catch(() => null);\n      if (fresh) stemBlobCache.current[`${type}_${song.id}`] = fresh;\n      // Rafraîchir le statut cache après import\n      const hasInst  = !!stemBlobCache.current[`inst_${song.id}`]  || await studioOfflineDB.hasAudio(`inst_${song.id}`).catch(() => false);\n      const hasVocal = !!stemBlobCache.current[`vocal_${song.id}`] || await studioOfflineDB.hasAudio(`vocal_${song.id}`).catch(() => false);\n      setStemCacheStatus(prev => ({ ...prev, [song.id]: { inst: hasInst, vocal: hasVocal } }));\n    }\n    finally { setImporting(null); e.target.value = ''; }\n  };\n\n  // Vérifie la présence réelle dans IndexedDB pour une chanson + pré-charge les blobs\n  const checkStemCache = async (songId: string) => {\n    setStemCacheStatus(prev => ({ ...prev, [songId]: { inst: null, vocal: null } }));\n    const [instBlob, vocalBlob] = await Promise.all([\n      studioOfflineDB.getAudio(`inst_${songId}`).catch(() => null),\n      studioOfflineDB.getAudio(`vocal_${songId}`).catch(() => null),\n    ]);\n    if (instBlob)  stemBlobCache.current[`inst_${songId}`]  = instBlob;\n    if (vocalBlob) stemBlobCache.current[`vocal_${songId}`] = vocalBlob;\n    setStemCacheStatus(prev => ({ ...prev, [songId]: { inst: !!instBlob, vocal: !!vocalBlob } }));\n  };\n\n  // Lit un stem directement depuis IndexedDB pour le tester\n  const testStemAudio = (songId: string, type: 'inst' | 'vocal') => {\n    const key    = `${songId}:${type}`;\n    const dbKey  = `${type}_${songId}`;\n\n    // Stop si déjà en lecture\n    if (testingAudio === key) {\n      audioTestRef.current?.pause();\n      if (audioTestRef.current?.src) URL.revokeObjectURL(audioTestRef.current.src);\n      audioTestRef.current = null;\n      setTestingAudio(null);\n      return;\n    }\n\n    // Utiliser le blob pré-chargé — SYNCHRONE, pas de .then()\n    const blob = stemBlobCache.current[dbKey];\n    if (!blob) {\n      // Blob pas encore chargé — tenter le chargement et réessayer\n      studioOfflineDB.getAudio(dbKey).then(b => {\n        if (b) { stemBlobCache.current[dbKey] = b; }\n      }).catch(() => {});\n      return;\n    }\n\n    // Tout synchrone dans le callstack du tap — iOS l'accepte\n    audioTestRef.current?.pause();\n    if (audioTestRef.current?.src) URL.revokeObjectURL(audioTestRef.current.src);\n\n    const url   = URL.createObjectURL(blob);\n    const audio = new Audio(url);\n    audioTestRef.current = audio;\n    setTestingAudio(key);\n\n    // Résumer le contexte audio global si nécessaire\n    const ctx = (window as any).__warmContext as AudioContext | undefined;\n    if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});\n\n    audio.onended = () => { setTestingAudio(null); URL.revokeObjectURL(url); audioTestRef.current = null; };\n    audio.onerror = (e) => { setTestingAudio(null); URL.revokeObjectURL(url); audioTestRef.current = null; };\n    audio.play().catch((e) => {\n      // Fallback via AudioContext si play() bloqué\n      const actx = (window as any).__warmContext as AudioContext | undefined;\n      if (!actx) { setTestingAudio(null); return; }\n      blob.arrayBuffer().then(buf => actx.decodeAudioData(buf)).then(decoded => {\n        const src = actx.createBufferSource();\n        src.buffer = decoded;\n        src.connect(actx.destination);\n        src.onended = () => { setTestingAudio(null); audioTestRef.current = null; };\n        src.start(0);\n      }).catch(() => setTestingAudio(null));\n    });\n  };\n\n  // Cleanup audio au démontage\n  useEffect(() => { return () => { audioTestRef.current?.pause(); }; }, []);\n\n  const progressColor = (progress: CacheProgress | null) => {\n    if (!progress) return '#22c55e';\n    if (progress.step === 'inst_convert' || progress.step === 'vocal_convert') return '#f97316';\n    if (progress.step === 'done') return '#22c55e';\n    return '#3b82f6';\n  };\n\n  return (\n    <div className=\"min-h-screen bg-[#020202] text-white flex flex-col\">\n\n      {/* Header */}\n      <div className=\"shrink-0 px-5 pt-6 pb-4 border-b border-zinc-900\">\n        <div className=\"flex items-center justify-between mb-1\">\n          <div className=\"flex items-center gap-2\">\n            <div className=\"w-8 h-8 bg-red-600 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(220,38,38,0.4)]\">\n              <Mic size={16} className=\"text-white\"/>\n            </div>\n            <div>\n              <p className=\"font-bebas text-2xl text-white tracking-widest leading-none\">BUNKER STUDIO</p>\n              <p className=\"text-[9px] text-zinc-600 font-black uppercase tracking-widest\">Multi-piste mobile</p>\n            </div>\n          </div>\n          <div className=\"flex items-center gap-2\">\n            {/* Compteur chansons hors-ligne */}\n            {cachedCount > 0 && (\n              <div className=\"flex items-center gap-1 px-2 py-1 bg-emerald-900/20 border border-emerald-600/20 rounded-full\">\n                <HardDrive size={9} className=\"text-emerald-500\"/>\n                <span className=\"text-[9px] font-black text-emerald-400\">{cachedCount}/{songs.length}</span>\n              </div>\n            )}\n            <div className={`flex items-center gap-1.5 px-2 py-1 rounded-full text-[9px] font-black uppercase ${isOnline ? 'bg-emerald-900/30 text-emerald-400' : 'bg-zinc-900 text-zinc-600'}`}>\n              {isOnline ? <Wifi size={10}/> : <WifiOff size={10}/>}\n              {isOnline ? 'WiFi' : 'Hors-ligne'}\n            </div>\n\n            {/* Indicateur santé du cache — visible si incomplet */}\n            {cacheHealth === 'incomplete' && (\n              <button\n                onClick={onRepairCache}\n                className=\"flex items-center gap-1.5 px-2 py-1 rounded-full active:scale-90 transition-all\"\n                style={{ background: '#7c2d1220', border: '1px solid #dc262640' }}>\n                <span className=\"text-[9px]\">⚠️</span>\n                <span className=\"text-[9px] font-black text-amber-500 uppercase\">{missingModules} module{missingModules > 1 ? 's' : ''} manquant{missingModules > 1 ? 's' : ''}</span>\n              </button>\n            )}\n            {cacheHealth === 'repairing' && (\n              <div className=\"flex items-center gap-1.5 px-2 py-1 rounded-full\" style={{ background: '#1e3a5f' }}>\n                <span className=\"text-[9px]\">🔧</span>\n                <span className=\"text-[9px] font-black text-blue-400 uppercase\">Réparation {repairProgress}%</span>\n              </div>\n            )}\n            {cacheHealth === 'ok' && missingModules === 0 && (\n              <div className=\"flex items-center gap-1 px-1.5 py-1 rounded-full\" style={{ background: '#14532d20' }}>\n                <CheckCircle2 size={9} className=\"text-emerald-600\"/>\n              </div>\n            )}\n\n            {pendingCount > 0 && (\n              <button onClick={onViewRecordings} className=\"flex items-center gap-1.5 bg-red-900/30 border border-red-600/30 px-2 py-1 rounded-full active:scale-90 transition-all\">\n                <Radio size={10} className=\"text-red-500 animate-pulse\"/>\n                <span className=\"text-[9px] font-black text-red-400 uppercase\">{pendingCount}</span>\n              </button>\n            )}\n          </div>\n        </div>\n      </div>\n\n      {/* MAC URL CONFIG */}\n      <MacUrlConfig />\n\n      {/* HTTPS warning */}\n      {window.location.protocol === 'http:' && httpsUrl && (\n        <div className=\"mx-5 mt-4 bg-amber-950/30 border border-amber-600/40 rounded-2xl px-4 py-3\">\n          <p className=\"text-[12px] font-black text-amber-400 mb-1\">⚠️ Micro bloqué — Safari exige HTTPS</p>\n          <a href={httpsUrl} className=\"block text-center py-2 bg-amber-600 rounded-xl font-black text-[12px] text-white uppercase tracking-widest\">\n            🔒 Ouvrir en HTTPS\n          </a>\n          <p className=\"text-[10px] text-zinc-600 mt-1.5 text-center\">Accepte le certificat → \"Continuer quand même\"</p>\n        </div>\n      )}\n\n      {/* Bannière PWA */}\n      {!isInstalled ? (\n        <div className=\"mx-5 mt-4 bg-red-950/30 border border-red-600/30 rounded-2xl px-4 py-3 flex items-center gap-3\">\n          <div className=\"w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center shrink-0\"><span className=\"text-xl\">🎤</span></div>\n          <div className=\"flex-1 min-w-0\">\n            <p className=\"text-[12px] font-black text-white\">Installer l'app sur iPhone</p>\n            <p className=\"text-[10px] text-zinc-400 mt-0.5\">Hors-ligne, micro, enregistrements</p>\n          </div>\n          <button onClick={onInstall} className=\"shrink-0 px-3 py-2 bg-red-600 rounded-xl font-black text-[11px] uppercase text-white active:scale-90 transition-all\">\n            Installer\n          </button>\n        </div>\n      ) : (\n        <div className=\"mx-5 mt-4 bg-emerald-950/30 border border-emerald-600/30 rounded-2xl px-4 py-2 flex items-center gap-2\">\n          <CheckCircle2 size={14} className=\"text-emerald-500 shrink-0\"/>\n          <p className=\"text-[11px] text-emerald-400 font-black\">App installée — fonctionne hors-ligne ✓</p>\n        </div>\n      )}\n\n      {/* Jauge de stockage */}\n      {storage && (\n        <div className={`mx-5 mt-3 rounded-2xl px-4 py-3 border ${storageWarning ? 'bg-red-950/30 border-red-600/40' : 'bg-zinc-900/40 border-zinc-800'}`}>\n          <div className=\"flex items-center justify-between mb-2\">\n            <div className=\"flex items-center gap-1.5\">\n              {storageWarning ? <AlertTriangle size={11} className=\"text-red-400\"/> : <HardDrive size={11} className=\"text-zinc-500\"/>}\n              <p className={`text-[10px] font-black uppercase ${storageWarning ? 'text-red-400' : 'text-zinc-500'}`}>\n                {storageWarning ? 'Stockage presque plein' : 'Stockage hors-ligne'}\n              </p>\n            </div>\n            <p className=\"text-[10px] text-zinc-500 font-black\">{formatMB(storage.used)} / {formatMB(storage.quota)}</p>\n          </div>\n          <div className=\"h-1.5 bg-zinc-800 rounded-full overflow-hidden\">\n            <div\n              className={`h-full rounded-full transition-all duration-500 ${storageWarning ? 'bg-red-500' : storage.pct > 70 ? 'bg-amber-500' : 'bg-emerald-500'}`}\n              style={{ width: `${Math.min(storage.pct, 100)}%` }}/>\n          </div>\n          {storageWarning && (\n            <button onClick={onClearAll} className=\"w-full mt-2 py-2 bg-red-900/30 border border-red-600/40 rounded-xl text-[11px] font-black text-red-400 uppercase active:scale-95\">\n              Vider tout le cache ({cachedSongs.size} chansons)\n            </button>\n          )}\n        </div>\n      )}\n\n      {/* Liste chansons */}\n      <div className=\"flex-1 overflow-y-auto px-5 pt-5 pb-28\" style={{ WebkitOverflowScrolling: 'touch' }}>\n        <p className=\"text-[10px] text-zinc-600 font-black uppercase tracking-widest mb-4\">\n          {songs.length} chanson{songs.length > 1 ? 's' : ''} · {cachedCount} hors-ligne\n        </p>\n\n        {songs.length === 0 ? (\n          <div className=\"flex flex-col items-center justify-center py-16 gap-4 opacity-30\">\n            <Music size={48} className=\"text-zinc-700\"/>\n            <p className=\"text-[12px] text-zinc-600 font-black uppercase text-center\">Aucune chanson originale</p>\n          </div>\n        ) : (\n          <div className=\"space-y-3\">\n            {songs.map(s => {\n              const hasProject   = studioService.getProjects().some(p => p.songId === s.id && p.tracks.length > 0);\n              const isCached     = cachedSongs.has(s.id);\n              const isCaching    = cachingId === s.id;\n              const hasError     = cacheError?.songId === s.id;\n              const needsConfirm = confirmUncache === s.id;\n              const showMenu     = showRefreshMenu === s.id;\n              const progress     = isCaching ? cacheProgress : null;\n              const isConverting = progress?.step === 'inst_convert' || progress?.step === 'vocal_convert';\n\n              return (\n                <div key={s.id} className=\"relative\">\n                  <div\n                    role=\"button\"\n                    tabIndex={0}\n                    onPointerDown={(e) => {\n                      // Ignorer si la cible est un bouton/label/input imbriqué\n                      const tag = (e.target as HTMLElement).closest('button, label, input, a');\n                      if (tag) return;\n                      if (showMenu) { setShowRefreshMenu(null); return; }\n                      if (showImport === s.id) { setShowImport(null); return; }\n                      if (!isCaching && !hasError) onSelect(s);\n                    }}\n                    className={`w-full flex items-center gap-4 p-4 bg-zinc-900/60 border rounded-2xl transition-all text-left cursor-pointer select-none ${\n                      isCaching   ? 'border-blue-600/30 cursor-default' :\n                      hasError    ? 'border-red-600/30' :\n                      showMenu    ? 'border-zinc-600' :\n                      'border-zinc-800 active:scale-[0.98] hover:border-zinc-700'\n                    }`}>\n\n                    {/* Pochette */}\n                    {s.posterUrl\n                      ? <img src={s.posterUrl} className=\"w-14 h-14 rounded-xl object-cover shrink-0\" loading=\"lazy\"/>\n                      : <div className=\"w-14 h-14 rounded-xl bg-zinc-800 flex items-center justify-center shrink-0\"><Music size={22} className=\"text-zinc-600\"/></div>\n                    }\n\n                    {/* Infos */}\n                    <div className=\"flex-1 min-w-0\">\n                      <p className=\"text-[15px] font-black text-white truncate\">{s.title}</p>\n                      <p className=\"text-[11px] text-zinc-500 truncate mt-0.5\">{s.artist}</p>\n                      {s.tempo && !isCaching && !hasError && (\n                        <p className=\"text-[10px] text-zinc-700 font-black uppercase mt-1\">{s.tempo} BPM · {s.key}</p>\n                      )}\n\n                      {/* État normal */}\n                      {!isCaching && !hasError && (\n                        <div className=\"flex items-center gap-2 mt-1\">\n                          {hasProject && <p className=\"text-[10px] text-red-400 font-black\">🎛 Projet en cours</p>}\n                          {isCached   && <p className=\"text-[10px] text-emerald-500 font-black\">✓ Hors-ligne</p>}\n                        </div>\n                      )}\n\n                      {/* ── Progression ── */}\n                      {isCaching && progress && (\n                        <div className=\"mt-2\">\n                          <div className=\"flex items-center gap-1.5 mb-1.5\">\n                            {isConverting\n                              ? <RefreshCw size={10} className=\"text-orange-400 animate-spin shrink-0\"/>\n                              : progress.step === 'done'\n                              ? <CheckCircle2 size={10} className=\"text-emerald-400 shrink-0\"/>\n                              : <ArrowDownToLine size={10} className=\"text-blue-400 shrink-0\"/>\n                            }\n                            <p className={`text-[11px] font-black truncate ${\n                              isConverting ? 'text-orange-400' :\n                              progress.step === 'done' ? 'text-emerald-400' : 'text-blue-400'\n                            }`}>{progress.label}</p>\n                            <p className=\"text-[10px] text-zinc-600 ml-auto shrink-0\">{progress.pct}%</p>\n                          </div>\n                          <div className=\"h-1.5 bg-zinc-800 rounded-full overflow-hidden\">\n                            <div className=\"h-full rounded-full transition-all duration-300\"\n                              style={{ width: `${progress.pct}%`, background: progressColor(progress) }}/>\n                          </div>\n                          {isConverting && (\n                            <p className=\"text-[9px] text-orange-500/70 mt-1 font-black uppercase tracking-widest\">\n                              Conversion FLAC → MP3 pour iPhone\n                            </p>\n                          )}\n                        </div>\n                      )}\n\n                      {/* ── Erreur + Réessayer ── */}\n                      {hasError && (\n                        <div className=\"mt-2\">\n                          <div className=\"flex items-center gap-1.5 mb-2\">\n                            <AlertCircle size={11} className=\"text-red-400 shrink-0\"/>\n                            <p className=\"text-[11px] text-red-400 font-black truncate\">{cacheError!.message}</p>\n                          </div>\n                          <button\n                            onClick={e => { e.stopPropagation(); onClearCacheError(); onCache(s); }}\n                            className=\"flex items-center gap-1.5 px-3 py-1.5 bg-red-600 rounded-xl text-[11px] font-black text-white uppercase active:scale-95\">\n                            <RotateCcw size={11}/> Réessayer\n                          </button>\n                        </div>\n                      )}\n\n                      {/* ── Menu actualiser ── */}\n                      {showMenu && isCached && !isCaching && (\n                        <div className=\"mt-2 flex gap-2\">\n                          <button\n                            onClick={e => { e.stopPropagation(); setShowRefreshMenu(null); onForceRefresh(s); }}\n                            className=\"flex items-center gap-1.5 px-3 py-1.5 bg-zinc-700 rounded-xl text-[11px] font-black text-white active:scale-95\">\n                            <RefreshCw size={11}/> Actualiser les stems\n                          </button>\n                          <button\n                            onClick={e => { e.stopPropagation(); setShowRefreshMenu(null); onUncache(s.id); }}\n                            className=\"px-3 py-1.5 bg-red-900/40 border border-red-700/40 rounded-xl text-[11px] font-black text-red-400 active:scale-95\">\n                            🗑 Effacer le lien\n                          </button>\n                        </div>\n                      )}\n                    </div>\n\n                    {/* ── Boutons droite ── */}\n                    <div className=\"shrink-0 flex flex-col items-center gap-2\">\n                      <div className=\"w-10 h-10 rounded-full bg-red-600/20 border border-red-600/30 flex items-center justify-center\">\n                        <Mic size={16} className=\"text-red-500\"/>\n                      </div>\n\n                      {isCaching ? (\n                        <div className=\"w-10 h-10 rounded-full bg-blue-900/30 border border-blue-600/30 flex items-center justify-center\">\n                          {isConverting\n                            ? <RefreshCw size={14} className=\"text-orange-400 animate-spin\"/>\n                            : <Loader2 size={14} className=\"animate-spin text-blue-400\"/>\n                          }\n                        </div>\n\n                      ) : hasError ? (\n                        <div className=\"w-10 h-10 rounded-full bg-red-900/30 border border-red-600/30 flex items-center justify-center\">\n                          <AlertCircle size={14} className=\"text-red-400\"/>\n                        </div>\n\n                      ) : isCached ? (\n                        showMenu ? (\n                          <button\n                            onClick={e => { e.stopPropagation(); setShowRefreshMenu(null); }}\n                            className=\"w-10 h-10 rounded-full bg-zinc-700 flex items-center justify-center active:scale-90\">\n                            <RefreshCw size={14} className=\"text-white\"/>\n                          </button>\n                        ) : needsConfirm ? (\n                          <button\n                            onClick={e => { e.stopPropagation(); onUncache(s.id); setConfirmUncache(null); }}\n                            className=\"w-10 h-10 rounded-full bg-red-600 flex items-center justify-center active:scale-90 transition-all\">\n                            <Trash2 size={13} className=\"text-white\"/>\n                          </button>\n                        ) : (\n                          // Long press → menu, tap normal → confirm suppression\n                          <button\n                            onClick={e => {\n                              e.stopPropagation();\n                              setShowRefreshMenu(s.id);\n                              setTimeout(() => setShowRefreshMenu(null), 5000);\n                            }}\n                            className=\"w-10 h-10 rounded-full bg-emerald-900/30 border border-emerald-500/50 flex items-center justify-center active:scale-90 transition-all\">\n                            <CheckCircle2 size={14} className=\"text-emerald-400\"/>\n                          </button>\n                        )\n                      ) : (\n                        <div className=\"flex flex-col items-center gap-2\">\n                          <button\n                            onClick={e => { e.stopPropagation(); onCache(s); }}\n
