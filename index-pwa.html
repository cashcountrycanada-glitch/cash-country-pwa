  "components/StudioMobile/MixerScreen.tsx": "/**\n * MixerScreen.tsx — v3 : Mixer visuel complet\n *\n * NOUVEAUTÉS :\n * - Section harmonies refaite : clavier visuel des 5 couches avec relation musicale\n * - Génération individuelle par harmonie (pas juste \"tout régénérer\")\n * - Waveform sur chaque piste générée\n * - Stack visuel des pistes empilées (vue timeline)\n * - Durée totale du projet dans le header\n * - Waveform du mix final après mixage\n * - Indicateur de niveau par piste dans la vue stack\n */\nimport React, { useState, useEffect } from 'react';\nimport {\n  ChevronLeft, Plus, Layers, Scissors, Loader2, CheckCircle2,\n  Send, Pause, Play, Sparkles, Music2, RefreshCw, BarChart2,\n} from 'lucide-react';\nimport { MobileRecording, TrackProject, Take, studioService } from '../../services/StudioService';\nimport { Song } from '../../types';\nimport { TRACK_PRESETS, formatTime, SectionMarker, SectionLabel, SECTION_LABELS, SECTION_COLORS } from './studio.types';\nimport TrackCard from './TrackCard';\nimport WaveformBar from './WaveformBar';\n\ninterface Props {\n  selected:    Song;\n  project:     TrackProject;\n  playingId:   string | null;\n  isMixing:    boolean;\n  mixDone:     boolean;\n  isOnline:    boolean;\n  uploading:   string | null;\n  uploadDone:  string | null;\n  playRef:     React.RefObject<HTMLAudioElement>;\n  onBack:          () => void;\n  onGoSongs:       () => void;\n  onAddTrack:      () => void;\n  onPlay:          (rec: MobileRecording) => void;\n  onMute:          (trackIndex: number, muted: boolean) => void;\n  onSolo:          (trackIndex: number) => void;\n  onVolume:        (trackIndex: number, gain: number) => void;\n  onPan:           (trackIndex: number, pan: number) => void;\n  onDelete:        (trackIndex: number) => void;\n  onMix:           () => void;\n  onPlayMix:       () => void;\n  onMasterize:     (vocalBlob: Blob, instBlob: Blob | null) => void;\n  onUploadMix:     () => void;\n  onGoComp:        (takes: Take[]) => void;\n  onProjectUpdate: (project: TrackProject) => void;\n  instBlob:        Blob | null;\n}\n\n// Définition des harmonies avec info musicale\nconst HARMONY_DEFS = [\n  { trackIndex: 1, label: 'Double',    pitch:  0,  color: '#f97316', emoji: '🎵', musicNote: 'Unisson',   desc: 'Épaissit la voix' },\n  { trackIndex: 2, label: '+3',        pitch:  3,  color: '#eab308', emoji: '🎶', musicNote: 'Tierce m.', desc: 'Harmonie douce' },\n  { trackIndex: 3, label: '+7',        pitch:  7,  color: '#22c55e', emoji: '🎼', musicNote: 'Quinte',    desc: 'Harmonie forte' },\n  { trackIndex: 4, label: 'Oct ↓',    pitch: -12, color: '#3b82f6', emoji: '🔉', musicNote: 'Octave -1', desc: 'Voix grave' },\n  { trackIndex: 5, label: '+5',        pitch:  5,  color: '#a855f7', emoji: '✨', musicNote: 'Quarte',    desc: 'Harmonie riche' },\n];\n\nexport default function MixerScreen({\n  selected, project, playingId, isMixing, mixDone, isOnline,\n  uploading, uploadDone, playRef,\n  onBack, onGoSongs, onAddTrack, onPlay, onMute, onSolo, onVolume, onPan,\n  onDelete, onMix, onPlayMix, onMasterize, onUploadMix, onGoComp,\n  onProjectUpdate, instBlob,\n}: Props) {\n  const [generatingIndex, setGeneratingIndex] = useState<number | null>(null);\n  const [generateLabel, setGenerateLabel]     = useState('');\n  const [generatePct, setGeneratePct]         = useState(0);\n  const [generatedDone, setGeneratedDone]     = useState<Set<number>>(new Set());\n  const [mixWaveform, setMixWaveform]         = useState<number[]>([]);\n  const [showStack, setShowStack]             = useState(false);\n  const [showSections, setShowSections]       = useState(false);\n  const [sections, setSections]               = useState<SectionMarker[]>(\n    (project as any).sections || []\n  );\n\n  const tracks    = project?.tracks || [];\n  const mainVoice = tracks.find(t => t.trackIndex === 0 && !(t as any).isGenerated);\n  const totalDuration = mainVoice?.duration || Math.max(...tracks.map(t => t.duration), 0);\n\n  // Charger la waveform du mix dès qu'il est prêt\n  useEffect(() => {\n    if (mixDone && project.mixedDataUrl && mixWaveform.length === 0) {\n      studioService.analyzeWaveform(project.mixedDataUrl, 100)\n        .then(setMixWaveform)\n        .catch(() => {});\n    }\n  }, [mixDone, project.mixedDataUrl]);\n\n  // Callback quand un FX est appliqué sur une piste → mettre à jour le projet\n  const handleTrackUpdate = (updated: MobileRecording) => {\n    const newTracks = project.tracks.map(t =>\n      t.trackIndex === updated.trackIndex ? updated : t\n    );\n    onProjectUpdate({ ...project, tracks: newTracks });\n  };\n\n  const handleGoComp = () => {\n    const takes: Take[] = tracks.map(t => ({ id: t.id, recording: t, regions: t.regions || [] }));\n    onGoComp(takes);\n  };\n\n  // Générer une harmonie individuelle\n  const generateOne = async (harmonyDef: typeof HARMONY_DEFS[0]) => {\n    if (!mainVoice || generatingIndex !== null) return;\n    setGeneratingIndex(harmonyDef.trackIndex);\n    setGeneratePct(0);\n    setGenerateLabel(`${harmonyDef.emoji} ${harmonyDef.label}...`);\n\n    try {\n      // Passer un projet \"fantôme\" qui ne contient que la couche voulue\n      // generateLayersFromVoice génère toutes les couches définies dans LAYERS_DEF\n      // puis on filtre — mais au moins le FX est appliqué individuellement\n      const generated = await studioService.generateLayersFromVoice(\n        mainVoice,\n        { ...project, tracks: [mainVoice] },\n        (label, pct) => {\n          setGenerateLabel(label);\n          setGeneratePct(Math.round(pct));\n        },\n      );\n\n      // Récupérer uniquement la couche demandée\n      const wanted = generated.find(r => r.trackIndex === harmonyDef.trackIndex);\n      if (wanted) {\n        const u = studioService.addTrackToProject(project.id, wanted);\n        if (u) onProjectUpdate(u);\n        setGeneratedDone(prev => new Set([...prev, harmonyDef.trackIndex]));\n        setTimeout(() => setGeneratedDone(prev => {\n          const s = new Set(prev); s.delete(harmonyDef.trackIndex); return s;\n        }), 3000);\n      }\n    } catch (e: any) {\n      alert('Erreur génération : ' + e.message);\n    } finally {\n      setGeneratingIndex(null);\n      setGenerateLabel('');\n      setGeneratePct(0);\n    }\n  };\n\n  // Générer toutes les harmonies\n  const generateAll = async () => {\n    if (!mainVoice || generatingIndex !== null) return;\n    setGeneratingIndex(-1); // -1 = toutes\n    setGeneratePct(0);\n    try {\n      const generated = await studioService.generateLayersFromVoice(\n        mainVoice, project,\n        (label, pct) => { setGenerateLabel(label); setGeneratePct(Math.round(pct)); },\n      );\n      if (generated.length > 0) {\n        let up = { ...project };\n        for (const rec of generated) {\n          const u = studioService.addTrackToProject(project.id, rec);\n          if (u) up = u;\n        }\n        onProjectUpdate(up);\n      }\n    } catch (e: any) {\n      alert('Erreur génération : ' + e.message);\n    } finally {\n      setGeneratingIndex(null);\n      setGenerateLabel('');\n      setGeneratePct(0);\n    }\n  };\n\n  const handleMasterize = () => {\n    if (!project?.mixedDataUrl) return;\n    const vocalBlob = studioService.dataUrlToBlob(project.mixedDataUrl);\n    onMasterize(vocalBlob, instBlob);\n  };\n\n  const hasAnyHarmony = HARMONY_DEFS.some(h => tracks.some(t => t.trackIndex === h.trackIndex));\n\n  return (\n    <div className=\"min-h-screen bg-[#020202] text-white flex flex-col\">\n\n      {/* ── Header ── */}\n      <div className=\"shrink-0 flex items-center gap-3 px-5 pt-6 pb-4 border-b border-zinc-900\">\n        <button onClick={onBack} className=\"w-10 h-10 rounded-xl bg-zinc-900 flex items-center justify-center active:scale-90\">\n          <ChevronLeft size={20}/>\n        </button>\n        <div className=\"min-w-0 flex-1\">\n          <p className=\"font-bebas text-xl text-white tracking-widest leading-none\">MIXER</p>\n          <p className=\"text-[10px] text-zinc-500 font-black uppercase\">\n            {selected.title}\n            {' · '}\n            <span className=\"text-zinc-400\">{tracks.length} piste{tracks.length > 1 ? 's' : ''}</span>\n            {totalDuration > 0 && (\n              <span className=\"text-zinc-600\"> · {formatTime(totalDuration)}</span>\n            )}\n          </p>\n        </div>\n        <div className=\"flex items-center gap-2\">\n          {tracks.length >= 2 && (\n            <button onClick={handleGoComp}\n              className=\"flex items-center gap-1.5 px-3 py-2 bg-red-900/30 border border-red-600/30 rounded-xl text-[11px] font-black text-red-400 active:scale-90\">\n              <Scissors size={13}/> Comp\n            </button>\n          )}\n          {tracks.length > 0 && (\n            <button\n              onClick={() => setShowStack(v => !v)}\n              className={`w-9 h-9 rounded-xl flex items-center justify-center active:scale-90 transition-all ${\n                showStack ? 'bg-blue-600 text-white' : 'bg-zinc-900 text-zinc-500'\n              }`}>\n              <BarChart2 size={15}/>\n            </button>\n          )}\n          <button onClick={onGoSongs} className=\"text-[11px] text-zinc-600 font-black uppercase px-3 py-2 active:scale-90\">\n            Chansons\n          </button>\n        </div>\n      </div>\n\n      <div className=\"flex-1 overflow-y-auto px-5 pt-4 pb-6 space-y-4\" style={{ WebkitOverflowScrolling: 'touch' }}>\n\n        {/* ── Vue Stack Timeline ── */}\n        {showStack && tracks.length > 0 && (\n          <div className=\"bg-zinc-950 border border-white/8 rounded-2xl p-4\">\n            <p className=\"text-[10px] text-zinc-500 font-black uppercase tracking-widest mb-3\">\n              Timeline — {tracks.length} piste{tracks.length > 1 ? 's' : ''}\n            </p>\n            <div className=\"space-y-2\">\n              {[...tracks].sort((a, b) => (a.trackIndex ?? 0) - (b.trackIndex ?? 0)).map(track => {\n                const preset = TRACK_PRESETS.find(p => p.index === track.trackIndex) || TRACK_PRESETS[0];\n                return (\n                  <div key={track.id} className=\"flex items-center gap-2\">\n                    <div\n                      className=\"w-20 shrink-0 flex items-center gap-1\"\n                      style={{ opacity: track.muted ? 0.3 : 1 }}>\n                      <span className=\"text-base leading-none\">{preset.emoji}</span>\n                      <span className=\"text-[9px] font-black truncate\" style={{ color: preset.color }}>\n                        {track.trackLabel}\n                      </span>\n                    </div>\n                    <div className=\"flex-1\">\n                      <WaveformBar\n                        dataUrl={track.dataUrl}\n                        color={preset.color}\n                        height={22}\n                        points={60}\n                        playbackPct={playingId === track.id ? undefined : undefined}\n                        dimmed={track.muted}\n                      />\n                    </div>\n                    <div className=\"w-10 shrink-0 text-right\">\n                      <span className=\"text-[9px] text-zinc-600 font-black\">\n                        {Math.round((track.gain ?? 1) * 100)}%\n                      </span>\n                    </div>\n                  </div>\n                );\n              })}\n            </div>\n          </div>\n        )}\n\n        {/* ── Ajouter une piste ── */}\n        <button onClick={onAddTrack}\n          className=\"w-full py-3 border border-dashed border-zinc-700 rounded-2xl flex items-center justify-center gap-2 text-zinc-600 font-black text-[12px] uppercase active:scale-95 transition-all\">\n          <Plus size={16}/> Enregistrer une piste\n        </button>\n\n        {/* ── Section Harmonies & Layers ── */}\n        {mainVoice && (\n          <div className=\"bg-zinc-950 border border-purple-600/20 rounded-2xl overflow-hidden\">\n            <div className=\"px-4 pt-4 pb-3\">\n              <div className=\"flex items-center gap-2 mb-1\">\n                <Sparkles size={14} className=\"text-purple-400\"/>\n                <p className=\"text-[12px] font-black text-white\">Harmonies & Layers</p>\n                <span className=\"ml-auto text-[9px] text-purple-500 font-black uppercase\">\n                  {HARMONY_DEFS.filter(h => tracks.some(t => t.trackIndex === h.trackIndex)).length}/{HARMONY_DEFS.length}\n                </span>\n              </div>\n              <p className=\"text-[10px] text-zinc-500 leading-relaxed mb-4\">\n                Génère individuellement chaque harmonie ou toutes d'un coup.\n              </p>\n\n              {/* ── Tonalité suggérée (depuis métadonnées chanson) ── */}\n              {(project as any).suggestedKey && (\n                <div className=\"flex items-center gap-2 px-3 py-2 rounded-xl mb-3\"\n                  style={{ background: '#a855f720', border: '1px solid #a855f730' }}>\n                  <span className=\"text-base\">🎵</span>\n                  <div className=\"flex-1\">\n                    <p className=\"text-[10px] font-black text-purple-300\">Tonalité détectée : {(project as any).suggestedKey}</p>\n                    <p className=\"text-[9px] text-zinc-500\">Les harmonies sont optimisées pour cette clé</p>\n                  </div>\n                </div>\n              )}\n\n              {/* ── Sections — activer harmonies par section ── */}\n              {mainVoice && (\n                <div className=\"mb-4\">\n                  <button\n                    onClick={() => setShowSections(v => !v)}\n                    className=\"w-full flex items-center justify-between px-3 py-2 rounded-xl mb-2 active:scale-[0.98] transition-all\"\n                    style={{ background: showSections ? '#1e1e2e' : '#0f0f0f', border: '1px solid #2a2a2a' }}>\n                    <div className=\"flex items-center gap-2\">\n                      <span className=\"text-[10px]\">🗺</span>\n                      <span className=\"text-[10px] font-black text-zinc-300 uppercase tracking-wider\">Harmonies par section</span>\n                    </div>\n                    <div className=\"flex items-center gap-2\">\n                      {sections.length > 0 && (\n                        <span className=\"text-[9px] font-black text-purple-400\">{sections.length} section{sections.length > 1 ? 's' : ''}</span>\n                      )}\n                      <span className=\"text-zinc-600 text-[10px]\">{showSections ? '▲' : '▼'}</span>\n                    </div>\n                  </button>\n\n                  {showSections && (\n                    <div className=\"space-y-2 px-1\">\n                      {/* Ajouter une section */}\n                      <div className=\"flex gap-1.5 flex-wrap mb-2\">\n                        {SECTION_LABELS.filter(l => !sections.find(s => s.label === l)).map(label => (\n                          <button\n                            key={label}\n                            onClick={() => {\n                              const lastEnd = sections.length > 0\n                                ? Math.max(...sections.map(s => s.endSec))\n                                : 0;\n                              const dur = totalDuration || 180;\n                              const newSec: SectionMarker = {\n                                id: `sec_${Date.now()}`,\n                                label: label as SectionLabel,\n                                startSec: lastEnd,\n                                endSec: Math.min(lastEnd + 30, dur),\n                                activeHarmonies: [1, 2, 3, 4, 5], // tout actif par défaut\n                              };\n                              const updated = [...sections, newSec].sort((a, b) => a.startSec - b.startSec);\n                              setSections(updated);\n                              onProjectUpdate({ ...project, sections: updated } as any);\n                            }}\n                            className=\"px-2 py-1 rounded-lg text-[9px] font-black uppercase active:scale-90 transition-all\"\n                            style={{ background: SECTION_COLORS[label as SectionLabel] + '20', color: SECTION_COLORS[label as SectionLabel], border: `1px solid ${SECTION_COLORS[label as SectionLabel]}40` }}>\n                            + {label}\n                          </button>\n                        ))}\n                      </div>\n\n                      {sections.length === 0 && (\n                        <p className=\"text-[9px] text-zinc-600 text-center py-2\">Ajoute des sections pour activer les harmonies sélectivement</p>\n                      )}\n\n                      {sections.map(sec => (\n                        <div key={sec.id} className=\"rounded-xl overflow-hidden\"\n                          style={{ background: '#0d0d0d', border: `1px solid ${SECTION_COLORS[sec.label]}30` }}>\n                          <div className=\"flex items-center gap-2 px-3 py-2\">\n                            <span className=\"text-[10px] font-black\" style={{ color: SECTION_COLORS[sec.label] }}>{sec.label}</span>\n                            {/* Temps start/end */}\n                            <div className=\"flex items-center gap-1 flex-1\">\n                              <input type=\"number\" min=\"0\" max={totalDuration} step=\"1\"\n                                value={Math.round(sec.startSec)}\n                                onChange={e => {\n                                  const updated = sections.map(s => s.id === sec.id ? { ...s, startSec: parseFloat(e.target.value) } : s);\n                                  setSections(updated); onProjectUpdate({ ...project, sections: updated } as any);\n                                }}\n                                className=\"w-12 text-[9px] font-black text-center rounded-lg px-1 py-0.5 bg-zinc-900 text-zinc-300 border border-zinc-800\"/>\n                              <span className=\"text-zinc-700 text-[9px]\">→</span>\n                              <input type=\"number\" min=\"0\" max={totalDuration} step=\"1\"\n                                value={Math.round(sec.endSec)}\n                                onChange={e => {\n                                  const updated = sections.map(s => s.id === sec.id ? { ...s, endSec: parseFloat(e.target.value) } : s);\n                                  setSections(updated); onProjectUpdate({ ...project, sections: updated } as any);\n                                }}\n                                className=\"w-12 text-[9px] font-black text-center rounded-lg px-1 py-0.5 bg-zinc-900 text-zinc-300 border border-zinc-800\"/>\n                              <span className=\"text-[8px] text-zinc-600\">s</span>\n                            </div>\n                            <button onClick={() => {\n                              const updated = sections.filter(s => s.id !== sec.id);\n                              setSections(updated); onProjectUpdate({ ...project, sections: updated } as any);\n                            }} className=\"text-zinc-700 active:text-red-500 text-[10px] px-1\">✕</button>\n                          </div>\n                          {/* Harmonies actives pour cette section */}\n                          <div className=\"flex gap-1.5 px-3 pb-2.5 flex-wrap\">\n                            {HARMONY_DEFS.map(h => {\n                              const active = sec.activeHarmonies.includes(h.trackIndex);\n                              return (\n                                <button key={h.trackIndex}\n                                  onClick={() => {\n                                    const newActive = active\n                                      ? sec.activeHarmonies.filter(i => i !== h.trackIndex)\n                                      : [...sec.activeHarmonies, h.trackIndex];\n                                    const updated = sections.map(s => s.id === sec.id ? { ...s, activeHarmonies: newActive } : s);\n                                    setSections(updated); onProjectUpdate({ ...project, sections: updated } as any);\n                                  }}\n                                  className=\"px-2 py-1 rounded-lg text-[8px] font-black uppercase active:scale-90 transition-all\"\n                                  style={{\n                                    background: active ? h.color + '25' : '#1a1a1a',\n                                    color: active ? h.color : '#3f3f46',\n                                    border: `1px solid ${active ? h.color + '50' : '#2a2a2a'}`,\n                                  }}>\n                                  {h.label}\n                                </button>\n                              );\n                            })}\n                          </div>\n\n                          {/* ── Volumes par harmonie pour cette section ── */}\n                          {sec.activeHarmonies.length > 0 && (\n                            <div className=\"px-3 pb-3 space-y-1.5\">\n                              <span className=\"text-[7px] font-black text-zinc-700 uppercase tracking-widest\">Volume par harmonie</span>\n                              {HARMONY_DEFS.filter(h => sec.activeHarmonies.includes(h.trackIndex)).map(h => {\n                                const vol = (sec as any).harmonyVolumes?.[h.trackIndex] ?? 0.75;\n                                return (\n                                  <div key={h.trackIndex} className=\"flex items-center gap-2\">\n                                    <span className=\"text-[8px] font-black w-16 shrink-0\" style={{ color: h.color }}>\n                                      {h.emoji} {h.label}\n                                    </span>\n                                    <input\n                                      type=\"range\" min=\"0\" max=\"1\" step=\"0.05\"\n                                      value={vol}\n                                      onChange={e => {\n                                        const newVol = parseFloat(e.target.value);\n                                        const updated = sections.map(s => s.id === sec.id ? {\n                                          ...s,\n                                          harmonyVolumes: { ...((s as any).harmonyVolumes ?? {}), [h.trackIndex]: newVol }\n                                        } : s);\n                                        setSections(updated); onProjectUpdate({ ...project, sections: updated } as any);\n                                      }}\n                                      className=\"flex-1 h-1 rounded-full appearance-none cursor-pointer\"\n                                      style={{ accentColor: h.color }}\n                                    />\n                                    <span className=\"text-[7px] font-black tabular-nums w-6 text-right\" style={{ color: h.color + 'cc' }}>\n                                      {Math.round(vol * 100)}\n                                    </span>\n                                  </div>\n                                );\n                              })}\n                            </div>\n                          )}\n                        </div>\n                      ))}\n                    </div>\n                  )}\n                </div>\n              )}\n\n              {/* ── Clavier visuel des harmonies ── */}\n              <div className=\"space-y-2 mb-4\">\n                {HARMONY_DEFS.map(h => {\n                  const hasTrack      = tracks.some(t => t.trackIndex === h.trackIndex);\n                  const existingTrack = tracks.find(t => t.trackIndex === h.trackIndex);\n                  const isGen         = generatingIndex === h.trackIndex;\n                  const isDone        = generatedDone.has(h.trackIndex);\n                  const appliedFxId   = (existingTrack as any)?.fxPresetId as string | undefined;\n\n                  return (\n                    <div\n                      key={h.trackIndex}\n                      className={`rounded-xl border overflow-hidden transition-all ${\n                        hasTrack\n                          ? 'border-opacity-40'\n                          : 'border-zinc-800'\n                      }`}\n                      style={{\n                        borderColor: hasTrack ? h.color + '50' : undefined,\n                        background: hasTrack ? h.color + '08' : '#0a0a0a',\n                      }}>\n\n                      <div className=\"flex items-center gap-3 px-3 py-2.5\">\n                        {/* Info harmonie */}\n                        <div className=\"text-xl leading-none w-8 text-center shrink-0\">{h.emoji}</div>\n                        <div className=\"flex-1 min-w-0\">\n                          <div className=\"flex items-center gap-2\">\n                            <p className=\"text-[12px] font-black text-white\">{h.label}</p>\n                            <span\n                              className=\"text-[9px] font-black px-1.5 py-0.5 rounded-full\"\n                              style={{ background: h.color + '25', color: h.color }}>\n                              {h.musicNote}\n                            </span>\n                            {appliedFxId && (\n                              <span className=\"text-[8px] font-black px-1.5 py-0.5 rounded-full bg-zinc-800 text-zinc-400\">\n                                ⚡ {appliedFxId.replace('_', ' ')}\n                              </span>\n                            )}\n                            {h.pitch !== 0 && (\n                              <span className=\"text-[9px] text-zinc-600 font-black\">\n                                {h.pitch > 0 ? `+${h.pitch}` : h.pitch} ST\n                              </span>\n                            )}\n                          </div>\n                          <p className=\"text-[10px] text-zinc-500\">{h.desc}</p>\n\n                          {/* Waveform si générée */}\n                          {hasTrack && existingTrack?.dataUrl && (\n                            <div className=\"mt-2\">\n                              <WaveformBar\n                                dataUrl={existingTrack.dataUrl}\n                                color={h.color}\n                                height={20}\n                                points={50}\n                                playbackPct={playingId === existingTrack.id ? undefined : undefined}\n                              />\n                            </div>\n                          )}\n\n                          {/* Progression génération */}\n                          {isGen && (\n                            <div className=\"mt-2\">\n                              <div className=\"flex justify-between mb-1\">\n                                <p className=\"text-[9px] font-black\" style={{ color: h.color }}>{generateLabel}</p>\n                                <p className=\"text-[9px] text-zinc-600\">{generatePct}%</p>\n                              </div>\n                              <div className=\"h-1 bg-zinc-800 rounded-full overflow-hidden\">\n                                <div className=\"h-full rounded-full transition-all duration-200\"\n                                  style={{ width: `${generatePct}%`, background: h.color }}/>\n                              </div>\n                            </div>\n                          )}\n                        </div>\n\n                        {/* Bouton générer / régénérer */}\n                        <div className=\"shrink-0\">\n                          {isGen ? (\n                            <div className=\"w-9 h-9 rounded-xl flex items-center justify-center\" style={{ background: h.color + '20' }}>\n                              <Loader2 size={14} className=\"animate-spin\" style={{ color: h.color }}/>\n                            </div>\n                          ) : isDone ? (\n                            <div className=\"w-9 h-9 rounded-xl bg-emerald-900/30 flex items-center justify-center\">\n                              <CheckCircle2 size={14} className=\"text-emerald-400\"/>\n                            </div>\n                          ) : hasTrack ? (\n                            <button\n                              onClick={() => generateOne(h)}\n                              disabled={generatingIndex !== null}\n                              className=\"w-9 h-9 rounded-xl flex items-center justify-center active:scale-90 disabled:opacity-30 transition-all\"\n                              style={{ background: h.color + '20' }}\n                              title=\"Régénérer\">\n                              <RefreshCw size={13} style={{ color: h.color }}/>\n                            </button>\n                          ) : (\n                            <button\n                              onClick={() => generateOne(h)}\n                              disabled={generatingIndex !== null}\n                              className=\"w-9 h-9 rounded-xl flex items-center justify-center active:scale-90 disabled:opacity-30 transition-all\"\n                              style={{ background: h.color + '25' }}\n                              title=\"Générer\">\n                              <Sparkles size={13} style={{ color: h.color }}/>\n                            </button>\n                          )}\n                        </div>\n                      </div>\n                    </div>\n                  );\n                })}\n              </div>\n\n              {/* Progression globale */}\n              {generatingIndex === -1 && (\n                <div className=\"mb-3\">\n                  <div className=\"flex justify-between mb-1\">\n                    <p className=\"text-[10px] text-purple-300 font-black\">{generateLabel}...</p>\n                    <p className=\"text-[10px] text-zinc-500\">{generatePct}%</p>\n                  </div>\n                  <div className=\"h-1.5 bg-zinc-900 rounded-full overflow-hidden\">\n                    <div className=\"h-full bg-purple-600 rounded-full transition-all\"\n                      style={{ width: `${generatePct}%` }}/>\n                  </div>\n                </div>\n              )}\n\n              {/* Bouton Tout générer */}\n              <button\n                onClick={generateAll}\n                disabled={generatingIndex !== null}\n                className={`w-full py-3 rounded-xl font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all disabled:opacity-50 ${\n                  hasAnyHarmony ? 'bg-zinc-800 text-zinc-300' : 'bg-purple-700 text-white'\n                }`}>\n                {generatingIndex === -1\n                  ? <><Loader2 size={14} className=\"animate-spin\"/> Génération...</>\n                  : hasAnyHarmony\n                  ? <><RefreshCw size={14}/> Tout régénérer</>\n                  : <><Sparkles size={14}/> Générer toutes les harmonies</>\n                }\n              </button>\n            </div>\n          </div>\n        )}\n\n        {/* Guide si vide */}\n        {!mainVoice && tracks.length === 0 && (\n          <div className=\"flex flex-col items-center justify-center py-12 gap-3 opacity-40\">\n            <Layers size={40} className=\"text-zinc-700\"/>\n            <p className=\"text-[12px] text-zinc-600 font-black uppercase text-center\">Enregistre la voix principale</p>\n          </div>\n        )}\n\n        {/* ── Pistes ── */}\n        {tracks.length > 0 && (\n          <div className=\"space-y-2\">\n            {tracks.filter(t => !(t as any).isGenerated).length > 0 && (\n              <p className=\"text-[9px] text-zinc-700 font-black uppercase tracking-widest px-1\">\n                🎤 Pistes enregistrées\n              </p>\n            )}\n            {tracks.filter(t => !(t as any).isGenerated).map(track => (\n              <TrackCard key={track.trackIndex} track={track} playingId={playingId}\n                allTracks={tracks}\n                onPlay={onPlay} onMute={onMute} onSolo={onSolo} onVolume={onVolume} onPan={onPan} onDelete={onDelete}\n                onTrackUpdate={handleTrackUpdate}/>\n            ))}\n\n            {tracks.filter(t => (t as any).isGenerated).length > 0 && (\n              <p className=\"text-[9px] text-zinc-700 font-black uppercase tracking-widest px-1 pt-2\">\n                ✨ Harmonies & layers générés\n              </p>\n            )}\n            {tracks.filter(t => (t as any).isGenerated).map(track => (\n              <TrackCard key={track.trackIndex} track={track} playingId={playingId}\n                allTracks={tracks}\n                onPlay={onPlay} onMute={onMute} onSolo={onSolo} onVolume={onVolume} onPan={onPan} onDelete={onDelete}\n                onTrackUpdate={handleTrackUpdate}/>\n            ))}\n          </div>\n        )}\n\n        {/* ── Zone Mix + Export ── */}\n        {tracks.length > 0 && (\n          <div className=\"space-y-3 pt-2\">\n\n            {/* Bouton Mixer */}\n            <button onClick={onMix} disabled={isMixing}\n              className=\"w-full py-4 bg-red-600 rounded-2xl font-black text-[14px] uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all disabled:opacity-60\">\n              {isMixing\n                ? <><Loader2 size={18} className=\"animate-spin\"/> Mixage...</>\n                : mixDone\n                ? <><CheckCircle2 size={18}/> Re-mixer</>\n                : <><Layers size={18}/> Mixer toutes les pistes</>}\n            </button>\n\n            {/* Waveform du mix + actions */}\n            {mixDone && project.mixedDataUrl && (\n              <div className=\"bg-zinc-950 border border-white/8 rounded-2xl overflow-hidden\">\n                {/* Header mix */}\n                <div className=\"px-4 pt-3 pb-2 flex items-center justify-between\">\n                  <div className=\"flex items-center gap-2\">\n                    <Music2 size={13} className=\"text-red-400\"/>\n                    <p className=\"text-[11px] font-black text-white\">Mix vocal</p>\n                    {totalDuration > 0 && (\n                      <span className=\"text-[10px] text-zinc-500\">{formatTime(totalDuration)}</span>\n                    )}\n                  </div>\n                  <button onClick={onPlayMix}\n                    className=\"flex items-center gap-1.5 px-3 py-1.5 bg-zinc-800 rounded-xl text-[11px] font-black text-white active:scale-90\">\n                    {playingId === 'mix' ? <><Pause size={12}/> Pause</> : <><Play size={12}/> Écouter</>}\n                  </button>\n                </div>\n\n                {/* Waveform mix */}\n                <div className=\"px-4 pb-3\">\n                  {mixWaveform.length > 0 ? (\n                    <WaveformBar\n                      waveform={mixWaveform}\n                      color=\"#ef4444\"\n                      height={48}\n                      points={100}\n                      playbackPct={playingId === 'mix' ? undefined : undefined}\n                      isPlaying={playingId === 'mix'}\n                    />\n                  ) : (\n                    <div className=\"h-12 bg-zinc-900 rounded-lg animate-pulse\"/>\n                  )}\n                </div>\n\n                {/* Actions */}\n                <div className=\"border-t border-white/5 divide-y divide-white/5\">\n                  <button onClick={handleMasterize}\n                    className=\"w-full py-3.5 font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 text-purple-400 active:bg-zinc-900 transition-all\">\n                    🎛️ Masteriser & Exporter\n                    <span className=\"text-[10px] opacity-60\">{instBlob ? '+ instrumental' : 'voix seule'}</span>\n                  </button>\n\n                  {isOnline && (\n                    <button onClick={onUploadMix} disabled={uploading === 'mix'}\n                      className=\"w-full py-3.5 font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 text-emerald-400 active:bg-zinc-900 transition-all disabled:opacity-60\">\n                      {uploading === 'mix'\n                        ? <><Loader2 size={14} className=\"animate-spin\"/> Transfert...</>\n                        : uploadDone === 'mix'\n                        ? <><CheckCircle2 size={14}/> Transféré au Mac !</>\n                        : <><Send size={14}/> Envoyer au Mac (brut)</>}\n                    </button>\n                  )}\n                </div>\n              </div>\n            )}\n          </div>\n        )}\n      </div>\n\n      <audio ref={playRef} playsInline className=\"hidden\"/>\n    </div>\n  );\n}\n",
  "components/StudioMobile/TrackCard.tsx": "/**\n * TrackCard.tsx — Carte piste mixer v3\n *\n * NOUVEAUTÉS :\n * - Bouton FX par piste qui ouvre un panneau de presets style BandLab\n * - Application du preset FX non-destructif via applyFxToTrack\n * - Waveform SVG avec progression lecture\n * - Badge pitch, badge Auto, indicateur clipping\n * - Preset FX actif affiché sur la carte\n */\nimport React, { useState, useEffect, useRef } from 'react';\nimport { Play, Pause, Trash2, VolumeX, Volume2, Zap, Loader2, CheckCircle2 } from 'lucide-react';\nimport { MobileRecording, studioService } from '../../services/StudioService';\nimport { TRACK_PRESETS, FX_PRESETS, FX_PRESET_DEFAULT, TRACK_FX_SUGGESTIONS, FxPreset, formatTime, formatDate } from './studio.types';\nimport WaveformBar from './WaveformBar';\n\ninterface Props {\n  track:     MobileRecording;\n  allTracks: MobileRecording[];\n  playingId: string | null;\n  onPlay:    (rec: MobileRecording) => void;\n  onMute:    (trackIndex: number, muted: boolean) => void;\n  onSolo:    (trackIndex: number) => void;\n  onVolume:  (trackIndex: number, gain: number) => void;\n  onPan:     (trackIndex: number, pan: number) => void;\n  onDelete:  (trackIndex: number) => void;\n  onTrackUpdate?: (updated: MobileRecording) => void;\n}\n\nexport default function TrackCard({ track, allTracks, playingId, onPlay, onMute, onSolo, onVolume, onPan, onDelete, onTrackUpdate }: Props) {\n  const preset     = TRACK_PRESETS.find(p => p.index === track.trackIndex) || TRACK_PRESETS[0];\n  const gain       = track.gain ?? 1;\n  const pan        = track.pan  ?? 0;\n  const isPlaying  = playingId === track.id;\n  const isClipping = gain > 1.0;\n  // Solo : cette piste est en solo si toutes les autres sont mutées\n  const isSolo = allTracks.length > 1 &&\n    allTracks.every(t => t.trackIndex === track.trackIndex ? !t.muted : t.muted);\n\n  // FX state\n  const activeFxId = (track as any).fxPresetId as string | undefined;\n  const activeFx   = FX_PRESETS.find(f => f.id === activeFxId) ?? null;\n  const [showFxPanel, setShowFxPanel]   = useState(false);\n  const [applyingFx, setApplyingFx]     = useState(false);\n  const [applyPct, setApplyPct]         = useState(0);\n  const [applyDone, setApplyDone]       = useState(false);\n  const [showFxDetail, setShowFxDetail] = useState<FxPreset | null>(null);\n\n  // Progression lecture\n  const [playPct, setPlayPct] = useState<number | undefined>(undefined);\n\n  useEffect(() => {\n    if (!isPlaying) { setPlayPct(undefined); return; }\n    const handler = (e: Event) => {\n      const el = e.target as HTMLAudioElement;\n      if (el.duration > 0) setPlayPct((el.currentTime / el.duration) * 100);\n    };\n    document.querySelectorAll('audio').forEach(el => el.addEventListener('timeupdate', handler));\n    return () => document.querySelectorAll('audio').forEach(el => el.removeEventListener('timeupdate', handler));\n  }, [isPlaying]);\n\n  const handleApplyFx = async (fx: FxPreset) => {\n    if (!track.dataUrl) return;\n    setApplyingFx(true); setApplyPct(0); setApplyDone(false);\n    try {\n      const newDataUrl = await studioService.applyFxToTrack(\n        track.dataUrl, fx,\n        (pct) => setApplyPct(pct),\n      );\n      const updated = { ...track, dataUrl: newDataUrl, fxPresetId: fx.id } as any;\n      studioService.saveRecordingLocally(updated);\n      onTrackUpdate?.(updated);\n      setApplyDone(true);\n      setTimeout(() => { setApplyDone(false); setShowFxPanel(false); }, 1500);\n    } catch (e: any) {\n      alert('Erreur FX : ' + e.message);\n    } finally {\n      setApplyingFx(false); setApplyPct(0);\n    }\n  };\n\n  const panLabel = pan === 0 ? 'C' : pan > 0 ? `R${Math.round(pan*100)}` : `L${Math.round(Math.abs(pan)*100)}`;\n  const suggestedFxId = TRACK_FX_SUGGESTIONS[track.trackIndex ?? 0];\n\n  return (\n    <div className=\"rounded-2xl overflow-hidden transition-all\"\n      style={{\n        background: '#0f0f0f',\n        borderLeft: `3px solid ${track.muted ? '#27272a' : preset.color}`,\n        border: `1px solid #1e1e1e`,\n        borderLeftWidth: 3,\n        borderLeftColor: track.muted ? '#27272a' : preset.color,\n        opacity: track.muted ? 0.55 : 1,\n      }}>\n\n      {/* ── En-tête ── */}\n      <div className=\"flex items-center gap-2.5 px-3 pt-3 pb-2\">\n        <div className=\"w-9 h-9 rounded-xl flex items-center justify-center shrink-0 text-base\"\n          style={{ background: preset.color + '20' }}>\n          {preset.emoji}\n        </div>\n\n        <div className=\"flex-1 min-w-0\">\n          <div className=\"flex items-center gap-1.5 flex-wrap\">\n            <p className=\"text-[13px] font-black text-white\">{track.trackLabel}</p>\n            {(track.pitchShift !== undefined && track.pitchShift !== 0) && (\n              <span className=\"text-[8px] font-black px-1.5 py-0.5 rounded-full\"\n                style={{ background: preset.color + '25', color: preset.color }}>\n                {track.pitchShift > 0 ? `+${track.pitchShift}` : track.pitchShift} ST\n              </span>\n            )}\n            {(track as any).isGenerated && (\n              <span className=\"text-[8px] font-black px-1.5 py-0.5 rounded-full bg-purple-900/40 text-purple-400\">✨ Auto</span>\n            )}\n          </div>\n          <div className=\"flex items-center gap-2 mt-0.5\">\n            <p className=\"text-[9px] text-zinc-600\">{formatTime(track.duration)} · {formatDate(track.recordedAt)}</p>\n            {activeFx && (\n              <span className=\"text-[8px] font-black px-1.5 py-0.5 rounded-full\"\n                style={{ background: activeFx.color + '20', color: activeFx.color }}>\n                {activeFx.emoji} {activeFx.label}\n              </span>\n            )}\n          </div>\n        </div>\n\n        <div className=\"flex items-center gap-1 shrink-0\">\n          {/* FX button */}\n          <button onClick={() => setShowFxPanel(v => !v)}\n            className=\"flex items-center gap-1 px-2 py-1.5 rounded-lg active:scale-90 transition-all\"\n            style={{\n              background: showFxPanel ? preset.color + '30' : activeFx ? activeFx.color + '20' : '#1a1a1a',\n              border: `1px solid ${showFxPanel ? preset.color + '60' : activeFx ? activeFx.color + '40' : '#2a2a2a'}`,\n            }}>\n            <Zap size={11} style={{ color: activeFx ? activeFx.color : '#52525b' }}/>\n            <span className=\"text-[9px] font-black\" style={{ color: activeFx ? activeFx.color : '#52525b' }}>\n              FX\n            </span>\n          </button>\n\n          {/* Play */}\n          <button onClick={() => onPlay(track)}\n            className=\"w-8 h-8 rounded-xl flex items-center justify-center active:scale-90\"\n            style={{ background: isPlaying ? preset.color + '30' : '#1a1a1a' }}>\n            {isPlaying ? <Pause size={13} style={{ color: preset.color }}/> : <Play size={13} className=\"text-white\"/>}\n          </button>\n\n          {/* Solo */}\n          <button onClick={() => onSolo(track.trackIndex!)}\n            className=\"w-8 h-8 rounded-xl flex items-center justify-center active:scale-90 font-black text-[10px]\"\n            style={{\n              background: isSolo ? preset.color + '30' : '#1a1a1a',\n              border: `1px solid ${isSolo ? preset.color : '#2a2a2a'}`,\n              color: isSolo ? preset.color : '#52525b',\n            }}>\n            S\n          </button>\n\n          {/* Mute */}\n          <button onClick={() => onMute(track.trackIndex!, !track.muted)}\n            className=\"w-8 h-8 rounded-xl flex items-center justify-center active:scale-90\"\n            style={{ background: track.muted ? '#1a1a1a' : '#222' }}>\n            {track.muted ? <VolumeX size={13} className=\"text-zinc-600\"/> : <Volume2 size={13} className=\"text-zinc-300\"/>}\n          </button>\n\n          {/* Delete */}\n          <button onClick={() => onDelete(track.trackIndex!)}\n            className=\"w-8 h-8 rounded-xl bg-zinc-950 flex items-center justify-center text-zinc-700 active:text-red-500 active:scale-90\">\n            <Trash2 size={13}/>\n          </button>\n        </div>\n      </div>\n\n      {/* ── Waveform ── */}\n      <div className=\"px-3 pb-2\">\n        {applyingFx ? (\n          <div>\n            <div className=\"flex justify-between mb-1\">\n              <p className=\"text-[9px] font-black text-zinc-500 uppercase\">Application FX...</p>\n              <p className=\"text-[9px] text-zinc-600\">{applyPct}%</p>\n            </div>\n            <div className=\"h-2 bg-zinc-900 rounded-full overflow-hidden\">\n              <div className=\"h-full rounded-full transition-all duration-200\"\n                style={{ width: `${applyPct}%`, background: preset.color }}/>\n            </div>\n          </div>\n        ) : (\n          <WaveformBar dataUrl={track.dataUrl} color={preset.color} height={28} points={80}\n            playbackPct={isPlaying ? playPct : undefined} isPlaying={isPlaying} dimmed={track.muted}/>\n        )}\n      </div>\n\n      {/* ── Faders ── */}\n      <div className=\"px-3 pb-3 space-y-1.5\" style={{ borderTop: '1px solid #1a1a1a', paddingTop: 8 }}>\n        {/* VOL */}\n        <div className=\"flex items-center gap-2\">\n          <span className=\"text-[9px] text-zinc-700 font-black uppercase w-7 shrink-0\">VOL</span>\n          <input type=\"range\" min=\"0\" max=\"2\" step=\"0.05\" value={gain}\n            onChange={e => onVolume(track.trackIndex!, parseFloat(e.target.value))}\n            className=\"flex-1 h-1 rounded-full appearance-none cursor-pointer\"\n            style={{\n              accentColor: isClipping ? '#ef4444' : preset.color,\n              background: `linear-gradient(to right, ${isClipping ? '#ef4444' : preset.color} ${(gain/2)*100}%, #1e1e1e ${(gain/2)*100}%)`,\n            }}/>\n          <div className=\"flex items-center gap-1 w-12 justify-end\">\n            {isClipping && <span className=\"text-[7px] font-black text-red-500 uppercase animate-pulse\">CLIP</span>}\n            <span className={`text-[9px] font-black ${isClipping ? 'text-red-400' : 'text-zinc-600'}`}>{Math.round(gain*100)}%</span>\n          </div>\n        </div>\n        {/* PAN */}\n        <div className=\"flex items-center gap-2\">\n          <span className=\"text-[9px] text-zinc-700 font-black uppercase w-7 shrink-0\">PAN</span>\n          <div className=\"flex-1 relative\">\n            <input type=\"range\" min=\"-1\" max=\"1\" step=\"0.05\" value={pan}\n              onChange={e => onPan(track.trackIndex!, parseFloat(e.target.value))}\n              className=\"w-full h-1 rounded-full appearance-none cursor-pointer accent-zinc-400\"\n              style={{\n                background: pan === 0 ? '#1e1e1e'\n                  : pan > 0\n                  ? `linear-gradient(to right, #1e1e1e 50%, ${preset.color}60 50%, ${preset.color}60 ${50+pan*50}%, #1e1e1e ${50+pan*50}%)`\n                  : `linear-gradient(to right, #1e1e1e ${50+pan*50}%, ${preset.color}60 ${50+pan*50}%, ${preset.color}60 50%, #1e1e1e 50%)`,\n              }}/>\n            <div className=\"absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-px h-3 bg-zinc-700 pointer-events-none\"/>\n          </div>\n          <span className=\"text-[9px] text-zinc-600 font-black w-12 text-right\">{panLabel}</span>\n        </div>\n      </div>\n\n      {/* ── Panneau FX ── */}\n      {showFxPanel && (\n        <div style={{ borderTop: '1px solid #1e1e1e', background: '#0a0a0a' }}>\n          <div className=\"px-3 py-2 flex items-center justify-between\">\n            <p className=\"text-[10px] font-black text-white uppercase tracking-widest flex items-center gap-1.5\">\n              <Zap size={11} style={{ color: preset.color }}/> Presets FX\n            </p>\n            <p className=\"text-[9px] text-zinc-600\">Appuie pour appliquer</p>\n          </div>\n\n          {applyDone && (\n            <div className=\"mx-3 mb-2 flex items-center gap-2 px-3 py-2 rounded-xl bg-emerald-900/30\">\n              <CheckCircle2 size={13} className=\"text-emerald-400\"/>\n              <p className=\"text-[11px] font-black text-emerald-400\">FX appliqué !</p>\n            </div>\n          )}\n\n          <div className=\"px-3 pb-3 space-y-1.5 max-h-72 overflow-y-auto\" style={{ WebkitOverflowScrolling: 'touch' }}>\n            {FX_PRESETS.map(fx => {\n              const isActive  = activeFxId === fx.id;\n              const isSuggested = fx.id === suggestedFxId && !activeFxId;\n\n              return (\n                <div key={fx.id}>\n                  <button\n                    onClick={() => setShowFxDetail(showFxDetail?.id === fx.id ? null : fx)}\n                    disabled={applyingFx}\n                    className=\"w-full flex items-center gap-3 px-3 py-2.5 rounded-xl active:scale-[0.98] transition-all text-left\"\n                    style={{\n                      background: isActive ? fx.color + '20' : '#141414',\n                      border: `1px solid ${isActive ? fx.color + '50' : isSuggested ? fx.color + '30' : '#1e1e1e'}`,\n                    }}>\n                    <span className=\"text-base leading-none shrink-0\">{fx.emoji}</span>\n                    <div className=\"flex-1 min-w-0\">\n                      <div className=\"flex items-center gap-1.5\">\n                        <p className=\"text-[12px] font-black\" style={{ color: isActive ? fx.color : '#e4e4e7' }}>{fx.label}</p>\n                        {isSuggested && !isActive && (\n                          <span className=\"text-[7px] font-black px-1 py-0.5 rounded\" style={{ background: fx.color + '20', color: fx.color }}>\n                            Suggéré\n                          </span>\n                        )}\n                        {isActive && <span className=\"text-[7px] font-black text-emerald-400\">✓ Actif</span>}\n                      </div>\n                      <p className=\"text-[9px] text-zinc-600 truncate\">{fx.description}</p>\n                    </div>\n\n                    {/* Apply button */}\n                    <button\n                      onClick={e => { e.stopPropagation(); handleApplyFx(fx); }}\n                      disabled={applyingFx || isActive}\n                      className=\"shrink-0 px-2.5 py-1.5 rounded-lg font-black text-[9px] uppercase active:scale-90 disabled:opacity-40 transition-all\"\n                      style={{\n                        background: isActive ? '#1a1a1a' : fx.color + '25',\n                        color: isActive ? '#52525b' : fx.color,\n                        border: `1px solid ${isActive ? '#2a2a2a' : fx.color + '40'}`,\n                      }}>\n                      {isActive ? '✓' : 'Appliquer'}\n                    </button>\n                  </button>\n\n                  {/* Détail FX expandable */}\n                  {showFxDetail?.id === fx.id && (\n                    <div className=\"mx-1 mb-1 px-3 py-2 rounded-xl space-y-2\"\n                      style={{ background: '#0d0d0d', border: `1px solid ${fx.color}20` }}>\n                      <p className=\"text-[8px] font-black text-zinc-600 uppercase tracking-widest mb-2\">Paramètres</p>\n                      {[\n                        { label: 'Graves', value: `${fx.lowGain > 0 ? '+' : ''}${fx.lowGain} dB` },\n                        { label: 'Mids', value: `${fx.midGain > 0 ? '+' : ''}${fx.midGain} dB` },\n                        { label: 'Aigus', value: `${fx.highGain > 0 ? '+' : ''}${fx.highGain} dB` },\n                        { label: 'Threshold', value: `${fx.compThreshold} dB` },\n                        { label: 'Ratio', value: `${fx.compRatio}:1` },\n                        { label: 'Attack', value: `${fx.compAttack} ms` },\n                        { label: 'Release', value: `${fx.compRelease} ms` },\n                        { label: 'Knee', value: `${fx.compKnee} dB` },\n                        { label: 'Reverb', value: fx.reverb === 'none' ? 'Sec' : `${fx.reverb} ${Math.round(fx.reverbMix * 100)}%` },\n                      ].map(({ label, value }) => (\n                        <div key={label} className=\"flex justify-between\">\n                          <span className=\"text-[9px] text-zinc-600 font-black uppercase\">{label}</span>\n                          <span className=\"text-[9px] font-black\" style={{ color: fx.color }}>{value}</span>\n                        </div>\n                      ))}\n                    </div>\n                  )}\n                </div>\n              );\n            })}\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n",
  "components/StudioMobile/WaveformBar.tsx": "/**\n * WaveformBar.tsx — Visualisation waveform SVG\n *\n * Affiche la forme d'onde d'un enregistrement.\n * Si playbackPct est fourni, un overlay de lecture avance sur la waveform.\n * Charge la waveform depuis analyzeWaveform() au montage si dataUrl est fourni.\n */\nimport React, { useEffect, useState, useRef } from 'react';\nimport { studioService } from '../../services/StudioService';\n\ninterface Props {\n  dataUrl?:     string;           // Pour calculer la waveform depuis l'audio\n  waveform?:    number[];         // Ou fournir directement les données\n  color?:       string;           // Couleur des barres\n  height?:      number;           // Hauteur en px (défaut 36)\n  points?:      number;           // Nombre de barres (défaut 60)\n  playbackPct?: number;           // 0-100 : progression lecture\n  isPlaying?:   boolean;\n  dimmed?:      boolean;          // Piste muée\n}\n\nexport default function WaveformBar({\n  dataUrl, waveform: waveformProp, color = '#ef4444',\n  height = 36, points = 60, playbackPct, isPlaying, dimmed,\n}: Props) {\n  const [waveform, setWaveform] = useState<number[]>(waveformProp || []);\n  const [loading, setLoading]   = useState(false);\n  const cancelRef = useRef(false);\n\n  useEffect(() => {\n    if (waveformProp) { setWaveform(waveformProp); return; }\n    if (!dataUrl) return;\n    cancelRef.current = false;\n    setLoading(true);\n    studioService.analyzeWaveform(dataUrl, points)\n      .then(w => { if (!cancelRef.current) setWaveform(w); })\n      .catch(() => {})\n      .finally(() => { if (!cancelRef.current) setLoading(false); });\n    return () => { cancelRef.current = true; };\n  }, [dataUrl, points]);\n\n  // Skeleton animé pendant le chargement\n  if (loading || waveform.length === 0) {\n    return (\n      <div\n        className=\"w-full rounded-lg overflow-hidden\"\n        style={{ height, background: '#18181b' }}>\n        <div\n          className=\"h-full rounded-lg animate-pulse\"\n          style={{ background: `${color}15` }}/>\n      </div>\n    );\n  }\n\n  const w = 100; // viewBox width\n  const h = height;\n  const barW = w / waveform.length;\n  const gap  = Math.max(0.5, barW * 0.15);\n  const playX = playbackPct != null ? (playbackPct / 100) * w : null;\n\n  return (\n    <div className=\"w-full relative\" style={{ height }}>\n      <svg\n        viewBox={`0 0 ${w} ${h}`}\n        preserveAspectRatio=\"none\"\n        className=\"w-full h-full\"\n        style={{ opacity: dimmed ? 0.3 : 1 }}>\n\n        {/* Barres de fond */}\n        {waveform.map((v, i) => {\n          const bh  = Math.max(2, v * (h * 0.85));\n          const x   = i * barW + gap / 2;\n          const y   = (h - bh) / 2;\n          const isPlayed = playX != null && (x + barW / 2) < playX;\n\n          return (\n            <rect\n              key={i}\n              x={x} y={y}\n              width={barW - gap} height={bh}\n              rx={1}\n              fill={isPlayed ? color : `${color}35`}\n            />\n          );\n        })}\n\n        {/* Curseur de lecture */}\n        {playX != null && (\n          <line\n            x1={playX} y1={2} x2={playX} y2={h - 2}\n            stroke={color} strokeWidth={1.5}\n            strokeLinecap=\"round\"\n            opacity={isPlaying ? 1 : 0.6}\n          />\n        )}\n      </svg>\n    </div>\n  );\n}\n",
  "components/StudioMobile/RecordingsList.tsx": "/**\n * RecordingsList.tsx — Écran liste des enregistrements (screen: 'recordings')\n */\nimport React from 'react';\nimport { ChevronLeft, Mic } from 'lucide-react';\nimport { MobileRecording } from '../../services/StudioService';\nimport RecordingCard from './RecordingCard';\n\ninterface Props {\n  recordings:  MobileRecording[];\n  pendingCount: number;\n  playingId:   string | null;\n  uploading:   string | null;\n  uploadDone:  string | null;\n  isOnline:    boolean;\n  playRef:     React.RefObject<HTMLAudioElement>;\n  onBack:      () => void;\n  onPlay:      (rec: MobileRecording) => void;\n  onUpload:    (rec: MobileRecording) => void;\n  onDelete:    (id: string) => void;\n}\n\nexport default function RecordingsList({\n  recordings, pendingCount, playingId, uploading, uploadDone, isOnline,\n  playRef, onBack, onPlay, onUpload, onDelete,\n}: Props) {\n  return (\n    <div className=\"min-h-screen bg-[#020202] text-white flex flex-col\">\n\n      {/* Header */}\n      <div className=\"shrink-0 flex items-center gap-3 px-5 pt-6 pb-4 border-b border-zinc-900\">\n        <button onClick={onBack} className=\"w-10 h-10 rounded-xl bg-zinc-900 flex items-center justify-center active:scale-90\">\n          <ChevronLeft size={20}/>\n        </button>\n        <div>\n          <p className=\"font-bebas text-2xl text-white tracking-widest leading-none\">ENREGISTREMENTS</p>\n          <p className=\"text-[9px] text-zinc-600 font-black uppercase\">\n            {recordings.length} fichier{recordings.length > 1 ? 's' : ''} · {pendingCount} à transférer\n          </p>\n        </div>\n      </div>\n\n      <div className=\"flex-1 overflow-y-auto px-5 pt-4 pb-8 space-y-3\">\n        {recordings.length === 0 ? (\n          <div className=\"flex flex-col items-center justify-center py-20 gap-4 opacity-30\">\n            <Mic size={48} className=\"text-zinc-700\"/>\n            <p className=\"text-[12px] text-zinc-600 font-black uppercase\">Aucun enregistrement</p>\n          </div>\n        ) : (\n          recordings.slice().reverse().map(rec => (\n            <RecordingCard\n              key={rec.id}\n              rec={rec}\n              playingId={playingId}\n              uploading={uploading}\n              uploadDone={uploadDone}\n              isOnline={isOnline}\n              onPlay={onPlay}\n              onUpload={onUpload}\n              onDelete={onDelete}\n            />\n          ))\n        )}\n      </div>\n\n      <audio ref={playRef} className=\"hidden\"/>\n    </div>\n  );\n}\n",
  "components/StudioMobile/RecordingCard.tsx": "/**\n * RecordingCard.tsx — Carte d'un enregistrement (play, upload, delete)\n */\nimport React from 'react';\nimport { Play, Pause, Trash2, Send, Loader2, CheckCircle2, Mic } from 'lucide-react';\nimport { MobileRecording } from '../../services/StudioService';\nimport { TRACK_PRESETS, formatTime, formatDate } from './studio.types';\n\ninterface Props {\n  rec:        MobileRecording;\n  playingId:  string | null;\n  uploading:  string | null;\n  uploadDone: string | null;\n  isOnline:   boolean;\n  onPlay:     (rec: MobileRecording) => void;\n  onUpload:   (rec: MobileRecording) => void;\n  onDelete:   (id: string) => void;\n}\n\nexport default function RecordingCard({\n  rec, playingId, uploading, uploadDone, isOnline, onPlay, onUpload, onDelete,\n}: Props) {\n  const isPlaying    = playingId === rec.id;\n  const isUploading  = uploading === rec.id;\n  const isDone       = uploadDone === rec.id;\n  const presetColor  = TRACK_PRESETS[rec.trackIndex ?? 0]?.color || '#888';\n\n  return (\n    <div className={`bg-zinc-900/60 border rounded-2xl overflow-hidden ${rec.transferred ? 'border-emerald-900/40' : 'border-zinc-800'}`}>\n\n      {/* Infos */}\n      <div className=\"flex items-center gap-3 p-4\">\n        <div className={`w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${rec.transferred ? 'bg-emerald-900/30' : 'bg-red-900/20'}`}>\n          {rec.transferred\n            ? <CheckCircle2 size={18} className=\"text-emerald-500\"/>\n            : <Mic          size={18} className=\"text-red-500\"/>}\n        </div>\n        <div className=\"flex-1 min-w-0\">\n          <p className=\"text-[14px] font-black text-white truncate\">{rec.songTitle}</p>\n          {rec.trackLabel && (\n            <p className=\"text-[10px] font-black mt-0.5\" style={{ color: presetColor }}>\n              {rec.trackLabel}\n            </p>\n          )}\n          <p className=\"text-[10px] text-zinc-500 mt-0.5\">\n            {formatDate(rec.recordedAt)} · {formatTime(rec.duration)}\n          </p>\n          {rec.transferred && (\n            <p className=\"text-[10px] text-emerald-500 font-black uppercase mt-0.5\">✓ Transféré</p>\n          )}\n        </div>\n      </div>\n\n      {/* Actions */}\n      <div className=\"flex border-t border-zinc-800\">\n        {/* Écouter */}\n        <button\n          onClick={() => onPlay(rec)}\n          className=\"flex-1 py-3 flex items-center justify-center gap-2 text-[11px] font-black uppercase text-zinc-400 hover:text-white active:bg-zinc-800\">\n          {isPlaying ? <><Pause size={13}/> Pause</> : <><Play size={13}/> Écouter</>}\n        </button>\n\n        {/* Upload */}\n        {!rec.transferred && isOnline && (\n          <button\n            onClick={() => onUpload(rec)}\n            disabled={isUploading}\n            className=\"flex-1 py-3 flex items-center justify-center gap-2 text-[11px] font-black uppercase text-red-400 hover:text-red-300 active:bg-zinc-800 border-l border-zinc-800 disabled:opacity-50\">\n            {isUploading\n              ? <><Loader2 size={13} className=\"animate-spin\"/> Envoi</>\n              : isDone\n              ? <><CheckCircle2 size={13} className=\"text-emerald-400\"/> Envoyé!</>\n              : <><Send size={13}/> Envoyer au Mac</>}\n          </button>\n        )}\n\n        {rec.transferred && (\n          <div className=\"flex-1 py-3 flex items-center justify-center gap-2 text-[11px] font-black text-emerald-600 border-l border-zinc-800\">\n            <CheckCircle2 size={13}/> Transféré\n          </div>\n        )}\n\n        {/* Supprimer */}\n        <button\n          onClick={() => onDelete(rec.id)}\n          className=\"w-12 py-3 flex items-center justify-center text-zinc-700 hover:text-red-500 active:bg-zinc-800 border-l border-zinc-800\">\n          <Trash2 size={14}/>\n        </button>\n      </div>\n    </div>\n  );\n}\n",
  "components/StudioMobile/CompEditor.tsx": "/**\n * CompEditor.tsx — Éditeur de comping multi-prise v2\n *\n * CORRECTIFS :\n * - audio playsInline (obligatoire iOS)\n * - playTake() cherche le blob dans IndexedDB si dataUrl absent\n * - Waveform chargée même si dataUrl absent (via IndexedDB)\n * - Sélection de région : min 0.3s au lieu de 0.5s\n * - \"Tout sélectionner\" par prise (bouton pratique)\n * - Indicateur de durée en temps réel pendant la sélection\n */\nimport React, { useState, useEffect, useRef, useCallback } from 'react';\nimport {\n  ChevronLeft, Play, Pause, Trash2, Loader2,\n  CheckCircle2, Scissors, Music, PlusCircle,\n} from 'lucide-react';\nimport { studioService, MobileRecording, Take, Region } from '../../services/StudioService';\nimport { studioOfflineDB } from '../../services/StudioOfflineDB';\nimport { Song } from '../../types';\n\ninterface Props {\n  song:         Song;\n  takes:        Take[];\n  onBack:       () => void;\n  onCompReady:  (blob: Blob) => void;\n  isOnline:     boolean;\n}\n\nconst TAKE_COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#a855f7','#ec4899'];\n\nfunction fmt(s: number) {\n  return `${Math.floor(s / 60)}:${(s % 60).toFixed(1).padStart(4, '0')}`;\n}\n\n// Récupérer le dataUrl d'un enregistrement (mémoire ou IndexedDB)\nasync function getRecordingDataUrl(rec: MobileRecording): Promise<string | null> {\n  if (rec.dataUrl) return rec.dataUrl;\n  try {\n    const blob = await studioOfflineDB.getAudio(`rec_${rec.id}`);\n    if (blob) return studioService.blobToDataUrl(blob);\n  } catch {}\n  return null;\n}\n\n// ── WaveformTrack ─────────────────────────────────────────────────────────────\nfunction WaveformTrack({\n  take, color, onAddRegion, onRemoveRegion, isPlaying, onPlayPause,\n}: {\n  take:           Take;\n  color:          string;\n  onAddRegion:    (region: Region) => void;\n  onRemoveRegion: (regionId: string) => void;\n  isPlaying:      boolean;\n  onPlayPause:    () => void;\n}) {\n  const canvasRef  = useRef<HTMLCanvasElement>(null);\n  const duration   = Math.max(take.recording.duration || 1, 1);\n  const [selecting, setSelecting] = useState(false);\n  const [selStart, setSelStart]   = useState(0);\n  const [selEnd, setSelEnd]       = useState(0);\n\n  // Dessin canvas\n  useEffect(() => {\n    const canvas = canvasRef.current;\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d')!;\n    const W = canvas.width, H = canvas.height;\n\n    ctx.clearRect(0, 0, W, H);\n    ctx.fillStyle = '#0a0a0a';\n    ctx.fillRect(0, 0, W, H);\n\n    // Waveform\n    if (take.waveformData && take.waveformData.length > 0) {\n      const pts = take.waveformData;\n      const barW = W / pts.length;\n      pts.forEach((amp, i) => {\n        const h = Math.max(2, amp * H * 0.85);\n        ctx.fillStyle = color + '60';\n        ctx.fillRect(i * barW, (H - h) / 2, Math.max(barW - 0.5, 1), h);\n      });\n    } else {\n      // Placeholder\n      ctx.fillStyle = color + '20';\n      ctx.fillRect(0, H * 0.25, W, H * 0.5);\n    }\n\n    // Régions existantes\n    take.regions.forEach(r => {\n      const x1 = (r.startSec / duration) * W;\n      const x2 = (r.endSec   / duration) * W;\n      ctx.fillStyle = color + '45';\n      ctx.fillRect(x1, 0, x2 - x1, H);\n      // Bords de région\n      ctx.fillStyle = color;\n      ctx.fillRect(x1, 0, 3, H);\n      ctx.fillRect(Math.max(x2 - 3, x1 + 3), 0, 3, H);\n    });\n\n    // Sélection en cours\n    if (selecting && Math.abs(selEnd - selStart) > 0.01) {\n      const x1 = (Math.min(selStart, selEnd) / duration) * W;\n      const x2 = (Math.max(selStart, selEnd) / duration) * W;\n      ctx.fillStyle = '#ffffff20';\n      ctx.fillRect(x1, 0, x2 - x1, H);\n      ctx.strokeStyle = '#ffffff80';\n      ctx.lineWidth = 2;\n      ctx.strokeRect(x1, 0, x2 - x1, H);\n    }\n  }, [take.waveformData, take.regions, selecting, selStart, selEnd, color, duration]);\n\n  const xToSec = useCallback((x: number, canvas: HTMLCanvasElement) => {\n    const rect = canvas.getBoundingClientRect();\n    const relX  = Math.max(0, Math.min(x - rect.left, rect.width));\n    return (relX / rect.width) * duration;\n  }, [duration]);\n\n  const onTouchStart = (e: React.TouchEvent) => {\n    e.preventDefault();\n    const sec = xToSec(e.touches[0].clientX, canvasRef.current!);\n    setSelecting(true); setSelStart(sec); setSelEnd(sec);\n  };\n  const onTouchMove = (e: React.TouchEvent) => {\n    if (!selecting) return;\n    e.preventDefault();\n    setSelEnd(xToSec(e.touches[0].clientX, canvasRef.current!));\n  };\n  const onTouchEnd = () => {\n    if (!selecting) return;\n    setSelecting(false);\n    const start = Math.min(selStart, selEnd);\n    const end   = Math.max(selStart, selEnd);\n    if (end - start < 0.3) { setSelStart(0); setSelEnd(0); return; }\n    onAddRegion({\n      id:       `REG-${Date.now()}`,\n      takeId:   take.recording.id,\n      startSec: parseFloat(start.toFixed(2)),\n      endSec:   parseFloat(end.toFixed(2)),\n      label:    take.recording.trackLabel || `Prise`,\n      color,\n    });\n    setSelStart(0); setSelEnd(0);\n  };\n\n  const selectAll = () => {\n    onAddRegion({\n      id: `REG-${Date.now()}`,\n      takeId: take.recording.id,\n      startSec: 0,\n      endSec: duration,\n      label: take.recording.trackLabel || 'Tout',\n      color,\n    });\n  };\n\n  const selDuration = Math.abs(selEnd - selStart);\n\n  return (\n    <div className=\"bg-zinc-950 border border-white/8 rounded-2xl overflow-hidden\">\n      {/* En-tête */}\n      <div className=\"flex items-center gap-3 px-4 py-3 border-b border-white/5\">\n        <div className=\"w-2 h-8 rounded-full shrink-0\" style={{ background: color }}/>\n        <div className=\"flex-1 min-w-0\">\n          <p className=\"text-[13px] font-black text-white truncate\">\n            {take.recording.trackLabel || `Prise ${take.recording.id.slice(-4)}`}\n          </p>\n          <p className=\"text-[10px] text-zinc-500\">\n            {fmt(duration)} · {take.regions.length} région{take.regions.length !== 1 ? 's' : ''}\n          </p>\n        </div>\n        <button\n          onClick={selectAll}\n          title=\"Tout sélectionner\"\n          className=\"px-2.5 py-1.5 bg-zinc-800 rounded-xl text-[10px] font-black text-zinc-400 uppercase active:scale-90 shrink-0\">\n          Tout\n        </button>\n        <button onClick={onPlayPause}\n          className=\"w-9 h-9 rounded-xl bg-zinc-800 flex items-center justify-center active:scale-90 shrink-0\">\n          {isPlaying ? <Pause size={14} className=\"text-white\"/> : <Play size={14} className=\"text-white\"/>}\n        </button>\n      </div>\n\n      {/* Canvas waveform */}\n      <div className=\"relative px-2 py-2\">\n        <canvas\n          ref={canvasRef}\n          width={640} height={80}\n          className=\"w-full rounded-xl touch-none\"\n          style={{ display: 'block', cursor: 'crosshair' }}\n          onTouchStart={onTouchStart}\n          onTouchMove={onTouchMove}\n          onTouchEnd={onTouchEnd}\n        />\n        <p className=\"text-[9px] text-zinc-700 text-center mt-1 font-black uppercase tracking-widest\">\n          {selecting && selDuration > 0.1\n            ? `Sélection : ${selDuration.toFixed(1)}s`\n            : 'Glisse pour sélectionner · \"Tout\" pour tout prendre'}\n        </p>\n      </div>\n\n      {/* Régions */}\n      {take.regions.length > 0 && (\n        <div className=\"px-4 pb-3 space-y-1.5\">\n          {take.regions.map(r => (\n            <div key={r.id} className=\"flex items-center gap-2 bg-zinc-900 rounded-xl px-3 py-2\">\n              <div className=\"w-2 h-2 rounded-full shrink-0\" style={{ background: color }}/>\n              <div className=\"flex-1 min-w-0\">\n                <p className=\"text-[11px] font-black text-white\">\n                  {fmt(r.startSec)} → {fmt(r.endSec)}\n                  <span className=\"text-zinc-500 font-normal ml-2\">{(r.endSec - r.startSec).toFixed(1)}s</span>\n                </p>\n              </div>\n              <button onClick={() => onRemoveRegion(r.id)} className=\"text-zinc-700 hover:text-red-500 active:scale-90\">\n                <Trash2 size={13}/>\n              </button>\n            </div>\n          ))}\n        </div>\n      )}\n    </div>\n  );\n}\n\n// ── CompEditor principal ───────────────────────────────────────────────────────\nexport default function CompEditor({ song, takes: initialTakes, onBack, onCompReady, isOnline }: Props) {\n  const [takes, setTakes]             = useState<Take[]>(initialTakes);\n  const [playingId, setPlayingId]     = useState<string | null>(null);\n  const [isMixing, setIsMixing]       = useState(false);\n  const [compBlob, setCompBlob]       = useState<Blob | null>(null);\n  const [compUrl,  setCompUrl]        = useState<string | null>(null);\n  const [playingComp, setPlayingComp] = useState(false);\n  const [loadingWave, setLoadingWave] = useState<Set<string>>(new Set());\n  const audioRef = useRef<HTMLAudioElement>(null);\n\n  // Charger waveforms — essayer IndexedDB si dataUrl absent\n  useEffect(() => {\n    takes.forEach(take => {\n      if (take.waveformData) return;\n      setLoadingWave(prev => new Set([...prev, take.recording.id]));\n\n      getRecordingDataUrl(take.recording).then(dataUrl => {\n        if (!dataUrl) {\n          setLoadingWave(prev => { const s = new Set(prev); s.delete(take.recording.id); return s; });\n          return;\n        }\n        return studioService.analyzeWaveform(dataUrl, 160).then(wf => {\n          setTakes(prev => prev.map(t =>\n            t.recording.id === take.recording.id ? { ...t, waveformData: wf } : t\n          ));\n        });\n      }).catch(() => {}).finally(() => {\n        setLoadingWave(prev => { const s = new Set(prev); s.delete(take.recording.id); return s; });\n      });\n    });\n  }, []);\n\n  const addRegion = (takeId: string, region: Region) =>\n    setTakes(prev => prev.map(t =>\n      t.recording.id === takeId ? { ...t, regions: [...t.regions, region] } : t\n    ));\n\n  const removeRegion = (takeId: string, regionId: string) =>\n    setTakes(prev => prev.map(t =>\n      t.recording.id === takeId ? { ...t, regions: t.regions.filter(r => r.id !== regionId) } : t\n    ));\n\n  const playTake = async (take: Take) => {\n    if (!audioRef.current) return;\n    if (playingId === take.recording.id) {\n      audioRef.current.pause(); setPlayingId(null); return;\n    }\n    const dataUrl = await getRecordingDataUrl(take.recording);\n    if (!dataUrl) return;\n    audioRef.current.src = dataUrl;\n    audioRef.current.load();\n    audioRef.current.play().catch(() => {});\n    setPlayingId(take.recording.id);\n    audioRef.current.onended = () => setPlayingId(null);\n  };\n\n  const totalRegions  = takes.reduce((s, t) => s + t.regions.length, 0);\n  const totalDuration = takes.reduce((s, t) => s + t.regions.reduce((rs, r) => rs + (r.endSec - r.startSec), 0), 0);\n\n  const doComp = async () => {\n    if (totalRegions === 0) return;\n    setIsMixing(true);\n    try {\n      // Enrichir les takes avec les dataUrls depuis IndexedDB si nécessaire\n      const enrichedTakes = await Promise.all(takes.map(async t => {\n        if (t.recording.dataUrl) return t;\n        const dataUrl = await getRecordingDataUrl(t.recording);\n        return dataUrl ? { ...t, recording: { ...t.recording, dataUrl } } : t;\n      }));\n      const blob = await studioService.mixComp(enrichedTakes);\n      if (compUrl) URL.revokeObjectURL(compUrl);\n      const url = URL.createObjectURL(blob);\n      setCompBlob(blob); setCompUrl(url);\n    } catch (e: any) {\n      alert('Erreur comp : ' + e.message);\n    } finally {\n      setIsMixing(false);\n    }\n  };\n\n  const playComp = () => {\n    if (!audioRef.current || !compUrl) return;\n    if (playingComp) { audioRef.current.pause(); setPlayingComp(false); return; }\n    audioRef.current.src = compUrl;\n    audioRef.current.load();\n    audioRef.current.play().catch(() => {});\n    setPlayingComp(true);\n    audioRef.current.onended = () => setPlayingComp(false);\n    setPlayingId(null);\n  };\n\n  // Ordre des régions pour l'aperçu final\n  const orderedRegions = takes\n    .flatMap((take, i) => take.regions.map(r => ({ ...r, color: TAKE_COLORS[i % TAKE_COLORS.length] })))\n    .sort((a, b) => a.startSec - b.startSec);\n\n  return (\n    <div className=\"min-h-screen bg-[#020202] text-white flex flex-col\">\n\n      {/* Header */}\n      <div className=\"shrink-0 flex items-center gap-3 px-5 pt-6 pb-4 border-b border-zinc-900\">\n        <button onClick={onBack} className=\"w-10 h-10 rounded-xl bg-zinc-900 flex items-center justify-center active:scale-90\">\n          <ChevronLeft size={20}/>\n        </button>\n        <div className=\"flex-1 min-w-0\">\n          <p className=\"font-bebas text-xl text-white tracking-widest leading-none\">COMP EDITOR</p>\n          <p className=\"text-[10px] text-zinc-500 font-black uppercase truncate\">\n            {song.title} · {takes.length} prise{takes.length > 1 ? 's' : ''}\n          </p>\n        </div>\n        {totalRegions > 0 && (\n          <div className=\"bg-zinc-900 rounded-xl px-3 py-1.5 text-right shrink-0\">\n            <p className=\"text-[11px] font-black text-white\">{totalRegions} rég.</p>\n            <p className=\"text-[10px] text-zinc-500\">{totalDuration.toFixed(1)}s</p>\n          </div>\n        )}\n      </div>\n\n      {/* Instructions */}\n      <div className=\"mx-5 mt-4 bg-zinc-900/60 border border-white/5 rounded-2xl px-4 py-3\">\n        <p className=\"text-[11px] font-black text-white mb-0.5\">Comment ça marche</p>\n        <p className=\"text-[10px] text-zinc-400 leading-relaxed\">\n          Glisse sur la waveform pour choisir les meilleures parties de chaque prise. Le comp assemble tout dans l'ordre. Utilise \"Tout\" pour prendre une prise complète.\n        </p>\n      </div>\n\n      {/* Prises */}\n      <div className=\"flex-1 overflow-y-auto px-5 pt-4 pb-4 space-y-4\" style={{ WebkitOverflowScrolling: 'touch' }}>\n\n        {takes.length === 0 ? (\n          <div className=\"flex flex-col items-center justify-center py-16 gap-3 opacity-30\">\n            <Scissors size={40} className=\"text-zinc-700\"/>\n            <p className=\"text-[12px] text-zinc-600 font-black uppercase text-center\">Aucune prise disponible</p>\n          </div>\n        ) : takes.map((take, i) => (\n          <div key={take.recording.id}>\n            {loadingWave.has(take.recording.id) ? (\n              <div className=\"bg-zinc-950 border border-white/8 rounded-2xl p-4 flex items-center gap-3\">\n                <Loader2 size={16} className=\"animate-spin text-zinc-600\"/>\n                <p className=\"text-[12px] text-zinc-500 font-black uppercase\">Analyse waveform...</p>\n              </div>\n            ) : (\n              <WaveformTrack\n                take={take}\n                color={TAKE_COLORS[i % TAKE_COLORS.length]}\n                onAddRegion={region => addRegion(take.recording.id, region)}\n                onRemoveRegion={regionId => removeRegion(take.recording.id, regionId)}\n                isPlaying={playingId === take.recording.id}\n                onPlayPause={() => playTake(take)}\n              />\n            )}\n          </div>\n        ))}\n\n        {/* Aperçu ordre final */}\n        {orderedRegions.length > 0 && (\n          <div className=\"bg-zinc-900/60 border border-white/5 rounded-2xl p-4\">\n            <p className=\"text-[11px] font-black text-zinc-400 uppercase tracking-widest mb-3\">Ordre du comp</p>\n            {orderedRegions.map((r, i) => (\n              <div key={r.id} className=\"flex items-center gap-2 mb-2\">\n                <span className=\"text-[11px] font-black text-zinc-600 w-5 shrink-0\">{i + 1}</span>\n                <div className=\"w-2 h-2 rounded-full shrink-0\" style={{ background: r.color }}/>\n                <p className=\"text-[12px]
