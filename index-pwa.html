                if (e.data.type === 'REPAIR_PROGRESS') {
                    const pct = Math.round((e.data.repaired / e.data.total) * 100);
                    document.getElementById('repair-bar').style.width = pct + '%';
                    document.getElementById('repair-status').textContent = `Réparation ${e.data.repaired}/${e.data.total}...`;
                }
                if (e.data.type === 'REPAIR_DONE') {
                    navigator.serviceWorker.removeEventListener('message', handler);
                    if (e.data.complete) {
                        document.getElementById('repair-status').textContent = '✅ Réparation complète — rechargement...';
                        document.getElementById('repair-bar').style.width = '100%';
                        document.getElementById('repair-bar').style.background = '#22c55e';

                        document.getElementById('repair-bar').style.background = '#f59e0b';
                        btn.disabled = false;
                        btn.textContent = '🔧 Réessayer';

        async function s6_require(relativePath, fromDir = "") {
            const absolutePath = normalizePath(fromDir ? `${fromDir}/${relativePath}` : relativePath);
            const extensions = ['', '.tsx', '.ts', '.js'];
            let code = null;
            let finalPath = null;

            if (moduleCache[absolutePath]) return moduleCache[absolutePath].exports;
            for (const ext of extensions) {
                const test = absolutePath.endsWith(ext) && ext !== '' ? absolutePath : absolutePath + ext;
                if (moduleCache[test]) return moduleCache[test].exports;
            }

            // ── Lookup 1 : modules inlinés dans index-pwa.html (100% offline) ──────
            const _inlineStore = window.__INLINE_MODULES__ || {};

                const testPath = absolutePath.endsWith(ext) && ext !== '' ? absolutePath : absolutePath + ext;
                if (_inlineStore[testPath] !== undefined) {

                    finalPath = testPath;

                    break;

                        const _text = await res.text();

                            console.warn('[S6] HTML reçu pour ' + testPath + ' — SW obsolète, ignoré');
                            diag(`⚠️ SW retourne HTML pour ${testPath.split('/').pop()} — cache corrompu`);
                            continue;
                        }
                        // v35 FIX: le SW retourne throw new Error("MODULE_OFFLINE:...") pour les modules absents
                        // Il faut ignorer cette réponse et continuer vers l'inline ou échouer proprement
                        if (_text.trimStart().startsWith('throw new Error("MODULE_OFFLINE')) {
                            console.warn('[S6] MODULE_OFFLINE reçu pour ' + testPath + ' — module absent du SW, cherche inline');
                            continue;
                        }
                        // Log source : SW cache ou réseau
                        const fromSW = res.headers.get('x-sw-cache') === 'true' ||
                                       res.url.startsWith('http') && navigator.serviceWorker?.controller;
                        console.log(`[S6] ${fromSW ? '📦' : '🌐'} ${testPath.split('/').pop()}`);
                        code = _text;
                        finalPath = testPath;
                        break;
                    }
                } catch (e) {
                    diag(`❌ fetch échoué: ${testPath.split('/').pop()} (${e.message})`);
                }
            }
            }

            if (!code) {
                diag(`❌ Module introuvable: ${absolutePath.split('/').pop()} — Mac requis ou cache incomplet`);
                throw new Error(`Missing module: ${absolutePath}`);
            }

            // Scan récursif pour pré-charger les dépendances
const depRegex = /import[\s\S]*?from\s+['"](.*?)['"]|require\s*\(\s*['"](.*?)['"]\s*\)/g;            
// const depRegex = /import\s+.*?from\s+['"](.*?)['"]|require\s*\(\s*['"](.*?)['"]\s*\)/g;
            let match;
            const currentDir = getDir(finalPath);
            
            while ((match = depRegex.exec(code)) !== null) {
                const depPath = match[1] || match[2];
                // Ne charger récursivement que si ce n'est pas une lib système déjà mappée
                if (depPath.startsWith('.') && !LIB_MAP[depPath]) {
                    await s6_require(depPath, currentDir);
                }
            }

                const transformed = Babel.transform(code, {
                    presets: [['typescript', { isTSX: true, allExtensions: true }], ['react']],
                    plugins: [[Babel.availablePlugins['transform-modules-commonjs']]]
                }).code;

                const module = { exports: {} };
                moduleCache[finalPath] = module;
                moduleCache[absolutePath] = module;

                const func = new Function('require', 'module', 'exports', 'React', transformed);
                
                const syncRequire = (p) => {
    if (LIB_MAP[p]) return moduleCache[p]?.exports;
    if (moduleCache[p]) return moduleCache[p].exports;
    
    const resolved = normalizePath(currentDir + '/' + p);
    if (moduleCache[resolved]) return moduleCache[resolved].exports;
    
    // Cherche avec toutes les extensions ET les variantes de chemin
    for (const ext of extensions) {
        const pExt = resolved + ext;
        if (moduleCache[pExt]) return moduleCache[pExt].exports;

        const pAlt = normalizePath(p) + ext;
        if (moduleCache[pAlt]) return moduleCache[pAlt].exports;

    console.error('[S6_SYNC] Cache keys:', Object.keys(moduleCache));
    console.error('[S6_SYNC] Cherche:', resolved, '| currentDir:', currentDir, '| p:', p);
    throw new Error(`MODULE INTROUVABLE EN SYNCHRONE : ${p}`);
};

        function normalizePath(p) {
            const parts = p.split(/[\\/]/);
            const stack = [];
            for (const part of parts) {
                if (part === '' || part === '.') continue;
                if (part === '..') stack.pop();
                else stack.push(part);
            }
            return stack.join('/');
        }
        function getDir(p) {
            const parts = p.split('/');
            return parts.length <= 1 ? "" : parts.slice(0, -1).join('/');

        async function detectMac() {

                clearTimeout(timeout);
                window.MAC_MODE = 'online';
                return true;
            } catch {
                clearTimeout(timeout);
                window.MAC_MODE = 'offline';
                return false;

        }

        function showMacBanner(mode) {
            const old = document.getElementById('mac-mode-banner');
            if (old) old.remove();

            const banner = document.createElement('div');
            banner.id = 'mac-mode-banner';
            const isOnline = mode === 'online';
            banner.style.cssText = [
                'position:fixed',
                'top:env(safe-area-inset-top,0px)',
                'left:0','right:0',
                'z-index:99999',
                'display:flex','align-items:center','justify-content:center','gap:8px',
                'padding:8px 16px',
                'font-family:monospace','font-size:9px','font-weight:900',
                'letter-spacing:0.15em','text-transform:uppercase',
                'transition:opacity 0.5s',
                isOnline
                    ? 'background:#052e16;color:#4ade80;border-bottom:1px solid #166534'
                    : 'background:#1c0a0a;color:#f87171;border-bottom:1px solid #7f1d1d',
            ].join(';');

            const dot = document.createElement('span');
            dot.style.cssText = 'width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;background:'
                + (isOnline ? '#22c55e' : '#ef4444');
            banner.appendChild(dot);

            const label = document.createElement('span');
            label.textContent = isOnline
                ? 'Mac accessible — synchronisation active'
                : 'Mac non accessible — mode autonome';
            banner.appendChild(label);

            if (!isOnline) {
                const btn = document.createElement('button');
                btn.textContent = 'Réparer quand Mac dispo';
                btn.style.cssText = 'margin-left:12px;padding:2px 10px;background:#7f1d1d;color:#fca5a5;border:1px solid #ef444440;border-radius:6px;font-size:8px;font-weight:900;cursor:pointer;font-family:monospace';
                btn.onclick = () => repairCache();
                banner.appendChild(btn);
            }

            document.body.appendChild(banner);

            // Bannière online disparaît après 4s
            if (isOnline) {
                setTimeout(() => {
                    banner.style.opacity = '0';
                    setTimeout(() => banner.remove(), 500);
                }, 4000);
            }
        }

        // ── Indicateur de cache ───────────────────────────────────────────────
        // Interroge le SW via CHECK_CACHE, affiche le % dans la bannière iOS.
        async function checkCacheStatus() {
          return new Promise(resolve => {
            if (!navigator.serviceWorker || !navigator.serviceWorker.controller) {
              resolve({ percent: 0, complete: false, missing: 0, total: 0 });
              return;
            }

            const timeout = setTimeout(() => resolve({ percent: 0, complete: false, missing: 0, total: 0 }), 3000);

            navigator.serviceWorker.addEventListener('message', function handler(e) {
              if (e.data && e.data.type === 'CACHE_STATUS') {
                clearTimeout(timeout);
                navigator.serviceWorker.removeEventListener('message', handler);
                const { missing, total, complete } = e.data;
                const cached = total - missing.length;
                const percent = total > 0 ? Math.round((cached / total) * 100) : 0;
                resolve({ percent, complete, missing: missing.length, total });
              }
            });

            navigator.serviceWorker.controller.postMessage({ type: 'CHECK_CACHE' });
          });
        }

        function updateCacheBadge(percent, complete) {
          const banner = document.getElementById('mac-mode-banner');
          if (!banner) return;

          // Supprimer ancien badge
          const old = banner.querySelector('#cache-badge');
          if (old) old.remove();

          const badge = document.createElement('span');
          badge.id = 'cache-badge';
          const color = complete ? '#22c55e' : percent > 50 ? '#eab308' : '#ef4444';
          badge.style.cssText = [
            'margin-left:8px',
            'padding:1px 7px',
            `background:${color}22`,
            `color:${color}`,
            `border:1px solid ${color}44`,
            'border-radius:10px',
            'font-size:8px',
            'font-weight:900',
            'font-family:monospace',
            'letter-spacing:0.05em',
          ].join(';');
          badge.textContent = complete ? '✓ CACHE 100%' : `CACHE ${percent}%`;
          banner.appendChild(badge);
        }

        // Surveillance connectivité toutes les 30s pendant l'utilisation
        function watchConnectivity() {
            let lastMode = window.MAC_MODE;
            setInterval(async () => {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 2000);
                let current;
                try {
                    await fetch('/api/songs', { method: 'HEAD', signal: controller.signal, cache: 'no-store' });
                    clearTimeout(timeout);
                    current = 'online';
                } catch {
                    clearTimeout(timeout);
                    current = 'offline';
                }
                if (current !== lastMode) {
                    lastMode = current;
                    window.MAC_MODE = current;
                    if (isIOSDevice) {
                      showMacBanner(current);
                      // Rafraîchir le badge cache après changement d'état
                      if (navigator.serviceWorker) {
                        navigator.serviceWorker.ready.then(async () => {
                          const status = await checkCacheStatus();
                          updateCacheBadge(status.percent, status.complete);
                        });
                      }
                    }
                    // Mac revenu en ligne → repair silencieux du cache SW
                    if (current === 'online') {
                        const sw = navigator.serviceWorker && navigator.serviceWorker.controller;
                        if (sw) sw.postMessage({ type: 'REPAIR_CACHE' });
                    }
                    // Notifie l'app React si elle écoute
                    window.dispatchEvent(new CustomEvent('mac-mode-change', { detail: { mode: current } }));
                }
            }, 30000);
        }

            try {

                if (cacheKeys.length > 0) {
                    const cache = await caches.open(cacheKeys[0]);
                    const cachedReqs = await cache.keys();
                    diag(`📦 Entrées cache: ${cachedReqs.length}`);
                    // Vérifier Babel spécifiquement
                    const babelCached = cachedReqs.some(r => r.url.includes('babel'));
                    const reactCached = cachedReqs.some(r => r.url.includes('react'));
                    diag(`⚙️ Babel: ${babelCached ? '✅ cache' : '⚠️ absent'}`);
                    diag(`⚛️ React: ${reactCached ? '✅ cache' : '⚠️ absent'}`);
                } else {
                    diag('⚠️ Aucun cache SW — premier lancement ou cache vidé');
                }
            } catch(e) { diag(`❌ Cache erreur: ${e.message}`); }

            // ── PHASE 3 : Détecter le Mac ─────────────────────────────────
            diag('── Détection Mac...');
            diag('MAC_DETECT_START');
            macOnline = await detectMac();
            diag(macOnline ? '✅ MAC_ONLINE — mode connecté' : '📵 MAC_OFFLINE — mode autonome');
            if (isIOSDevice) {
              showMacBanner(macOnline ? 'online' : 'offline');
              // Vérifier le cache après que le SW soit prêt
              if (navigator.serviceWorker) {
                navigator.serviceWorker.ready.then(async () => {
                  const status = await checkCacheStatus();
                  updateCacheBadge(status.percent, status.complete);

                  // Si cache incomplet et Mac accessible → repair automatique
                  if (!status.complete && macOnline) {
                    const sw = navigator.serviceWorker.controller;
                    if (sw) sw.postMessage({ type: 'REPAIR_CACHE' });
                  }

                  // Écouter la progression du repair
                  navigator.serviceWorker.addEventListener('message', async (e) => {
                    if (e.data && e.data.type === 'REPAIR_DONE') {
                      const refreshed = await checkCacheStatus();
                      updateCacheBadge(refreshed.percent, refreshed.complete);
                    }
                    if (e.data && e.data.type === 'REPAIR_PROGRESS') {
                      const p = Math.round((e.data.repaired / e.data.total) * 100);
                      updateCacheBadge(p, false);
                    }
                  });
                });
              }
            }
            watchConnectivity();
            bootstrap(); // démarre TOUJOURS — cache ou réseau
        });

  "services/StudioOfflineDB.ts": "/**\n * StudioOfflineDB.ts — Stockage persistant Studio Mobile iPhone v2\n *\n * CORRECTIFS v2 :\n * - getAudio() : type par défaut 'audio/mp4' au lieu de 'audio/webm' (iOS)\n * - deleteAllForSong() : nettoyer tous les audios d'une chanson\n * - getStorageEstimate() : quota IndexedDB iOS (~50MB par origine)\n * - init() robuste avec retry si la DB est bloquée (Safari iOS tue parfois la connexion)\n * - tx() protégée : relance getDB() si this.db est null (après kill Safari)\n */\n\nconst DB_NAME    = 'CashCountryStudio';\nconst DB_VERSION = 1;\n\nconst STORE_SONGS = 'songs';\nconst STORE_AUDIO = 'audio';\nconst STORE_STATE = 'state';\n\n// Détecter iOS pour le type MIME par défaut\nfunction isIOS(): boolean {\n  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||\n    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);\n}\n\nclass StudioOfflineDatabase {\n  private db: IDBDatabase | null = null;\n  private initPromise: Promise<void> | null = null;\n\n  static async requestPersistence(): Promise<void> {\n    try {\n      if (navigator.storage && navigator.storage.persist) {\n        const granted = await navigator.storage.persist();\n        console.log('[DB] Stockage persistant:', granted ? '✅ accordé' : '⚠️ quota limité');\n      }\n    } catch(e) { console.warn('[DB] persist() erreur:', e); }\n  }\n\n  async init(): Promise<void> {\n    if (this.db) return;\n    StudioOfflineDatabase.requestPersistence().catch(() => {});\n    // Éviter les initialisations parallèles\n    if (this.initPromise) return this.initPromise;\n\n    this.initPromise = new Promise((resolve, reject) => {\n      const req = indexedDB.open(DB_NAME, DB_VERSION);\n\n      req.onupgradeneeded = (event) => {\n        const db = (event.target as IDBOpenDBRequest).result;\n        if (!db.objectStoreNames.contains(STORE_SONGS)) {\n          db.createObjectStore(STORE_SONGS, { keyPath: 'id' });\n        }\n        if (!db.objectStoreNames.contains(STORE_AUDIO)) {\n          const audioStore = db.createObjectStore(STORE_AUDIO, { keyPath: 'key' });\n          // Index par songId pour faciliter la suppression par chanson\n          audioStore.createIndex('songId', 'songId', { unique: false });\n        }\n        if (!db.objectStoreNames.contains(STORE_STATE)) {\n          db.createObjectStore(STORE_STATE, { keyPath: 'key' });\n        }\n      };\n\n      req.onsuccess = () => {\n        this.db = req.result;\n        // Gérer la déconnexion de la DB (iOS peut tuer la connexion)\n        this.db.onclose = () => { this.db = null; this.initPromise = null; };\n        this.db.onerror = (e) => console.warn('[StudioDB] Erreur DB:', e);\n        resolve();\n      };\n\n      req.onerror = () => {\n        this.initPromise = null;\n        reject(req.error);\n      };\n\n      req.onblocked = () => {\n        // Une autre connexion bloque l'upgrade — fermer les anciennes\n        console.warn('[StudioDB] DB bloquée — attente...');\n      };\n    });\n\n    return this.initPromise;\n  }\n\n  private async getDB(): Promise<IDBDatabase> {\n    if (!this.db) await this.init();\n    return this.db!;\n  }\n\n  private async tx(store: string, mode: IDBTransactionMode = 'readonly') {\n    const db = await this.getDB();\n    return db.transaction([store], mode).objectStore(store);\n  }\n\n  private idbOp<T>(req: IDBRequest<T>): Promise<T> {\n    return new Promise((res, rej) => {\n      req.onsuccess = () => res(req.result);\n      req.onerror   = () => rej(req.error);\n    });\n  }\n\n  // ── Chansons ──────────────────────────────────────────────────────────────\n\n  async saveSongs(songs: any[]): Promise<void> {\n    const store = await this.tx(STORE_SONGS, 'readwrite');\n    await this.idbOp(store.clear());\n    await Promise.all(songs.map(s => this.idbOp(store.put(s))));\n  }\n\n  async getAllSongs(): Promise<any[]> {\n    const store = await this.tx(STORE_SONGS);\n    return this.idbOp(store.getAll());\n  }\n\n  // ── Audio ─────────────────────────────────────────────────────────────────\n\n  async saveAudio(key: string, blob: Blob, meta: object = {}): Promise<void> {\n    // Vérifier l'espace disponible AVANT d'écrire pour un feedback immédiat\n    try {\n      const est = await this.getStorageEstimate();\n      const needed = blob.size;\n      const available = est.quota - est.used;\n      if (available < needed + 2 * 1024 * 1024) {\n        // Moins de 2 Mo de marge → erreur claire avec détails\n        const usedMB  = (est.used  / (1024 * 1024)).toFixed(1);\n        const quotaMB = (est.quota / (1024 * 1024)).toFixed(1);\n        const needMB  = (needed    / (1024 * 1024)).toFixed(1);\n        // Tenter de libérer de l'espace en supprimant les anciens enregistrements\n        try { await this.freeSpaceForSize(needed); } catch {}\n        // Revérifier après nettoyage\n        const est2 = await this.getStorageEstimate();\n        if (est2.quota - est2.used < needed + 2 * 1024 * 1024) {\n          throw new DOMException(\n          `QUOTA_FULL: utilisé ${usedMB} Mo / ${quotaMB} Mo, besoin ${needMB} Mo — supprimez des chansons en cache`,\n          'QuotaExceededError'\n        );\n        } // end if est2\n      }\n    } catch (e: any) {\n      // Re-lancer uniquement les erreurs de quota, pas les erreurs storage.estimate()\n      if (e.name === 'QuotaExceededError') throw e;\n    }\n\n    const buffer = await blob.arrayBuffer();\n    const store  = await this.tx(STORE_AUDIO, 'readwrite');\n\n    try {\n      await this.idbOp(store.put({\n        key,\n        buffer,\n        size:    blob.size,\n        type:    blob.type || (isIOS() ? 'audio/mp4' : 'audio/webm'),\n        savedAt: Date.now(),\n        ...meta,\n      }));\n    } catch (e: any) {\n      // IDBTransaction peut aussi lever QuotaExceededError directement\n      if (e.name === 'QuotaExceededError' || (e.message && e.message.includes('quota'))) {\n        const est = await this.getStorageEstimate().catch(() => ({ used: 0, quota: 50 * 1024 * 1024, pct: 0 }));\n        const usedMB  = (est.used  / (1024 * 1024)).toFixed(1);\n        const quotaMB = (est.quota / (1024 * 1024)).toFixed(1);\n        throw new DOMException(\n          `QUOTA_FULL: IndexedDB plein (${usedMB} Mo / ${quotaMB} Mo) — supprimez des chansons en cache pour libérer de l'espace`,\n          'QuotaExceededError'\n        );\n      }\n      throw e;\n    }\n  }\n\n  async getAudio(key: string): Promise<Blob | null> {\n    const store = await this.tx(STORE_AUDIO);\n    const rec   = await this.idbOp(store.get(key));\n    if (!rec) return null;\n    // Sur iOS Safari : forcer audio/mp4 TOUJOURS — webm/ogg/flac causent NotSupportedError.\n    // Sur desktop : respecter le type stocké.\n    const storedType = rec.type || 'audio/mp4';\n    const type = isIOS()\n      ? 'audio/mp4'\n      : storedType;\n    return new Blob([rec.buffer], { type });\n  }\n\n  async hasAudio(key: string): Promise<boolean> {\n    const store = await this.tx(STORE_AUDIO);\n    const rec   = await this.idbOp(store.get(key));\n    return !!rec;\n  }\n\n  async deleteAudio(key: string): Promise<void> {\n    const store = await this.tx(STORE_AUDIO, 'readwrite');\n    await this.idbOp(store.delete(key));\n  }\n\n  // Supprimer tous les fichiers audio d'une chanson (nettoyage espace)\n  async deleteAllForSong(songId: string): Promise<void> {\n    const store = await this.tx(STORE_AUDIO, 'readwrite');\n    // Chercher par clé manuelle (les clés commencent par inst_, vocal_, rec_)\n    const allKeys = await this.idbOp(store.getAllKeys()) as string[];\n    const toDelete = allKeys.filter(k =>\n      k === `inst_${songId}` ||\n      k === `vocal_${songId}` ||\n      (k as string).includes(`_${songId}_`)\n    );\n    const store2 = await this.tx(STORE_AUDIO, 'readwrite');\n    await Promise.all(toDelete.map(k => this.idbOp(store2.delete(k))));\n    await this.markSongUncached(songId);\n  }\n\n  async getAllAudioKeys(): Promise<string[]> {\n    const store = await this.tx(STORE_AUDIO);\n    return this.idbOp(store.getAllKeys()) as Promise<string[]>;\n  }\n\n  // ── État persistant ───────────────────────────────────────────────────────\n\n  async setState(key: string, value: any): Promise<void> {\n    const store = await this.tx(STORE_STATE, 'readwrite');\n    await this.idbOp(store.put({ key, value, updatedAt: Date.now() }));\n  }\n\n  async getState<T>(key: string, defaultValue: T): Promise<T> {\n    const store = await this.tx(STORE_STATE);\n    const rec   = await this.idbOp(store.get(key));\n    return rec ? rec.value : defaultValue;\n  }\n\n  // ── IDs des chansons en cache ──────────────────────────────────────────────\n\n  async getCachedSongIds(): Promise<Set<string>> {\n    const ids = await this.getState<string[]>('cachedSongIds', []);\n    return new Set(ids);\n  }\n\n  async markSongCached(songId: string): Promise<void> {\n    const ids = await this.getCachedSongIds();\n    ids.add(songId);\n    await this.setState('cachedSongIds', Array.from(ids));\n  }\n\n  async markSongUncached(songId: string): Promise<void> {\n    const ids = await this.getCachedSongIds();\n    ids.delete(songId);\n    await this.setState('cachedSongIds', Array.from(ids));\n  }\n\n  // ── Taille et quota ───────────────────────────────────────────────────────\n\n  async getTotalSize(): Promise<number> {\n    const store = await this.tx(STORE_AUDIO);\n    const all   = await this.idbOp(store.getAll());\n    return all.reduce((sum: number, r: any) => sum + (r.size || 0), 0);\n  }\n\n  // Estimation du quota disponible (navigator.storage API)\n  // iOS Safari : ~50MB par origine, peut varier\n  // Libérer de l'espace en supprimant les enregistrements les plus anciens\n  async freeSpaceForSize(needed: number): Promise<void> {\n    await this.init(); const db = this.db!;\n    return new Promise((resolve, reject) => {\n      const tx = db.transaction(['audio'], 'readwrite');\n      const store = tx.objectStore('audio');\n      const req = store.getAll();\n      req.onsuccess = () => {\n        // Trier par date (les enregistrements d'abord, les plus anciens en premier)\n        const items = req.result as any[];\n        const recs = items.filter(i => i.key?.startsWith('rec_'))\n          .sort((a, b) => (a.meta?.createdAt || 0) - (b.meta?.createdAt || 0));\n        let freed = 0;\n        const deleteNext = (i: number) => {\n          if (i >= recs.length || freed >= needed) { resolve(); return; }\n          const del = store.delete(recs[i].key);\n          del.onsuccess = () => {\n            freed += recs[i].blob?.size || 0;\n            console.warn(`[DB] Libéré enregistrement ${recs[i].key} (${(freed/1024/1024).toFixed(1)} Mo)`);\n            deleteNext(i + 1);\n          };\n          del.onerror = () => deleteNext(i + 1);\n        };\n        deleteNext(0);\n      };\n      req.onerror = () => reject(req.error);\n    });\n  }\n\n  async getStorageEstimate(): Promise<{ used: number; quota: number; pct: number }> {\n    const used = await this.getTotalSize();\n    if ('storage' in navigator && 'estimate' in navigator.storage) {\n      try {\n        const est = await navigator.storage.estimate();\n        const quota = est.quota || 50 * 1024 * 1024;\n        return { used, quota, pct: Math.round((used / quota) * 100) };\n      } catch {}\n    }\n    // Fallback : quota iOS estimé à 50MB\n    const quota = 50 * 1024 * 1024;\n    return { used, quota, pct: Math.round((used / quota) * 100) };\n  }\n\n  // Vider tout le cache audio (garde les métadonnées)\n  async clearAllAudio(): Promise<void> {\n    const store = await this.tx(STORE_AUDIO, 'readwrite');\n    await this.idbOp(store.clear());\n    await this.setState('cachedSongIds', []);\n  }\n}\n\nexport const studioOfflineDB = new StudioOfflineDatabase();\n",
  "services/StudioService.ts": "import { studioOfflineDB } from './StudioOfflineDB';\n/**\n * StudioService.ts — Pipeline d'enregistrement mobile v7.6\n *\n * RÉALITÉ iOS confirmée (WebKit Bugzilla #154538, Apple QA1631, ios-safe-audio-context) :\n *   • sampleRate dicté par AVAudioSession hardware : haut-parleur=48kHz, casque=44.1kHz.\n *   • On ne peut PAS forcer le sampleRate côté JS. On accepte le natif.\n *   • Warm-up : créer AudioContext + jouer 1 buffer silencieux dans un geste user → stable.\n *   • NE PAS stocker __warmStream : cloner un stream arrêté = silence. getUserMedia() direct.\n *   • addModule() UNE SEULE FOIS par contexte (flag __warmWorkletLoaded).\n *   • Nettoyage nodes précédents avant chaque prise (pas d'accumulation).\n *   • Capture SÈCHE (DRY) : config.reverb IGNORÉ — effets = post-prod uniquement.\n */\nexport type ReverbType = 'none' | 'room' | 'hall' | 'plate';\nexport interface StudioEffectsConfig {\n  reverb: ReverbType;\n  saturation: number;\n  compression: boolean;\n  gainL: number;\n  gainR: number;\n  deviceId?: string;\n}\nexport interface MobileRecording {\n  id: string; songId: string; songTitle: string; artist: string;\n  duration: number; recordedAt: number; blob?: Blob; dataUrl?: string;\n  transferred: boolean; fileName: string; trackIndex?: number; trackLabel?: string;\n  pitchShift?: number; gain?: number; pan?: number; muted?: boolean; projectId?: string;\n  isGenerated?: boolean; regions?: Region[];\n  takeSlot?: 'A' | 'B' | 'C'; // Slot de prise voix principale\n}\nexport interface Region { id: string; takeId: string; startSec: number; endSec: number; label?: string; color?: string; }\nexport interface Take { id: string; recording: MobileRecording; waveformData?: number[]; regions: Region[]; }\nexport interface TrackProject {\n  id: string; songId: string; songTitle: string; createdAt: number;\n  tracks: MobileRecording[]; takes?: Take[]; compRegions?: Region[];\n  mixedDataUrl?: string; sections?: any[]; suggestedKey?: string;\n}\nconst STORAGE_KEY = 'cash_studio_recordings';\n\nfunction isIOS(): boolean {\n  return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);\n}\n\nfunction getBestMimeType(): string {\n  if (MediaRecorder.isTypeSupported('audio/webm;codecs=pcm')) return 'audio/webm;codecs=pcm';\n  if (MediaRecorder.isTypeSupported('audio/mp4;codecs=pcm'))  return 'audio/mp4;codecs=pcm';\n  if (MediaRecorder.isTypeSupported('audio/mp4;codecs=alac')) return 'audio/mp4;codecs=alac';\n  if (isIOS()) return 'audio/mp4';\n  if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) return 'audio/webm;codecs=opus';\n  if (MediaRecorder.isTypeSupported('audio/webm')) return 'audio/webm';\n  if (MediaRecorder.isTypeSupported('audio/mp4')) return 'audio/mp4';\n  return '';\n}\n\nasync function pitchShiftBuffer(ctx: OfflineAudioContext | AudioContext, buffer: AudioBuffer, semitones: number): Promise<AudioBuffer> {\n  if (semitones === 0) return buffer;\n  const rate = Math.pow(2, semitones / 12);\n  const origLen = buffer.length;\n  const origRate = buffer.sampleRate;\n  const channels = buffer.numberOfChannels;\n  const shiftCtx = new OfflineAudioContext(channels, origLen, origRate);\n  const src = shiftCtx.createBufferSource();\n  src.buffer = buffer;\n  src.playbackRate.value = rate;\n  const eq = shiftCtx.createBiquadFilter();\n  if (semitones > 0) { eq.type = 'highshelf'; eq.frequency.value = 4000; eq.gain.value = -Math.min(semitones * 0.4, 4); }\n  else { eq.type = 'lowshelf'; eq.frequency.value = 300; eq.gain.value = -Math.min(Math.abs(semitones) * 0.3, 3); }\n  const compGain = shiftCtx.createGain();\n  compGain.gain.value = semitones > 0 ? 0.95 : 1.05;\n  src.connect(eq); eq.connect(compGain); compGain.connect(shiftCtx.destination);\n  src.start(0);\n  return shiftCtx.startRendering();\n}\n\nasync function doubleTrackBuffer(buffer: AudioBuffer): Promise<AudioBuffer> {\n  const sr = buffer.sampleRate;\n  const channels = buffer.numberOfChannels;\n  const len = buffer.length;\n  const delayMs = 18;\n  const delaySamp = Math.floor((delayMs / 1000) * sr);\n  const totalLen = len + delaySamp;\n  const offline = new OfflineAudioContext(2, totalLen, sr);\n  const src1 = offline.createBufferSource(); src1.buffer = buffer;\n  const pan1 = offline.createStereoPanner(); pan1.pan.value = -0.25;\n  const gain1 = offline.createGain(); gain1.gain.value = 0.85;\n  src1.connect(pan1); pan1.connect(gain1); gain1.connect(offline.destination); src1.start(0);\n  const src2 = offline.createBufferSource(); src2.buffer = buffer; src2.playbackRate.value = Math.pow(2, 0.15 / 12);\n  const pan2 = offline.createStereoPanner(); pan2.pan.value = 0.25;\n  const gain2 = offline.createGain(); gain2.gain.value = 0.80;\n  src2.connect(pan2); pan2.connect(gain2); gain2.connect(offline.destination); src2.start(delaySamp / sr);\n  return offline.startRendering();\n}\n\nfunction getOfflineDB() {\n  // studioOfflineDB est déjà chargé via __INLINE_MODULES__ avant StudioService\n  return studioOfflineDB;\n}\n\nasync function audioBufferToBlob(buffer: AudioBuffer): Promise<Blob> {\n  const mimeType = getBestMimeType();\n  const ctx = new (window.AudioContext || (window as any).webkitAudioContext)();\n  const dest = ctx.createMediaStreamDestination();\n  const src = ctx.createBufferSource(); src.buffer = buffer; src.connect(dest);\n  const recOpts: MediaRecorderOptions = {};\n  if (mimeType) recOpts.mimeType = mimeType;\n  const recorder = new MediaRecorder(dest.stream, recOpts);\n  const chunks: Blob[] = [];\n  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };\n  return new Promise(resolve => {\n    recorder.onstop = () => { ctx.close(); const type = chunks[0]?.type || mimeType || 'audio/mp4'; resolve(new Blob(chunks, { type })); };\n    recorder.start(); src.start();\n    setTimeout(() => { recorder.stop(); try { src.stop(); } catch {} }, (buffer.duration + 0.3) * 1000);\n  });\n}\n\nexport const studioService = {\n  async saveRecordingLocallyAsync(rec: MobileRecording): Promise<void> {\n    const db = getOfflineDB();\n    // Demander le stockage persistant si pas encore fait\n    StudioOfflineDatabase.requestPersistence().catch(() => {});\n    if (rec.dataUrl) { const blob = this.dataUrlToBlob(rec.dataUrl); await db.saveAudio(`rec_${rec.id}`, blob, { songId: rec.songId, songTitle: rec.songTitle, type: 'recording' }); }\n    const meta = { ...rec, dataUrl: undefined, blob: undefined };\n    const existing = await db.getState<any[]>('recordings', []);\n    await db.setState('recordings', [...existing.filter((r: any) => r.id !== rec.id), meta]);\n  },\n  saveRecordingLocally(rec: MobileRecording): void {\n    this.saveRecordingLocallyAsync(rec).catch((e: any) => {\n      if (e && (e.name === 'QuotaExceededError' || (e.message && e.message.includes('QUOTA_FULL')))) {\n        window.dispatchEvent(new CustomEvent('studio:quotaExceeded', { detail: { message: e.message } }));\n      } else {\n        console.warn('[StudioService] saveRecordingLocally:', e);\n      }\n    });\n  },\n  async getLocalRecordingsAsync(): Promise<MobileRecording[]> {\n    try {\n      const db = getOfflineDB();\n      const metas = await db.getState<any[]>('recordings', []);\n      return Promise.all(metas.map(async (meta: any) => {\n        try { const blob = await db.getAudio(`rec_${meta.id}`); if (blob) return { ...meta, dataUrl: await studioService.blobToDataUrl(blob) }; } catch {}\n        return meta;\n      }));\n    } catch { return this.getLocalRecordings(); }\n  },\n  getLocalRecordings(): MobileRecording[] { try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; } catch { return []; } },\n  async deleteLocalRecordingAsync(id: string): Promise<void> {\n    const db = getOfflineDB(); await db.deleteAudio(`rec_${id}`);\n    const metas = await db.getState<any[]>('recordings', []);\n    await db.setState('recordings', metas.filter((r: any) => r.id !== id));\n  },\n  deleteLocalRecording(id: string): void { this.deleteLocalRecordingAsync(id).catch(() => {}); },\n  markTransferred(id: string): void {\n    try { const recs = this.getLocalRecordings().map(r => r.id === id ? { ...r, transferred: true } : r); localStorage.setItem(STORAGE_KEY, JSON.stringify(recs)); } catch {}\n  },\n  async uploadToServer(rec: MobileRecording, blob: Blob): Promise<boolean> {\n    try {\n      const formData = new FormData();\n      formData.append('audio', blob, rec.fileName);\n      formData.append('songId', rec.songId); formData.append('songTitle', rec.songTitle);\n      formData.append('artist', rec.artist); formData.append('duration', String(rec.duration));\n      formData.append('recordedAt', String(rec.recordedAt)); formData.append('recId', rec.id);\n      formData.append('trackIndex', String(rec.trackIndex ?? 0));\n      formData.append('trackLabel', rec.trackLabel ?? 'Voix principale');\n      if (rec.takeSlot) formData.append('takeSlot', rec.takeSlot);\n      const controller = new AbortController();\n      const timeoutId = setTimeout(() => controller.abort(), 10_000);\n      let res: Response;\n      try { res = await fetch('/api/studio/upload', { method: 'POST', body: formData, signal: controller.signal }); } finally { clearTimeout(timeoutId); }\n      if (!res.ok) return false;\n      try { const data = await res.json(); return data.success === true; } catch { return false; }\n    } catch { return false; }\n  },\n  async getPendingFromServer(): Promise<any[]> { try { const res = await fetch('/api/studio/pending'); if (!res.ok) return []; return await res.json(); } catch { return []; } },\n  async deleteFromServer(recId: string): Promise<void> { try { await fetch(`/api/studio/recording/${recId}`, { method: 'DELETE' }); } catch {} },\n  makeDistortionCurve(amount: number): Float32Array {\n    const k = amount * 100; const n = 44100; const curve = new Float32Array(n); const deg = Math.PI / 180;\n    fo   "components/StudioMobile.tsx": "/**\nStudioMobile.tsx — Orchestrateur v7.4\nCORRECTIFS MAJEURS :\n1. Warm-up : Crée UN SEUL AudioContext global (__warmContext), le démarre, \n   demande la permission, stoppe les tracks MAIS GARDE LE CONTEXTE OUVERT.\n2. Plus de double upload dans handleStemReady.\n3. Capture sèche forcée via recorder.\n*/\nimport React, { useState, useEffect, useRef } from 'react';\nimport { studioService, ReverbType, MobileRecording, TrackProject, Take } from '../services/StudioService';\nimport { studioOfflineDB } from '../services/StudioOfflineDB';\nimport { Song, SongType } from '../types';\nimport { Screen, TRACK_PRESETS, TrackPreset } from './StudioMobile/studio.types';\nimport { useStudioAudio }    from './StudioMobile/useStudioAudio';\nimport { useStudioOffline }  from './StudioMobile/useStudioOffline';\nimport { useStudioRecorder } from './StudioMobile/useStudioRecorder';\nimport SongSelector    from './StudioMobile/SongSelector';\nimport RecordScreen    from './StudioMobile/RecordScreen';\nimport MixerScreen     from './StudioMobile/MixerScreen';\nimport RecordingsList  from './StudioMobile/RecordingsList';\nimport CompEditor      from './StudioMobile/CompEditor';\nimport MasteringEngine, { MasteringProps } from './StudioMobile/MasteringEngine';\n\ninterface Props { songs?: Song[]; }\nconst BUILD_VERSION = 'v7.6.0';\n\nfunction DebugPanel({ debugLog, onClear }: { debugLog: string[]; onClear: () => void }) {\n  const [minimized, setMinimized] = React.useState(true);\n  const ctxRate = (window as any).__warmContext?.sampleRate;\n  const ctxState = (window as any).__warmContext?.state;\n  const rateColor = !ctxRate ? '#71717a' : ctxRate >= 44000 ? '#22c55e' : '#f59e0b';\n  return (\n    <div style={{\n      position:'fixed', bottom:0, left:0, right:0, zIndex:9999,\n      background:'rgba(0,0,0,0.92)', padding:'8px',\n      maxHeight: minimized ? 'auto' : '40vh',\n      overflowY: minimized ? 'hidden' : 'auto',\n    }}>\n      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: minimized ? 0 : 4 }}>\n        <span style={{ color:'#f59e0b', fontSize:15, fontWeight:900, letterSpacing:2 }}>\n          {BUILD_VERSION}\n        </span>\n        <div style={{ display:'flex', gap:10, alignItems:'center' }}>\n          {ctxRate && (\n            <span style={{ color: rateColor, fontSize: 9, fontWeight: 900, fontFamily: 'monospace' }}>\n              🎵 {ctxRate}Hz{ctxState === 'suspended' ? ' ⏸' : ''}\n            </span>\n          )}\n          <span style={{ color:'#facc15', fontSize:9, fontWeight:900, textTransform:'uppercase' }}>\n            {minimized ? `LOG(${debugLog.length})` : 'DEBUG'}\n          </span>\n          <button\n            onClick={() => setMinimized(m => !m)}\n            style={{ color:'#a1a1aa', fontSize:11, background:'rgba(255,255,255,0.08)', border:'1px solid #3f3f46', borderRadius:6, padding:'4px 10px', minWidth:36, minHeight:28 }}>\n            {minimized ? '▲' : '▼'}\n          </button>\n          {debugLog.length > 0 && (\n            <button onClick={onClear} style={{ color:'#ef4444', fontSize:9, background:'none', border:'none' }}>\n              CLEAR\n            </button>\n          )}\n        </div>\n      </div>\n      {!minimized && debugLog.map((l,i) => (\n        <div key={i} style={{\n          fontFamily:'monospace', fontSize:9,\n          color: l.includes('❌') || l.includes('ERREUR') || l.includes('ERROR') || l.includes('fail') ? '#ef4444'\n            : l.includes('✅') || l.includes('SUCCÈS') || l.includes('OK') ? '#22c55e'\n            : l.includes('⚠️') || l.includes('⚠') || l.includes('WARN') ? '#f59e0b'\n            : l.includes('▶') || l.includes('play') ? '#60a5fa'\n            : '#a1a1aa',\n          borderBottom:'1px solid #1a1a1a', paddingBottom:2, marginBottom:2,\n          wordBreak: 'break-all',\n        }}>{l}</div>\n      ))}\n    </div>\n  );\n}\n\nexport default function StudioMobile({ songs: propSong le contexte sans geste si possible (Chrome/Android/desktop).\n    // Sur iOS, le contexte démarre en 'suspended' jusqu'au premier geste.\n    try {\n      let ctx = (window as any).__warmContext as AudioContext | undefined;\n      if (!ctx || ctx.state === 'closed') {\n        ctx = new AudioCtx({ latencyHint: 'interactive' });\n        (window as any).__warmContext = ctx;\n        (window as any).__warmWorkletLoaded = null;\n        addLog(`AudioContext pré-créé | ${ctx.sampleRate}Hz | state=${ctx.state}`);\n      }\n    } catch (e) {\n      addLog(`⚠️ Pré-création contexte échouée: ${e}`);\n    }\n\n    // Visibilité : reprendre le contexte si suspendu (app en background puis foreground)\n    const handleVisibility = () => {\n      if (document.visibilityState === 'visible') {\n        const ctx = (window as any).__warmContext as AudioContext | undefined;\n        if (ctx && ctx.state === 'suspended') {\n          ctx.resume().then(() => addLog(`AudioContext repris | ${ctx.sampleRate}Hz`)).catch(() => {});\n        }\n      }\n    };\n    document.addEventListener('visibilitychange', handleVisibility);\n    return () => document.removeEventListener('visibilitychange', handleVisibility);\n  }, []);\n\n  useEffect(() => {\n    studioService.getLocalRecordingsAsync().then(setRecordings).catch(() => setRecordings(studioService.getLocalRecordings()));\n  }, []);\n  \n  useEffect(() => {\n    if (!selected) return;\n    const proj = studioService.getOrCreateProject(selected.id, selected.title);\n    if (selected.key && !(proj as any).suggestedKey) (proj as any).suggestedKey = selected.key;\n    setProject(proj);\n    setMixDone(false);\n  }, [selected?.id]);\n\n  // Calculer les prises existantes par slot pour la chanson sélectionnée\n  const slotTakes = React.useMemo(() => {\n    const takes: { A?: any; B?: any; C?: any } = {};\n    if (!project) return takes;\n    project.tracks.forEach(t => {\n      if (t.trackIndex === 0 && !t.isGenerated && t.takeSlot) {\n        takes[t.takeSlot as 'A' | 'B' | 'C'] = t;\n      }\n    });\n    return takes;\n  }, [project]);\n\n  const reloadRecordings = () => studioService.getLocalRecordingsAsync().then(setRecordings).catch(() => setRecordings(studioService.getLocalRecordings()));\n  const updateProject = (updater: (p: TrackProject) => TrackProject) => setProject(prev => { if (!prev) return prev; const n = updater(prev); studioService.saveProject(n); return n; });\n  const handleMuteTrack = (i: number, v: boolean) => updateProject(p => ({ ...p, tracks: p.tracks.map(t => t.trackIndex === i ? { ...t, muted: v } : t) }));\n  const handleSoloTrack = (i: number) => updateProject(p => {\n    const alreadySolo = p.tracks.every(t => t.trackIndex === i ? !t.muted : t.muted);\n    return { ...p, tracks: p.tracks.map(t => ({ ...t, muted: alreadySolo ? false : t.trackIndex !== i })) };\n  });\n  const handleVolumeTrack = (i: number, v: number) => updateProject(p => ({ ...p, tracks: p.tracks.map(t => t.trackIndex === i ? { ...t, gain: v } : t) }));\n  const handlePanTrack = (i: number, v: number) => updateProject(p => ({ ...p, tracks: p.tracks.map(t => t.trackIndex === i ? { ...t, pan: v } : t) }));\n  const handleDeleteTrack = (i: number) => updateProject(p => ({ ...p, tracks: p.tracks.filter(t => t.trackIndex !== i) }));\n\n  const handlePreviewStems = () => {\n    const inst  = audio.instRef.current;\n    const vocal = audio.vocalGuideRef.current;\n    addLog(`PREVIEW tap | instUrl=${audio.instUrl ? audio.instUrl.slice(0,30) : 'NULL'} | instCached=${audio.instCached}`);\n\n    if (isPreviewing) {\n      inst?.pause(); vocal?.pause(); setIsPreviewing(false);\n      return;\n    }\n\n    // Résumer AudioContext en fire-and-forget — ne PAS attendre la Promise\n    // play() doit rester dans la callstack synchrone du tap\n    const ctx = (window as any).__warmContext as AudioContext | undefined;\n    if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});\n\n    const playEl = (el: HTMLAudioElement, label: string) => {\n      el.currentTime = 0;\n      const p = el.play();\n      if (p) {\n        p.then(() => addLog(`${label}.play() OK`))\n         .catch((e: Error) => {\n           addLog(`${label}.play() ERREUR: ${e.name} | src=${el.src.slice(0,40)}`);\n           // Fallback AudioContext decodeAudioData (contourne les restrictions iOS sur <audio>)\n           if (ctx && (e.name === 'NotSupportedError' || e.name === 'NotAllowedError')) {\n             fetch(el.src).then(r => r.arrayBuffer()).then(buf => ctx.decodeAudioData(buf)).then(decoded => {\n               const bsrc = ctx.createBufferSource();\n               bsrc.buffer = decoded;\n               bsrc.connect(ctx.destination);\n               bsrc.onended = () => { vocal?.pause(); setIsPreviewing(false); };\n               // Tracker le temps de lecture pour sync paroles\n               (window as any).__instCtxStartTime = ctx.currentTime;\n               (window as any).__instCtxOffset    = 0;\n               (window as any).__instCtxActive    = true;\n               bsrc.onended = () => { setIsPreviewing(false); (window as any).__instCtxActive = false; };\n               bsrc.start(0);\n               addLog(`${label} AudioContext fallback OK`);\n             }).catch(e2 => addLog(`${label} AudioContext fallback ERREUR: ${e2.message}`));\n           }\n         });\n      }\n    };\n\n    if (inst && audio.instUrl) {\n      if (!inst.src || inst.src !== audio.instUrl) {\n        inst.src = audio.instUrl;\n        inst.load();\n        inst.addEventListener('canplay', () => playEl(inst, 'inst'), { once: true });\n      } else {\n        playEl(inst, 'inst');\n      }\n      inst.onended = () => { vocal?.pause(); setIsPreviewing(false); inst.onended = null; };\n    } else {\n      addLog(`PREVIEW: inst manquant | instUrl=${audio.instUrl} | instRef=${!!inst}`);\n    }\n\n    if (vocal && audio.vocalGuideUrl) {\n      try { vocal.volume = audio.vocalVolRef.current; } catch {}\n      if (!vocal.src || vocal.src !== audio.vocalGuideUrl) {\n        vocal.src = audio.vocalGuideUrl;\n        vocal.load();\n        vocal.addEventListener('canplay', () => {\n          playEl(vocal, 'vocal');\n          audio.setVocalGuideVol(audio.vocalGuideVol);\n        }, { once: true });\n      } else {\n        playEl(vocal, 'vocal');\n        audio.setVocalGuideVol(audio.vocalGuideVol);\n      }\n    }\n\n    setIsPreviewing(true);\n  };\n\n  const handleDeleteRecording = (id: string) => { studioService.deleteLocalRecording(id); reloadRecordings(); };\n  const handleUploadRecording = async (rec: MobileRecording) => {\n    setUploading(rec.id);\n    try {\n      let blob: Blob | null = null;\n      try { blob = await studioOfflineDB.getAudio(`rec_${rec.id}`); } catch {}\n      if (!blob && rec.dataUrl) blob = studioService.dataUrlToBlob(rec.dataUrl);\n      if (!blob) { alert('Fichier introuvable.'); return; }\n      const ok = await studioService.uploadToServer(rec, blob);\n      if (ok) { studioService.markTransferred(rec.id); reloadRecordings(); setUploadDone(rec.id); setTimeout(() => setUploadDone(null), 3000); }\n      else alert('Échec transfert.');\n    } catch (e: any) { alert('Erreur : ' + e.message); }\n    finally { setUploading(null); }\n  };\n\n  const handleMix = async () => {\n    if (!project || project.tracks.length === 0) return;\n    setIsMixing(true);\n    try {\n      const mixBlob = await studioService.mixProject(project);\n      const dataUrl = await studioService.blobToDataUrl(mixBlob);\n      updateProject(p => ({ ...p, mixedDataUrl: dataUrl }));\n      setMixDone(true);\n    } catch (e: any) { alert('Erreur mixage : ' + e.message); }\n    finally { setIsMixing(false); }\n  };\n\n  const handleUploadMix = async () => {\n    if (!project?.mixedDataUrl || !selected) return;\n    setUploading('mix');\n    try {\n      const blob = studioService.dataUrlToBlob(project.mixedDataUrl);\n      const fakeRec: MobileRecording = { id: `MIX-${project.id}`, songId .title, artist: selected.artist || '', duration: compTakes.reduce((s,t)=>s+t.regions.reduce((rs,r)=>rs+(r.endSec-r.startSec),0),0), recordedAt: Date.now(), dataUrl, transferred: false, fileName: `COMP_${selected.title.replace(/\\s+/g,'_')}_${Date.now()}.mp4`, trackLabel: 'Comp final', trackIndex: 99, projectId: project?.id }; studioService.saveRecordingLocally(rec); reloadRecordings(); if (project) { updateProject(p => ({ ...p, mixedDataUrl: dataUrl })); setMixDone(true); } setScreen('mixer'); }} /></>;\n  if (screen === 'mixer' && selected && project) return <><DebugPanel debugLog={debugLog} onClear={() => setDebugLog([])} /><MixerScreen selected={selected} project={project} playingId={audio.playingId} isMixing={isMixing} mixDone={mixDone} isOnline={offline.isOnline} uploading={uploading} uploadDone={uploadDone} playRef={audio.playRef} instBlob={masterInstBlob} onBack={() => setScreen('record')} onGoSongs={() => setScreen('songs')} onAddTrack={() => setScreen('record')} onPlay={audio.playRecording} onMute={handleMuteTrack} onSolo={handleSoloTrack} onVolume={handleVolumeTrack} onPan={handlePanTrack} onDelete={handleDeleteTrack} onMix={handleMix} onPlayMix={() => project?.mixedDataUrl && audio.playMix(project.mixedDataUrl)} onMasterize={async (vocalBlob, _) => { const ib = await getInstBlob(); handleMasterize(vocalBlob, ib); }} onUploadMix={handleUploadMix} onGoComp={(takes) => { setCompTakes(takes); setScreen('comp'); }} onProjectUpdate={(up) => { setProject(up); studioService.saveProject(up); reloadRecordings(); }} /></>;\n  if (screen === 'record' && selected) return <><DebugPanel debugLog={debugLog} onClear={() => setDebugLog([])} /><RecordScreen selected={selected} project={project} currentPreset={currentPreset} reverb={reverb} isRecording={recorder.isRecording} isSaving={recorder.isSaving} duration={recorder.duration} analyser={recorder.analyser} vuLevel={recorder.vuLevel} monitoring={recorder.monitoring} permError={recorder.permError} httpsUrl={offline.httpsUrl} instUrl={audio.instUrl} instLoading={audio.instLoading} instCached={audio.instCached} vocalGuideUrl={audio.vocalGuideUrl} vocalLoading={audio.vocalLoading} vocalCached={audio.vocalCached} vocalGuideVol={audio.vocalGuideVol} showLyrics={showLyrics} instRef={audio.instRef} vocalGuideRef={audio.vocalGuideRef} getInstPlaybackTime={audio.getInstPlaybackTime} onPreWarmMic={recorder.preWarmMic} onBack={() => { if (isPreviewing) { audio.instRef.current?.pause(); audio.vocalGuideRef.current?.pause(); setIsPreviewing(false); } setScreen('songs'); setSelected(null); }} onGoMixer={() => { if (isPreviewing) { audio.instRef.current?.pause(); audio.vocalGuideRef.current?.pause(); setIsPreviewing(false); } setScreen('mixer'); }} onPresetChange={setCurrentPreset} onReverbChange={setReverb} takeSlot={takeSlot} onTakeSlotChange={setTakeSlot} slotTakes={slotTakes}\n        onStartRecording={() => { if (isPreviewing) { audio.instRef.current?.pause(); audio.vocalGuideRef.current?.pause(); setIsPreviewing(false); } if (selected && project) recorder.startRecording(selected, project); }} onStopRecording={() => { if (selected && project) recorder.stopRecording(selected, project, handleRecordingSaved); }} onToggleMonitor={recorder.toggleMonitoring} onVocalVolumeChange={audio.setVocalGuideVol} onToggleLyrics={() => setShowLyrics(v => !v)} onPreviewStems={handlePreviewStems} isPreviewing={isPreviewing} audioDevices={recorder.audioDevices} selectedDevice={recorder.selectedDevice} onSelectDevice={recorder.setSelectedDevice} onRefreshDevices={recorder.refreshDevices} punchIn={recorder.punchIn} punchOut={recorder.punchOut} onSetPunchIn={recorder.setPunchIn} onSetPunchOut={recorder.setPunchOut} stemDuration={audio.instRef.current?.duration || 0} sections={(project?.sections as any[] ?? [])} autoSelectReason={recorder.autoSelectReason} activeDeviceLabel={recorder.activeDeviceLabel} bluetoothMicDetected={recorder.bluetoothMicDetected} forcedBuiltinMic={recorder.forcedBuiltinMic} /></>;\n  if (screen === 'recordings') return <><DebugPanel debugLog={debugLog} onClear={() => setDebugLog([])} /><RecordingsList recordings={recordings} pendingCount={pendingCount} playingId={audio.playingId} uploading={uploading} uploadDone={uploadDone} isOnline={offline.isOnline} playRef={audio.playRef} onBack={() => setScreen('songs')} onPlay={audio.playRecording} onUpload={handleUploadRecording} onDelete={handleDeleteRecording} /></>;\n  return <><DebugPanel debugLog={debugLog} onClear={() => setDebugLog([])} /><SongSelector songs={originals} isOnline={offline.isOnline} isInstalled={offline.isInstalled} httpsUrl={offline.httpsUrl} cachedSongs={offline.cachedSongs} cachingId={offline.cachingId} cacheProgress={offline.cacheProgress} cacheError={offline.cacheError} cachedCount={offline.cachedCount} storage={offline.storage} storageWarning={offline.storageWarning} pendingCount={pendingCount} cacheHealth={offline.cacheHealth} missingModules={offline.missingModules} repairProgress={offline.repairProgress} onSelect={(song) => { setSelected(song); setScreen('record'); audio.stopPlayback(); }} onInstall={offline.installPWA} onCache={(song) => offline.cacheSongForOffline(song, allSongs)} onForceRefresh={(song) => offline.forceRefreshSong(song, allSongs)}\n            onImportFile={offline.importFileToCache} onClearCacheError={offline.clearCacheError} onRepairCache={offline.repairCache} onUncache={offline.uncacheSong} onClearAll={offline.clearAllCache} onViewRecordings={() => setScreen('recordings')} /></>;\n}",
  "components/StudioMobile/studio.types.ts": "/**\n * studio.types.ts — Types, constantes et utilitaires du Studio Mobile v2\n *\n * NOUVEAUTÉS :\n * - FxPreset : preset d'effets par piste (EQ, compresseur, saturation, reverb)\n * - FX_PRESETS : banque de presets inspirés BandLab\n */\nimport { ReverbType } from '../../services/StudioService';\n\nexport type Screen = 'songs' | 'record' | 'mixer' | 'recordings' | 'comp' | 'master';\n\nexport interface TrackPreset {\n  index: number;\n  label: string;\n  pitch: number;\n  pan:   number;\n  gain:  number;\n  color: string;\n  emoji: string;\n}\n\n// ── Preset d\\'effets par piste ────────────────────────────────────────────────\nexport interface FxPreset {\n  id:          string;\n  label:       string;\n  emoji:       string;\n  description: string;\n  color:       string;\n  // EQ 3 bandes\n  lowGain:     number;   // -12..+12 dB  @ 250 Hz\n  midGain:     number;   // -12..+12 dB  @ 2500 Hz\n  highGain:    number;   // -12..+12 dB  @ 8000 Hz\n  // Compresseur\n  compThreshold: number; // -40..0 dB\n  compRatio:     number; // 1..20\n  compAttack:    number; // ms\n  compRelease:   number; // ms\n  compKnee:      number; // 0..40 dB\n  // Saturation douce 0..1\n  saturation:  number;\n  // Reverb\n  reverb:      ReverbType;\n  reverbMix:   number;   // 0..1\n}\n\n// Banque de presets FX — inspirés des presets BandLab populaires\nexport const FX_PRESETS: FxPreset[] = [\n  {\n    id: 'clean',\n    label: 'Clean',\n    emoji: '🎙',\n    description: 'Signal propre sans traitement',\n    color: '#71717a',\n    lowGain: 0, midGain: 0, highGain: 0,\n    compThreshold: 0, compRatio: 1, compAttack: 10, compRelease: 150, compKnee: 6,\n    saturation: 0, reverb: 'none', reverbMix: 0,\n  },\n  {\n    id: 'studio_vocal',\n    label: 'Studio Vocal',\n    emoji: '🎤',\n    description: 'Voix chaude et présente, compression douce',\n    color: '#ef4444',\n    lowGain: 1.0, midGain: 2.5, highGain: 1.5,\n    compThreshold: -18, compRatio: 3, compAttack: 10, compRelease: 150, compKnee: 8,\n    saturation: 0.05, reverb: 'room', reverbMix: 0.18,\n  },\n  {\n    id: 'country_warm',\n    label: 'Country Warm',\n    emoji: '🤠',\n    description: 'Son country chaleureux, graves riches',\n    color: '#f97316',\n    lowGain: 3.0, midGain: -0.5, highGain: 1.0,\n    compThreshold: -20, compRatio: 3.5, compAttack: 15, compRelease: 200, compKnee: 10,\n    saturation: 0.08, reverb: 'hall', reverbMix: 0.22,\n  },\n  {\n    id: 'punchy',\n    label: 'Punchy',\n    emoji: '💥',\n    description: 'Attaque forte, présence dans le mix',\n    color: '#eab308',\n    lowGain: 0.5, midGain: 3.5, highGain: 2.0,\n    compThreshold: -15, compRatio: 5, compAttack: 3, compRelease: 80, compKnee: 4,\n    saturation: 0.12, reverb: 'room', reverbMix: 0.12,\n  },\n  {\n    id: 'airy',\n    label: 'Airy & Bright',\n    emoji: '✨',\n    description: 'Voix légère et aérienne, aigus brillants',\n    color: '#22c55e',\n    lowGain: -1.0, midGain: 0.5, highGain: 4.0,\n    compThreshold: -20, compRatio: 2.5, compAttack: 20, compRelease: 200, compKnee: 12,\n    saturation: 0.03, reverb: 'plate', reverbMix: 0.25,\n  },\n  {\n    id: 'harmony',\n    label: 'Harmony',\n    emoji: '🎶',\n    description: 'Idéal pour harmonies et layers vocaux',\n    color: '#a855f7',\n    lowGain: -2.0, midGain: 1.0, highGain: 2.5,\n    compThreshold: -22, compRatio: 4, compAttack: 8, compRelease: 120, compKnee: 8,\n    saturation: 0.04, reverb: 'hall', reverbMix: 0.30,\n  },\n  {\n    id: 'double_epic',\n    label: 'Double Epic',\n    emoji: '🎵',\n    description: 'Double tracking épais et large',\n    color: '#3b82f6',\n    lowGain: 1.5, midGain: -1.0, highGain: 1.5,\n    compThreshold: -16, compRatio: 4, compAttack: 5, compRelease: 100, compKnee: 6,\n    saturation: 0.10, reverb: 'hall', reverbMix: 0.28,\n  },\n  {\n    id: 'octave_deep',\n    label: 'Octave Deep',\n    emoji: '🔉',\n    description: 'Octave grave profonde et puissante',\n    color: '#06b6d4',\n    lowGain: 5.0, midGain: -2.0, highGain: -1.0,\n    compThreshold: -20, compRatio: 5, compAttack: 10, compRelease: 200, compKnee: 10,\n    saturation: 0.15, reverb: 'room', reverbMix: 0.15,\n  },\n  {\n    id: 'digi_comp',\n    label: 'Digi Comp',\n    emoji: '⚡',\n    description: 'Compression agressive style trap/hip-hop',\n    color: '#f43f5e',\n    lowGain: 2.0, midGain: 1.5, highGain: 3.0,\n    compThreshold: -25, compRatio: 6, compAttack: 1, compRelease: 69, compKnee: 6,\n    saturation: 0.15, reverb: 'none', reverbMix: 0,\n  },\n  {\n    id: 'velvet',\n    label: 'Velvet',\n    emoji: '🎼',\n    description: 'Son doux et velouté, voix soul/R&B',\n    color: '#d946ef',\n    lowGain: 2.5, midGain: -0.5, highGain: -1.0,\n    compThreshold: -22, compRatio: 3, compAttack: 15, compRelease: 250, compKnee: 15,\n    saturation: 0.06, reverb: 'plate', reverbMix: 0.20,\n  },\n];\n\nexport const FX_PRESET_DEFAULT = FX_PRESETS[0]; // Clean\n\nexport const TRACK_PRESETS: TrackPreset[] = [\n  { index: 0, label: 'Voix principale', pitch: 0,   pan: 0,    gain: 1.0,  color: '#ef4444', emoji: '🎤' },\n  { index: 1, label: 'Double tracking', pitch: 0,   pan: -0.4, gain: 0.6,  color: '#f97316', emoji: '🎵' },\n  { index: 2, label: 'Harmonie +3',     pitch: 3,   pan: 0.5,  gain: 0.5,  color: '#eab308', emoji: '🎶' },\n  { index: 3, label: 'Harmonie +7',     pitch: 7,   pan: -0.5, gain: 0.45, color: '#22c55e', emoji: '🎼' },\n  { index: 4, label: 'Octave bas',      pitch: -12, pan: 0,    gain: 0.35, color: '#3b82f6', emoji: '🔉' },\n  { index: 5, label: 'Harmonie +5',     pitch: 5,   pan: 0.3,  gain: 0.4,  color: '#a855f7', emoji: '✨' },\n];\n\n// Presets FX recommandés par type de piste\nexport const TRACK_FX_SUGGESTIONS: Record<number, string> = {\n  0: 'studio_vocal',  // Voix principale → Studio Vocal\n  1: 'double_epic',   // Double tracking → Double Epic\n  2: 'harmony',       // Harmonie +3 → Harmony\n  3: 'harmony',       // Harmonie +7 → Harmony\n  4: 'octave_deep',   // Octave bas → Octave Deep\n  5: 'harmony',       // Harmonie +5 → Harmony\n};\n\nexport interface SectionMarker {\n  id:         string;\n  label:      'Intro' | 'Couplet' | 'Refrain' | 'Pont' | 'Outro';\n  startSec:   number;\n  endSec:     number;\n  // quelles harmonies (trackIndex 1-5) sont actives dans cette section\n  activeHarmonies: number[];\n  // volume individuel par harmonie dans cette section (0.0 – 1.0), clé = trackIndex\n  harmonyVolumes?: Record<number, number>;\n}\n\nexport const SECTION_LABELS = ['Intro', 'Couplet', 'Refrain', 'Pont', 'Outro'] as const;\nexport type SectionLabel = typeof SECTION_LABELS[number];\n\nexport const SECTION_COLORS: Record<SectionLabel, string> = {\n  Intro:   '#3b82f6',\n  Couplet: '#22c55e',\n  Refrain: '#ef4444',\n  Pont:    '#a855f7',\n  Outro:   '#f97316',\n};\n\nexport const REVERB_LABELS: Record<ReverbType, string> = {\n  none:  'Sec',\n  room:  'Pièce',\n  hall:  'Hall',\n  plate: 'Plaque',\n};\n\nexport const REVERB_TYPES: ReverbType[] = ['none', 'room', 'hall', 'plate'];\n\nexport function formatTime(s: number): string {\n  return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;\n}\n\nexport function formatDate(ts: number): string {\n  return new Date(ts).toLocaleDateString('fr-CA', {\n    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',\n  });\n}\n",
  "components/StudioMobile/useStudioAudio.ts": "/**\nuseStudioAudio.ts v7.4 — STABLE iOS\nCORRECTIF MAJEUR : Suppression totale de AudioContext/GainNode pour le guide vocal.\nCes éléments entraient en conflit avec la session d'enregistrement sur iOS,\nforçant le basculement en mode 16kHz.\nLe volume est maintenant géré via l'élément <audio> natif (.volume).\nSur iPhone, le volume physique prévaut, mais cela garantit une compatibilité totale\nsans casser la qualité du micro.\n*/\nimport { useState, useRef, useEffect, useCallback } from 'react';\nimport { MobileRecording } from '../../services/StudioService';\nimport { studioOfflineDB } from '../../services/StudioOfflineDB';\nimport { Song, TrackType } from '../../types';\n\nfunction isIOS(): boolean {\n  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||\n    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);\n}\nfunction fixBlobType(blob: Blob): Blob {\n  if (isIOS()) {\n    // iOS Safari ne supporte que audio/mp4, audio/mpeg, audio/aac\n    // FLAC, WebM, OGG, et '' sont tous invalides → forcer audio/mp4\n    const t = blob.type.toLowerCase();\n    if (!t.includes('mp4') && !t.includes('mpeg') && !t.includes('aac') && !t.includes('mp3')) {\n      return new Blob([blob], { type: 'audio/mp4' });\n    }\n  }\n  return blob;\n}\nfunction getMediaUrl(fileName: string): string {\n  const _macUrl = ((window as any).__CC_MAC_URL as string) || '';\n  const _base = _macUrl.startsWith('http') ? _macUrl : '';\n  if (!_base && isIOS() && fileName.toLowerCase().endsWith('.flac')) return `/api/media-transcode/${encodeURIComponent(fileName)}`;\n  return `${_base}/api/media/${encodeURIComponent(fileName)}`;\n}\nfunction makeAudioEl(): HTMLAudioElement {\n  const el = document.createElement('audio');\n  el.setAttribute('playsinline', '');\n  el.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;left:-9999px;top:-9999px;';\n  document.body.appendChild(el);\n  return el;\n}\n\ninterface AudioResult {\n  instUrl:          string | null;\n  vocalGuideUrl:    string | null;\n  vocalGuideVol:    number;\n  playingId:        string | null;\n  instLoading:      boolean;\n  vocalLoading:     boolean;\n  instCached:       boolean;   // true = blob URL depuis IndexedDB\n  vocalCached:      boolean;   // true = blob URL depuis IndexedDB\n  instRef:          React.RefObject<HTMLAudioElement>;\n  vocalGuideRef:    React.RefObject<HTMLAudioElement>;\n  playRef:          React.RefObject<HTMLAudioElement>;\n  vocalVolRef:      React.RefObject<number>;\n  setVocalGuideVol: (v: number) => void;\n  playRecording:    (rec: MobileRecording) => Promise<void>;\n  stopPlayback:     () => void;\n  playMix:          (dataUrl: string) => void;\n  getInstPlaybackTime: () => number; // temps de lecture actuel du stem inst (sec)\n}\n\nexport function useStudioAudio(selected: Song | null): AudioResult {\n  const [instUrl, setInstUrl] = useState<string | null>(null);\n  const [vocalGuideUrl, setVocalGuideUrl] = useState<string | null>(null);\n  const [vocalGuideVol, setVocalGuideVol] = useState(0.4);\n  const [playingId, setPlayingId] = useState<string | null>(null);\n  const [instLoading, setInstLoading] = useState(false);\n  const [vocalLoading, setVocalLoading] = useState(false);\n  const [instCached, setInstCached] = useState(false);\n  const [vocalCached, setVocalCached] = useState(false);\n\n  const instRef = useRef(null as unknown as HTMLAudioElement);\n  const vocalGuideRef = useRef(null as unknown as HTMLAudioElement);\n  const playRef = useRef(null as unknown as HTMLAudioElement);\n  const vocalVolRef = useRef(0.4);\n  const createdRef = useRef(false);\n\n  // Tracking du temps de lecture via AudioContext (pour sync paroles quand <audio>.play() échoue sur iOS)\n  const ctxPlaybackStartTimeRef = useRef<number>(0);  // ctx.currentTime au moment du start\n  const ctxPlaybackOffsetRef    = useRef<number>(0);  // offset dans le fichier (punchIn)\n  const ctxPlaybackActiveRef    = useRef<boolean>(false);\n  const instBufSrcRef           = useRef<AudioBufferSourceNode | null>(null);\n\n  const getInstPlaybackTime = (): number => {\n    // Priorité 1 : <audio> element joue normalement\n    if (instRef.current && !isNaN(instRef.current.currentTime) && instRef.current.currentTime > 0) {\n      return instRef.current.currentTime;\n    }\n    // Priorité 2 : tracker local (handlePreviewStems fallback)\n    const ctx = (window as any).__warmContext as AudioContext | undefined;\n    if (ctx && ctxPlaybackActiveRef.current) {\n      return ctxPlaybackOffsetRef.current + (ctx.currentTime - ctxPlaybackStartTimeRef.current);\n    }\n    // Priorité 3 : tracker global (startStem dans recorder)\n    if (ctx && (window as any).__instCtxActive) {\n      return ((window as any).__instCtxOffset || 0) + (ctx.currentTime - ((window as any).__instCtxStartTime || ctx.currentTime));\n    }\n    return 0;\n  };\n  \n  if (!createdRef.current && typeof document !== 'undefined') {\n    createdRef.current = true;\n    (instRef as React.MutableRefObject<HTMLAudioElement>).current = makeAudioEl();\n    (vocalGuideRef as React.MutableRefObject<HTMLAudioElement>).current = makeAudioEl();\n    (playRef as React.MutableRefObject<HTMLAudioElement>).current = makeAudioEl();\n  }\n\n  useEffect(() => {\n    return () => {\n      instRef.current?.pause(); instRef.current?.remove();\n      vocalGuideRef.current?.pause(); vocalGuideRef.current?.remove();\n      playRef.current?.pause(); playRef.current?.remove();\n    };\n  }, []);\n\n  // Contrôle du volume guide vocal — iOS : .volume est read-only, utiliser un GainNode\n  const vocalGainNodeRef = useRef<GainNode | null>(null);\n  const vocalAudioCtxRef = useRef<AudioContext | null>(null);\n  const vocalSourceRef   = useRef<MediaElementAudioSourceNode | null>(null);\n\n  const setVolumeIOS = useCallback((v: number) => {\n    // Sur iOS, HTMLAudioElement.volume est read-only — on passe par GainNode.\n    // IMPORTANT: ctx.resume() est async — on doit attendre avant de jouer.\n    if (!vocalGuideRef.current) return;\n    // Fallback immédiat .volume pour Desktop/Android\n    try { vocalGuideRef.current.volume = v; } catch {}\n    // GainNode async pour iOS\n    (async () => {\n    try {\n      const AudioCtx = window.AudioContext || (window as any).webkitAudioContext;\n      if (!AudioCtx) return;\n      if (!vocalAudioCtxRef.current || vocalAudioCtxRef.current.state === 'closed') {\n        vocalAudioCtxRef.current = new AudioCtx({ latencyHint: 'playback' });\n      }\n      const ctx = vocalAudioCtxRef.current;\n      // Attendre que le contexte soit actif avant de brancher les noeuds\n      if (ctx.state === 'suspended') await ctx.resume();\n      if (!vocalSourceRef.current) {\n        vocalSourceRef.current = ctx.createMediaElementSource(vocalGuideRef.current);\n      }\n      if (!vocalGainNodeRef.current) {\n        vocalGainNodeRef.current = ctx.createGain();\n        vocalSourceRef.current.connect(vocalGainNodeRef.current);\n        vocalGainNodeRef.current.connect(ctx.destination);\n      }\n      vocalGainNodeRef.current.gain.setTargetAtTime(v, ctx.currentTime, 0.01);\n    } catch {\n      // Fallback : tenter .volume directement (Desktop / contexte non-iOS)\n      try { vocalGuideRef.current.volume = v; } catch {}\n    }\n    })(); // end async IIFE\n  }, []);\n\n  const updateVocalVol = useCallback((v: number) => {\n    vocalVolRef.current = v;\n    setVocalGuideVol(v);\n    setVolumeIOS(v);\n  }, [setVolumeIOS]);\n\n  useEffect(() => {\n    const el = instRef.current;\n    if (!el) return;\n    if (instUrl) { el.src = instUrl; el.load(); }\n    else { el.removeAttribute('src'); el.load(); }\n  }, [instUrl]);\n\n  useEffect(() => {\n    const el = vocalGuideRef.current;\n    if (!el) return;\n    if (vocalGuideUrl) {\n      el.src = vocalGuideUrl;\n      // Appliquer le volume dès que possible\n      el.oncanplay = () => {\n        // 1. Fallback immédiat via .volume (fonctionne toujours)\n        try { el.volume = vocalVolRef.current; } catch {}\n        // 2. GainNode si AudioContext disponible\n        setVolumeIOS(vocalVolRef.current);\n      };\n      // Aussi appliquer .volume directement maintenant (avant canplay)\n      try { el.volume = vocalVolRef.current; } catch {}\n      el.load();\n    } else {\n      el.removeAttribute('src'); el.load();\n    }\n  }, [vocalGuideUrl, setVolumeIOS]);\n\n  useEffect(() => {\n    if (!selected) { setInstUrl(null); setInstCached(false); return; }\n    const inst = selected.versions?.find(v => v.trackType === TrackType.STEM_INSTRUMENTAL);\n    if (!inst?.fileName) { setInstUrl(null); setInstCached(false); return; }\n    setInstLoading(true);\n    // iOS et Desktop : IndexedDB en priorité, réseau en fallback\n    studioOfflineDB.getAudio(`inst_${selected.id}`).then(blob => {\n      if (blob) {\n        setInstUrl(URL.createObjectURL(fixBlobType(blob)));\n        setInstCached(true);\n        console.log(`[Audio] inst CACHE: ${(blob.size/1024/1024).toFixed(1)} MB`);\n      } else {\n        // Pas en cache — URL réseau (Mac requis)\n        setInstUrl(getMediaUrl(inst.fileName!));\n        setInstCached(false);\n        console.warn('[Audio] inst NON EN CACHE — URL réseau');\n        // Télécharger en arrière-plan pour mise en cache\n        fetch(getMediaUrl(inst.fileName!))\n          .then(r => r.ok ? r.blob() : null)\n          .then(b => b && studioOfflineDB.saveAudio(`inst_${selected.id}`, fixBlobType(b), { songId: selected.id, songTitle: selected.title, type: 'instrumental' }).catch(() => {}))\n          .catch(() => {});\n      }\n    }).catch(() => {\n      setInstUrl(getMediaUrl(inst.fileName!));\n      setInstCached(false);\n    }).finally(() => setInstLoading(false));\n  }, [selected?.id]);\n\n\n  useEffect(() => {\n    if (!selected) { setVocalGuideUrl(null); setVocalCached(false); return; }\n    const vocal = selected.versions?.find(v => v.trackType === TrackType.STEM_VOCAL);\n    if (!vocal?.fileName) { setVocalGuideUrl(null); setVocalCached(false); return; }\n    setVocalLoading(true);\n    // iOS et Desktop : IndexedDB en priorité, réseau en fallback\n    studioOfflineDB.getAudio(`vocal_${selected.id}`).then(blob => {\n      if (blob) {\n        setVocalGuideUrl(URL.createObjectURL(fixBlobType(blob)));\n        setVocalCached(true);\n        console.log(`[Audio] vocal CACHE: ${(blob.size/1024/1024).toFixed(1)} MB`);\n      } else {\n        setVocalGuideUrl(getMediaUrl(vocal.fileName!));\n        setVocalCached(false);\n        console.warn('[Audio] vocal NON EN CACHE — URL réseau');\n        fetch(getMediaUrl(vocal.fileName!))\n          .then(r => r.ok ? r.blob() : null)\n          .then(b => b && studioOfflineDB.saveAudio(`vocal_${selected.id}`, fixBlobType(b), { songId: selected.id, songTitle: selected.title, type: 'vocal' }).catch(() => {}))\n          .catch(() => {});\n      }\n    }).catch(() => {\n      setVocalGuideUrl(getMediaUrl(vocal.fileName!));\n      setVocalCached(false);\n    }).finally(() => setVocalLoading(false));\n  }, [selected?.id]);\n\n  const playRecording = useCallback(async (rec: MobileRecording) => {\n    if (!playRef.current) return;\n    if (playingId === rec.id) { playRef.current.pause(); setPlayingId(null); return; }\n\n    // ── Chercher le blob audio ────────────────────────────────────────────\n    let blob: Blob | null = null;\n\n    // 1. IndexedDB (stocké par saveRecordingLocallyAsync)\n    try {\n      blob = await studioOfflineDB.getAudio(`rec_${rec.id}`);\n      if (blob) console.log(`[Play] IndexedDB: ${(blob.size/1024).toFixed(0)} Ko`);\n    } catch(e) {\n      console.warn('[Play] IndexedDB erreur:', e);\n    }\n\n    // 2. dataUrl en mémoire\n    if (!blob && rec.dataUrl) {\n      try {\n        const [header, data] = rec.dataUrl.split(',');\n        const mime = header.match(/:(.*?);/)?.[1] ?? 'audio/mp4';\n        const binary = atob(data);\n        const bytes = new Uint8Array(binary.length);\n        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);\n        blob = new Blob([bytes], { type: mime });\n        console.log(`[Play] dataUrl: ${(blob.size/1024).toFixed(0)} Ko | type=${mime}`);\n      } catch(e) {\n        console.error('[Play] Erreur décodage dataUrl:', e);\n      }\n    }\n\n    if (!blob || blob.size === 0) {\n      console.error('[Play] Aucun blob disponible pour', rec.id);\n      alert('Fichier audio introuvable. La prise a peut-être été perdue.');\n      return;\n    }\n\n    const fixedBlob = fixBlobType(blob);\n    const src = URL.createObjectURL(fixedBlob);\n    console.log(`[Play] URL créée: ${src} | type=${fixedBlob.type}`);\n\n    playRef.current.src = src;\n    playRef.current.load();\n    try {\n      await playRef.current.play();\n      console.log('[Play] Lecture demarree');\n    } catch(e: any) {\n      console.error('[Play] Erreur play():', e.name, e.message);\n      alert(`Erreur lecture: ${e.message}`);\n    }\n    setPlayingId(rec.id);\n    playRef.current.onended = () => { setPlayingId(null); URL.revokeObjectURL(src); };\n  }, [playingId]);\n\n  const playMix = useCallback((dataUrl: string) => {\n    if (!playRef.current) return;\n    if (playingId === 'mix') { playRef.current.pause(); setPlayingId(null); return; }\n    playRef.current.src = dataUrl; playRef.current.load(); playRef.current.play().catch(() => {});\n    setPlayingId('mix'); playRef.current.onended = () => setPlayingId(null);\n  }, [playingId]);\n\n  const stopPlayback = useCallback(() => { playRef.current?.pause(); setPlayingId(null); }, []);\n\n  return {\n    instUrl, vocalGuideUrl, vocalGuideVol, playingId,\n    instLoading, vocalLoading,\n    instCached, vocalCached,\n    instRef, vocalGuideRef, playRef, vocalVolRef,\n    setVocalGuideVol: updateVocalVol,\n    playRecording, stopPlayback, playMix,\n    getInstPlaybackTime,\n  };\n}",
  "components/StudioMobile/useStudioOffline.ts": "/**\n * useStudioOffline.ts — Hook réseau, PWA, cache hors-ligne v3\n *\n * NOUVEAUTÉS v3 :\n * - cacheError : message d'erreur exposé avec songId pour afficher \"Réessayer\"\n * - forceRefreshSong : re-télécharge les stems même s'ils sont déjà en cache\n *   (utile si un stem est corrompu ou mal converti)\n * - cachedCount : nombre total de chansons en cache\n * - Meilleure gestion WiFi coupé : l'erreur reste visible jusqu'au prochain essai\n */\nimport { useState, useEffect, useCallback, useRef } from 'react';\nimport { Song, TrackType } from '../../types';\nimport { studioOfflineDB } from '../../services/StudioOfflineDB';\n\ninterface StorageInfo { used: number; quota: number; pct: number; }\n\nexport interface CacheProgress {\n  step:  'inst_download' | 'inst_convert' | 'vocal_download' | 'vocal_convert' | 'done';\n  label: string;\n  pct:   number;\n}\n\nexport interface CacheError {\n  songId:  string;\n  message: string;\n}\n\ninterface OfflineResult {\n  isOnline:        boolean;\n  isInstalled:     boolean;\n  httpsUrl:        string;\n  installPrompt:   any;\n  cachedSongs:     Set<string>;\n  cachedCount:     number;\n  cachingId:       string | null;\n  cacheProgress:   CacheProgress | null;\n  cacheError:      CacheError | null;\n  storage:         StorageInfo | null;\n  storageWarning:  boolean;\n  cacheHealth:     'ok' | 'incomplete' | 'checking' | 'repairing';\n  missingModules:  number;\n  repairProgress:  number; // 0-100\n  installPWA:          () => Promise<void>;\n  cacheSongForOffline: (song: Song, allSongs: Song[], force?: boolean) => Promise<void>;\n  forceRefreshSong:    (song: Song, allSongs: Song[]) => Promise<void>;\n  uncacheSong:         (songId: string) => Promise<void>;\n  clearAllCache:       () => Promise<void>;\n  clearCacheError:     () => void;\n  repairCache:         () => void;\n  importFileToCache:   (song: Song, type: 'inst' | 'vocal', file: File) => Promise<void>;\n  setOffli
