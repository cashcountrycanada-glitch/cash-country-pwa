 {\n          const vGain = ctx.createGain();\n          vGain.gain.value = optsRef.current.vocalGuideVolRef?.current ?? 0.4;\n          const vsrc = ctx.createBufferSource();\n          vsrc.buffer = vocalBuf;\n          vsrc.connect(vGain);\n          vGain.connect(ctx.destination);\n          (window as any).__vocalBufSrc  = vsrc;\n          (window as any).__vocalBufGain = vGain;\n          vsrc.onended = () => {\n            (window as any).__vocalBufSrc  = null;\n            (window as any).__vocalBufGain = null;\n          };\n          vsrc.start(startAt, t);  // ← même startAt que inst : synchro parfaite\n        } else if (vocalEl && optsRef.current.vocalGuideUrl) {\n          vocalEl.play().catch(() => {});\n        }\n      };\n\n      await startStemsSync();\n\n      if (optsRef.current.backingTracks && optsRef.current.backingTracks.length > 0) {\n        backingRefsRef.current.forEach(el => { el.pause(); el.src = ''; });\n        backingRefsRef.current = [];\n        const sections: any[] = (optsRef.current as any).sections ?? [];\n        const activeSec = pIn !== null ? sections.find((s: any) => Math.abs(s.startSec - pIn) < 2) : null;\n        for (const bt of optsRef.current.backingTracks) {\n          if (activeSec && bt.trackIndex !== undefined && !activeSec.activeHarmonies.includes(bt.trackIndex)) continue;\n          let gain = bt.gain ?? 0.4;\n          if (activeSec && bt.trackIndex !== undefined) { const sv = activeSec.harmonyVolumes?.[bt.trackIndex]; if (sv !== undefined) gain = sv * 0.6; }\n          const el = new Audio(bt.dataUrl); el.playsInline = true; el.currentTime = pIn ?? 0; el.play().catch(() => {});\n          backingRefsRef.current.push(el);\n        }\n      }\n\n      // 2. Résoudre le device micro\n      const currentDevices = audioDevicesRef.current;\n      let effectiveDeviceId: string | undefined;\n      let reason: AutoSelectReason;\n      let deviceLabel: string;\n\n      if (selectedDevice !== null) {\n        // Sélection manuelle → TOUJOURS respectée, jamais surchargée\n        effectiveDeviceId = selectedDevice;\n        reason = 'manual';\n        const found = currentDevices.find(d => d.deviceId === selectedDevice);\n        deviceLabel = found?.label ?? `Device ${selectedDevice.slice(0, 8)}`;\n        optsRef.current.onLog?.(`🎙 MANUEL → \"${deviceLabel}\"`);\n        // Avertissement si l'utilisateur a sélectionné un micro BT manuellement\n        if (found?.category === 'bluetooth') {\n          optsRef.current.onLog?.('⚠️ Micro BT sélectionné manuellement — iOS peut basculer en HFP (son téléphonie). Préférer \"Micro int.\" si qualité dégradée.');\n        }\n      } else {\n        const resolved = resolveAutoDevice(currentDevices, optsRef.current.onLog ?? (() => {}));\n        effectiveDeviceId = resolved.deviceId;\n        reason = resolved.reason;\n        deviceLabel = resolved.label;\n      }\n\n      setAutoSelectReason(reason);\n      setActiveDeviceLabel(deviceLabel);\n\n      // 3. Capture DRY\n      optsRef.current.onLog?.(`🎤 Capture DRY → \"${deviceLabel}\"`);\n      const result = await studioService.startRecordingPro({\n        reverb: 'none' as any, saturation: 0, compression: false, gainL: 1.0, gainR: 1.0,\n        deviceId: effectiveDeviceId,\n      }, (level) => setVuLevel(level), optsRef.current.onLog);\n\n      refreshDevices();\n      const { recorder, chunks, context, stream, analyser: an, monitorGain, stopWorklet } = result;\n\n      if (stream) {\n        const track = stream.getAudioTracks()[0]; const s = track.getSettings();\n        optsRef.current.onLog?.(`🎵 Stream : ${s.sampleRate ?? '?'}Hz · ${s.channelCount ?? '?'}ch`);\n      }\n      if (context) optsRef.current.onLog?.(`🎵 AudioContext : ${context.sampleRate}Hz ${context.sampleRate >= 44000 ? '✅' : '⚠️'}`);\n\n      stopWorkletRef.current      = stopWorklet ?? null;\n      recorderRef.current         = recorder;\n      chunksRef.current           = chunks;\n      audioCtxRef.current         = context;\n      streamRef.current           = stream;\n      monitorGainRef.current      = monitorGain;\n      sourceNodeRef.current       = (result as any).sourceNode ?? null;\n      monitorConnectedRef.current = false;\n\n      setAnalyser(an);\n      setIsRecording(true);\n      setIsSaving(false);\n      setDuration(0);\n      durationRef.current = 0;\n      setPermError(false);\n      optsRef.current.onLog?.(`✅ REC — ${deviceLabel}`);\n\n      timerRef.current = setInterval(() => {\n        setDuration(d => {\n          const next = d + 1; syncDuration(next);\n          if (pOut !== null && next >= (pOut - (pIn ?? 0))) { recorderRef.current?.stop(); clearInterval(timerRef.current!); }\n          return next;\n        });\n      }, 1000);\n\n    } catch (e: any) {\n      optsRef.current.onLog?.(`❌ Erreur REC : ${e.message}`);\n      if (/Permission|denied|NotAllowed/i.test(e.message)) setPermError(true);\n      else alert('Erreur micro : ' + e.message);\n    }\n  }, [selectedDevice, refreshDevices]);\n\n  const stopRecording = useCallback((\n    song: Song, project: TrackProject,\n    onSaved: (rec: MobileRecording, updatedProject: TrackProject | null) => void,\n  ) => {\n    if ((!recorderRef.current && !stopWorkletRef.current) || !song || !project) return;\n    clearInterval(timerRef.current);\n    optsRef.current.instRef.current?.pause();\n    optsRef.current.vocalGuideRef.current?.pause();\n    // Stopper les BufferSourceNodes AudioContext (fallback iOS)\n    try { (window as any).__instBufSrc?.stop();  } catch {} finally { (window as any).__instBufSrc  = null; (window as any).__instCtxActive = false; (window as any).__instWallStart = null; }\n    try { (window as any).__vocalBufSrc?.stop(); } catch {} finally { (window as any).__vocalBufSrc = null; (window as any).__vocalBufGain = null; }\n    backingRefsRef.current.forEach(el => { el.pause(); el.currentTime = 0; });\n    backingRefsRef.current = [];\n    if (monitorConnectedRef.current && monitorGainRef.current && audioCtxRef.current) {\n      try { monitorGainRef.current.disconnect(audioCtxRef.current.destination); } catch {}\n      monitorConnectedRef.current = false;\n    }\n    setMonitoring(false);\n\n    // ── LIBÉRATION IMMÉDIATE DES RESSOURCES AUDIO ─────────────────────\n    // Déconnecter sourceNode et stopper le stream AVANT handleSave\n    // pour libérer iOS de AVAudioSession PlayAndRecord immédiatement.\n    // Sans ça, iOS garde la session ouverte pendant tout le traitement\n    // du blob, dégradant la lecture des stems pendant plusieurs secondes.\n    if (sourceNodeRef.current) {\n      try { sourceNodeRef.current.disconnect(); } catch {}\n      sourceNodeRef.current = null;\n    }\n    streamRef.current?.getTracks().forEach(t => t.stop());\n    streamRef.current = null;\n    const isWarmCtx = audioCtxRef.current === (window as any).__warmContext;\n    if (!isWarmCtx && audioCtxRef.current) {\n      audioCtxRef.current.close().catch(() => {});\n      audioCtxRef.current = null;\n    }\n    vocalGainNodeRef.current = null;\n    setAnalyser(null);\n    optsRef.current.onLog?.('🔓 Session micro fermée — stems restaurés');\n\n    const handleSave = async (workletBlob?: Blob) => {\n      setIsRecording(false); setIsSaving(true);\n      try {\n        // iOS coupe IndexedDB DÉFINITIVEMENT pendant AVAudioSession PlayAndRecord\n        // Solution : ne pas attendre — sauvegarder en arrière-plan quand iOS le permet\n        // ── Construire le blob audio ──────────────────────────────────────\n        let blob: Blob;\n        if (workletBlob && workletBlob.size > 0) {\n          blob = workletBlob;\n          optsRef.current.onLog?.(`💾 Blob AudioWorklet: ${(workletBlob.size / 1024).toFixed(0)} Ko WAV`);\n        } else if (chunksRef.current.length > 0) {\n          blob = new Blob(chunksRef.current, { type: chunksRef.current[0]?.type || 'audio/mp4' });\n          optsRef.current.onLog?.(`💾 Blob MediaRecorder: ${(blob.size / 1024).toFixed(0)} Ko | chunks=${chunksRef.current.length}`);\n        } else {\n          // Aucune donnée — enregistrement trop court ou erreur capture\n          optsRef.current.onLog?.('❌ Blob vide — aucune donnée capturée. Durée suffisante?');\n          return;\n        }\n\n        if (blob.size < 1000) {\n          optsRef.current.onLog?.(`⚠️ Blob suspect: ${blob.size} bytes — trop petit, probablement corrompu`);\n        }\n\n        // sourceNode et stream déjà libérés ci-dessus (avant handleSave)\n\n        optsRef.current.onLog?.(`💾 Sauvegarde...`);\n\n        // Sur iOS, si l'AudioWorklet a produit un WAV trop gros ET qu'on a des chunks MediaRecorder disponibles,\n        // préférer les chunks (mp4 compressé natif iOS)\n        let finalBlob = blob;\n        if (blob.type.includes('wav') && blob.size > 5 * 1024 * 1024 && chunksRef.current.length > 0) {\n          const mpBlob = new Blob(chunksRef.current, { type: chunksRef.current[0]?.type || 'audio/mp4' });\n          if (mpBlob.size > 1000) {\n            finalBlob = mpBlob;\n            optsRef.current.onLog?.(`💾 WAV → mp4 (MediaRecorder): ${(finalBlob.size/1024).toFixed(0)} Ko (était ${(blob.size/1024).toFixed(0)} Ko WAV)`);\n          }\n        }\n\n        const id = `REC-${Date.now()}`;\n        const safeTitle = song.title.replace(/\\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');\n        const ext = finalBlob.type.includes('mp4') ? 'mp4' : finalBlob.type.includes('wav') ? 'wav' : 'webm';\n        const fileName = `${safeTitle}_T${optsRef.current.currentPreset.index}_${Date.now()}.${ext}`;\n\n        const dataUrl = await studioService.blobToDataUrl(finalBlob);\n        optsRef.current.onLog?.(`✅ dataUrl: ${(dataUrl.length / 1024).toFixed(0)} Ko`);\n\n        // Vérifier l'espace disponible et libérer les anciennes prises si nécessaire\n        try {\n          if (navigator.storage && navigator.storage.estimate) {\n            const est = await navigator.storage.estimate();\n            const usedMB  = ((est.usage  || 0) / 1024 / 1024).toFixed(0);\n            const quotaMB = ((est.quota  || 0) / 1024 / 1024).toFixed(0);\n            const freeMB  = (((est.quota || 0) - (est.usage || 0)) / 1024 / 1024).toFixed(0);\n            optsRef.current.onLog?.(`💾 Stockage: ${usedMB}MB / ${quotaMB}MB — libre: ${freeMB}MB`);\n            // Si moins de 10MB libres, supprimer les prises déjà transférées\n            if (((est.quota || 0) - (est.usage || 0)) < 10 * 1024 * 1024) {\n              optsRef.current.onLog?.('⚠️ Espace faible — nettoyage des prises transférées...');\n              const allRecs = await studioService.getLocalRecordingsAsync();\n              const transferred = allRecs.filter(r => r.transferred);\n              for (const r of transferred) {\n                await studioService.deleteLocalRecordingAsync(r.id).catch(() => {});\n              }\n              optsRef.current.onLog?.(`🗑 ${transferred.length} prise(s) transférée(s) supprimées`);\n            }\n          }\n        } catch {}\n\n        const rec: MobileRecording = {\n          id, songId: song.id, songTitle: song.title, artist: song.artist || '',\n          duration: durationRef.current, recordedAt: Date.now(), dataUrl, transferred: false,\n          fileName, trackIndex: optsRef.current.currentPreset.index, trackLabel: optsRef.current.currentPreset.label,\n          takeSlot: optsRef.current.currentPreset.index === 0 ? (optsRef.current.takeSlot ?? 'A') : undefined,\n          pitchShift: optsRef.current.currentPreset.pitch, gain: optsRef.current.currentPreset.gain,\n          pan: optsRef.current.currentPreset.pan, projectId: project.id,\n        };\n\n        // Décoder et mettre en cache l'AudioBuffer en arrière-plan (évite decodeAudioData au moment de générer les harmonies)\n        finalBlob.arrayBuffer().then(ab => {\n          const tmpCtx = new (window.AudioContext || (window as any).webkitAudioContext)();\n          return tmpCtx.decodeAudioData(ab).then(buf => {\n            (window as any).__lastRecDecodedBuf = buf;\n            (window as any).__lastRecDecodedId  = id;\n            tmpCtx.close();\n          }).catch(() => { tmpCtx.close(); });\n        }).catch(() => {});\n        // 1. Ajouter immédiatement au projet (dataUrl en mémoire) — prise disponible instantanément\n        const updatedProject = studioService.addTrackToProject(project.id, rec);\n        optsRef.current.onLog?.(`✅ Prise en mémoire (${(dataUrl.length/1024).toFixed(0)} KB) | slot=${optsRef.current.takeSlot ?? 'A'}`);\n        onSaved(rec, updatedProject); // UI mise à jour tout de suite\n\n        // 2. Sauvegarde via studioOfflineDB.saveAudio() — route vers OPFS Worker (createSyncAccessHandle)\n        //    IMPORTANT : NE PAS utiliser createWritable() directement ici.\n        //    Safari iOS ne supporte PAS FileSystemFileHandle.createWritable() sur le main thread.\n        //    Seul le Worker OPFS (createSyncAccessHandle) fonctionne sur iOS.\n        //    studioOfflineDB.saveAudio() route automatiquement vers ce Worker.\n        const saveBlob = finalBlob; // capturer pour la closure async\n        const saveRec  = rec;\n\n        const saveViaOPFS = async (): Promise<boolean> => {\n          try {\n            await studioOfflineDB.init();\n            await studioOfflineDB.saveAudio(`rec_${saveRec.id}`, saveBlob, {\n              songId: saveRec.songId,\n              songTitle: saveRec.songTitle,\n              type: 'recording',\n              savedAt: Date.now(),\n            });\n            const metaEntry = { ...saveRec, dataUrl: undefined };\n            // 1. Métadonnées dans IDB (tentative — peut échouer pendant AVAudioSession)\n            try {\n              const metas = await studioOfflineDB.getState<any[]>('recordings', []);\n              await studioOfflineDB.setState('recordings', [...metas.filter((r: any) => r.id !== saveRec.id), metaEntry]);\n            } catch {\n              optsRef.current.onLog?.('💾 Audio OK — métadonnées IDB échouées (non bloquant)');\n            }\n            // 2. Métadonnées dans localStorage — garantie absolue, survit aux crashes iOS\n            //    Pas affecté par AVAudioSession. C'est le fallback final de getLocalRecordingsAsync.\n            try {\n              const lsRecs: any[] = JSON.parse(localStorage.getItem('cash_studio_recordings') || '[]');\n              const updated = [...lsRecs.filter((r: any) => r.id !== saveRec.id), metaEntry];\n              localStorage.setItem('cash_studio_recordings', JSON.stringify(updated));\n              try { localStorage.removeItem(`emergency_${saveRec.id}`); } catch {}\n            } catch {}\n            const backend = await studioOfflineDB.checkOPFS() ? 'OPFS' : 'IDB';\n            optsRef.current.onLog?.(`💾 ✅ Prise sécurisée ${backend} → rec_${saveRec.id} (${(saveBlob.size/1024).toFixed(0)} Ko)`);\n            return true;\n          } catch (opfsErr: any) {\n            optsRef.current.onLog?.(`⚠️ saveAudio échoué: ${opfsErr?.message} — fallback IDB`);\n            return false;\n          }\n        };\n\n        const saveViaIDB = async (): Promise<boolean> => {\n          try {\n            await studioOfflineDB.init();\n            await studioService.saveRecordingLocallyAsync(saveRec);\n            const ok = await studioOfflineDB.hasAudio(`rec_${saveRec.id}`);\n            if (ok) {\n              optsRef.current.onLog?.('💾 ✅ Prise sécurisée IndexedDB');\n              try { localStorage.removeItem(`emergency_${saveRec.id}`); } catch {}\n              return true;\n            }\n            return false;\n          } catch {\n            return false;\n          }\n        };\n\n        // Ajouter à la file de sauvegarde différée (tentatives OPFS + IDB)\n        const pending = (window as any).__pendingSaves as any[] || [];\n        pending.push({ rec: saveRec, blob: saveBlob, timestamp: Date.now() });\n        (window as any).__pendingSaves = pending;\n        optsRef.current.onLog?.('💾 Sauvegarde différée — OPFS prioritaire...');\n\n        // Fonction globale de traitement de la file\n        // IMPORTANT : chaque item utilise ses propres rec/blob (pas la closure externe)\n        const processPendingQueue = async () => {\n          const queue = (window as any).__pendingSaves as any[] || [];\n          if (!queue.length) return;\n          const saved: any[] = [];\n          for (const item of queue) {\n            const itemRec  = item.rec  as typeof saveRec;\n            const itemBlob = item.blob as typeof saveBlob;\n\n            const saveItemViaOPFS = async (): Promise<boolean> => {\n              try {\n                await studioOfflineDB.init();\n                await studioOfflineDB.saveAudio(`rec_${itemRec.id}`, itemBlob, {\n                  songId: itemRec.songId, songTitle: itemRec.songTitle,\n                  type: 'recording', savedAt: Date.now(),\n                });\n                const metaEntry = { ...itemRec, dataUrl: undefined };\n                try {\n                  const metas = await studioOfflineDB.getState<any[]>('recordings', []);\n                  await studioOfflineDB.setState('recordings', [...metas.filter((r: any) => r.id !== itemRec.id), metaEntry]);\n                } catch {}\n                // localStorage — garantie absolue\n                try {\n                  const lsRecs: any[] = JSON.parse(localStorage.getItem('cash_studio_recordings') || '[]');\n                  localStorage.setItem('cash_studio_recordings', JSON.stringify([...lsRecs.filter((r: any) => r.id !== itemRec.id), metaEntry]));\n                  try { localStorage.removeItem(`emergency_${itemRec.id}`); } catch {}\n                } catch {}\n                const backend = await studioOfflineDB.checkOPFS() ? 'OPFS' : 'IDB';\n                optsRef.current.onLog?.(`💾 ✅ Prise différée sauvegardée ${backend} → ${itemRec.id}`);\n                return true;\n              } catch { return false; }\n            };\n\n            const saveItemViaIDB = async (): Promise<boolean> => {\n              try {\n                await studioOfflineDB.init();\n                await studioService.saveRecordingLocallyAsync(itemRec);\n                const ok = await studioOfflineDB.hasAudio(`rec_${itemRec.id}`);\n                if (ok) {\n                  optsRef.current.onLog?.('💾 ✅ Prise différée sauvegardée IDB');\n                  try { localStorage.removeItem(`emergency_${itemRec.id}`); } catch {}\n                  return true;\n                }\n                return false;\n              } catch { return false; }\n            };\n\n            // Tenter OPFS d'abord (Worker createSyncAccessHandle — stable sur iOS)\n            const opfsOk = await saveItemViaOPFS().catch(() => false);\n            if (opfsOk) { saved.push(item); continue; }\n            // Fallback IDB avec 3 tentatives\n            for (let attempt = 0; attempt < 3; attempt++) {\n              const idbOk = await saveItemViaIDB().catch(() => false);\n              if (idbOk) { saved.push(item); break; }\n              await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));\n            }\n          }\n          (window as any).__pendingSaves = queue.filter((q: any) => !saved.includes(q));\n          if ((window as any).__pendingSaves.length > 0) {\n            optsRef.current.onLog?.(`⚠️ ${(window as any).__pendingSaves.length} prise(s) encore en attente`);\n          }\n        };\n\n        // Sauvegarder métadonnées d'urgence dans localStorage (survit aux crashes)\n        try {\n          localStorage.setItem(`emergency_${rec.id}`, JSON.stringify({\n            id: rec.id, songId: rec.songId, songTitle: rec.songTitle,\n            duration: rec.duration, recordedAt: rec.recordedAt,\n            takeSlot: rec.takeSlot, projectId: rec.projectId,\n          }));\n        } catch {}\n\n        // Tenter immédiatement\n        processPendingQueue().catch(() => {});\n\n        // Puis retenter à intervalles croissants sans bloquer l'UI\n        [2000, 5000, 12000, 25000,   "components/StudioMobile/RecordScreen.tsx": "/**\n * RecordScreen.tsx — v7.8\n *\n * UI de sélection micro pour 3 setups :\n *   Setup 1 : Micro cravate (récepteur Lightning/USB-C) + écouteurs BT → badge \"Externe ✓\"\n *   Setup 2 : Carte son V8 (USB-C) + micro condensateur → badge \"V8 ✓\"\n *   Setup 3 : Aucun externe, écouteurs BT → badge \"Builtin (A2DP protégé)\"\n *\n * Mode Auto : priorité externe > builtin-si-BT > défaut iOS\n * Mode Manuel : sélection toujours respectée, avertissement si BT choisi manuellement\n */\nimport React, { useEffect, useRef, useState, useCallback } from 'react';\nimport { ChevronLeft, Mic, Square, Headphones, AlertCircle, Layers, Loader2, VolumeX, Radio, RefreshCw } from 'lucide-react';\nimport { ReverbType, TrackProject } from '../../services/StudioService';\nimport { Song } from '../../types';\nimport { TRACK_PRESETS, TrackPreset, REVERB_LABELS, REVERB_TYPES, formatTime, SectionMarker, SECTION_COLORS } from './studio.types';\nimport VUMeter from './VUMeter';\nimport { AudioDevice, AutoSelectReason } from './useStudioRecorder';\nimport { studioOfflineDB } from '../../services/StudioOfflineDB';\n\ninterface Props {\n  selected: Song; project: TrackProject | null; currentPreset: TrackPreset; reverb: ReverbType;\n  isRecording: boolean; isSaving: boolean; duration: number; analyser: AnalyserNode | null;\n  vuLevel: number; monitoring: boolean; permError: boolean; httpsUrl: string;\n  instUrl: string | null; instLoading: boolean; instCached: boolean;\n  vocalGuideUrl: string | null; vocalLoading: boolean; vocalCached: boolean;\n  vocalGuideVol: number; showLyrics: boolean;\n  instRef: React.RefObject<HTMLAudioElement>; vocalGuideRef: React.RefObject<HTMLAudioElement>;\n  getInstPlaybackTime: () => number;\n  onBack: () => void; onGoMixer: () => void; onPresetChange: (preset: TrackPreset) => void;\n  onRefreshSong: () => void;\n  onReverbChange: (r: ReverbType) => void; onStartRecording: () => void; onStopRecording: () => void;\n  t { time: number; text: string }> = [];\n  for (const line of raw.split('\\\n')) {\n    const m = line.match(/^\\[(\\d+):(\\d+(?:[.:]?\\d+)?)\\]\\s*(.*)/);\n    if (!m) continue;\n    const mins = parseInt(m[1], 10); const secs = parseFloat(m[2]); const text = m[3].trim();\n    if (text) lines.push({ time: mins * 60 + secs, text });\n  }\n  return lines.sort((a, b) => a.time - b.time);\n}\n\n// Raccourcit le label d'un device pour l'affichage dans un bouton compact\nfunction shortLabel(label: string, category: string): string {\n  if (/external microphone/i.test(label)) return 'Micro ext.';\n  if (/built.?in microphone|iphone microphone|microphone intégré/i.test(label)) return 'Micro int.';\n  if (/headset microphone/i.test(label)) return 'Casque';\n  if (/usb audio codec/i.test(label)) return 'USB Audio';\n  if (/v8/i.test(label)) return 'V8';\n  if (/airpods/i.test(label)) return 'AirPods';\n  if (category === 'bluetooth') return label.replace(/microphone|mic|audio/gi, '').trim().slice(0, 14) || 'BT';\n  if (category === 'external') return label.slice(0, 14);\n  return label.replace(/microphone|mic/gi, '').trim().slice(0, 12) || label.slice(0, 10);\n}\n\n// Couleur et icône selon la catégorie + raison auto\nfunction deviceStyle(dev: AudioDevice, isSelected: boolean, isAuto: boolean, autoReason: AutoSelectReason, presetColor: string) {\n  if (dev.category === 'bluetooth') {\n    return {\n      bg:     isSelected ? '#7c3aed20' : '#1a1a1a',\n      border: isSelected ? '#7c3aed' : '#2a2a2a',\n      color:  isSelected ? '#a78bfa' : '#52525b',\n      icon:   '🎧',\n    };\n  }\n  if (dev.category === 'external') {\n    return {\n      bg:     isSelected ? '#16a34a20' : '#1a1a1a',\n      border: isSelected ? '#16a34a' : '#2a2a2a',\n      color:  isSelected ? '#4ade80' : '#52525b',\n      icon:   '🎙',\n    };\n  }\n  if (dev.category === 'builtin') {\n    const isHfpProtect = isAuto && autoReason === 'builtin_hfp';\n    return {\n      bg:     isSelected ? (isHfpProtect ? ' .id;\n    console.warn('[LRC DEBUG]', selected.title, 'type:', typeof rawLrc, 'isArray:', Array.isArray(rawLrc),\n      'first:', JSON.stringify(Array.isArray(rawLrc) ? rawLrc[0] : String(rawLrc).slice(0,80)));\n    if ((window as any).__addLog) (window as any).__addLog(`[LRC] type=${typeof rawLrc} isArr=${Array.isArray(rawLrc)} first=${JSON.stringify(Array.isArray(rawLrc) ? rawLrc[0] : String(rawLrc).slice(0,60))}`);\n  }\n  const lrcLines: { time: number; text: string }[] = (() => {\n    if (Array.isArray(rawLrc)) {\n      if (rawLrc.length === 0) return [];\n      // Array d'objets {time, text} — format correct\n      if (typeof rawLrc[0] === 'object' && rawLrc[0] !== null && 'text' in rawLrc[0]) {\n        // Fusionner les lignes consécutives dont le gap est < 3.5s (phrases coupées en deux)\n        const raw = rawLrc as { time: number; text: string }[];\n        const merged: { time: number; text: string }[] = [];\n        for (let i = 0; i < raw.length; i++) {\n          const cur = raw[i];\n          const next = raw[i + 1];\n          // Fusion si : gap < 3.5s ET (ligne suivante courte sans majuscule = fragment OCR coupé)\n          const isOcrFragment = next && next.text.trim().length <= 15 && !next.text.trim().match(/^[A-ZÀ-Ö«»\\u2014\\u2013\\-]/);\n          const isShortContinuation = next && (next.time - cur.time) < 3.5 && cur.text.length < 40 && !cur.text.match(/[.!?…]$/);\n          if (next && (isOcrFragment || isShortContinuation)) {\n            merged.push({ time: cur.time, text: cur.text + (isOcrFragment ? '' : ' ') + next.text.trim() });\n            i++; // sauter la ligne suivante déjà fusionnée\n          } else {\n            merged.push(cur);\n          }\n        }\n        return merged;\n      }\n      // Array de strings — traiter chaque string comme une ligne\n      if (typeof rawLrc[0] === 'string') {\n        return (rawLrc as string[]).filter(s => s.trim()).map((text, i) => ({ time: i * 3, text: text.trim() }));\n      }\n      return [];\n    }\n    if (typeof rawLrc === 'string' && rawLrc.includes('[')) {\n      // Format LRC: [mm:ss.xx]texte\n      return rawLrc.split('\\n').reduce((acc: { time: number; text: string }[], line: string) => {\n        const m = line.match(/\\[(\\d+):(\\d+(?:\\.\\d+)?)\\](.*)/);\n        if (m) acc.push({ time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() });\n        return acc;\n      }, []);\n    }\n    if (typeof rawLrc === 'string' && rawLrc.length > 0) {\n      return rawLrc.split('\\n').filter(l => l.trim()).map((text, i) => ({ time: i * 3, text: text.trim() }));\n    }\n    return [];\n  })();\n  const staticLines = selected.lyricsWithChords ? parseLyricsWithChords(selected.lyricsWithChords) : [];\n  const hasLrc = lrcLines.length > 0;\n\n  useEffect(() => {\n    if (!hasLrc) return;\n    const iv = setInterval(() => {\n      const t = getInstPlaybackTime();\n      if (t <= 0) return;\n      let idx = 0;\n      for (let i = 0; i < lrcLines.length; i++) { if (lrcLines[i].time <= t) idx = i; else break; }\n      setLrcIndex(idx);\n    }, 150);\n    return () => clearInterval(iv);\n  }, [hasLrc, lrcLines, getInstPlaybackTime]);\n\n  useEffect(() => {\n    if (!lyricsScrollRef.current) return;\n    const active = lyricsScrollRef.current.querySelector('[data-active=\"true\"]') as HTMLElement;\n    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });\n  }, [lrcIndex]);\n\n  const trackCount = project?.tracks.length || 0;\n\n  // Analyser l'état actuel des devices pour les avertissements\n  const hasExternalMic = audioDevices.some(d => d.category === 'external');\n  const hasBluetooth   = audioDevices.some(d => d.category === 'bluetooth');\n  const selectedDev    = audioDevices.find(d => d.deviceId === selectedDevice);\n  const selectedIsBT   = selectedDev?.category === 'bluetooth';\n\n  // Badge statut auto-sélection\n  function renderAutoStatusBadge() {\n    if (isRecording) {\n      const color = autoSelectReason === 'external' ? '#4ade80'\n        : autoSelectReason === 'builtin_hfp' ? '#fbbf24'\n        : '#a1a1aa';\n      const icon = autoSelectReason === 'external' ? '🎙'\n        : autoSelectReason === 'builtin_hfp' ? '🛡'\n        : '📱';\n      return (\n        <div className=\"mx-4 mb-2 rounded-xl px-3 py-2 flex items-center gap-2\" style={{ background: color + '15', border: `1px solid ${color}50` }}>\n          <span style={{ fontSize: 11 }}>{icon}</span>\n          <span className=\"text-[9px] font-black uppercase tracking-wider\" style={{ color }}>{activeDeviceLabel}</span>\n          {autoSelectReason === 'builtin_hfp' && <span className=\"text-[8px] font-black ml-auto\" style={{ color: '#fbbf24' }}>A2DP ✓</span>}\n          {autoSelectReason === 'external' && <span className=\"text-[8px] font-black ml-auto\" style={{ color: '#4ade80' }}>HD ✓</span>}\n        </div>\n      );\n    }\n    return null;\n  }\n\n  return (\n    <div className=\"min-h-screen flex flex-col\" style={{ background: '#0a0a0a' }}>\n      {/* Header */}\n      <div className=\"shrink-0 flex items-center gap-3 px-4 pt-5 pb-3\" style={{ borderBottom: '1px solid #1a1a1a' }}>\n        <button onClick={onBack} className=\"w-9 h-9 rounded-xl flex items-center justify-center active:scale-90\" style={{ background: '#1a1a1a' }}>\n          <ChevronLeft size={18} className=\"text-zinc-400\" />\n        </button>\n        <div className=\"flex-1 min-w-0\">\n          <p className=\"font-bebas text-lg text-white tracking-widest leading-none truncate\">{selected.title}</p>\n          <p className=\"text-[9px] text-zinc-600 font-black uppercase truncate\">{selected.artist}</p>\n        </div>\n        <div className=\"shrink-0 px-3 py-1.5 rounded-xl\" style={{ background: isRecording ? '#dc262620' : '#1a1a1a', border: `1px solid ${isRecording ? '#dc2626' : '#2a2a2a'}` }}>\n          <p className=\"font-bebas text-2xl tracking-widest tabular-nums leading-none\" style={{ color: isRecording ? '#ef4444' : '#71717a' }}> ide ? '#16a34a30' : '#141414',\n                          border: `1.5px solid ${isGuide ? '#16a34a' : '#333'}`,\n                          color: isGuide ? '#4ade80' : '#71717a',\n                        }}>\n                        {isGuide ? '🎧' : '▶'} Slot {slot}\n                      </button>\n                    );\n                  })}\n                  {slotGuideActive && !isRecording && (\n                    <button onClick={() => onSlotGuide(null)}\n                      className=\"px-2 py-1.5 rounded-lg font-black text-[10px] uppercase text-zinc-600 border border-zinc-800 active:scale-95 transition-all\">\n                      ✕ Arrêter\n                    </button>\n                  )}\n                  {isRecording && slotGuideActive && (\n                    <span className=\"text-[9px] text-emerald-500 font-black uppercase animate-pulse self-center\">🎧 Guide actif</span>\n                  )}\n                </div>\n              </div>\n            )}\n          </div>\n        )}\n\n        <div className=\"shrink-0 px-4 pt-4 pb-2\">\n          <p className=\"text-[9px] text-zinc-700 font-black uppercase tracking-widest mb-2\">Piste</p>\n          <div className=\"flex gap-2 overflow-x-auto pb-1\" style={{ scrollbarWidth: 'none' }}>\n            {TRACK_PRESETS.map(preset => {\n              const hasTrack = project?.tracks.some(t => t.trackIndex === preset.index);\n              const isActive = currentPreset.index === preset.index;\n              return (\n                <button key={preset.index} onClick={() => !isRecording && !isSaving && onPresetChange(preset)} disabled={isRecording || isSaving}\n                  className=\"shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl transition-all active:scale-95\"\n                  style={{ background: isActive ? preset.color + '20' : '#141414', border: `1px solid ${isActive ? preset.color + '60' : '#222'}`, minWidth: 72 }}>\n                  <span className=\"text-lg leading-none\">{preset.emoji}</span>\n                  <span className=\"text-[9px] font-black whitespace-nowrap\" style={{ color: isActive ? preset.color : '#52525b' }}>\n                    {preset.label.replace('Harmonie ', '+').replace('Voix principale', 'Voix').replace('Double tracking', 'Double').replace('Octave bas', 'Oct↓')}\n                  </span>\n                  {hasTrack && <span className=\"text-[7px] font-black\" style={{ color: '#22c55e' }}>✓</span>}\n                </button>\n              );\n            })}\n          </div>\n        </div>\n\n        {/* Zone principale */}\n        <div className=\"shrink-0 mx-4 rounded-2xl overflow-hidden\" style={{ background: '#111', border: `1px solid ${isRecording ? currentPreset.color + '40' : '#1e1e1e'}` }}>\n\n          {/* ── SÉLECTION MICRO ────────────────────────────────────────────── */}\n          {audioDevices.length > 0 && (\n            <div className=\"px-4 pt-3 pb-3\" style={{ borderBottom: '1px solid #1a1a1a' }}>\n              <div className=\"flex items-center gap-2 mb-2\">\n                <Radio size={9} className=\"text-zinc-600 shrink-0\" />\n                <span className=\"text-[8px] font-black uppercase tracking-widest text-zinc-700\">Micro</span>\n                {/* Avertissement BT sélectionné manuellement */}\n                {selectedIsBT && !isRecording && (\n                  <span className=\"text-[8px] font-black ml-2 px-1.5 py-0.5 rounded\" style={{ background: '#7c3aed20', color: '#c4b5fd' }}>\n                    ⚠️ BT → son téléphonie possible\n                  </span>\n                )}\n                <button onClick={onRefreshDevices} disabled={isRecording}\n                  className=\"shrink-0 w-5 h-5 flex items-center justify-center rounded-lg active:scale-90 disabled:opacity-30 ml-auto\"\n                  style={{ background: '#1a1a1a' }}>\n                  <RefreshCw size={8} className=\"text-zinc-600\" />\n                </button>\n              </div>\n\n              <div className=\"flex gap-1.5 overflow-x-auto pb-0.5\" style={{ scrollbarWidth: 'none' }}>\n                {/* Bouton Auto */}\n                <button\n                  onClick={() => !isRecording && onSelectDevice(null)}\n                  disabled={isRecording}\n                  className=\"shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded-xl transition-all active:scale-90 disabled:opacity-40\"\n                  style={{\n                    background: selectedDevice === null ? '#3b82f620' : '#141414',\n                    border: `1px solid ${selectedDevice === null ? '#3b82f6' : '#222'}`,\n                    minWidth: 52,\n                  }}>\n                  <span className=\"text-[9px]\">⚡</span>\n                  <span className=\"text-[8px] font-black uppercase\" style={{ color: selectedDevice === null ? '#60a5fa' : '#52525b' }}>Auto</span>\n                  {selectedDevice === null && (\n                    <span className=\"text-[6px] font-black\" style={{ color: '#3b82f6aa' }}>\n                      {autoSelectReason === 'external' ? 'EXT' : autoSelectReason === 'builtin_hfp' ? 'HFP🛡' : 'DEF'}\n                    </span>\n                  )}\n                </button>\n\n                {/* Devices disponibles */}\n                {audioDevices.map(dev => {\n                  const isSelected = selectedDevice === dev.deviceId;\n                  const isAutoSelected = selectedDevice === null; // En mode auto, aucun bouton device n'est \"actif\"\n                  const style = deviceStyle(dev, isSelected, isAutoSelected, autoSelectReason, currentPreset.color);\n                  const label = shortLabel(dev.label, dev.category);\n                  return (\n                    <button\n                      key={dev.deviceId}\n                      onClick={() => !isRecording && onSelectDevice(dev.deviceId)}\n                      disabled={isRecording}\n                      className=\"shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded-xl transition-all active:scale-90 disabled:opacity-40\"\n                      style={{ background: style.bg, border: `1px solid ${style.border}`, minWidth: 52 }}\n                      title={dev.label}>\n                      <span className=\"text-[9px]\">{style.icon}</span>\n                      <span className=\"text-[8px] font-black uppercase text-center leading-tight max-w-[60px] truncate\" style={{ color: style.color }}>\n                        {label}\n                      </span>\n                      {dev.category === 'bluetooth' && (\n                        <span className=\"text-[6px] font-black\" style={{ color: '#7c3aed80' }}>BT</span>\n                      )}\n                      {dev.category === 'external' && (\n                        <span className=\"text-[6px] font-black\" style={{ color: '#16a34a' }}>EXT</span>\n                      )}\n                    </button>\n                  );\n                })}\n              </div>\n\n              {/* Résumé du setup détecté — affiché seulement avant l'enregistrement */}\n              {!isRecording && !isSaving && (\n                <div className=\"mt-2 flex items-center gap-1.5 flex-wrap\">\n                  {hasExternalMic && (\n                    <span className=\"text-[8px] font-black px-2 py-0.5 rounded-full\" style={{ background: '#16a34a20', color: '#4ade80', border: '1px solid #16a34a40' }}>\n                      🎙 Externe détecté — qualité HD\n                    </span>\n                  )}\n                  {hasBluetooth && !hasExternalMic && selectedDevice === null && (\n                    <span className=\"text-[8px] font-black px-2 py-0.5 rounded-full\" style={{ background: '#92400e20', color: '#fbbf24', border: '1px solid #92400e40' }}>\n                      🎧 BT → Micro iPhone auto (A2DP protégé)\n                    </span>\n                  )}\n                  {hasBluetooth && !hasExternalMic && selectedIsBT && (\n                    <span className=\"text-[8px] font-black px-2 py-0.5 rounded-full\" style={{ background: '#7c3aed20', color: '#c4b5fd', border: '1px solid #7c3aed40' }}>\n                      ⚠️ Micro BT actif — qualité peut être réduite (HFP)\n                    </span>\n                  )}\n                  {!hasBluetooth && !hasExternalMic && (\n                    <span className=\"text-[8px] font-black px-2 py-0.5 rounded-full\" style={{ background: '#1a1a1a', color: '#52525b', border: '1px solid #222' }}>\n                      📱 Micro iPhone\n                    </span>\n                  )}\n                </div>\n              )}\n            </div>\n          )}\n\n          {/* VU Meter */}\n          <div className=\"px-4 pt-4 pb-2\">\n            <div className=\"flex items-center justify-between mb-2\">\n              <p className=\"text-[9px] text-zinc-700 font-black uppercase tracking-widest\">Niveau</p>\n              {isRecording && <div className=\"flex items-center gap-1.5\"><div className=\"w-2 h-2 rounded-full bg-red-500 animate-pulse\" /><span className=\"text-[9px] font-black text-red-400 uppercase tracking-widest\">REC</span></div>}\n            </div>\n            <VUMeter analyser={analyser} vuLevel={vuLevel} active={isRecording} />\n          </div>\n\n          {/* Stems — badges et bouton Écouter basés sur IndexedDB (instCached/vocalCached),\n               PAS sur instUrl/vocalGuideUrl qui peuvent être null si Mac hors ligne */}\n          <div className=\"flex gap-2 px-4 pb-3 flex-wrap items-center\">\n            {instLoading\n              ? <div className=\"flex items-center gap-1.5 px-2 py-1 rounded-lg\" style={{ background: '#1a1a1a' }}><Loader2 size={9} className=\"text-zinc-600 animate-spin\" /><span className=\"text-[9px] text-zinc-600 font-black\">Instrum...</span></div>\n              : instCached\n                ? <div className=\"flex items-center gap-1.5 px-2 py-1 rounded-lg\" style={{ background: '#1e3a5f', border: '1px solid #1d4ed880' }}>\n                    <Headphones size={9} className=\"text-blue-400\" />\n                    <span className=\"text-[9px] font-black uppercase text-blue-400\">INSTRUM 📦</span>\n                  </div>\n                : instUrl\n                  ? <div className=\"flex items-center gap-1.5 px-2 py-1 rounded-lg\" style={{ background: '#2a1f00', border: '1px solid #92400e80' }}>\n                      <Headphones size={9} className=\"text-amber-500\" />\n                      <span className=\"text-[9px] font-black uppercase text-amber-500\">INSTRUM 🌐</span>\n                    </div>\n                  : <button onClick={onRefreshSong} disabled={isRecording}\n                      className=\"flex items-center gap-1.5 px-2 py-1 rounded-lg active:scale-95\"\n                      style={{ background: '#2a1a00', border: '1px solid #92400e80' }}>\n                      <RefreshCw size={9} className=\"text-amber-500\" />\n                      <span className=\"text-[9px] font-black uppercase text-amber-500\">↺ Recharger stems</span>\n                    </button>\n            }\n            {vocalLoading\n              ? <div className=\"flex items-center gap-1.5 px-2 py-1 rounded-lg\" style={{ background: '#1a1a1a' }}><Loader2 size={9} className=\"text-zinc-600 animate-spin\" /><span className=\"text-[9px] text-zinc-600 font-black\">Guide...</span></div>\n              : vocalCached\n                ? <div className=\"flex items-center gap-1.5 px-2 py-1 rounded-lg\" style={{ background: '#1e3a1e', border: '1px solid #16a34a80' }}>\n                    <Mic size={9} className=\"text-emerald-400\" />\n                    <span className=\"text-[9px] font-black uppercase text-emerald-400\">GUIDE 📦</span>\n                  </div>\n                : vocalGuideUrl\n                  ? <div className=\"flex items-center gap-1.5 px-2 py-1 rounded-lg\" style={{ background: '#2a1f00', border: '1px solid #92400e80' }}>\n                      <Mic size={9} className=\"text-amber-500\" />\n                      <span className=\"text-[9px] font-black uppercase text-amber-500\">GUIDE 🌐</span>\n                    </div>\n                  : null\n            }\n            {/* Bouton Écouter — visible pendant le chargement ET quand stems dispo.\n                 JAMAIS conditionnel sur instCached/instUrl seuls — pendant instLoading\n                 ces états sont false/null mais les stems arrivent dans quelques ms. */}\n            {(() => {\n              const anyCached  = instCached || vocalCached;\n              const anyUrl     = instUrl || vocalGuideUrl;\n              const isLoading  = instLoading || vocalLoading;\n              const hasStems   = anyCached || anyUrl;\n              const disabled   = isRecording || isSaving || (isLoading && !hasStems);\n              if (!hasStems && !isLoading) return null; // vraiment rien → cacher\n              return (\n                <button\n                  onClick={disabled ? undefined : onPreviewStems}\n                  disabled={disabled}\n                  className=\"ml-auto flex items-center gap-1.5 px-3 py-1 rounded-lg transition-all\"\n                  style={{\n                    opacity: disabled ? 0.4 : 1,\n                    background: isPreviewing ? '#7c3aed20' : anyCached ? '#0f2a0f' : isLoading ? '#1a1a1a' : '#2a1800',\n                    border: `1px solid ${isPreviewing ? '#7c3aed80' : anyCached ? '#16a34a60' : isLoading ? '#2a2a2a' : '#d9770660'}`,\n                  }}>\n                  {isLoading && !hasStems\n                    ? <Loader2 size={9} className=\"text-zinc-500 animate-spin\" />\n                    : isPreviewing\n                      ? <Square size={9} fill=\"currentColor\" className=\"text-violet-400\" />\n                      : <Headphones size={9} className={anyCached ? 'text-emerald-400' : 'text-amber-500'} />\n                  }\n                  <span className=\"text-[9px] font-black uppercase\" style={{\n                    color: isLoading && !hasStems ? '#52525b' : isPreviewing ? '#a78bfa' : anyCached ? '#4ade80' : '#f59e0b'\n                  }}>\n                    {isLoading && !hasStems ? 'Chargement...' : isPreviewing ? 'Stop' : anyCached ? 'Écouter 📦' : 'Écouter 🌐'}\n                  </span>\n                </button>\n              );\n            })()}\n          </div>\n\n          {/* Sections punch */}\n          {sections.length > 0 && !isRecording && (\n            <div className=\"px-4 pb-2\" style={{ borderTop: '1px solid #1a1a1a', paddingTop: 10 }}>\n              <div className=\"flex items-center gap-1.5 mb-2\"><span className=\"text-[8px] font-black text-zinc-600 uppercase tracking-widest\">Section →</span></div>\n              <div className=\"flex gap-1.5 flex-wrap\">\n                {[...sections].sort((a, b) => a.startSec - b.startSec).map(sec => {\n                  const color = SECTION_COLORS[sec.label as keyof typeof SECTION_COLORS] ?? '#71717a';\n                  const isActive = punchIn === sec.startSec && punchOut === sec.endSec;\n                  return (\n                    <button key={sec.id} onClick={() => { if (isActive) { onSetPunchIn(null); onSetPunchOut(null); } else { onSetPunchIn(sec.startSec); onSetPunchOut(sec.endSec); } }}\n                      className=\"flex flex-col items-start px-2.5 py-1.5 rounded-xl active:scale-90 transition-all\" style={{ background: isActive ? color + '25' : '#111', border: `1px solid ${isActive ? color + '80' : '#222'}`, minWidth: 60 }}>\n                      <span className=\"text-[9px] font-black uppercase\" style={{ color: isActive ? color : '#52525b' }}>{sec.label}</span>\n                      <span className=\"text-[7px] tabular-nums\" style={{ color: isActive ? color + 'cc' : '#3f3f46' }}>{formatTime(sec.startSec)}→{formatTime(sec.endSec)}</span>\n                    </button>\n                  );\n                })}\n              </div>\n            </div>\n          )}\n\n          {/* Punch In/Out — visible dès que les stems sont en IndexedDB ou via réseau */}\n          {(instCached || vocalCached || instUrl || vocalGuideUrl) && !isRecording && (\n            <div className=\"px-4 pb-3 flex items-center gap-2\" style={{ borderTop: '1px solid #1a1a1a', paddingTop: 10 }}>\n              <span className=\"text-[9px] text-zinc-600 font-black uppercase shrink-0\">Punch</span>\n              <div className=\"flex items-center gap-1 flex-1\">\n                <span className=\"text-[8px] text-zinc-700 font-black uppercase w-4\">IN</span>\n                <input type=\"range\" min=\"0\" max={stemDuration > 0 ? stemDuration : 300} step=\"1\" value={punchIn ?? 0}\n                  onChange={e => { const v = parseFloat(e.target.value); onSetPunchIn(v === 0 ? null : v); }} disabled={isRecording}\n                  className=\"flex-1 h-1 rounded-full appearance-none cursor-pointer\"\n                  style={{ accentColor: '#f97316', background: `linear-gradient(to right, #f97316 ${stemDuration > 0 ? ((punchIn ?? 0) / stemDuration) * 100 : 0}%, #1e1e1e ${stemDuration > 0 ? ((punchIn ?? 0) / stemDuration) * 100 : 0}%)` }} />\n                <span className=\"text-[8px] font-black w-7 text-right\" style={{ color: punchIn ? '#f97316' : '#3f3f46' }}>{punchIn ? formatTime(punchIn) : '--'}</span>\n              </div>\n              <span className=\"text-zinc-800 text-[10px]\">→</span>\n              <div className=\"flex items-center gap-1 flex-1\">\n                <span className=\"text-[8px] text-zinc-700 font-black uppercase w-5\">OUT</span>\n                <input type=\"range\" min=\"0\" max={stemDuration > 0 ? stemDuration : 300} step=\"1\" value={punchOut ?? (stemDuration || 300)}\n                  onChange={e => { const v = parseFloat(e.target.value); onSetPunchOut(v >= (stemDuration || 300) ? null : v); }} disabled={isRecording}\n                  className=\"flex-1 h-1 rounded-full appearance-none cursor-pointer\"\n                  style={{ accentColor: '#ef4444', background: `linear-gradient(to right, #1e1e1e ${stemDuration > 0 ? ((punchOut ?? stemDuration) / stemDuration) * 100 : 100}%, #ef4444 ${stemDuration > 0 ? ((punchOut ?? stemDuration) / stemDuration) * 100 : 100}%)` }} />\n                <span className=\"text-[8px] font-black w-7 text-right\" style={{ color: punchOut ? '#ef4444' : '#3f3f46' }}>{punchOut ? formatTime(punchOut) : '--'}</span>\n              </div>\n              {(punchIn || punchOut) && <button onClick={() => { onSetPunchIn(null); onSetPunchOut(null); }} className=\"text-[8px] font-black text-zinc-700 active:text-zinc-400 px-1\">✕</button>}\n            </div>\n          )}\n\n          {/* Volume guide vocal */}\n          {vocalGuideUrl && (\n            <div className=\"px-4 pb-3 flex items-center gap-3\" style={{ borderTop: '1px solid #1e1e1e', paddingTop: 10 }}>\n              <Mic size={12} className=\"text-emerald-400 shrink-0\" />\n              <span className=\"text-[9px] text-zinc-600 font-black uppercase w-10 shrink-0\">Guide</span>\n              <input type=\"range\" min=\"0\" max=\"1\" step=\"0.05\" value={localVol}\n                onChange={e => handleVolChange(parseFloat(e.target.value))}\n                className=\"flex-1 h-1 rounded-full appearance-none cursor-pointer\"\n                style={{ accentColor: '#22c55e', background: `linear-gradient(to right, #22c55e ${localVol * 100}%, #27272a ${localVol * 100}%)` }} />\n              <span className=\"text-[10px] font-black text-emerald-400 w-8 text-right shrink-0\">{Math.round(localVol * 100)}%</span>\n              {localVol === 0 && <VolumeX size={11} className=\"text-zinc-700 shrink-0\" />}\n            </div>\n          )}\n        </div>\n\n        {/* Boutons actions */}\n        <div className=\"shrink-0 px-4 py-4\">\n          {/* Reverb (post-prod uniquement, masqué pendant REC) */}\n          {!isRecording && !isSaving && (\n            <div className=\"flex items-center gap-2 mb-4\">\n              <span className=\"text-[9px] text-zinc-700 font-black uppercase w-16 shrink-0\">Reverb (post)</span>\n              <div className=\"flex gap-1.5 flex-1\">\n                {REVERB_TYPES.map(r => (\n                  <button key={r} onClick={() => onReverbChange(r)} disabled={isRecording || isSaving}\n                    className=\"flex-1 py-1.5 rounded-lg font-black text-[9px] uppercase tracking-wider transition-all\"\n                    style={{ background: reverb === r ? currentPreset.color : '#141414', color: reverb === r ? '#fff' : '#52525b', border: `1px solid ${reverb === r ? currentPreset.color + '80' : '#222'}` }}>\n                    {REVERB_LABELS[r]}\n                  </button>\n                ))}\n              </div>\n            </div>\n          )}\n\n          {/* Boutons Monitoring + REC */}\n          <div className=\"flex items-center justify-center gap-6\">\n            <button onClick={onToggleMonitor} className=\"flex flex-col items-center gap-1.5 active:scale-90 transition-all\">\n              <div className=\"w-12 h-12 rounded-2xl flex items-center justify-center\" style={{ background: monitoring ? '#1e3a5f' : '#141414', border: `1px solid ${monitoring ? '#3b82f6' : '#222'}` }}>\n                <Headphones size={20} style={{ color: monitoring ? '#3b82f6' : '#52525b' }} />\n              </div>\n              <span className=\"text-[8px] font-black uppercase tracking-wider\" style={{ color: monitoring ? '#3b82f6' : '#3f3f46' }}>{monitoring ? 'Écoute ON' : 'Écoute'}</span>\n            </button>\n\n            {isSaving\n              ? <div className=\"w-24 h-24 rounded-full flex flex-col items-center justify-center gap-1\" style={{ background: '#141414', border: '2px solid #27272a' }}>\n                  <Loader2 size={24} className=\"text-zinc-500 animate-spin\" />\n                  <span className=\"text-[8px] font-black text-zinc-600 uppercase\">Sauvegarde</span>\n                </div>\n              : isRecording\n              ? <button onClick={onStopRecording} className=\"w-24 h-24 rounded-full flex items-center justify-center active:scale-90 transition-all\" style={{ background: '#fff', boxShadow: '0 0 40px rgba(255,255,255,0.15)' }}>\n                  <Square size={32} className=\"text-black\" fill=\"currentColor\" />\n                </button>\n              : <button onClick={async () => { await onPreWarmMic(); onStartRecording(); }} className=\"w-24 h-24 rounded-full flex items-center justify-center active:scale-90 transition-all\" style={{ background: currentPreset.color, boxShadow: `0 0 30px ${currentPreset.color}50` }}>\n                  <Mic size={36} className=\"text-white\" />\n                </button>\n            }\n\n            <div className=\"w-12 h-12 flex flex-col items-center gap-1.5 justify-center\">\n              {isRecording && <><div className=\"w-2 h-2 rounded-full bg-red-500 animate-pulse\" /><span className=\"text-[8px] font-black text-red-400 uppercase tabular-nums\">{formatTime(duration)}</span></>}\n            </div>\n          </div>\n\n          <p className=\"text-center text-[10px] font-black uppercase tracking-widest mt-3\" style={{ color: isRecording ? currentPreset.color : '#3f3f46' }}>\n            {isSaving ? '⏳ Traitement...' : isRecording ? `● ${currentPreset.emoji} ${currentPreset.label}` : `${currentPreset.emoji} ${currentPreset.label}`}\n          </p>\n        </div>\n\n        {/* Paroles */}\n        {(hasLrc || staticLines.length > 0) && showLyrics && (\n          <div className=\"flex flex-col overflow-hidden mx-4 mb-4 rounded-2xl\" style={{ background: '#080808', border: '1px solid #222', height: 260, flexShrink: 0 }}>\n            <div className=\"shrink-0 flex items-center justify-between px-4 py-2.5\" style={{ borderBottom: '1px solid #1e1e1e' }}>\n              <div className=\"flex items-center gap-2\">\n                <span className=\"text-[9px] text-zinc-600 font-black uppercase tracking-widest\">Paroles</span>\n                {serverLrcLoading && <span className=\"text-[8px] text-zinc-600 font-black uppercase animate-pulse\">● chargement...</span>}\n                {hasLrc && !serverLrcLoading && <span className=\"text-[8px] font-black uppercase\" style={{ color: '#16a34a' }}>● {selected.lrcData ? 'Sync' : serverLrc ? 'LRC' : 'Gemini'}</span>}\n              </div>\n              <button onClick={onToggleLyrics} className=\"px-3 py-1 rounded-lg text-[9px] font-black uppercase active:scale-90\" style={{ background: '#1a1a1a', color: '#52525b' }}>Masquer</button>\n            </div>\n            <div ref={lyricsScrollRef} className=\"overflow-y-auto px-5 py-4\" style={{ WebkitOverflowScrolling: 'touch', flex: 1, minHeight: 0 }}>\n              {hasLrc\n                ? <div className=\"space-y-3\">{lrcLines.map((line, i) => {\n                    const isActive = i === lrcIndex; const isPast = i < lrcIndex; const isNext = i === lrcIndex + 1; const isAfterNext = i === lrcIndex + 2;\n                    if (isPast || (!isActive && !isNext && !isAfterNext)) return null;\n                    return (\n                      <p key={i} data-active={isActive ? 'true' : 'false'} className=\"transition-all duration-300 leading-snug\"\n                        style={{ fontSize: isActive ? 26 : isNext ? 20 : 14, fontWeight: isActive ? 900 : isNext ? 700 : 400, color: isActive ? '#ffffff' : isNext ? '#d4d4d8' : '#52525b', textShadow: isActive ? '0 0 28px rgba(255,255,255,0.3)' : 'none', transform: isActive ? 'translateX(6px)' : 'none', marginBottom: isActive ? 16 : isNext ? 12 : 6 }}>\n                        {line.text}\n                      </p>\n                    );\n                  })}</div>\n                : <div className=\"space-y-2\">{staticLines.map((line, i) => (\n                    <p key={i} className=\"leading-relaxed\"\n                      style={{ fontSize: line.isSection ? 11 : 19, fontWeight: line.isSection ? 900 : 600, color: line.isSection ? '#ef4444' : '#e4e4e7', textTransform: line.isSection ? 'uppercase' : 'none', letterSpacing: line.isSection ? '0.2em' : 'normal', marginTop: line.isSection ? 20 : 0, opacity: line.isSection ? 0.8 : 1 }}>\n                      {line.text}\n                    </p>\n                  ))}</div>\n              }\n              <div style={{ height: 40 }} />\n            </div>\n          </div>\n        )}\n        {(hasLrc || staticLines.length > 0) && !showLyrics && (\n          <button onClick={onToggleLyrics} className=\"shrink-0 mx-4 mb-4 py-3 rounded-xl text-[11px] font-black uppercase tracking-widest active:scale-95 transition-all\" style={{ background: '#141414', border: '1px solid #333', color: '#a1a1aa' }}>\n            🎵 Afficher les paroles\n          </button>\n        )}\n      </div>\n    </div>\n  );\n}\n",
  "components/StudioMobile/VUMeter.tsx": "/**\n * VUMeter.tsx — VU-mètre réel via AnalyserNode\n * Alimenté par MediaStreamSource → AnalyserNode (jamais connecté à destination).\n * Le basculement AVAudioSession est déjà absorbé au démarrage — pas de dégradation.\n */\nimport React, { useRef, useEffect } from 'react';\n\ninterface Props {\n  analyser: AnalyserNode | null;\n  active:   boolean;\n  vuLevel?: number; // ignoré — conservé pour compatibilité\n}\n\nexport default function VUMeter({ analyser, active }: Props) {\n  const canvasRef = useRef<HTMLCanvasElement>(null);\n  const rafRef    = useRef<number>(0);\n\n  useEffect(() => {\n    const canvas = canvasRef.current;\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d')!;\n\n    if (!active || !analyser) {\n      ctx.clearRect(0, 0, canvas.width, canvas.height);\n      // Barres éteintes quand inactif\n      const bars = 20;\n      const w    = canvas.width / bars - 1;\n      for (let i = 0; i < bars; i++) {\n        ctx.fillStyle = '#1a1a1a';\n        const h = canvas.height * (0.4 + 0.6 * (i / bars));\n        ctx.fillRect(i * (w + 1), canvas.height - h, w, h);\n      }\n      return;\n    }\n\n    const dataArray = new Uint8Array(analyser.frequencyBinCount);\n\n    const draw = () => {\n      analyser.getByteFrequencyData(dataArray);\n\n      // RMS sur les fréquences vocales (bins 2-30 environ sur 44kHz/fftSize 256)\n      let sum = 0;\n      const end = Math.min(30, dataArray.length);\n      for (let i = 2; i < end; i++) sum += dataArray[i] * dataArray[i];\n      const rms   = Math.sqrt(sum / (end - 2)) / 255;\n      const level = Math.min(1, rms * 2.5);\n\n      ctx.clearRect(0, 0, canvas.width, canvas.height);\n      const bars = 20;\n      const w    = canvas.width / bars - 1;\n\n      for (let i = 0; i < bars; i++) {\n        const threshold = i / bars;\n        const lit       = threshold < level;\n        const isHot     = i > bars * 0.8;\n        const isMid     = i > bars * 0.6;\n        ctx.fillStyle   = lit\n          ? (isHot ? '#ef4444' : isMid ? '#eab308' : '#22c55e')\n          : '#1a1a1a';\n        const h = canvas.height * (0.4 + 0.6 * (i / bars));\n        ctx.fillRect(i * (w + 1), canvas.height - h, w, h);\n      }\n\n      rafRef.current = requestAnimationFrame(draw);\n    };\n\n    draw();\n    return () => cancelAnimationFrame(rafRef.current);\n  }, [active, analyser]);\n\n  return (\n    <canvas\n      ref={canvasRef}\n      width={280}\n      height={60}\n      className=\"w-full rounded-xl\"\n      style={{ background: '#0a0a0a', maxWidth: 320 }}\n    />\n  );\n}\n",
  "components/StudioMobile/MixerScreen.tsx": "/**\n * MixerScreen.tsx — v3 : Mixer visuel complet\n *\n * NOUVEAUTÉS :\n * - Section harmonies refaite : clavier visuel des 5 couches avec relation musicale\n * - Génération individuelle par harmonie (pas juste \"tout régénérer\")\n * - Waveform sur chaque piste générée\n * - Stack visuel des pistes empilées (vue timeline)\n * - Durée totale du projet dans le header\n * - Waveform du mix final après mixage\n * - Indicateur de niveau par piste dans la vue stack\n */\nimport React, { useState, useEffect } from 'react';\nimport {\n  ChevronLeft, Plus, Layers, Scissors, Loader2, CheckCircle2,\n  Send, Pause, Play, Sparkles, Music2, RefreshCw, BarChart2, Download, Shield,\n} from 'lucide-react';\nimport { MobileRecording, TrackProject, Take, studioService } from '../../services/StudioService';\nimport { studioOfflineDB } from '../../services/StudioOfflineDB';\nimport { Song } from '../../types';\nimport { TRACK_PRESETS, formatTime, SectionMarker, SectionLabel, SECTION_LABELS, SECTION_COLORS } from './studio.types';\nimport TrackCard from './TrackCard';\nimport WaveformBar from './WaveformBar';\n\ninterface Props {\n  selected:    Song;\n  project:     TrackProject;\n  playingId:   string | null;\n  isMixing:    boolean;\n  mixProgress: number;\n  mixLabel:    string;\n  mixDone:     boolean;\n  isOnline:    boolean;\n  uploading:   string | null;\n  uploadDone:  string | null;\n  playRef:     React.RefObject<HTMLAudioElement>;\n  onBack:          () => void;\n  onGoSongs:       () => void;\n  onAddTrack:      () => void;\n  onPlay:          (rec: MobileRecording) => void;\n  onMute:          (trackIndex: number, muted: boolean) => void;\n  onSolo:          (trackIndex: number) => void;\n  onVolume:        (trackIndex: number, gain: number) => void;\n  onPan:           (trackIndex: number, pan: number) => void;\n  onDelete:        (trackIndex: number) => void;\n  onMix:           (layerIds: string[]) => void;\n  onPlayMix:       () => void;\n  onMasterize:     (vocalBlob: Blob, instBlob: Blob | null) => void;\n  onUploadMix:     () => void;\n  onGoComp:        (takes: Take[]) => void;\n  onProjectUpdate: (project: TrackProject) => void;\n  instBlob:        Blob | null;\n  takeSlot:        'A' | 'B' | 'C';\n}\n\n// Définition des harmonies avec info musicale\nconst HARMONY_DEFS = [\n  { trackIndex: 1, label: 'Double',    pitch:  0,  color: '#f97316', emoji: '🎵', musicNote: 'Unisson',   desc: 'Épaissit la voix' },\n  { trackIndex: 2, label: '+3',        pitch:  3,  color: '#eab308', emoji: '🎶', musicNote: 'Tierce m.', desc: 'Harmonie douce' },\n  { trackIndex: 3, label: '+7',        pitch:  7,  color: '#22c55e', emoji: '🎼', musicNote: 'Quinte',    desc: 'Harmonie forte' },\n  { trackIndex: 4, label: 'Oct ↓',    pitch: -12, color: '#3b82f6', emoji: '🔉', musicNote: 'Octave -1', desc: 'Voix grave' },\n  { trackIndex: 5, label: '+5',        pitch:  5,  color: '#a855f7', emoji: '✨', musicNote: 'Quarte',    desc: 'Harmonie riche' },\n];\n\nexport default function MixerScreen({\n  selected, project, playingId, isMixing, mixProgress, mixLabel, mixDone, isOnline,\n  uploading, uploadDone, playRef,\n  onBack, onGoSongs, onAddTrack, onPlay, onMute, onSolo, onVolume, onPan,\n  onDelete, onMix, onPlayMix, onMasterize, onUploadMix, onGoComp,\n  onProjectUpdate, instBlob, takeSlot,\n}: Props) {\n  const [generatingIndex, setGeneratingIndex] = useState<number | null>(null);\n  const [backupDone, setBackupDone]           = useState(false);\n  const [autoBackupDone, setAutoBackupDone]   = useState(false);\n  const [showRecovery, setShowRecovery]       = useState(false);\n  const [recoveryItems, setRecoveryItems]     = useState<{key: string; label: string; size: number; date: string}[]>([]);\n  const [recovering, setRecovering]           = useState<string | null>(null);\n  const [exportingVoice, setExportingVoice]   = useState(false);\n  const [layerSlots, setLayerSlots]           = useState<Set<string>>(new Set());\n  const [generateLabel, setGenerateLabel]     = useState('');\n  const [generatePct, setGeneratePct]         = useState(0);\n  const [generatedDone, setGeneratedDone]     = useState<Set<number>>(new Set());\n  const [mixWaveform, setMixWaveform]         = useState<number[]>([]);\n  const [showStack, setShowStack]             = useState(false);\n  const [showSections, setShowSections]       = useState(false);\n  const [sections, setSections]               = useState<SectionMarker[]>(\n    (project as any).sections || []\n  );\n\n  const tracks    = project?.tracks || [];\n  // mainVoice = la voix du slot actif en priorité, sinon premier non-muté\n  // slotVoices = une prise par slot (dédupliqué — garder la plus récente par takeSlot)\n  const slotVoices = React.useMemo(() => {\n    const all = tracks.filter(t => t.trackIndex === 0 && !(t as any).isGenerated);\n    const bySlot = new Map<string, typeof all[0]>();\n    for (const t of all) {\n      const slot = t.takeSlot ?? 'A';\n      const existing = bySlot.get(slot);\n      // Garder la plus récente (recordedAt)\n      if (!existing || (t.recordedAt ?? 0) > (existing.recordedAt ?? 0)) {\n        bySlot.set(slot, t);\n      }\n    }\n    return Array.from(bySlot.values());\n  }, [tracks]);\n  const mainVoice  = slotVoices.find(t => t.takeSlot === takeSlot && t.dataUrl)  // slot actif avec data ← PRIORITÉ\n    ?? slotVoices.find(t => t.takeSlot === takeSlot)                               // slot actif sans data encore\n    ?? slotVoices.find(t => !t.muted && t.dataUrl)                                 // non-muté avec data\n    ?? slotVoices.find(t => t.dataUrl)                                             // premier avec data\n    ?? slotVoices.find(t => !t.muted)                                              // non-muté sans data\n    ?? slotVoices[0];                                                               // premier quoi qu'il arrive\n  const totalDuration = mainVoice?.duration || Math.max(...tracks.map(t => t.duration), 0);\n\n  // Charger la waveform du mix dès qu'il est prêt\n  // mixedDataUrl peut être une blob: URL (URL.createObjectURL) ou une data: URL legacy\n  useEffect(() => {\n    if (!mixDone || !project.mixedDataUrl || mixWaveform.length > 0) return;\n    const url = project.mixedDataUrl;\n    if (url.startsWith('blob:')) {\n      // Blob URL → fetch le blob puis analyser\n      fetch(url)\n        .then(r => r.blob())\n        .then(blob => studioService.blobToDataUrl(blob))\n        .then(dataUrl => studioService.analyzeWaveform(dataUrl, 100))\n        .then(setMixWaveform)\n        .catch(() => {});\n    } else {\n      studioService.analyzeWaveform(url, 100)\n        .then(setMixWaveform)\n        .catch(() => {});\n    }\n  }, [mixDone, project.mixedDataUrl]);\n\n  // Préchargement actif du cache audio — remplace le polling passif qui bloquait après réouverture\n  const [audioCacheReady, setAudioCacheReady] = React.useState(false);\n  const [audioCacheError, setAudioCacheError] = React.useState(false);\n  useEffect(() => {\n    if (!mainVoice) return;\n    // Si déjà en cache (même session), prêt immédiatement\n    const already = !!(window as any).__lastRecDecodedBuf &&\n                    (window as any).__lastRecDecodedId === mainVoice.id;\n    if (already) { setAudioCacheReady(true); return; }\n    // Sinon déclencher le chargement actif depuis OPFS/IDB\n    setAudioCacheReady(false);\n    setAudioCacheError(false);\n    studioService.warmAudioCache(mainVoice).then(ok => {\n      if (ok) setAudioCacheReady(true);\n      else setAudioCacheError(true);\n    });\n  }, [mainVoice?.id]);\n\n\n  const handleTrackUpdate = (updated: MobileRecording) => {\n    const newTracks = project.tracks.map(t =>\n      t.trackIndex === updated.trackIndex ? updated : t\n    );\n    onProjectUpdate({ ...project, tracks: newTracks });\n  };\n\n  const handleGoComp = () => {\n    const takes: Take[] = tracks.map(t => ({ id: t.id, recording: t, regions: t.regions || [] }));\n    onGoComp(takes);\n  };\n\n  // Backup automatique silencieux dans IndexedDB — clé séparée backup_voice_xxx\n  const autoBackupToIndexedDB = async (voice: MobileRecording) => {\n    if (!voice) return;\n    try {\n      // Récupérer le blob source (dataUrl ou IndexedDB)\n      let blob: Blob | null = null;\n      // resolveBlobAsync gère data:, blob:, opfs: et les clés IDB\n      if (voice.dataUrl) {\n        blob = await studioService.resolveBlobAsync(voice.dataUrl);\n      }\n      if (!blob || blob.size < 1000) {\n        blob = await studioOfflineDB.getAudio(`rec_${voice.id}`);\n      }\n      if (!blob || blob.size < 1000) return;\n      // Sauvegarder sous une clé backup_ séparée\n      const backupKey = `backup_voice_${voice.id}`;\n      await studioOfflineDB.saveAudio(backupKey, blob, {\n        type: 'voice_backup',\n        songId: voice.songId,\n        songTitle: voice.songTitle,\n        originalId: voice.id,\n        backedUpAt: Date.now(),\n      });\n      setAutoBackupDone(true);\n      console.log(`[Backup] ✅ Voix sauvegardée automatiquement: ${backupKey} (${(blob.size/1024).toFixed(0)} KB)`);\n    } catch (e) {\n      console.warn('[Backup] Erreur backup automatique:', e);\n    }\n  };\n\n  // Charger tous les backups disponibles dans IndexedDB\n  const loadRecoveryItems = async () => {\n    try {\n      const keys = await studioOfflineDB.listAllAudioKeys();\n      const backupKeys = keys.filter(k => k.startsWith('backup_voice_') || k.startsWith('rec_'));\n      const items = await Promise.all(backupKeys.map(async key => {\n        try {\n          const blob = await studioOfflineDB.getAudio(key);\n          const isBackup = key.startsWith('backup_voice_');\n          const id = key.replace('backup_voice_', '').replace('rec_', '');\n          // Trouver les métadonnées dans le projet\n          const allProjects = studioService.getProjects();\n          const track = allProjects.flatMap(p => p.tracks).find(t => t.id === id);\n          const label = track\n            ? `${isBackup ? '🛡 Backup' : '🎙 Prise'} — ${track.songTitle} (${new Date(track.recordedAt).toLocaleDateString('fr-CA')} ${new Date(track.recordedAt).toLocaleTimeString('fr-CA', {hour:'2-digit',minute:'2-digit'})})`\n            : `${isBackup ? '🛡 Backup' : '🎙 Prise'} — ${id.slice(-8)}`;\n          return { key, label, size: blob?.size || 0, date: track ? new Date(track.recordedAt).toISOString() : '' };\n        } catch { return null; }\n      }));\n      setRecoveryItems(items.filter(Boolean).filter(i => i!.size > 1000).sort((a,b) => b!.date.localeCompare(a!.date)) as any);\n    } catch (e) { console.warn('Recovery load error:', e); }\n  };\n\n  // Restaurer un backup comme nouvelle voix principale\n  const restoreFromBackup = async (key: string) => {\n    setRecovering(key);\n    try {\n      const blob = await studioOfflineDB.getAudio(key);\n      if (!blob || blob.size < 1000) { alert('Backup vide ou corrompu.'); return; }\n      const dataUrl = await studioService.blobToDataUrl(blob);\n      const id = `REC-RESTORED-${Date.now()}`;\n      const rec: MobileRecording = {\n        id, songId: selected.id, songTitle: selected.title,\n        artist: (selected as any).artist || '',\n        duration: 0, recordedAt: Date.now(), dataUrl,\n        transferred: false,\n        fileName: `RESTORED_${selected.title.replace(/\\s+/g,'_')}_${Date.now()}.mp4`,\n        trackIndex: 0, trackLabel: 'Voix principale (restaurée)',\n        takeSlot: 'A', projectId: project.id,\n      };\n      await studioService.saveRecordingLocallyAsync(rec);\n      onProjectUpdate(studioService.addTrackToProject(project.id, rec) || project);\n      setShowRecovery(false);\n      alert('✅ Voix restaurée dans le slot A !');\n    } catch (e: any) { const isQ = e?.message?.toLowerCase().includes('quota'); if (!isQ) alert('Erreur restauration : ' + e.message); }\n    finally { setRecovering(null); }\n  };\n\n  // Backup de la voix principale — export fichier audio directement\n  // (localStorage trop limité pour les blobs audio sur iOS)\n  const backupMainVoice = async () => {\n    if (!mainVoice?.dataUrl) return;\n    try {\n      const res  = await fetch(mainVoice.dataUrl);\n      const blob = await res.blob();\n      const safeTitle = (mainVoice.songTitle || 'voix').replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40);\n      const ext  = blob.type.includes('mp4') ? 'm4a' : blob.type.includes('mpeg') ? 'mp3' : 'wav';\n      const ts   = new Date().toISOString().slice(0,16).replace('T','_').replace(':','h');\n      const fileName = `BACKUP_${safeTitle}_${ts}.${ext}`;\n      const file = new File([blob], fileName, { type: blob.type });\n      if (navigator.share && navigator.canShare?.({ files: [file] })) {\n        await navigator.share({ title: `Backup — ${mainVoice.songTitle}`, files: [file] });\n      } else {\n        const url = URL.createObjectURL(blob);\n        const a = document.createElement('a');\n        a.href = url; a.download = fileName; a.click();\n        setTimeout(() => URL.revokeObjectURL(url), 5000);\n      }\n      setBackupDone(true);\n      setTimeout(() => setBackupDone(false), 4000);\n    } catch (e: any) {\n      if (!e.message?.includes('cancel') && e.name !== 'AbortError') {\n        const isQ = e?.message?.toLowerCase().includes('quota'); if (!isQ) alert('Erreur backup : ' + e.message);\n      }\n    }\n  };\n\n  // Export audio de la voix principale vers iPhone\n  const exportMainVoice = async () => {\n    if (!mainVoice?.dataUrl || exportingVoice) return;\n    setExportingVoice(true);\n    try {\n      const res  = await fetch(mainVoice.dataUrl);\n      const blob = await res.blob();\n      const safeTitle = (mainVoice.songTitle || 'voix').replace(/[^a-zA-Z0-9]/g, '_');\n      const ext  = blob.type.includes('mp4') ? 'm4a' : blob.type.includes('mpeg') ? 'mp3' : 'wav';\n      const fileName = `${safeTitle}_VOIX_PRINCIPALE.${ext}`;\n      const file = new File([blob], fileName, { type: blob.type });\n      if (navigator.share && navigator.canShare?.({ files: [file] })) {\n        await navigator.share({ title: fileName, files: [file] });\n      } else {\n        const url = URL.createObjectURL(blob);\n        const a = document.createElement('a');\n        a.href = url; a.download = fileName; a.click();\n        setTimeout(() => URL.revokeObjectURL(url), 5000);\n      }\n    } catch (e: any) {\n      if (!e.message?.includes('cancel') && !e.message?.toLowerCase().includes('quota')) alert('Erreur export : ' + e.message);\n    } finally { setExportingVoice(false); }\n  };\n\n  // Générer une harmonie individuelle\n  const generateOne = async (harmonyDef: typeof HARMONY_DEFS[0]) => {\n    if (!mainVoice || generatingIndex !== null) return;\n    // Backup automatique silencieux avant génération\n    autoBackupToIndexedDB(mainVoice);\n    setGeneratingIndex(harmonyDef.trackIndex);\n    setGeneratePct(0);\n    setGenerateLabel(`${harmonyDef.emoji} ${harmonyDef.label}...`);\n\n    try {\n      // Passer un projet \"fantôme\" qui ne contient que la couche voulue\n      // generateLayersFromVoice génère toutes les couches définies dans LAYERS_DEF\n      // puis on filtre — mais au moins le FX est appliqué individuellement\n      const generated = await studioService.generateLayersFromVoice(\n        mainVoice,\n        { ...project, tracks: [mainVoice] },\n        (label, pct) => {\n          setGenerateLabel(label);\n          setGeneratePct(pct > 0 ? Math.round(pct) : generatePct); // ignorer pct=-1 (progress Worker)\n        },\n        { realPartition: (selected as any).realPartition, key: (selected as any).key },\n        harmonyDef.trackIndex, // ← générer seulement cette harmonie\n      );\n\n      // Récupérer uniquement la couche demandée\n      const wanted = generated.find(r => r.trackIndex === harmonyDef.trackIndex);\n      if (wanted) {\n        const u = studioService.addTrackToProject(project.id, wanted);\n        if (u) {\n          // Réinjecter la voix principale avec son dataUrl\n          const uFixed = {\n            ...u,\n            tracks: u.tracks.map(t =>\n              t.id === mainVoice.id ? { ...t, dataUrl: mainVoice.dataUrl } : t\n            ),\n          };\n          onProjectUpdate(uFixed);\n        }\n        setGeneratedDone(prev => new Set([...prev, harmonyDef.trackIndex]));\n        setTimeout(() => setGeneratedDone(prev => {\n          const s = new Set(prev); s.delete(harmonyDef.trackIndex); return s;\n        }), 3000);\n      }\n    } catch (e: any) {\n      const isQuota = e?.name === 'QuotaExceededError'\n        || (e?.message && e.message.toLowerCase().includes('quota'));\n      if (isQuota) {\n        console.warn('[Harmonie] Quota dépassé — harmonie conservée en mémoire:', e.message);\n      } else {\n        alert('Erreur génération : ' + e.message);\n      }\n    } finally {\n      setGeneratingIndex(null);\n      setGenerateLabel('');\n      setGeneratePct(0);\n    }\n  };\n\n  // Générer toutes les harmonies\n  const generateAll = async () => {\n    if (!mainVoice || generatingIndex !== null) return;\n    // Backup automatique silencieux avant génération\n    if (mainVoice) autoBackupToIndexedDB(mainVoice);\n    setGeneratingIndex(-1);\n    setGeneratePct(0);\n    let currentProject = { ...project };\n\n    try {\n      const generated = await studioService.generateLayersFromVoice(\n        mainVoice, project,\n        (label, pct) => {\n          setGenerateLabel(label);\n          if (pct >= 0) setGeneratePct(Math.round(pct));\n        },\n        { realPartition: (selected as any).realPartition, key: (selected as any).key },\n      );\n\n      // Ajouter toutes les harmonies au projet et mettre à jour l'UI\n      if (generated.length > 0) {\n        let up = { ...currentProject };\n        for (const rec of generated) {\n          const u = studioService.addTrackToProject(project.id, rec);\n          if (u) up = u;\n        }\n        // Réinjecter dataUrl de la voix principale (addTrackToProject ne stocke pas les dataUrls)\n        up = {\n          ...up,\n          tracks: up.tracks.map(t =>\n            t.id === mainVoice.id ? { ...t, dataUrl: mainVoice.dataUrl } : t\n          ),\n        };\n        onProjectUpdate(up);\n      }\n    } catch (e: any) {\n      const isQuota = e?.name === 'QuotaExceededError'\n        || (e?.message && e.message.toLowerCase().includes('quota'));\n      if (isQuota) {\n        console.warn('[Harmonies] Quota dépassé — harmonies conservées en mémoire:', e.message);\n      } else {\n        alert('Erreur génération : ' + e.message);\n      }\n    } finally {\n      setGeneratingIndex(null);\n      setGenerateLabel('');\n      setGeneratePct(0);\n    }\n  };\n\n  const handleMasterize = async () => {\n    if (!project?.mixedDataUrl) return;\n    const url = project.mixedDataUrl;\n    if (url.startsWith('blob:')) {\n      // blob: URL → récupérer le blob depuis __mixBlob en mémoire\n      const blob = (window as any).__mixBlob as Blob | undefined;\n      if (blob) onMasterize(blob, instBlob);\n      else fetch(url).then(r => r.blob()).then(b => onMasterize(b, instBlob)).catch(() => {});\n    } else {\n      const resolved = await studioService.resolveBlobAsync(url);\n      if (resolved) onMasterize(resolved, instBlob);\n      else console.warn('[Masterize] Blob mix introuvable');\n    }\n  };\n\n  const hasAnyHarmony = HARMONY_DEFS.some(h => tracks.some(t => t.trackIndex === h.trackIndex));\n\n  return (\n    <>\n    {/* ── Overlay mixage plein écran ── */}\n    {isMixing && (\n      <div className=\"fixed inset-0 z-50 bg-[#020202] flex flex-col items-center justify-center gap-6 px-8\">\n        <div className=\"text-5xl\">🎛️</div>\n        <p className=\"text-white font-black text-[18px] uppercase tracking-widest text-center\">\n          Mixage en cours…\n        </p>\n        <p className=\"text-zinc-400 text-[13px] font-black text-center\">\n          {mixLabel || 'Traitement des pistes…'}\n        </p
