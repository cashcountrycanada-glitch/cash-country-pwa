  "components/StudioMobile/studio.types.ts": "/**\n * studio.types.ts — Types, constantes et utilitaires du Studio Mobile v2\n *\n * NOUVEAUTÉS :\n * - FxPreset : preset d'effets par piste (EQ, compresseur, saturation, reverb)\n * - FX_PRESETS : banque de presets inspirés BandLab\n */\nimport { ReverbType } from '../../services/StudioService';\n\nexport type Screen = 'songs' | 'record' | 'mixer' | 'recordings' | 'comp' | 'master';\n\nexport interface TrackPreset {\n  index: number;\n  label: string;\n  pitch: number;\n  pan:   number;\n  gain:  number;\n  color: string;\n  emoji: string;\n}\n\n// ── Preset d\\'effets par piste ────────────────────────────────────────────────\nexport interface FxPreset {\n  id:          string;\n  label:       string;\n  emoji:       string;\n  description: string;\n  color:       string;\n  // EQ 3 bandes\n  lowGain:     number;   // -12..+12 dB  @ 250 Hz\n  midGain:     number;   // -12..+12 dB  @ 2500 Hz\n  highGain:    number;   // -12..+12 dB  @ 8000 Hz\n  // Compresseur\n  compThreshold: number; // -40..0 dB\n  compRatio:     number; // 1..20\n  compAttack:    number; // ms\n  compRelease:   number; // ms\n  compKnee:      number; // 0..40 dB\n  // Saturation douce 0..1\n  saturation:  number;\n  // Reverb\n  reverb:      ReverbType;\n  reverbMix:   number;   // 0..1\n  // Auto-Tune léger (0 = off, 0.3 = transparent, 0.7 = audible, 1.0 = T-Pain)\n  autotune?:   number;\n  autotuneSpeed?: 'slow' | 'medium' | 'fast'; // vitesse de correction\n}\n\n// Banque de presets FX — inspirés des presets BandLab populaires\nexport const FX_PRESETS: FxPreset[] = [\n  {\n    id: 'clean',\n    label: 'Clean',\n    emoji: '🎙',\n    description: 'Signal propre sans traitement',\n    color: '#71717a',\n    lowGain: 0, midGain: 0, highGain: 0,\n    compThreshold: 0, compRatio: 1, compAttack: 10, compRelease: 150, compKnee: 6,\n    saturation: 0, reverb: 'none', reverbMix: 0,\n  },\n  {\n    id: 'studio_vocal',\n    label: 'Studio Vocal',\n    emoji: '🎤',\n    description: 'Voix chaude et présente, compression douce',\n    color: '#ef4444',\n    lowGain: 1.0, midGain: 2.5, highGain: 1.5,\n    compThreshold: -18, compRatio: 3, compAttack: 10, compRelease: 150, compKnee: 8,\n    saturation: 0.05, reverb: 'room', reverbMix: 0.18,\n  },\n  {\n    id: 'country_warm',\n    label: 'Country Warm',\n    emoji: '🤠',\n    description: 'Son country chaleureux, graves riches',\n    color: '#f97316',\n    lowGain: 3.0, midGain: -0.5, highGain: 1.0,\n    compThreshold: -20, compRatio: 3.5, compAttack: 15, compRelease: 200, compKnee: 10,\n    saturation: 0.08, reverb: 'hall', reverbMix: 0.22,\n  },\n  {\n    id: 'punchy',\n    label: 'Punchy',\n    emoji: '💥',\n    description: 'Attaque forte, présence dans le mix',\n    color: '#eab308',\n    lowGain: 0.5, midGain: 3.5, highGain: 2.0,\n    compThreshold: -15, compRatio: 5, compAttack: 3, compRelease: 80, compKnee: 4,\n    saturation: 0.12, reverb: 'room', reverbMix: 0.12,\n  },\n  {\n    id: 'airy',\n    label: 'Airy & Bright',\n    emoji: '✨',\n    description: 'Voix légère et aérienne, aigus brillants',\n    color: '#22c55e',\n    lowGain: -1.0, midGain: 0.5, highGain: 4.0,\n    compThreshold: -20, compRatio: 2.5, compAttack: 20, compRelease: 200, compKnee: 12,\n    saturation: 0.03, reverb: 'plate', reverbMix: 0.25,\n  },\n  {\n    id: 'harmony',\n    label: 'Harmony',\n    emoji: '🎶',\n    description: 'Idéal pour harmonies et layers vocaux',\n    color: '#a855f7',\n    lowGain: -2.0, midGain: 1.0, highGain: 2.5,\n    compThreshold: -22, compRatio: 4, compAttack: 8, compRelease: 120, compKnee: 8,\n    saturation: 0.04, reverb: 'hall', reverbMix: 0.30,\n  },\n  {\n    id: 'double_epic',\n    label: 'Double Epic',\n    emoji: '🎵',\n    description: 'Double tracking épais et large',\n    color: '#3b82f6',\n    lowGain: 1.5, midGain: -1.0, highGain: 1.5,\n    compThreshold: -16, compRatio: 4, compAttack: 5, compRelease: 100, compKnee: 6,\n    saturation: 0.10, reverb: 'hall', reverbMix: 0.28,\n  },\n  {\n    id: 'octave_deep',\n    label: 'Octave Deep',\n    emoji: '🔉',\n    description: 'Octave grave profonde et puissante',\n    color: '#06b6d4',\n    lowGain: 5.0, midGain: -2.0, highGain: -1.0,\n    compThreshold: -20, compRatio: 5, compAttack: 10, compRelease: 200, compKnee: 10,\n    saturation: 0.15, reverb: 'room', reverbMix: 0.15,\n  },\n  {\n    id: 'digi_comp',\n    label: 'Digi Comp',\n    emoji: '⚡',\n    description: 'Compression agressive style trap/hip-hop',\n    color: '#f43f5e',\n    lowGain: 2.0, midGain: 1.5, highGain: 3.0,\n    compThreshold: -25, compRatio: 6, compAttack: 1, compRelease: 69, compKnee: 6,\n    saturation: 0.15, reverb: 'none', reverbMix: 0,\n  },\n  {\n    id: 'velvet',\n    label: 'Velvet',\n    emoji: '🎼',\n    description: 'Son doux et velouté, voix soul/R&B',\n    color: '#d946ef',\n    lowGain: 2.5, midGain: -0.5, highGain: -1.0,\n    compThreshold: -22, compRatio: 3, compAttack: 15, compRelease: 250, compKnee: 15,\n    saturation: 0.06, reverb: 'plate', reverbMix: 0.20,\n  },\n  {\n    id: 'autotune_transparent',\n    label: 'Auto-Tune Doux',\n    emoji: '🎯',\n    description: 'Correction transparente — intonation naturelle',\n    color: '#10b981',\n    lowGain: 0.5, midGain: 1.5, highGain: 1.0,\n    compThreshold: -18, compRatio: 2.5, compAttack: 12, compRelease: 160, compKnee: 8,\n    saturation: 0.03, reverb: 'room', reverbMix: 0.12,\n    autotune: 0.35, autotuneSpeed: 'slow',\n  },\n  {\n    id: 'autotune_country',\n    label: 'Country Pitch',\n    emoji: '🤠🎯',\n    description: 'Auto-Tune country — chaleureux et contrôlé',\n    color: '#f59e0b',\n    lowGain: 2.5, midGain: 1.0, highGain: 0.5,\n    compThreshold: -20, compRatio: 3, compAttack: 15, compRelease: 200, compKnee: 10,\n    saturation: 0.07, reverb: 'hall', reverbMix: 0.18,\n    autotune: 0.45, autotuneSpeed: 'medium',\n  },\n];\n\nexport const FX_PRESET_DEFAULT = FX_PRESETS[0]; // Clean\n\nexport const TRACK_PRESETS: TrackPreset[] = [\n  { index: 0, label: 'Voix principale', pitch: 0,   pan: 0,    gain: 1.0,  color: '#ef4444', emoji: '🎤' },\n  { index: 1, label: 'Double tracking', pitch: 0,   pan: -0.4, gain: 0.6,  color: '#f97316', emoji: '🎵' },\n  { index: 2, label: 'Harmonie +3',     pitch: 3,   pan: 0.5,  gain: 0.5,  color: '#eab308', emoji: '🎶' },\n  { index: 3, label: 'Harmonie +7',     pitch: 7,   pan: -0.5, gain: 0.45, color: '#22c55e', emoji: '🎼' },\n  { index: 4, label: 'Octave bas',      pitch: -12, pan: 0,    gain: 0.35, color: '#3b82f6', emoji: '🔉' },\n  { index: 5, label: 'Harmonie +5',     pitch: 5,   pan: 0.3,  gain: 0.4,  color: '#a855f7', emoji: '✨' },\n];\n\n// Presets FX recommandés par type de piste\nexport const TRACK_FX_SUGGESTIONS: Record<number, string> = {\n  0: 'studio_vocal',  // Voix principale → Studio Vocal\n  1: 'double_epic',   // Double tracking → Double Epic\n  2: 'harmony',       // Harmonie +3 → Harmony\n  3: 'harmony',       // Harmonie +7 → Harmony\n  4: 'octave_deep',   // Octave bas → Octave Deep\n  5: 'harmony',       // Harmonie +5 → Harmony\n};\n\nexport interface SectionMarker {\n  id:         string;\n  label:      'Intro' | 'Couplet' | 'Refrain' | 'Pont' | 'Outro';\n  startSec:   number;\n  endSec:     number;\n  // quelles harmonies (trackIndex 1-5) sont actives dans cette section\n  activeHarmonies: number[];\n  // volume individuel par harmonie dans cette section (0.0 – 1.0), clé = trackIndex\n  harmonyVolumes?: Record<number, number>;\n}\n\nexport const SECTION_LABELS = ['Intro', 'Couplet', 'Refrain', 'Pont', 'Outro'] as const;\nexport type SectionLabel = typeof SECTION_LABELS[number];\n\nexport const SECTION_COLORS: Record<SectionLabel, string> = {\n  Intro:   '#3b82f6',\n  Couplet: '#22c55e',\n  Refrain: '#ef4444',\n  Pont:    '#a855f7',\n  Outro:   '#f97316',\n};\n\nexport const REVERB_LABELS: Record<ReverbType, string> = {\n  none:  'Sec',\n  room:  'Pièce',\n  hall:  'Hall',\n  plate: 'Plaque',\n};\n\nexport const REVERB_TYPES: ReverbType[] = ['none', 'room', 'hall', 'plate'];\n\nexport function formatTime(s: number): string {\n  return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;\n}\n\nexport function formatDate(ts: number): string {\n  return new Date(ts).toLocaleDateString('fr-CA', {\n    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',\n  });\n}\n",
  "components/StudioMobile/useStudioAudio.ts": "/**\nuseStudioAudio.ts v7.4 — STABLE iOS\nCORRECTIF MAJEUR : Suppression totale de AudioContext/GainNode pour le guide vocal.\nCes éléments entraient en conflit avec la session d'enregistrement sur iOS,\nforçant le basculement en mode 16kHz.\nLe volume est maintenant géré via l'élément <audio> natif (.volume).\nSur iPhone, le volume physique prévaut, mais cela garantit une compatibilité totale\nsans casser la qualité du micro.\n*/\nimport { useState, useRef, useEffect, useCallback } from 'react';\nimport { MobileRecording } from '../../services/StudioService';\nimport { studioOfflineDB } from '../../services/StudioOfflineDB';\nimport { Song, TrackType } from '../../types';\n\nfunction isIOS(): boolean {\n  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||\n    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);\n}\n// Teste une fois si iOS peut lire audio/flac nativement (iOS 11+)\nlet _iosFlacSupported: boolean | null = null;\nfunction iosSupportsFlac(): boolean {\n  if (_iosFlacSupported !== null) return _iosFlacSupported;\n  try {\n    const a = document.createElement('audio');\n    _iosFlacSupported = a.canPlayType('audio/flac') !== '';\n  } catch { _iosFlacSupported = false; }\n  return _iosFlacSupported;\n}\n\nfunction fixBlobType(blob: Blob): Blob {\n  if (isIOS()) {\n    const t = blob.type.toLowerCase();\n    // iOS supporte nativement : mp4/aac, mp3, flac, WAV, aiff\n    if (t.includes('mp4') || t.includes('mpeg') || t.includes('aac') || \n        t.includes('mp3') || t.includes('flac') || t.includes('wav') || \n        t.includes('wave') || t.includes('aiff')) return blob;\n    // Types non supportés (WebM, OGG, Opus) → forcer audio/mp4\n    if (t.includes('webm') || t.includes('ogg') || t.includes('opus')) {\n      return new Blob([blob], { type: 'audio/mp4' });\n    }\n    // Type vide → laisser tel quel (iOS essaiera de détecter)\n    if (t === '') return blob;\n  }\n  return blob;\n}\nfunction getMediaUrl(fileName: string): string {\n  const _macUrl = ((window as any).__CC_MAC_URL as string) || '';\n  const _base = _macUrl.startsWith('http') ? _macUrl : '';\n  if (!_base && isIOS() && fileName.toLowerCase().endsWith('.flac')) return `/api/media-transcode/${encodeURIComponent(fileName)}`;\n  return `${_base}/api/media/${encodeURIComponent(fileName)}`;\n}\nfunction makeAudioEl(): HTMLAudioElement {\n  const el = document.createElement('audio');\n  el.setAttribute('playsinline', '');\n  el.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;left:-9999px;top:-9999px;';\n  document.body.appendChild(el);\n  return el;\n}\n\ninterface AudioResult {\n  instUrl:          string | null;\n  vocalGuideUrl:    string | null;\n  vocalGuideVol:    number;\n  playingId:        string | null;\n  instLoading:      boolean;\n  vocalLoading:     boolean;\n  instCached:       boolean;   // true = blob URL depuis IndexedDB\n  vocalCached:      boolean;   // true = blob URL depuis IndexedDB\n  instRef:          React.RefObject<HTMLAudioElement>;\n  vocalGuideRef:    React.RefObject<HTMLAudioElement>;\n  playRef:          React.RefObject<HTMLAudioElement>;\n  vocalVolRef:      React.RefObject<number>;\n  setVocalGuideVol: (v: number) => void;\n  playRecording:    (rec: MobileRecording) => Promise<void>;\n  stopPlayback:     () => void;\n  playMix:          (dataUrl: string) => void;\n  getInstPlaybackTime: () => number; // temps de lecture actuel du stem inst (sec)\n}\n\nexport function useStudioAudio(selected: Song | null): AudioResult {\n  const [instUrl, setInstUrl] = useState<string | null>(null);\n  const [vocalGuideUrl, setVocalGuideUrl] = useState<string | null>(null);\n  const [vocalGuideVol, setVocalGuideVol] = useState(0.4);\n  const [playingId, setPlayingId] = useState<string | null>(null);\n  const [instLoading, setInstLoading] = useState(false);\n  const [vocalLoading, setVocalLoading] = useState(false);\n  const [instCached, setInstCached] = useState(false);\n  const [vocalCached, setVocalCached] = useState(false);\n\n  const instRef = useRef(null as unknown as HTMLAudioElement);\n  const vocalGuideRef = useRef(null as unknown as HTMLAudioElement);\n  const playRef = useRef(null as unknown as HTMLAudioElement);\n  const vocalVolRef = useRef(0.4);\n  const createdRef = useRef(false);\n\n  // Tracking du temps de lecture via AudioContext (pour sync paroles quand <audio>.play() échoue sur iOS)\n  const ctxPlaybackStartTimeRef = useRef<number>(0);  // ctx.currentTime au moment du start\n  const ctxPlaybackOffsetRef    = useRef<number>(0);  // offset dans le fichier (punchIn)\n  const ctxPlaybackActiveRef    = useRef<boolean>(false);\n  const instBufSrcRef           = useRef<AudioBufferSourceNode | null>(null);\n  const instDecodedBufRef       = useRef<AudioBuffer | null>(null);\n  const vocalDecodedBufRef      = useRef<AudioBuffer | null>(null);\n\n  const getInstPlaybackTime = (): number => {\n    const ctx = (window as any).__warmContext as AudioContext | undefined;\n    // Priorité 1 : tracker AudioContext global (preview ou REC via BufferSourceNode)\n    if (ctx && (window as any).__instCtxActive) {\n      const elapsed = ctx.currentTime - ((window as any).__instCtxStartTime || ctx.currentTime);\n      const t = ((window as any).__instCtxOffset || 0) + elapsed;\n      return Math.max(0, t); // pendant les ~50ms de buffer, retourner 0 plutôt que négatif\n    }\n    // Priorité 2 : tracker performance.now() (fallback si AudioContext suspendu)\n    if ((window as any).__instWallStart) {\n      const elapsed = (performance.now() - (window as any).__instWallStart) / 1000;\n      return Math.max(0, elapsed);\n    }\n    // Priorité 3 : <audio> element joue normalement\n    if (instRef.current && !isNaN(instRef.current.currentTime) && instRef.current.currentTime > 0) {\n      return instRef.current.currentTime;\n    }\n    return 0;\n  };\n  \n  if (!createdRef.current && typeof document !== 'undefined') {\n    createdRef.current = true;\n    (instRef as React.MutableRefObject<HTMLAudioElement>).current = makeAudioEl();\n    (vocalGuideRef as React.MutableRefObject<HTMLAudioElement>).current = makeAudioEl();\n    (playRef as React.MutableRefObject<HTMLAudioElement>).current = makeAudioEl();\n  }\n\n  useEffect(() => {\n    return () => {\n      instRef.current?.pause(); instRef.current?.remove();\n      vocalGuideRef.current?.pause(); vocalGuideRef.current?.remove();\n      playRef.current?.pause(); playRef.current?.remove();\n    };\n  }, []);\n\n  // Contrôle du volume guide vocal — iOS : .volume est read-only, utiliser un GainNode\n  const vocalGainNodeRef = useRef<GainNode | null>(null);\n  const vocalAudioCtxRef = useRef<AudioContext | null>(null);\n  const vocalSourceRef   = useRef<MediaElementAudioSourceNode | null>(null);\n\n  const setVolumeIOS = useCallback((v: number) => {\n    // Sur iOS, HTMLAudioElement.volume est read-only — on passe par GainNode.\n    // IMPORTANT: ctx.resume() est async — on doit attendre avant de jouer.\n    if (!vocalGuideRef.current) return;\n    // Fallback immédiat .volume pour Desktop/Android\n    try { vocalGuideRef.current.volume = v; } catch {}\n    // GainNode async pour iOS\n    (async () => {\n    try {\n      const AudioCtx = window.AudioContext || (window as any).webkitAudioContext;\n      if (!AudioCtx) return;\n      if (!vocalAudioCtxRef.current || vocalAudioCtxRef.current.state === 'closed') {\n        vocalAudioCtxRef.current = new AudioCtx({ latencyHint: 'playback' });\n      }\n      const ctx = vocalAudioCtxRef.current;\n      // Attendre que le contexte soit actif avant de brancher les noeuds\n      if (ctx.state === 'suspended') await ctx.resume();\n      if (!vocalSourceRef.current) {\n        vocalSourceRef.current = ctx.createMediaElementSource(vocalGuideRef.current);\n      }\n      if (!vocalGainNodeRef.current) {\n        vocalGainNodeRef.current = ctx.createGain();\n        vocalSourceRef.current.connect(vocalGainNodeRef.current);\n        vocalGainNodeRef.current.connect(ctx.destination);\n      }\n      vocalGainNodeRef.current.gain.setTargetAtTime(v, ctx.currentTime, 0.01);\n    } catch {\n      // Fallback : tenter .volume directement (Desktop / contexte non-iOS)\n      try { vocalGuideRef.current.volume = v; } catch {}\n    }\n    })(); // end async IIFE\n  }, []);\n\n  const updateVocalVol = useCallback((v: number) => {\n    vocalVolRef.current = v;\n    setVocalGuideVol(v);\n    setVolumeIOS(v);\n    // Contrôler aussi le GainNode du BufferSourceNode vocal (mode AudioContext)\n    const gain: GainNode | null = (window as any).__vocalBufGain || null;\n    if (gain) {\n      try { gain.gain.setTargetAtTime(v, gain.context.currentTime, 0.01); } catch {}\n    }\n  }, [setVolumeIOS]);\n\n  useEffect(() => {\n    const el = instRef.current;\n    if (!el) return;\n    if (instUrl) { el.src = instUrl; el.load(); }\n    else { el.removeAttribute('src'); el.load(); }\n  }, [instUrl]);\n\n  useEffect(() => {\n    const el = vocalGuideRef.current;\n    if (!el) return;\n    if (vocalGuideUrl) {\n      el.src = vocalGuideUrl;\n      // Appliquer le volume dès que possible\n      el.oncanplay = () => {\n        // 1. Fallback immédiat via .volume (fonctionne toujours)\n        try { el.volume = vocalVolRef.current; } catch {}\n        // 2. GainNode si AudioContext disponible\n        setVolumeIOS(vocalVolRef.current);\n      };\n      // Aussi appliquer .volume directement maintenant (avant canplay)\n      try { el.volume = vocalVolRef.current; } catch {}\n      el.load();\n    } else {\n      el.removeAttribute('src'); el.load();\n    }\n  }, [vocalGuideUrl, setVolumeIOS]);\n\n  const instBlobUrlRef  = useRef<string | null>(null);\n  const vocalBlobUrlRef = useRef<string | null>(null);\n\n  // ─── Chargement instrumental ─────────────────────────────────────────────\n  // NOUVELLE RÈGLE : stems servis directement depuis Railway/GitHub Releases.\n  // IndexedDB N'EST PLUS utilisée pour les stems — réservée aux enregistrements vocaux.\n  // Priorité : Mac local (si connecté) → Railway /api/media/ (GitHub Releases)\n  useEffect(() => {\n    if (!selected) {\n      setInstUrl(null); setInstCached(false);\n      return;\n    }\n    let cancelled = false;\n    setInstLoading(true);\n\n    const dbLog = (msg: string) => { console.log(msg); (window as any).__addLog?.(msg); };\n\n    const inst = selected.versions?.find((v: any) =>\n      v.trackType === TrackType.STEM_INSTRUMENTAL ||\n      v.trackType === 'Instrumental Stem (Export ZIP)'\n    ) || selected.versions?.find((v: any) =>\n      v.trackType === 'Instrumentale Pure (Copie IA)'\n    );\n\n    if (!inst?.fileName) {\n      setInstUrl(null); setInstCached(false); setInstLoading(false);\n      return;\n    }\n\n    const macUrl = ((window as any).__CC_MAC_URL as string) || '';\n    if (macUrl.startsWith('http')) {\n      // Mac configuré → tester si disponible\n      fetch(`${macUrl}/api/songs`, { method: 'HEAD', signal: AbortSignal.timeout(2500) })\n        .then(r => {\n          if (cancelled) return;\n          if (r.ok) {\n            dbLog(`[Audio] ✅ inst depuis Mac`);\n            setInstUrl(getMediaUrl(inst.fileName!)); setInstCached(false);\n          } else {\n            dbLog(`[Audio] Mac KO → Railway pour inst`);\n            setInstUrl(`/api/media/${encodeURIComponent(inst.fileName!)}`); setInstCached(false);\n          }\n        })\n        .catch(() => {\n          if (!cancelled) {\n            dbLog(`[Audio] Mac timeout → Railway pour inst`);\n            setInstUrl(`/api/media/${encodeURIComponent(inst.fileName!)}`); setInstCached(false);\n          }\n        })\n        .finally(() => { if (!cancelled) setInstLoading(false); });\n    } else {\n      // Pas de Mac → Railway directement (GitHub Releases)\n      dbLog(`[Audio] inst → Railway /api/media/`);\n      setInstUrl(`/api/media/${encodeURIComponent(inst.fileName!)}`); setInstCached(false);\n      setInstLoading(false);\n    }\n\n    return () => { cancelled = true; };\n  }, [selected?.id]);\n\n  // ─── Chargement vocal guide ───────────────────────────────────────────────\n  // NOUVELLE RÈGLE : stems servis directement depuis Railway/GitHub Releases.\n  // IndexedDB N'EST PLUS utilisée pour les stems — réservée aux enregistrements vocaux.\n  // Priorité : Mac local (si connecté) → Railway /api/media/ (GitHub Releases)\n  useEffect(() => {\n    if (!selected) {\n      setVocalGuideUrl(null); setVocalCached(false);\n      return;\n    }\n    let cancelled = false;\n    setVocalLoading(true);\n\n    const dbLog = (msg: string) => { console.log(msg); (window as any).__addLog?.(msg); };\n\n    const vocal = selected.versions?.find((v: any) => v.trackType === TrackType.STEM_VOCAL);\n\n    if (!vocal?.fileName) {\n      setVocalGuideUrl(null); setVocalCached(false); setVocalLoading(false);\n      return;\n    }\n\n    const macUrlV = ((window as any).__CC_MAC_URL as string) || '';\n    if (macUrlV.startsWith('http')) {\n      // Mac configuré → tester si disponible\n      fetch(`${macUrlV}/api/songs`, { method: 'HEAD', signal: AbortSignal.timeout(2500) })\n        .then(r => {\n          if (cancelled) return;\n          if (r.ok) {\n            dbLog(`[Audio] ✅ vocal depuis Mac`);\n            setVocalGuideUrl(getMediaUrl(vocal.fileName!)); setVocalCached(false);\n          } else {\n            dbLog(`[Audio] Mac KO → Railway pour vocal`);\n            setVocalGuideUrl(`/api/media/${encodeURIComponent(vocal.fileName!)}`); setVocalCached(false);\n          }\n        })\n        .catch(() => {\n          if (!cancelled) {\n            dbLog(`[Audio] Mac timeout → Railway pour vocal`);\n            setVocalGuideUrl(`/api/media/${encodeURIComponent(vocal.fileName!)}`); setVocalCached(false);\n          }\n        })\n        .finally(() => { if (!cancelled) setVocalLoading(false); });\n    } else {\n      // Pas de Mac → Railway directement (GitHub Releases)\n      dbLog(`[Audio] vocal → Railway /api/media/`);\n      setVocalGuideUrl(`/api/media/${encodeURIComponent(vocal.fileName!)}`); setVocalCached(false);\n      setVocalLoading(false);\n    }\n\n    return () => { cancelled = true; };\n  }, [selected?.id]);\n\n  const playRecording = useCallback(async (rec: MobileRecording) => {\n    if (!playRef.current) return;\n    if (playingId === rec.id) { playRef.current.pause(); setPlayingId(null); return; }\n\n    // ── Chercher le blob audio ────────────────────────────────────────────\n    let blob: Blob | null = null;\n\n    // 1. IndexedDB (stocké par saveRecordingLocallyAsync)\n    try {\n      blob = await studioOfflineDB.getAudio(`rec_${rec.id}`);\n      if (blob) console.log(`[Play] IndexedDB: ${(blob.size/1024).toFixed(0)} Ko`);\n    } catch(e) {\n      console.warn('[Play] IndexedDB erreur:', e);\n    }\n\n    // 2. dataUrl en mémoire (ou sentinelle opfs:)\n    if (!blob && rec.dataUrl) {\n      try {\n        if (rec.dataUrl.startsWith('blob:')) {\n          // blob: URL directe (ex: mix)\n          blob = await fetch(rec.dataUrl).then(r => r.blob());\n        } else if (rec.dataUrl.startsWith('opfs:')) {\n          // Sentinelle — chercher dans les caches mémoire (FX ou harmony)\n          const key = rec.dataUrl.slice(5);\n          const fxBlob = (window as any).__lastFxBlob as Blob | undefined;\n          const fxKey  = (window as any).__lastFxKey  as string | undefined;\n          const harmBlobs = (window as any).__harmonyBlobs as Record<string,Blob> | undefined;\n          if (fxBlob && fxKey === key) {\n            blob = fxBlob;\n          } else if (harmBlobs && harmBlobs[key]) {\n            blob = harmBlobs[key];\n          } else {\n            // Fallback OPFS\n            try { blob = await studioOfflineDB.getAudio(key); } catch {}\n          }\n        } else {\n          const [header, data] = rec.dataUrl.split(',');\n          const mime = header.match(/:(.*?);/)?.[1] ?? 'audio/mp4';\n          const binary = atob(data);\n          const bytes = new Uint8Array(binary.length);\n          for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);\n          blob = new Blob([bytes], { type: mime });\n          console.log(`[Play] dataUrl: ${(blob.size/1024).toFixed(0)} Ko | type=${mime}`);\n        }\n      } catch(e) {\n        console.error('[Play] Erreur décodage dataUrl:', e);\n      }\n    }\n\n    if (!blob || blob.size === 0) {\n      console.error('[Play] Aucun blob disponible pour', rec.id);\n      alert('Fichier audio introuvable. La prise a peut-être été perdue.');\n      return;\n    }\n\n    // Révoquer l'URL précédente si elle existe\n    const prevUrl = (playRef.current as any).__blobUrl as string | undefined;\n    if (prevUrl) { URL.revokeObjectURL(prevUrl); }\n\n    const fixedBlob = fixBlobType(blob);\n    const src = URL.createObjectURL(fixedBlob);\n    (playRef.current as any).__blobUrl = src;\n    console.log(`[Play] URL créée: ${src} | type=${fixedBlob.type}`);\n\n    playRef.current.src = src;\n    playRef.current.load();\n    try {\n      await playRef.current.play();\n      console.log('[Play] Lecture demarree');\n    } catch(e: any) {\n      console.error('[Play] Erreur play():', e.name, e.message);\n      URL.revokeObjectURL(src);\n      (playRef.current as any).__blobUrl = undefined;\n      if (e.name !== 'AbortError') alert(`Erreur lecture: ${e.message}`);\n      return;\n    }\n    setPlayingId(rec.id);\n    playRef.current.onended = () => {\n      setPlayingId(null);\n      URL.revokeObjectURL(src);\n      if (playRef.current) (playRef.current as any).__blobUrl = undefined;\n    };\n  }, [playingId]);\n\n  const playMix = useCallback((dataUrl: string) => {\n    if (!playRef.current) return;\n    if (playingId === 'mix') { playRef.current.pause(); setPlayingId(null); return; }\n    playRef.current.src = dataUrl; playRef.current.load(); playRef.current.play().catch(() => {});\n    setPlayingId('mix'); playRef.current.onended = () => setPlayingId(null);\n  }, [playingId]);\n\n  const stopPlayback = useCallback(() => {\n    if (!playRef.current) return;\n    playRef.current.pause();\n    const prevUrl = (playRef.current as any).__blobUrl as string | undefined;\n    if (prevUrl) { URL.revokeObjectURL(prevUrl); (playRef.current as any).__blobUrl = undefined; }\n    setPlayingId(null);\n  }, []);\n\n  return {\n    instUrl, vocalGuideUrl, vocalGuideVol, playingId,\n    instLoading, vocalLoading,\n    instCached, vocalCached,\n    instRef, vocalGuideRef, playRef, vocalVolRef,\n    setVocalGuideVol: updateVocalVol,\n    playRecording, stopPlayback, playMix,\n    getInstPlaybackTime,\n  };\n}",
  "components/StudioMobile/useStudioOffline.ts": "/**\n * useStudioOffline.ts — Hook réseau, PWA, cache hors-ligne v3\n *\n * NOUVEAUTÉS v3 :\n * - cacheError : message d'erreur exposé avec songId pour afficher \"Réessayer\"\n * - forceRefreshSong : re-télécharge les stems même s'ils sont déjà en cache\n *   (utile si un stem est corrompu ou mal converti)\n * - cachedCount : nombre total de chansons en cache\n * - Meilleure gestion WiFi coupé : l'erreur reste visible jusqu'au prochain essai\n */\nimport { useState, useEffect, useCallback, useRef } from 'react';\nimport { Song, TrackType } from '../../types';\nimport { studioOfflineDB } from '../../services/StudioOfflineDB';\n\ninterface StorageInfo { used: number; quota: number; pct: number; }\n\nexport interface CacheProgress {\n  step:  'inst_download' | 'inst_convert' | 'vocal_download' | 'vocal_convert' | 'done';\n  label: string;\n  pct:   number;\n}\n\nexport interface CacheError {\n  songId:  string;\n  message: string;\n}\n\ninterface OfflineResult {\n  isOnline:        boolean;\n  isInstalled:     boolean;\n  httpsUrl:        string;\n  installPrompt:   any;\n  cachedSongs:     Set<string>;\n  cachedCount:     number;\n  cachingId:       string | null;\n  cacheProgress:   CacheProgress | null;\n  cacheError:      CacheError | null;\n  storage:         StorageInfo | null;\n  storageWarning:  boolean;\n  storageCritical: boolean;\n  cacheHealth:     'ok' | 'incomplete' | 'checking' | 'repairing';\n  missingModules:  number;\n  repairProgress:  number; // 0-100\n  installPWA:          () => Promise<void>;\n  cacheSongForOffline: (song: Song, allSongs: Song[], force?: boolean) => Promise<void>;\n  forceRefreshSong:    (song: Song, allSongs: Song[]) => Promise<void>;\n  uncacheSong:         (songId: string) => Promise<void>;\n  clearAllCache:       () => Promise<void>;\n  clearCacheError:     () => void;\n  repairCache:         () => void;\n  importFileToCache:   (song: Song, type: 'inst' | 'vocal', file: File) => Promise<void>;\n  setOfflineLog:       (fn: (msg: string) => void) => void;\n}\n\n// ── Téléchargement avec progression réelle ────────────────────────────────────\nasync function fetchWithProgress(\n  url: string,\n  onProgress: (pct: number) => void,\n  signal?: AbortSignal,\n): Promise<Blob> {\n  // Timeout 90s — fichiers audio peuvent être volumineux\n  const controller = new AbortController();\n  const timeoutId  = setTimeout(() => controller.abort(), 90_000);\n  const combined   = signal\n    ? (() => { signal.addEventListener('abort', () => controller.abort()); return controller.signal; })()\n    : controller.signal;\n\n  let res: Response;\n  try {\n    res = await fetch(url, { signal: combined });\n  } finally {\n    clearTimeout(timeoutId);\n  }\n\n  if (!res.ok) throw new Error(`Erreur serveur ${res.status}`);\n\n  const contentLength = res.headers.get('Content-Length');\n  const total = contentLength ? parseInt(contentLength, 10) : 0;\n\n  let blob: Blob;\n  if (!total || !res.body) {\n    onProgress(50);\n    blob = await res.blob();\n    onProgress(100);\n  } else {\n    const reader = res.body.getReader();\n    const chunks: Uint8Array[] = [];\n    let received = 0;\n\n    while (true) {\n      const { done, value } = await reader.read();\n      if (done) break;\n      chunks.push(value);\n      received += value.length;\n      onProgress(Math.round((received / total) * 100));\n    }\n\n    const allChunks = new Uint8Array(received);\n    let pos = 0;\n    for (const chunk of chunks) { allChunks.set(chunk, pos); pos += chunk.length; }\n    blob = new Blob([allChunks]);\n  }\n\n  // Vérifier que le blob est bien un fichier audio — pas une page HTML du routeur\n  const blobType = blob.type || '';\n  const isAudio  = blobType.startsWith('audio/') || blobType === 'application/octet-stream' || blobType === '';\n  if (!isAudio && blobType.startsWith('text/')) {\n    throw new Error(`Réponse invalide (${blobType}) — le Mac est peut-être éteint`);\n  }\n\n  return blob;\n}\n\nfunction isIOS(): boolean {\n  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||\n    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);\n}\n\n// iOS Safari supporte FLAC nativement depuis iOS 11 — pas de conversion nécessaire.\nfunction getMediaUrl(fileName: string): string {\n  const _mac = ((window as any).__CC_MAC_URL as string) || '';\n  const _base = _mac.startsWith('http') ? _mac : '';\n  return `${_base}/api/media/${encodeURIComponent(fileName)}`;\n}\n\nfunction getMediaUrlFallbacks(fileName: string): string[] {\n  // Génère des variantes du nom de fichier en cas de 503/404\n  const urls: string[] = [getMediaUrl(fileName)];\n  // Variante sans _compressed\n  const noCompressed = fileName.replace(/_compressed(\\.\\w+)$/, '$1');\n  if (noCompressed !== fileName) urls.push(getMediaUrl(noCompressed));\n  // Variante avec extension différente (.flac <-> .mp3)\n  const withFlac = fileName.replace(/\\.mp3$/i, '.flac');\n  if (withFlac !== fileName) urls.push(getMediaUrl(withFlac));\n  const withMp3 = fileName.replace(/\\.flac$/i, '.mp3');\n  if (withMp3 !== fileName) urls.push(getMediaUrl(withMp3));\n  // Sans _compressed + flac\n  const noCompressedFlac = noCompressed.replace(/\\.mp3$/i, '.flac');\n  if (noCompressedFlac !== noCompressed && noCompressedFlac !== fileName) urls.push(getMediaUrl(noCompressedFlac));\n  return [...new Set(urls)];\n}\n\nfunction needsConversion(_fileName: string): boolean {\n  return false; // iOS lit FLAC nativement — pas de transcoding\n}\n\nexport function useStudioOffline(): OfflineResult {\n  const logRef = useRef<(msg: string) => void>(() => {});\n  const setOfflineLog = useCallback((fn: (msg: string) => void) => { logRef.current = fn; }, []);\n  const log = (msg: string) => logRef.current(msg);\n  const [isOnline, setIsOnline]           = useState(navigator.onLine);\n  const [isInstalled, setIsInstalled]     = useState(false);\n  const [httpsUrl, setHttpsUrl]           = useState('');\n  const [installPrompt, setInstallPrompt] = useState<any>(null);\n  const [cachedSongs, setCachedSongs]     = useState<Set<string>>(new Set());\n  const [cachingId, setCachingId]         = useState<string | null>(null);\n  const [cacheProgress, setCacheProgress] = useState<CacheProgress | null>(null);\n  const [cacheError, setCacheError]       = useState<CacheError | null>(null);\n  const [storage, setStorage]             = useState<StorageInfo | null>(null);\n  const [cacheHealth, setCacheHealth]     = useState<'ok'|'incomplete'|'checking'|'repairing'>('checking');\n  const [missingModules, setMissingModules] = useState(0);\n  const [repairProgress, setRepairProgress] = useState(0);\n  const [purgedSongs, setPurgedSongs]     = useState<Array<{songId: string; missingInst: boolean; missingVocal: boolean}>>([]);\n  // Écouter les messages du SW (CACHE_STATUS, REPAIR_*)\n  useEffect(() => {\n    const handler = (e: MessageEvent) => {\n      if (e.data?.type === 'CACHE_STATUS') {\n        setMissingModules(e.data.missing.length);\n        setCacheHealth(e.data.complete ? 'ok' : 'incomplete');\n      }\n      if (e.data?.type === 'REPAIR_START') {\n        setCacheHealth('repairing');\n        setRepairProgress(0);\n      }\n      if (e.data?.type === 'REPAIR_PROGRESS') {\n        setRepairProgress(Math.round((e.data.repaired / e.data.total) * 100));\n      }\n      if (e.data?.type === 'REPAIR_DONE') {\n        setCacheHealth(e.data.complete ? 'ok' : 'incomplete');\n        setMissingModules(e.data.failed);\n        setRepairProgress(e.data.complete ? 100 : 0);\n      }\n    };\n    navigator.serviceWorker?.addEventListener('message', handler);\n    // Vérifier l'état du cache au montage.\n    // Le contrôleur SW peut ne pas être encore actif au premier rendu (installation\n    // asynchrone). On attend 2s avant de déclarer 'incomplete', ce qui évite\n    // le faux avertissement jaune au démarrage sur iPhone.\n    const checkSW = () => {\n      const sw = navigator.serviceWorker?.controller;\n      if (sw) {\n        sw.postMessage({ type: 'CHECK_CACHE' });\n      } else {\n        // Pas de SW du tout (ex: http sans PWA) → pas d'avertissement inutile\n        setCacheHealth('ok');\n      }\n    };\n    // Vérification immédiate si SW déjà actif, sinon attendre l'activation\n    if (navigator.serviceWorker?.controller) {\n      checkSW();\n    } else {\n      // SW en cours d'activation → attendre\n      const onControllerChange = () => {\n        checkSW();\n        navigator.serviceWorker?.removeEventListener('controllerchange', onControllerChange);\n      };\n      navigator.serviceWorker?.addEventListener('controllerchange', onControllerChange);\n      // Timeout de sécurité : si le SW n'arrive pas en 5s, on considère OK (pas de cache)\n      setTimeout(() => {\n        navigator.serviceWorker?.removeEventListener('controllerchange', onControllerChange);\n        if (!navigator.serviceWorker?.controller) setCacheHealth('ok');\n      }, 5000);\n    }\n    return () => navigator.serviceWorker?.removeEventListener('message', handler);\n  }, []);\n\n  const repairCache = () => {\n    const sw = navigator.serviceWorker?.controller;\n    if (sw) { setCacheHealth('repairing'); sw.postMessage({ type: 'REPAIR_CACHE' }); }\n    else window.location.reload();\n  };\n  const storageWarning = storage ? storage.pct > 60 : false;\n  const storageCritical = storage ? storage.pct > 85 : false;\n  const cachedCount    = cachedSongs.size;\n\n  const refreshStorage = useCallback(async () => {\n    try { setStorage(await studioOfflineDB.getStorageEstimate()); } catch {}\n  }, []);\n\n  useEffect(() => {\n    // navigator.onLine détecte juste le WiFi, pas si le Mac répond\n    // On fait un vrai ping HTTP vers le Mac toutes les 15 secondes\n    const checkMacReachable = async () => {\n      // Mode autonome forcé → jamais pinguer le Mac\n      if (localStorage.getItem('cc_force_autonomous') === '1') {\n        setIsOnline(false);\n        return;\n      }\n      const macUrl = ((window as any).__CC_MAC_URL as string) || '';\n      if (!macUrl.startsWith('http')) {\n        setIsOnline(false);\n        return;\n      }\n      try {\n        const ctrl = new AbortController();\n        const timeout = setTimeout(() => ctrl.abort(), 3000); // 3s max\n        const r = await fetch(`${macUrl}/api/songs`, { method: 'HEAD', signal: ctrl.signal });\n        clearTimeout(timeout);\n        setIsOnline(r.ok || r.status < 500);\n      } catch {\n        setIsOnline(false); // Mac fermé ou pas joignable\n      }\n    };\n\n    checkMacReachable(); // ping immédiat au démarrage\n    const interval = setInterval(checkMacReachable, 15000); // toutes les 15s\n    // Aussi écouter les events réseau natifs comme fallback\n    const up   = () => checkMacReachable();\n    const down = () => setIsOnline(false);\n    window.addEventListener('online', up);\n    window.addEventListener('offline', down);\n    return () => {\n      clearInterval(interval);\n      window.removeEventListener('online', up);\n      window.removeEventListener('offline', down);\n    };\n  }, []);\n\n  useEffect(() => {\n    fetch('/api/local-ip').then(r => r.json())\n      .then(d => { if (d.httpsUrl) setHttpsUrl(d.studioUrl || d.httpsUrl + '?mode=studio'); })\n      .catch(() => {});\n  }, []);\n\n  useEffect(() => {\n    const standalone =\n      window.matchMedia('(display-mode: standalone)').matches ||\n      (window.navigator as any).standalone === true;\n    setIsInstalled(standalone);\n    const handler = (e: any) => { e.preventDefault(); setInstallPrompt(e); };\n    window.addEventListener('beforeinstallprompt', handler);\n    return () => window.removeEventListener('beforeinstallprompt', handler);\n  }, []);\n\n  useEffect(() => {\n    // Charger les IDs — faire confiance à la liste existante comme base\n    // et vérifier en arrière-plan sans bloquer l'affichage\n    studioOfflineDB.getCachedSongIds().then(async (ids) => {\n      // Afficher immédiatement ce qu'on connaît\n      setCachedSongs(ids);\n      if (ids.size === 0) return;\n      // Vérification en arrière-plan — marquer ☁️ seulement si AUCUN blob (inst ni vocal)\n      // Une chanson avec juste l'inst ou juste le vocal uploadé reste considérée en cache\n      for (const songId of Array.from(ids)) {\n        studioOfflineDB.verifySongCache(songId)\n          .then(result => {\n            if (!result.inst && !result.vocal) {\n              // Vraiment vide — retirer du cache\n              setCachedSongs(prev => { const s = new Set(prev); s.delete(songId); return s; });\n            }\n          })\n          .catch(() => {}); // En cas d'erreur DB, garder comme caché\n      }\n    }).catch(() => {});\n    refreshStorage();\n  }, []);\n\n  const installPWA = useCallback(async () => {\n    if (installPrompt) {\n      installPrompt.prompt();\n      const { outcome } = await installPrompt.userChoice;\n      if (outcome === 'accepted') { setIsInstalled(true); setInstallPrompt(null); }\n    } else {\n      alert('Sur iPhone : bouton Partage ⬆️ → \"Sur l\\'écran d\\'accueil\"');\n    }\n  }, [installPrompt]);\n\n  // Helper : essaie chaque URL en séquence sans for...of+await (compat Babel browser)\n  const tryUrls = (urls: string[], onProgress: (pct: number) => void): Promise<Blob> => {\n    const attempt = (i: number): Promise<Blob> => {\n      if (i >= urls.length) return Promise.reject(new Error('Toutes les URLs ont échoué'));\n      return fetchWithProgress(urls[i], onProgress).catch(() => attempt(i + 1));\n    };\n    return attempt(0);\n  };\n\n  // ── Téléchargement d'un stem individuel ──────────────────────────────────\n  const downloadStem = async (\n    fileName: string,\n    key: string,\n    songId: string,\n    songTitle: string,\n    type: 'instrumental' | 'vocal',\n    baseStep: 'inst' | 'vocal',\n    basePct: number,\n    force: boolean,\n  ): Promise<boolean> => {\n    const alreadyCached = !force && await studioOfflineDB.hasAudio(key);\n\n    if (alreadyCached) {\n      const label = type === 'instrumental' ? '🎸 Instrumental — déjà en cache ✓' : '🎤 Guide vocal — déjà en cache ✓';\n      setCacheProgress({ step: `${baseStep}_download` as any, label, pct: basePct + 47 });\n      await new Promise(r => setTimeout(r, 300));\n      return true;\n    }\n\n    // Vérifier que l'URL Mac est configurée AVANT de tenter le téléchargement\n    const macUrl = ((window as any).__CC_MAC_URL as string) || '';\n    if (!macUrl.startsWith('http')) {\n      throw new Error(`Adresse Mac non configurée — configure l'URL du Mac dans les paramètres pour télécharger les stems`);\n    }\n\n    const urlToFetch = getMediaUrlFallbacks(fileName)[0];\n    log(`⬇️ ${type === 'instrumental' ? '🎸' : '🎤'} Téléchargement: ${fileName}`);\n    log(`   URL: ${urlToFetch}`);\n\n    const converting = needsConversion(fileName);\n    const emoji = type === 'instrumental' ? '🎸' : '🎤';\n    const name  = type === 'instrumental' ? 'Instrumental' : 'Guide vocal';\n\n    // Téléchargement via tryUrls (pas de for...of+await — compat Babel browser)\n    const urls = getMediaUrlFallbacks(fileName);\n    let blob: Blob;\n    if (converting) {\n      setCacheProgress({ step: `${baseStep}_convert` as any, label: `${emoji} ${name} — conversion...`, pct: basePct + 2 });\n      const sim = setInterval(() => {\n        setCacheProgress({ step: `${baseStep}_convert` as any, label: `${emoji} ${name} — conversion...`, pct: basePct + 20 });\n      }, 400);\n      try {\n        blob = await tryUrls(urls, (dlPct) => {\n          clearInterval(sim);\n          setCacheProgress({ step: `${baseStep}_convert` as any, label: `${emoji} ${name} — ${dlPct}%`, pct: basePct + 10 + Math.round(dlPct * 0.35) });\n        });\n      } finally { clearInterval(sim); }\n    } else {\n      setCacheProgress({ step: `${baseStep}_download` as any, label: `${emoji} ${name} — 0%`, pct: basePct + 2 });\n      blob = await tryUrls(urls,\n        (dlPct) => setCacheProgress({ step: `${baseStep}_download` as any, label: `${emoji} ${name} — ${dlPct}%`, pct: basePct + 2 + Math.round(dlPct * 0.45) }),\n      );\n    }\n    await studioOfflineDB.saveAudio(key, blob, { songId, songTitle, type });\n    return true;\n  };\n\n  // ── Cache principal ───────────────────────────────────────────────────────\n  const cacheSongForOffline = useCallback(async (song: Song, allSongs: Song[], force = false) => {\n    if (cachingId) {\n      console.warn('[Cache] Déjà en cours pour', cachingId, '— ignoré:', song.id);\n      return; // déjà en cours — une seule chanson à la fois\n    }\n    setCachingId(song.id);\n    setCacheProgress({ step: 'inst_download', label: 'Démarrage...', pct: 0 });\n    setCacheError(null);\n\n    try {\n      await studioOfflineDB.saveSongs(allSongs);\n\n      const inst  = song.versions?.find(v => v.trackType === TrackType.STEM_INSTRUMENTAL);\n      const vocal = song.versions?.find(v => v.trackType === TrackType.STEM_VOCAL);\n\n      if (inst?.fileName) {\n        await downloadStem(inst.fileName, `inst_${song.id}`, song.id, song.title, 'instrumental', 'inst', 0, force);\n      }\n      if (vocal?.fileName) {\n        await downloadStem(vocal.fileName, `vocal_${song.id}`, song.id, song.title, 'vocal', 'vocal', 50, force);\n      }\n\n      setCacheProgress({ step: 'done', label: '✓ Prêt hors-ligne', pct: 100 });\n      await new Promise(r => setTimeout(r, 700));\n\n      await studioOfflineDB.markSongCached(song.id);\n      setCachedSongs(prev => new Set([...prev, song.id]));\n      await refreshStorage();\n\n    } catch (e: any) {\n      const msg = !navigator.onLine\n        ? 'WiFi coupé — reconnecte-toi et réessaie'\n        : e.message || 'Erreur inconnue';\n      console.warn('[StudioOffline] Erreur:', msg);\n      setCacheError({ songId: song.id, message: msg });\n      setCacheProgress(null);\n    } finally {\n      setCachingId(null);\n      setCacheProgress(null);\n    }\n  }, [cachingId]);\n\n  // ── Force re-téléchargement (stems corrompus) ─────────────────────────────\n  const forceRefreshSong = useCallback(async (song: Song, allSongs: Song[]) => {\n    // Supprimer les stems existants avant de re-télécharger\n    await studioOfflineDB.deleteAllForSong(song.id).catch(() => {});\n    setCachedSongs(prev => { const s = new Set(prev); s.delete(song.id); return s; });\n    await cacheSongForOffline(song, allSongs, true);\n  }, [cacheSongForOffline]);\n\n  const clearCacheError = useCallback(() => setCacheError(null), []);\n\n  const uncacheSong = useCallback(async (songId: string) => {\n    await studioOfflineDB.deleteAllForSong(songId).catch(() => {});\n    setCachedSongs(prev => { const s = new Set(prev); s.delete(songId); return s; });\n    await refreshStorage();\n  }, []);\n\n  const clearAllCache = useCallback(async () => {\n    await studioOfflineDB.clearAllAudio().catch(() => {});\n    setCachedSongs(new Set());\n    await refreshStorage();\n  }, []);\n\n  const importFileToCache = useCallback(async (song: Song, type: 'inst' | 'vocal', file: File) => {\n    const key = type === 'inst' ? `inst_${song.id}` : `vocal_${song.id}`;\n    // Garder le type MIME original — iOS Safari supporte FLAC/WAV/MP3/M4A nativement.\n    // Ne PAS mentir sur le type (ex: forcer audio/mp4 sur du FLAC) — ça cause des erreurs de décodage.\n    const rawType = file.type || '';\n    // Seulement si le type est complètement vide (fichier sans extension reconnue), deviner depuis le nom\n    let blobType = rawType;\n    if (!blobType) {\n      const name = file.name.toLowerCase();\n      if (name.endsWith('.flac'))      blobType = 'audio/flac';\n      else if (name.endsWith('.mp3'))  blobType = 'audio/mpeg';\n      else if (name.endsWith('.m4a'))  blobType = 'audio/mp4';\n      else if (name.endsWith('.wav'))  blobType = 'audio/wav';\n      else if (name.endsWith('.aac'))  blobType = 'audio/aac';\n      else                             blobType = 'audio/flac'; // défaut raisonnable\n    }\n    log(`📂 Import manuel: ${file.name} (${(file.size/1024).toFixed(0)} Ko) → clé: ${key} type: ${blobType}`);\n    const blob = new Blob([await file.arrayBuffer()], { type: blobType });\n    await studioOfflineDB.saveAudio(key, blob, { songId: song.id, songTitle: song.title, type: type === 'inst' ? 'instrumental' : 'vocal' });\n    log(`✅ ${type === 'inst' ? '🎸' : '🎤'} Sauvegardé dans IndexedDB: ${key} (${(blob.size/1024).toFixed(0)} Ko)`);\n    // Si les deux stems existent maintenant, marquer la chanson comme cachée\n    const hasInst  = await studioOfflineDB.hasAudio(`inst_${song.id}`).catch(() => false);\n    const hasVocal = await studioOfflineDB.hasAudio(`vocal_${song.id}`).catch(() => false);\n    const inst  = song.versions?.find((v: any) => v.trackType === TrackType.STEM_INSTRUMENTAL);\n    const vocal = song.versions?.find((v: any) => v.trackType === TrackType.STEM_VOCAL);\n    const needsInst  = !!inst?.fileName;\n    const needsVocal = !!vocal?.fileName;\n    log(`   inst=${hasInst} vocal=${hasVocal} (requis: inst=${needsInst} vocal=${needsVocal})`);\n    if ((!needsInst || hasInst) && (!needsVocal || hasVocal)) {\n      await studioOfflineDB.markSongCached(song.id);\n      setCachedSongs(prev => new Set([...prev, song.id]));\n      log(`✅ ${song.title} marquée Hors-ligne — les deux stems sont en cache`);\n    }\n    await refreshStorage();\n  }, [refreshStorage]);\n\n  return {\n    isOnline, isInstalled, httpsUrl, installPrompt,\n    cachedSongs, cachedCount, cachingId, cacheProgress, cacheError,\n    storage, storageWarning, storageCritical,\n    cacheHealth, missingModules, repairProgress,\n    installPWA, cacheSongForOffline, forceRefreshSong,\n    uncacheSong, clearAllCache, clearCacheError, repairCache,\n    importFileToCache, setOfflineLog,\n  };\n}\n",
  "components/StudioMobile/useStudioRecorder.ts": "/**\n * useStudioRecorder.ts — v7.8\n *\n * LOGIQUE DE SÉLECTION MICRO — 3 SETUPS RÉELS :\n *\n * Setup 1 — Micro cravate (récepteur dans prise Lightning/USB-C) + écouteurs BT\n *   → iOS voit le récepteur comme \"External Microphone\" ou \"Headset Microphone\"\n *   → PRIORITÉ 1 : sélectionné automatiquement en mode Auto\n *   → Les écouteurs BT restent en A2DP (pas de HFP car micro = filaire externe)\n *\n * Setup 2 — Carte son V8 (USB-C) + micro condensateur + écouteurs filaires sur V8\n *   → iOS voit la V8 comme interface USB (label: \"USB Audio\", \"V8\", etc.)\n *   → PRIORITÉ 1 : sélectionnée automatiquement\n *   → Zéro HFP, qualité maximale\n *\n * Setup 3 — Aucun externe, écouteurs BT uniquement\n *   → PRIORITÉ 2 : forcer Built-in iPhone pour garder les écouteurs en A2DP\n *\n * Mode Manuel : sélection utilisateur TOUJOURS respectée, aucune surcharge.\n */\nimport { useState, useRef, useCallback, useEffect } from 'react';\nimport { studioService, ReverbType, MobileRecording, TrackProject } from '../../services/StudioService';\nimport { studioOfflineDB } from '../../services/StudioOfflineDB';\nimport { Song } from '../../types';\nimport { TrackPreset } from './studio.types';\n\nfunction labelFromDeviceId(deviceId: string): string {\n  if (deviceId === 'default') return '🎙 Micro par défaut';\n  if (deviceId === 'communications') return '🎙 Micro communications';\n  return `🎙 Micro ${deviceId.slice(0, 6)}...`;\n}\n\nfunction classifyDevice(label: string): 'bluetooth' | 'external' | 'builtin' | 'unknown' {\n  if (/airpods|bluetooth|buds|jbl|beats|bose|sony|plantronics|jabra|poly|sennheiser|samsung galaxy buds|anker|soundcore/i.test(label)) return 'bluetooth';\n  if (/external microphone|headset microphone|usb audio|usb mic|rode|dji|v8|focusrite|scarlett|behringer|zoom|tascam|interface|audio codec/i.test(label)) return 'external';\n  if (/built.?in|internal|iphone microphone|microphone intégré/i.test(label)) return 'builtin';\n  return 'unknown';\n}\n\nexport interface AudioDevice {\n  deviceId: string;\n  label: string;\n  category: 'bluetooth' | 'external' | 'builtin' | 'unknown';\n}\n\nexport type AutoSelectReason = 'external' | 'builtin_hfp' | 'default' | 'manual';\n\ninterface RecorderOptions {\n  reverb: ReverbType;\n  currentPreset: TrackPreset;\n  instUrl: string | null;\n  vocalGuideUrl: string | null;\n  vocalGuideVol: number;\n  vocalGuideVolRef: React.RefObject<number>;\n  instRef: React.RefObject<HTMLAudioElement>;\n  vocalGuideRef: React.RefObject<HTMLAudioElement>;\n  backingTracks?: { dataUrl: string; gain: number; pan: number; trackIndex?: number }[];\n  sections?: any[];\n  onLog?: (msg: string) => void;\n  takeSlot?: 'A' | 'B' | 'C';\n}\n\ninterface RecorderResult {\n  isRecording: boolean;\n  isSaving: boolean;\n  duration: number;\n  analyser: AnalyserNode | null;\n  vuLevel: number;\n  monitoring: boolean;\n  permError: boolean;\n  audioDevices: AudioDevice[];\n  selectedDevice: string | null;\n  setSelectedDevice: (id: string | null) => void;\n  refreshDevices: () => Promise<void>;\n  punchIn: number | null;\n  punchOut: number | null;\n  setPunchIn: (v: number | null) => void;\n  setPunchOut: (v: number | null) => void;\n  setPermError: (v: boolean) => void;\n  toggleMonitoring: () => void;\n  preWarmMic: () => Promise<void>;\n  startRecording: (song: Song, project: TrackProject) => Promise<void>;\n  stopRecording: (song: Song, project: TrackProject, onSaved: (rec: MobileRecording, updatedProject: TrackProject | null) => void) => void;\n  vocalGainNodeRef: React.RefObject<GainNode | null>;\n  autoSelectReason: AutoSelectReason;\n  activeDeviceLabel: string;\n}\n\nfunction resolveAutoDevice(\n  devices: AudioDevice[],\n  log: (m: string) => void,\n): { deviceId: string | undefined; reason: AutoSelectReason; label: string } {\n  const external = devices.find(d => d.category === 'external');\n  const builtin  = devices.find(d => d.category === 'builtin');\n  const hasBT    = devices.some(d => d.category === 'bluetooth');\n\n  // Priorité 1 : micro externe filaire/USB (cravate, V8)\n  if (external) {\n    log(`✅ AUTO → Externe : \"${external.label}\"`);\n    return { deviceId: external.deviceId, reason: 'external', label: external.label };\n  }\n\n  // Priorité 2 : Bluetooth détecté → forcer builtin pour garder A2DP\n  if (hasBT) {\n    if (builtin) {\n      log(`🛡 AUTO → Builtin forcé (${builtin.label}) — A2DP protégé`);\n      return { deviceId: builtin.deviceId, reason: 'builtin_hfp', label: builtin.label };\n    }\n    // BT sans builtin identifiable → undefined, iOS prend intégré par défaut\n    log('🛡 AUTO → Défaut iOS (BT présent — builtin introuvable)');\n    return { deviceId: undefined, reason: 'builtin_hfp', label: 'Micro iPhone' };\n  }\n\n  // Pas de BT, pas d'externe → défaut iOS\n  log('AUTO → Défaut iOS');\n  return { deviceId: undefined, reason: 'default', label: 'Micro iPhone' };\n}\n\nexport function useStudioRecorder(opts: RecorderOptions): RecorderResult {\n  const optsRef = useRef(opts);\n  useEffect(() => { optsRef.current = opts; }); // sync every render, no deps\n  const [isRecording, setIsRecording]   = useState(false);\n  const [isSaving, setIsSaving]         = useState(false);\n  const [duration, setDuration]         = useState(0);\n  const [analyser, setAnalyser]         = useState<AnalyserNode | null>(null);\n  const [vuLevel, setVuLevel]           = useState<number>(0);\n  const [monitoring, setMonitoring]     = useState(false);\n  const [permError, setPermError]       = useState(false);\n  const [audioDevices, setAudioDevices] = useState<AudioDevice[]>([]);\n  const [selectedDevice, setSelectedDevice] = useState<string | null>(null);\n  const [punchIn, setPunchIn]   = useState<number | null>(null);\n  const [punchOut, setPunchOut] = useState<number | null>(null);\n  const [autoSelectReason, setAutoSelectReason] = useState<AutoSelectReason>('default');\n  const [activeDeviceLabel, setActiveDeviceLabel] = useState<string>('');\n\n  const punchInRef  = useRef<number | null>(null);\n  const punchOutRef = useRef<number | null>(null);\n  useEffect(() => { punchInRef.current  = punchIn;  }, [punchIn]);\n  useEffect(() => { punchOutRef.current = punchOut; }, [punchOut]);\n\n  const audioDevicesRef = useRef<AudioDevice[]>([]);\n\n  const refreshDevices = useCallback(async () => {\n    if (!navigator.mediaDevices?.enumerateDevices) return;\n    try {\n      const raw = await navigator.mediaDevices.enumerateDevices();\n      const mics: AudioDevice[] = raw\n        .filter(d => d.kind === 'audioinput')\n        .map(d => ({\n          deviceId: d.deviceId,\n          label: d.label || labelFromDeviceId(d.deviceId),\n          category: classifyDevice(d.label || ''),\n        }));\n      setAudioDevices(mics);\n      audioDevicesRef.current = mics;\n      const ext = mics.find(m => m.category === 'external');\n      const bt  = mics.find(m => m.category === 'bluetooth');\n      if (ext) optsRef.current.onLog?.(`🎙 Externe détecté : ${ext.label}`);\n      if (bt)  optsRef.current.onLog?.(`🎧 Bluetooth : ${bt.label}`);\n    } catch {}\n  }, []);\n\n  const backingRefsRef = useRef<HTMLAudioElement[]>([]);\n  useEffect(() => {\n    return () => { backingRefsRef.current.forEach(el => { el.pause(); el.src = ''; }); backingRefsRef.current = []; };\n  }, []);\n  useEffect(() => {\n    refreshDevices();\n    navigator.mediaDevices?.addEventListener?.('devicechange', refreshDevices);\n    return () => navigator.mediaDevices?.removeEventListener?.('devicechange', refreshDevices);\n  }, [refreshDevices]);\n\n  const recorderRef         = useRef<MediaRecorder | null>(null);\n  const audioCtxRef         = useRef<AudioContext | null>(null);\n  const chunksRef           = useRef<Blob[]>([]);\n  const streamRef           = useRef<MediaStream | null>(null);\n  const timerRef            = useRef<any>(null);\n  const monitorGainRef      = useRef<GainNode | null>(null);\n  const sourceNodeRef       = useRef<MediaStreamAudioSourceNode | null>(null);\n  const monitorConnectedRef = useRef(false);\n  const stopWorkletRef      = useRef<(() => Blob) | null>(null);\n  const vocalGainNodeRef    = useRef<GainNode | null>(null);\n  const durationRef         = useRef(0);\n  const syncDuration = (d: number) => { durationRef.current = d; };\n\n  const permissionGrantedRef = useRef(false);\n  const preWarmMic = useCallback(async () => {\n    if (permissionGrantedRef.current) return;\n    try {\n      const AudioCtx = window.AudioContext || (window as any).webkitAudioContext;\n      let ctx = (window as any).__warmContext as AudioContext | undefined;\n      if (!ctx || ctx.state === 'closed') {\n        ctx = new AudioCtx({ latencyHint: 'interactive' });\n        (window as any).__warmContext = ctx;\n        (window as any).__warmWorkletLoaded = null;\n      }\n      if (ctx.state === 'suspended') await ctx.resume();\n      // Buffer silencieux 1 sample → stabilise AVAudioSession\n      const buf = ctx.createBuffer(1, 1, ctx.sampleRate);\n      const src = ctx.createBufferSource(); src.buffer = buf;\n      const mute = ctx.createGain(); mute.gain.value = 0;\n      src.connect(mute); mute.connect(ctx.destination); src.start();\n      // getUserMedia → acquiert permission + énumère les vrais labels\n      const s = await navigator.mediaDevices.getUserMedia({\n        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },\n        video: false,\n      });\n      s.getTracks().forEach(t => t.stop());\n      permissionGrantedRef.current = true;\n      optsRef.current.onLog?.(`✅ Warm-up OK | ${ctx.sampleRate}Hz`);\n      await refreshDevices(); // Maintenant les labels sont disponibles\n    } catch (e: any) {\n      optsRef.current.onLog?.(`⚠️ Warm-up : ${e.message}`);\n      setPermError(true);\n    }\n  }, [refreshDevices]);\n\n  const startRecording = useCallback(async (song: Song, project: TrackProject) => {\n    if (!song) return;\n    try {\n      optsRef.current.onLog?.('═══ TAP REC ═══');\n      const pIn  = punchInRef.current;\n      const pOut = punchOutRef.current;\n\n      // 1. Stems de référence — synchronisation sample-accurate via AudioContext\n      // On force TOUJOURS le path AudioContext (pas <audio>.play) pour garantir l'alignement\n      // C'est le même mécanisme que le PREVIEW qui est parfaitement synchro\n      const startStemsSync = async () => {\n        const ctx = (window as any).__warmContext as AudioContext | undefined;\n        const t = pIn ?? 0;\n\n        // Stopper les sources AudioContext précédentes\n        try { (window as any).__instBufSrc?.stop(); }  catch {}\n        try { (window as any).__vocalBufSrc?.stop(); } catch {}\n        (window as any).__instBufSrc = null;\n        (window as any).__vocalBufSrc = null;\n\n        // Aussi couper les éléments <audio> (ils ne serviront pas pendant rec)\n        const instEl  = optsRef.current.instRef.current;\n        const vocalEl = optsRef.current.vocalGuideRef.current;\n        if (instEl)  { instEl.pause();  instEl.currentTime = t; }\n        if (vocalEl) { vocalEl.pause(); vocalEl.currentTime = t; }\n\n        if (!ctx) {\n          // Fallback ultime : <audio>.play() séquentiel (pas idéal mais fonctionnel)\n          if (instEl  && optsRef.current.instUrl)       { instEl.play().catch(()=>{}); }\n          if (vocalEl && optsRef.current.vocalGuideUrl) { vocalEl.play().catch(()=>{}); }\n          return;\n        }\n\n        // Charger les deux buffers (déjà décodés en mémoire si PREVIEW a été fait)\n        const instBufRaw:  AudioBuffer | null = (window as any).__instDecodedBuf  || null;\n        const vocalBufRaw: AudioBuffer | null = (window as any).__vocalDecodedBuf || null;\n\n        const fetchBuf = async (url: string): Promise<AudioBuffer | null> => {\n          try {\n            const r = await fetch(url);\n            const ab = await r.arrayBuffer();\n            return await ctx.decode
