ate.now()}.mp4`;\n\n      const fakeRec: MobileRecording = {\n        id:          `STEM-${Date.now()}`,\n        songId,\n        songTitle,\n        artist:      '',\n        duration:    vocalMastered.duration,\n        recordedAt:  Date.now(),\n        dataUrl:     '',\n        transferred: false,\n        fileName,\n      };\n\n      const ok = await studioService.uploadToServer(fakeRec, blob);\n      if (ok) {\n        // ── Assigner automatiquement comme stem vocal sur le Mac ──────────────\n        // Sans cet appel, le fichier reste dans \"en attente\" dans l'inbox\n        // et nécessite un clic manuel. Avec cet appel, songs.json est mis à jour\n        // immédiatement et l'app Electron reçoit un événement 'stem-vocal-updated'.\n        try {\n          const assignRes = await fetch('/api/studio/assign-stem', {\n            method: 'POST',\n            headers: { 'Content-Type': 'application/json' },\n            body: JSON.stringify({\n              recId:    fakeRec.id,\n              songId,\n              fileName,\n            }),\n          });\n          const assignData = await assignRes.json().catch(() => ({}));\n          if (assignData.success) {\n            console.log(`[Mastering] Stem vocal assigné sur Mac : ${fileName} → ${assignData.songTitle}`);\n          } else {\n            console.warn('[Mastering] assign-stem échoué, fichier dans inbox Mac');\n          }\n        } catch (e) {\n          // Non-bloquant : le fichier est dans l'inbox, l'utilisateur peut assigner manuellement\n          console.warn('[Mastering] assign-stem non disponible:', e);\n        }\n\n        setSentToMac(true);\n        await onStemReady(blob, fileName);\n      } else {\n        alert('Échec du transfert — Mac allumé et WiFi même réseau ?');\n      }\n    } catch (e: any) {\n      if (!e?.message?.toLowerCase().includes('quota')) alert('Erreur : ' + e.message);\n    } finally {\n      setSendingToMac(false);\n    }\n  };\n\n  // ── MODE B : Export MP3 (Publication) ─────────────────────────────────────\n\n  const exportAsMP3 = async () => {\n    if (!fullMastered && !vocalMastered) return;\n    setExportingMp3(true);\n    try {\n      const source    = fullMastered || vocalMastered!;\n      const safeTitle = songTitle.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40);\n      const fileName  = `${safeTitle}_MASTER_320.mp3`;\n\n      const mp3Blob = await encodeMP3(source, 320);\n      await shareFileIOS(mp3Blob, fileName, `${songTitle} — Master MP3`);\n      setExportedMp3(true);\n    } catch (e: any) {\n      if ((e as any).name !== 'AbortError' && !e?.message?.toLowerCase().includes('quota')) alert('Erreur export MP3 : ' + e.message);\n    } finally {\n      setExportingMp3(false);\n    }\n  };\n\n  // ── MODE B : Export MP4 natif iOS (AAC) ───────────────────────────────────\n\n  const exportAsMP4 = async () => {\n    if (!fullMastered && !vocalMastered) return;\n    setExportingMp4(true);\n    try {\n      const source    = fullMastered || vocalMastered!;\n      const safeTitle = songTitle.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40);\n      const fileName  = `${safeTitle}_MASTER.mp4`;\n\n      const mp4Blob = await audioBufferToBlob(source);\n      await shareFileIOS(mp4Blob, fileName, `${songTitle} — Master MP4`);\n      setExportedMp4(true);\n    } catch (e: any) {\n      if ((e as any).name !== 'AbortError' && !e?.message?.toLowerCase().includes('quota')) alert('Erreur export MP4 : ' + e.message);\n    } finally {\n      setExportingMp4(false);\n    }\n  };\n\n  // ── MODE B : Export WAV 24-bit (Qualité maximale Spotify/DistroKid) ────────\n\n  const exportAsWAV = async () => {\n    if (!fullMastered && !vocalMastered) return;\n    setExportingWav(true);\n    try {\n      const source    = fullMastered || vocalMastered!;\n      const safeTitle = songTitle.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40);\n      const fileName  = `${safeTitle}_MASTER_24bit.wav`;\n\n      const wavBlob = encodeWAV(source); // synchrone — pas de MediaRecorder nécessaire\n      await shareFileIOS(wavBlob, fileName, `${songTitle} — Master WAV 24-bit`);\n      setExportedWav(true);\n    } catch (e: any) {\n      if ((e as any).name !== 'AbortError' && !e?.message?.toLowerCase().includes('quota')) alert('Erreur export WAV : ' + e.message);\n    } finally {\n      setExportingWav(false);\n    }\n  };\n\n  const hasResult = !!vocalMastered;\n  const hasFullMix = !!fullMastered;\n\n  // ── Stem vocal seul (local iPhone) ───────────────────────────────────────\n  const exportVocalStem = async () => {\n    if (!vocalMastered) return;\n    setExportingVocal(true);\n    try {\n      const safeTitle = songTitle.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40);\n      const wavBlob   = encodeWAV(vocalMastered);\n      await shareFileIOS(wavBlob, `${safeTitle}_VOCAL_STEM.wav`, `${songTitle} — Stem Vocal`);\n      setExportedVocal(true);\n    } catch (e: any) {\n      if (e.name !== 'AbortError' && !e?.message?.toLowerCase().includes('quota')) alert('Erreur export vocal : ' + e.message);\n    } finally { setExportingVocal(false); }\n  };\n\n  // ── Stem instrumental seul (depuis IndexedDB) ─────────────────────────────\n  const exportInstStem = async () => {\n    if (!instBlob) return;\n    setExportingInst(true);\n    try {\n      const safeTitle = songTitle.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40);\n      const ext = instBlob.type.includes('mp4') ? 'mp4' : instBlob.type.includes('flac') ? 'flac' : 'mp4';\n      await shareFileIOS(instBlob, `${safeTitle}_INST_STEM.${ext}`, `${songTitle} — Stem Instrumental`);\n      setExportedInst(true);\n    } catch (e: any) {\n      if (e.name !== 'AbortError' && !e?.message?.toLowerCase().includes('quota')) alert('Erreur export instrumental : ' + e.message);\n    } finally { setExportingInst(false); }\n  };\n\n  // ── ZIP stems (vocal WAV + instrumental) ─────────────────────────────────\n  const exportStemsZip = async () => {\n    if (!vocalMastered) return;\n    setExportingZip(true);\n    try {\n      const safeTitle = songTitle.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 40);\n      // Partager les deux fichiers ensemble via navigator.share({ files })\n      const vocalWav  = encodeWAV(vocalMastered);\n      const vocalFile = new File([vocalWav], `${safeTitle}_VOCAL_STEM.wav`, { type: 'audio/wav' });\n      const files: File[] = [vocalFile];\n      if (instBlob) {\n        const ext = instBlob.type.includes('mp4') ? 'mp4' : 'mp4';\n        files.push(new File([instBlob], `${safeTitle}_INST_STEM.${ext}`, { type: instBlob.type || 'audio/mp4' }));\n      }\n      if (navigator.share && navigator.canShare?.({ files })) {\n        await navigator.share({ title: `${songTitle} — Stems`, files });\n      } else {\n        // Fallback : télécharger vocal seulement\n        await shareFileIOS(vocalWav, `${safeTitle}_VOCAL_STEM.wav`, `${songTitle} — Stem Vocal`);\n      }\n      setExportedZip(true);\n    } catch (e: any) {\n      if (e.name !== 'AbortError' && !e?.message?.toLowerCase().includes('quota')) alert('Erreur export stems : ' + e.message);\n    } finally { setExportingZip(false); }\n  };\n\n  return (\n    <div className=\"min-h-screen bg-[#020202] text-white flex flex-col\">\n\n      {/* Header */}\n      <div className=\"shrink-0 flex items-center gap-3 px-5 pt-6 pb-4 border-b border-zinc-900\">\n        <button onClick={onBack} className=\"w-10 h-10 rounded-xl bg-zinc-900 flex items-center justify-center active:scale-90\">\n          <ChevronLeft size={20}/>\n        </button>\n        <div className=\"flex-1 min-w-0\">\n          <p className=\"font-bebas text-xl text-white tracking-widest leading-none\">MASTERING STUDIO</p>\n          <p className=\"text-[10px] text-zinc-500 font-black uppercase truncate\">{songTitle}</p>\n        </div>\n      </div>\n\n      <div className=\"flex-1 overflow-y-auto px-5 pt-4 pb-8 space-y-5\" style={{ WebkitOverflowScrolling: 'touch' }}>\n\n        {/* Explication des 2 modes */}\n        <div className=\"grid grid-cols-2 gap-2\">\n          <div className=\"bg-zinc-900/60 border border-zinc-800 rounded-2xl p-3\">\n            <p className=\"text-[10px] font-black text-zinc-400 uppercase mb-1 flex items-center gap-1\">\n              <Mic size={10}/> Mode A — Mac\n            </p>\n            <p className=\"text-[11px] text-white font-bold\">Voix + harmonies</p>\n            <p className=\"text-[9px] text-zinc-500 mt-0.5 leading-relaxed\">Remplace le stem vocal sur le Mac pour les spectacles</p>\n          </div>\n          <div className={`bg-zinc-900/60 border rounded-2xl p-3 ${instBlob ? 'border-zinc-800' : 'border-zinc-800/40 opacity-50'}`}>\n            <p className=\"text-[10px] font-black text-zinc-400 uppercase mb-1 flex items-center gap-1\">\n              <Music2 size={10}/> Mode B — Publication\n            </p>\n            <p className=\"text-[11px] text-white font-bold\">Voix + harmonies + instrumental</p>\n            <p className=\"text-[9px] text-zinc-500 mt-0.5 leading-relaxed\">\n              {instBlob ? 'Export MP3/MP4 → Spotify, YouTube' : 'Instrumental non disponible hors-ligne'}\n            </p>\n          </div>\n        </div>\n\n        {/* Niveaux */}\n        <div className=\"bg-zinc-950 border border-white/8 rounded-2xl p-4\">\n          <p className=\"text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3\">Niveaux</p>\n          <div className=\"grid grid-cols-3 gap-2\">\n            {[\n              { label: 'Entrée', value: inputLufs },\n              { label: 'Voix masterisée', value: outputVocalLufs, color: 'text-emerald-400' },\n              { label: 'Mix complet', value: outputFullLufs, color: 'text-blue-400' },\n            ].map(({ label, value, color }) => (\n              <div key={label} className=\"bg-zinc-900 rounded-xl p-2.5 text-center\">\n                <p className=\"text-[9px] text-zinc-600 font-black uppercase\">{label}</p>\n                <p className={`text-[20px] font-bebas mt-0.5 ${color || 'text-white'}`}>\n                  {value !== null && value !== undefined ? `${value > 0 ? '+' : ''}${value}` : '—'}\n                </p>\n                <p className=\"text-[8px] text-zinc-600\">LUFS</p>\n              </div>\n            ))}\n          </div>\n        </div>\n\n        {/* Presets par catégorie */}\n        <div>\n          <p className=\"text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3\">Style de masterisation</p>\n          {/* Onglets catégorie */}\n          <div className=\"flex gap-1.5 overflow-x-auto pb-2 mb-3\" style={{ scrollbarWidth: 'none' }}>\n            {PRESET_CATEGORIES.map(cat => (\n              <button key={cat.id} onClick={() => setActiveCategory(cat.id)}\n                className=\"shrink-0 px-3 py-1.5 rounded-xl font-black text-[10px] uppercase tracking-wider transition-all\"\n                style={{\n                  background: activeCategory === cat.id ? '#dc2626' : '#18181b',\n                  color: activeCategory === cat.id ? '#fff' : '#71717a',\n                  border: `1px solid ${activeCategory === cat.id ? '#dc2626' : '#27272a'}`,\n                }}>\n                {cat.label}\n              </button>\n            ))}\n          </div>\n          {/* Grille presets de la catégorie */}\n          <div className=\"grid grid-cols-1 gap-2\">\n            {(PRESET_CATEGORIES.find(c => c.id === activeCategory)?.keys || []).map(key => {\n              const p = PRESETS[key];\n              if (!p) return null;\n              const isActive = preset === key;\n              return (\n                <button key={key} onClick={() => applyPreset(key)}\n                  className=\"flex items-center gap-3 py-3 px-4 rounded-xl text-left transition-all\"\n                  style={{\n                    background: isActive ? '#dc262615' : '#18181b',\n                    border: `1px solid ${isActive ? '#dc262650' : '#27272a'}`,\n                  }}>\n                  <span className=\"text-2xl leading-none shrink-0\">{p.emoji}</span>\n                  <div className=\"flex-1 min-w-0\">\n                    <p className=\"text-[13px] font-black text-white\">{p.label}</p>\n                    <p className=\"text-[10px] text-zinc-500\">{p.description}</p>\n                  </div>\n                  <div className=\"text-right shrink-0\">\n                    <p className=\"text-[10px] font-black text-zinc-400\">{p.settings.targetLufs} LUFS</p>\n                    <p className=\"text-[9px] text-zinc-600\">{db(p.settings.ceiling)}</p>\n                  </div>\n                </button>\n              );\n            })}\n          </div>\n        </div>\n\n        {/* Balance Voix / Instrumental */}\n        {instBlob && (\n          <div className=\"bg-zinc-950 border border-white/8 rounded-2xl p-4\">\n            <div className=\"flex items-center justify-between mb-3\">\n              <p className=\"text-[10px] font-black text-zinc-500 uppercase tracking-widest\">Balance Voix / Instrumental</p>\n              <div className=\"flex gap-1.5\">\n                {[[-9,'Voix forte'],[-6,'Voix+'],[-3,'Équilibré'],[0,'Égal'],[3,'Inst+'],[6,'Inst fort']].map(([val, label]) => (\n                  <button key={val} onClick={() => setInstGainDb(val as number)}\n                    className=\"px-1.5 py-0.5 rounded-lg text-[8px] font-black transition-all\"\n                    style={{ background: instGainDb === val ? '#3b82f6' : '#27272a', color: instGainDb === val ? '#fff' : '#52525b' }}>\n                    {label}\n                  </button>\n                ))}\n              </div>\n            </div>\n            <div className=\"flex items-center gap-3\">\n              <span className=\"text-[9px] text-red-400 font-black w-8 shrink-0\">VOIX</span>\n              <div className=\"flex-1 relative\">\n                <input type=\"range\" min=\"-12\" max=\"6\" step=\"1\" value={instGainDb}\n                  onChange={e => setInstGainDb(parseInt(e.target.value))}\n                  className=\"w-full h-2 rounded-full appearance-none cursor-pointer\"\n                  style={{ background: `linear-gradient(to right, #ef4444 0%, #ef4444 ${((0-(-12))/18)*100}%, #3b82f6 ${((0-(-12))/18)*100}%, #3b82f6 ${((instGainDb-(-12))/18)*100}%, #27272a ${((instGainDb-(-12))/18)*100}%, #27272a 100%)` }}/>\n                <div className=\"absolute left-1/2 top-0 w-px h-2 bg-zinc-600 pointer-events-none\" style={{ transform: 'translateX(-50%)' }}/>\n              </div>\n              <span className=\"text-[9px] text-blue-400 font-black w-8 shrink-0 text-right\">INST</span>\n            </div>\n            <div className=\"flex justify-between mt-1.5\">\n              <span className=\"text-[8px] text-zinc-700\">Voix forte</span>\n              <span className=\"text-[9px] font-black\" style={{ color: instGainDb === 0 ? '#a1a1aa' : instGainDb < 0 ? '#ef4444' : '#3b82f6' }}>\n                {instGainDb === 0 ? 'Égal' : instGainDb < 0 ? `Voix +${Math.abs(instGainDb)} dB` : `Inst +${instGainDb} dB`}\n              </span>\n              <span className=\"text-[8px] text-zinc-700\">Inst forte</span>\n            </div>\n          </div>\n        )}\n\n        {/* EQ avancé */}\n        <div className=\"bg-zinc-950 border border-white/8 rounded-2xl overflow-hidden\">\n          <button onClick={() => setShowAdvanced(v => !v)}\n            className=\"w-full flex items-center justify-between px-4 py-3 active:bg-zinc-900\">\n            <span className=\"text-[11px] font-black text-zinc-400 uppercase tracking-widest\">EQ & Compresseur</span>\n            <span className=\"text-zinc-600 text-[11px]\">{showAdvanced ? '▲' : '▼'}</span>\n          </button>\n          {showAdvanced && (\n            <div className=\"px-4 pb-4 border-t border-white/5 space-y-3 pt-3\">\n              {[\n                { key: 'lowGain'  as const, label: 'Graves 250Hz',  color: '#f97316' },\n                { key: 'midGain'  as const, label: 'Mids 2.5kHz',   color: '#eab308' },\n                { key: 'highGain' as const, label: 'Aigus 8kHz',    color: '#22c55e' },\n              ].map(({ key, label, color }) => (\n                <div key={key} className=\"flex items-center gap-3\">\n                  <span className=\"text-[10px] text-zinc-500 font-black w-20 shrink-0\">{label}</span>\n                  <input type=\"range\" min=\"-12\" max=\"12\" step=\"0.5\" value={settings[key]}\n                    onChange={e => setSettings(s => ({ ...s, [key]: parseFloat(e.target.value) }))}\n                    className=\"flex-1 h-1.5 rounded-full appearance-none cursor-pointer\"\n                    style={{ accentColor: color, background: `linear-gradient(to right, ${color} ${((settings[key]+12)/24)*100}%, #27272a ${((settings[key]+12)/24)*100}%)` }}/>\n                  <span className=\"text-[10px] font-black w-14 text-right shrink-0\" style={{ color }}>{db(settings[key])}</span>\n                </div>\n              ))}\n              <div className=\"flex items-center gap-3 mt-1\">\n                <span className=\"text-[10px] text-zinc-500 font-black w-20 shrink-0\">Ceiling</span>\n                <input type=\"range\" min=\"-6\" max=\"0\" step=\"0.1\" value={settings.ceiling}\n                  onChange={e => setSettings(s => ({ ...s, ceiling: parseFloat(e.target.value) }))}\n                  className=\"flex-1 h-1.5 rounded-full appearance-none cursor-pointer accent-red-500\"/>\n                <span className=\"text-[10px] text-red-400 font-black w-14 text-right shrink-0\">{db(settings.ceiling)}</span>\n              </div>\n            </div>\n          )}\n        </div>\n\n        {/* Bouton Masteriser */}\n        <button onClick={runMastering} disabled={isMastering}\n          className=\"w-full py-4 bg-red-600 rounded-2xl font-black text-[14px] uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all disabled:opacity-60\">\n          {isMastering\n            ? <><Loader2 size={18} className=\"animate-spin\"/> {progressLabel || 'Masterisation...'}</>\n            : hasResult ? <><Zap size={18}/> Re-masteriser</> : <><Zap size={18}/> Masteriser</>\n          }\n        </button>\n\n        {isMastering && (\n          <div className=\"space-y-1.5\">\n            <div className=\"flex justify-between items-center\">\n              <span className=\"text-[10px] text-zinc-500 font-black uppercase tracking-widest truncate pr-2\">\n                {progressLabel || 'En cours...'}\n              </span>\n              <span className=\"text-[11px] font-black text-red-500 shrink-0\">{progress}%</span>\n            </div>\n            <div className=\"h-2 bg-zinc-900 rounded-full overflow-hidden\">\n              <div\n                className={`h-full rounded-full transition-all duration-500 ${\n                  progressLabel.includes('Encodage') ? 'bg-gradient-to-r from-red-600 to-orange-500' : 'bg-red-600'\n                }`}\n                style={{ width: `${progress}%` }}\n              />\n            </div>\n          </div>\n        )}\n\n        {/* ── RÉSULTATS ── */}\n        {hasResult && (\n          <div className=\"space-y-3\">\n\n            {/* Guide workflow */}\n            <div className=\"bg-zinc-900/50 border border-zinc-800 rounded-2xl p-3\">\n              <p className=\"text-[9px] text-zinc-500 font-black uppercase tracking-widest mb-2\">Quoi exporter ?</p>\n              <div className=\"space-y-1.5\">\n                <p className=\"text-[10px] text-white\">🎤 <span className=\"font-black\">Pour le spectacle</span> — Envoyer au Mac (Mode A)</p>\n                <p className=\"text-[10px] text-white\">🎵 <span className=\"font-black\">Pour Spotify/Apple Music</span> — WAV 24-bit (meilleure qualité)</p>\n                <p className=\"text-[10px] text-white\">📱 <span className=\"font-black\">Pour partager / YouTube</span> — MP3 320kbps</p>\n                <p className=\"text-[10px] text-white\">🎛️ <span className=\"font-black\">Pour produire davantage</span> — Stems séparés</p>\n              </div>\n            </div>\n\n            {/* Séparateur */}\n            <div className=\"flex items-center gap-3\">\n              <div className=\"flex-1 h-px bg-zinc-800\"/>\n              <p className=\"text-[10px] text-zinc-600 font-black uppercase tracking-widest\">Résultats</p>\n              <div className=\"flex-1 h-px bg-zinc-800\"/>\n            </div>\n\n            {/* ── MODE A : Voix masterisée ── */}\n            <div className=\"bg-zinc-950 border border-zinc-800 rounded-2xl overflow-hidden\">\n              <div className=\"flex items-center gap-3 p-4 border-b border-white/5\">\n                <div className=\"w-9 h-9 rounded-xl bg-red-900/30 flex items-center justify-center shrink-0\">\n                  <Mic size={16} className=\"text-red-400\"/>\n                </div>\n                <div className=\"flex-1 min-w-0\">\n                  <p className=\"text-[13px] font-black text-white\">Voix + harmonies masterisée</p>\n                  <p className=\"text-[10px] text-zinc-500\">→ Remplace le stem vocal sur le Mac</p>\n                </div>\n                <button onClick={() => playAudio('vocal')}\n                  className=\"w-9 h-9 rounded-xl bg-zinc-800 flex items-center justify-center active:scale-90 shrink-0\">\n                  {playing === 'vocal' ? <Pause size={14}/> : <Play size={14}/>}\n                </button>\n              </div>\n              {isOnline ? (\n                <button onClick={sendToMac} disabled={sendingToMac || sentToMac}\n                  className={`w-full py-3.5 font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all ${\n                    sentToMac ? 'bg-emerald-900/30 text-emerald-400' : 'bg-red-600 text-white'\n                  } disabled:opacity-60`}>\n                  {sendingToMac\n                    ? <><Loader2 size={14} className=\"animate-spin\"/> Encodage &amp; transfert… (~{Math.round((vocalMastered?.duration||0))}s)</>\n                    : sentToMac\n                    ? <><CheckCircle2 size={14}/> Stem vocal mis à jour sur le Mac</>\n                    : <><Send size={14}/> Envoyer au Mac → Stem vocal</>\n                  }\n                </button>\n              ) : (\n                <div className=\"px-4 py-3 flex items-center gap-2\">\n                  <AlertCircle size={13} className=\"text-amber-500 shrink-0\"/>\n                  <p className=\"text-[11px] text-amber-400\">WiFi requis pour envoyer au Mac</p>\n                </div>\n              )}\n            </div>\n\n            {/* ── MODE B : Mix complet ── */}\n            <div className={`bg-zinc-950 border rounded-2xl overflow-hidden ${hasFullMix ? 'border-blue-800/40' : 'border-zinc-800/40 opacity-50'}`}>\n              <div className=\"flex items-center gap-3 p-4 border-b border-white/5\">\n                <div className=\"w-9 h-9 rounded-xl bg-blue-900/30 flex items-center justify-center shrink-0\">\n                  <Music2 size={16} className=\"text-blue-400\"/>\n                </div>\n                <div className=\"flex-1 min-w-0\">\n                  <p className=\"text-[13px] font-black text-white\">Mix complet masterisé</p>\n                  <p className=\"text-[10px] text-zinc-500\">\n                    {hasFullMix ? 'Voix + harmonies + instrumental → Spotify / YouTube' : 'Instrumental non disponible hors-ligne'}\n                  </p>\n                </div>\n                {hasFullMix && (\n                  <button onClick={() => playAudio('full')}\n                    className=\"w-9 h-9 rounded-xl bg-zinc-800 flex items-center justify-center active:scale-90 shrink-0\">\n                    {playing === 'full' ? <Pause size={14}/> : <Play size={14}/>}\n                  </button>\n                )}\n              </div>\n\n              {hasFullMix && (\n                <div className=\"divide-y divide-white/5\">\n                  {/* Export MP3 320kbps */}\n                  <button onClick={exportAsMP3} disabled={exportingMp3}\n                    className=\"w-full py-3.5 font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all text-emerald-400 disabled:opacity-60\">\n                    {exportingMp3\n                      ? <><Loader2 size={14} className=\"animate-spin\"/> Encodage MP3...</>\n                      : exportedMp3\n                      ? <><CheckCircle2 size={14}/> MP3 320kbps partagé !</>\n                      : <><Share2 size={14}/> Exporter MP3 320kbps — Spotify / YouTube</>\n                    }\n                  </button>\n\n                  {/* Export WAV 24-bit — qualité maximale distribution */}\n                  <button onClick={exportAsWAV} disabled={exportingWav}\n                    className=\"w-full py-3.5 font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all text-purple-400 disabled:opacity-60\">\n                    {exportingWav\n                      ? <><Loader2 size={14} className=\"animate-spin\"/> Encodage WAV...</>\n                      : exportedWav\n                      ? <><CheckCircle2 size={14}/> WAV 24-bit partagé !</>\n                      : <><Share2 size={14}/> Exporter WAV 24-bit — Qualité maximale</>\n                    }\n                  </button>\n\n                  {/* Export MP4 natif iOS — masqué par défaut */}\n                  <button onClick={exportAsMP4} disabled={exportingMp4}\n                    className=\"w-full py-3 font-black text-[11px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all text-blue-300/70 disabled:opacity-60\">\n                    {exportingMp4\n                      ? <><Loader2 size={13} className=\"animate-spin\"/> Encodage MP4… (~{Math.round(((fullMastered||vocalMastered)?.duration||0))}s)</>\n                      : exportedMp4\n                      ? <><CheckCircle2 size={13}/> MP4 partagé !</>\n                      : <><Share2 size={13}/> MP4 (AirDrop / iCloud)</>\n                    }\n                  </button>\n                </div>\n              )}\n            </div>\n\n            {/* Note Spotify */}\n            <div className=\"bg-zinc-900/40 border border-white/5 rounded-2xl p-3\">\n              <p className=\"text-[10px] text-zinc-500 leading-relaxed\">\n                <span className=\"text-purple-400 font-black\">WAV 24-bit</span> — Meilleure qualité, recommandé pour DistroKid / TuneCore / CD Baby → Spotify, Apple Music.{'\\\n'}\n                <span className=\"text-emerald-400 font-black\">MP3 320kbps</span> — Compatible partout, taille réduite, qualité excellente.{'\\\n'}\n                <span className=\"text-blue-400 font-black\">MP4</span> — Pour YouTube avec photo de couverture.\n              </p>\n            </div>\n\n            {/* ── Stems séparés ── */}\n            {hasResult && (\n              <div className=\"bg-zinc-950 border border-orange-800/40 rounded-2xl overflow-hidden\">\n                <div className=\"flex items-center gap-3 p-4 border-b border-white/5\">\n                  <div className=\"w-9 h-9 rounded-xl bg-orange-900/30 flex items-center justify-center shrink-0\">\n                    <span className=\"text-[16px]\">🎛️</span>\n                  </div>\n                  <div className=\"flex-1 min-w-0\">\n                    <p className=\"text-[13px] font-black text-white\">Stems séparés</p>\n                    <p className=\"text-[10px] text-zinc-500\">Vocal WAV + Instrumental — Pour production avancée</p>\n                  </div>\n                </div>\n                <div className=\"divide-y divide-white/5\">\n                  <button onClick={exportVocalStem} disabled={exportingVocal}\n                    className=\"w-full py-3.5 font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all text-red-400 disabled:opacity-60\">\n                    {exportingVocal ? <><Loader2 size={14} className=\"animate-spin\"/> Export vocal...</>\n                      : exportedVocal ? <><CheckCircle2 size={14}/> Stem vocal partagé !</>\n                      : <><Share2 size={14}/> Stem vocal WAV — Voix + harmonies</>}\n                  </button>\n                  <button onClick={exportInstStem} disabled={exportingInst || !instBlob}\n                    className={`w-full py-3.5 font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all disabled:opacity-40 ${instBlob ? 'text-blue-400' : 'text-zinc-600'}`}>\n                    {exportingInst ? <><Loader2 size={14} className=\"animate-spin\"/> Export instrumental...</>\n                      : exportedInst ? <><CheckCircle2 size={14}/> Instrumental partagé !</>\n                      : instBlob ? <><Share2 size={14}/> Stem instrumental — Piste de fond</>\n                      : <>🔒 Instrumental non disponible hors-ligne</>}\n                  </button>\n                  <button onClick={exportStemsZip} disabled={exportingZip}\n                    className=\"w-full py-3.5 font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all text-orange-400 disabled:opacity-60\">\n                    {exportingZip ? <><Loader2 size={14} className=\"animate-spin\"/> Préparation stems...</>\n                      : exportedZip ? <><CheckCircle2 size={14}/> Stems partagés !</>\n                      : <><Share2 size={14}/> Partager les 2 stems ensemble</>}\n                  </button>\n                </div>\n              </div>\n            )}\n          </div>\n        )}\n      </div>\n\n      <audio ref={playRef} playsInline className=\"hidden\"/>\n    </div>\n  );\n}\n",
  "components/StudioMobile/SongSelector.tsx": "/**\n * SongSelector.tsx — Écran sélection chanson v3\n *\n * NOUVEAUTÉS v3 :\n * - Bouton \"Réessayer\" quand un téléchargement échoue (WiFi coupé, etc.)\n * - Bouton \"↺ Actualiser\" sur les chansons en cache pour forcer le re-téléchargement\n * - Compteur \"X / Y hors-ligne\" dans l'entête\n * - Barre de progression détaillée par stem avec badge conversion iOS\n */\nimport React, { useState, useEffect, useRef } from 'react';\nimport {\n  Mic, Music, Wifi, WifiOff, Radio, CheckCircle2,\n  Loader2, Download, Trash2, AlertTriangle, HardDrive,\n  ArrowDownToLine, RefreshCw, AlertCircle, RotateCcw,\n} from 'lucide-react';\nimport { Song, TrackType } from '../../types';\nimport { studioService } from '../../services/StudioService';\nimport { studioOfflineDB } from '../../services/StudioOfflineDB';\nimport { CacheProgress, CacheError } from './useStudioOffline';\n\ninterface StorageInfo { used: number; quota: number; pct: number; }\nfunction formatMB(b: number) { return (b / 1048576).toFixed(0) + ' MB'; }\n\ninterface Props {\n  songs:          Song[];\n  isOnline:       boolean;\n  isInstalled:    boolean;\n  httpsUrl:       string;\n  cachedSongs:    Set<string>;\n  cachedCount:    number;\n  cachingId:      string | null;\n  cacheProgress:  CacheProgress | null;\n  cacheError:     CacheError | null;\n  storage:        StorageInfo | null;\n  storageWarning: boolean;\n  storageCritical: boolean;\n  pendingCount:   number;\n  cacheHealth:    'ok' | 'incomplete' | 'checking' | 'repairing';\n  missingModules: number;\n  repairProgress: number;\n  onSelect:           (song: Song) => void;\n  onInstall:          () => void;\n  onCache:            (song: Song) => void;\n  onForceRefresh:     (song: Song) => void;\n  onImportFile:       (song: Song, type: 'inst' | 'vocal', file: File) => Promise<void>;\n  onUncache:          (songId: string) => void;\n  onClearAll:         () => void;\n  onViewRecordings:   () => void;\n  onClearCacheError:  () => void;\n  onRepairCache:      () => void;\n}\n\n// ── Composant config URL Mac ─────────────────────────────────────────────────\n// Composant ligne de stem — défini au niveau module pour éviter la redéfinition à chaque render\ninterface StemRowProps {\n  songId: string;\n  type: 'inst' | 'vocal';\n  fileName: string | null;\n  inCache: boolean | null;\n  importing: string | null;\n  testingAudio: string | null;\n  loadingAudio: string | null;   // clé 'songId:type' pendant chargement blob async\n  onTest: (songId: string, type: 'inst' | 'vocal') => void;\n  onImport: (e: React.ChangeEvent<HTMLInputElement>) => void;\n}\nfunction StemRow({ songId, type, fileName, inCache, importing, testingAudio, loadingAudio, onTest, onImport }: StemRowProps) {\n  const isInst      = type === 'inst';\n  const testKey     = `${songId}:${type}`;\n  const isTesting   = testingAudio === testKey;\n  const isLoading   = loadingAudio === testKey;\n  const isImporting = importing === `${songId}:${type}`;\n  // Bouton actif si inCache=true OU si blob fraîchement importé en mémoire\n  const canListen = inCache === true;\n  return (\n    <div className=\"mb-4\">\n      <div className=\"flex items-center gap-1.5 mb-1.5\">\n        <span className=\"text-[9px] font-black uppercase tracking-widest text-zinc-500\">\n          {isInst ? '🎸 Instrumental' : '🎤 Vocal stem'}\n        </span>\n        {inCache === null  && <span className=\"text-[9px] text-zinc-600 animate-pulse\">…vérif</span>}\n        {inCache === true  && <span className=\"text-[9px] font-black text-emerald-400 bg-emerald-900/30 px-1.5 py-0.5 rounded-full\">✓ En cache</span>}\n        {inCache === false && <span className=\"text-[9px] font-black text-orange-400 bg-orange-900/20 px-1.5 py-0.5 rounded-full\">⚠ Absent</span>}\n      </div>\n      {fileName\n        ? <p className=\"text-[10px] font-mono text-zinc-300 bg-zinc-800/80 border border-zinc-700 rounded-lg px-2.5 py-1.5 mb-2 break-all leading-relaxed\">{fileName}</p>\n        : <p className=\"text-[10px] font-mono text-zinc-600 bg-zinc-900 border border-zinc-800 rounded-lg px-2.5 py-1.5 mb-2 italic\">Aucun fichier associé</p>\n      }\n      <div className=\"flex gap-2\">\n        <button\n          onClick={e => { e.stopPropagation(); onTest(songId, type); }}\n          disabled={!canListen || isLoading}\n          className={`flex-1 flex items-center justify-center gap-1.5 py-2 rounded-xl font-black text-[11px] uppercase transition-all active:scale-95 ${\n            !canListen ? 'bg-zinc-800 text-zinc-600 cursor-not-allowed opacity-40' :\n            isLoading  ? 'bg-zinc-700 text-zinc-400 animate-pulse' :\n            isTesting  ? 'bg-amber-600 text-white' :\n            isInst     ? 'bg-blue-900/60 border border-blue-600/40 text-blue-300' :\n                         'bg-emerald-900/60 border border-emerald-600/40 text-emerald-300'\n          }`}>\n          {isLoading ? '⏳ Chargement...' : isTesting ? '⏹ Stop' : '🔊 Écouter'}\n        </button>\n        <label className=\"flex-1\">\n          <input\n            type=\"file\"\n            accept=\"audio/*,.flac,.wav,.mp3,.m4a,.mp4\"\n            className=\"hidden\"\n            onClick={e => { (e.target as HTMLInputElement).value = ''; }}\n            onChange={onImport}\n          />\n          <span className={`flex items-center justify-center gap-1.5 py-2 rounded-xl font-black text-[11px] uppercase active:scale-95 cursor-pointer transition-all ${\n            isImporting ? 'bg-zinc-700 text-zinc-400' :\n            isInst      ? 'bg-blue-700 text-white' : 'bg-emerald-700 text-white'\n          }`}>\n            {isImporting ? '⏳ Import...' : '📂 Remplacer'}\n          </span>\n        </label>\n      </div>\n    </div>\n  );\n}\n\nfunction MacUrlConfig() {\n  const forceAutonomous = localStorage.getItem('cc_force_autonomous') === '1';\n  const [macUrl, setMacUrl] = React.useState<string>(() =>\n    forceAutonomous ? '' : ((window as any).__CC_MAC_URL || '')\n  );\n  const [editing, setEditing] = React.useState(false);\n  const [input, setInput] = React.useState('');\n  const [testing, setTesting] = React.useState(false);\n  const [testResult, setTestResult] = React.useState<'ok'|'fail'|null>(null);\n  const [autoDetecting, setAutoDetecting] = React.useState(false);\n  const [autonomous, setAutonomous] = React.useState(forceAutonomous);\n\n  React.useEffect(() => {\n    // Si mode autonome forcé → ne jamais auto-détecter le Mac\n    if (forceAutonomous) {\n      (window as any).__CC_MAC_URL = '';\n      return;\n    }\n    const existing = (window as any).__CC_MAC_URL as string | undefined;\n    if (existing && existing.startsWith('http')) return;\n    setAutoDetecting(true);\n    fetch('/api/local-ip', { cache: 'no-store' })\n      .then(r => r.json())\n      .then(d => {\n        const url = d.studioUrl || d.httpsUrl;\n        if (url && url.startsWith('http')) {\n          const clean = url.replace(/\\?.*$/, '').replace(/\\/$/, '');\n          (window as any).__CC_MAC_URL = clean;\n          (window as any).__CC_MAC_HTTP_URL = clean.replace('https://', 'http://').replace(':8443', ':8080');\n          localStorage.setItem('cc_mac_url', clean);\n          setMacUrl(clean);\n        }\n      })\n      .catch(() => {})\n      .finally(() => setAutoDetecting(false));\n  }, []);\n\n  const save = async () => {\n    let url = input.trim().replace(/\\/$/, '');\n    if (url && !url.startsWith('http')) url = 'https://' + url;\n    setTesting(true); setTestResult(null);\n    try {\n      const controller = new AbortController();\n      const tid = setTimeout(() => controller.abort(), 5000);\n      const res = await fetch(`${url}/api/songs`, { signal: controller.signal, cache: 'no-store' });\n      clearTimeout(tid);\n      if (res.ok) {\n        (window as any).__CC_MAC_URL = url;\n        localStorage.setItem('cc_mac_url', url);\n        localStorage.removeItem('cc_force_autonomous');\n        window.dispatchEvent(new Event('cc_mode_changed'));\n        setMacUrl(url); setTestResult('ok'); setAutonomous(false);\n        setTimeout(() => { setEditing(false); setTestResult(null); }, 1500);\n      } else { setTestResult('fail'); }\n    } catch { setTestResult('fail'); }\n    finally { setTesting(false); }\n  };\n\n  const clear = () => {\n    (window as any).__CC_MAC_URL = '';\n    localStorage.removeItem('cc_mac_url');\n    localStorage.setItem('cc_force_autonomous', '1');\n    window.dispatchEvent(new Event('cc_mode_changed'));\n    setMacUrl(''); setEditing(false); setAutonomous(true);\n  };\n\n  if (editing) return (\n    <div className=\"mx-5 mt-4 bg-blue-950/30 border border-blue-600/40 rounded-2xl px-4 py-3\">\n      <p className=\"text-[12px] font-black text-blue-300 mb-2\">⚙️ Adresse du Mac</p>\n      <input type=\"url\" placeholder=\"https://192.168.x.x:8443\" value={input}\n        onChange={e => { setInput(e.target.value); setTestResult(null); }}\n        className=\"w-full bg-zinc-900 border border-zinc-700 rounded-xl px-3 py-2 text-[13px] text-white font-black mb-3\" style={{ fontFamily: 'monospace' }}/>\n      {testResult === 'fail' && <p className=\"text-[10px] text-red-400 font-black mb-2\">❌ Mac non joignable</p>}\n      {testResult === 'ok'   && <p className=\"text-[10px] text-emerald-400 font-black mb-2\">✅ Mac connecté !</p>}\n      <div className=\"flex gap-2\">\n        <button onClick={save} disabled={!input.trim() || testing} className=\"flex-1 py-2 bg-blue-600 rounded-xl font-black text-[12px] text-white uppercase active:scale-95 disabled:opacity-50\">\n          {testing ? 'Test...' : 'Connecter'}\n        </button>\n        <button onClick={() => setEditing(false)} className=\"px-4 py-2 bg-zinc-800 border border-zinc-700 rounded-xl font-black text-[12px] text-zinc-400 active:scale-95\">Annuler</button>\n      </div>\n    </div>\n  );\n\n  if (autoDetecting) return (\n    <div className=\"mx-5 mt-4 bg-zinc-900/40 border border-zinc-800 rounded-2xl px-4 py-2 flex items-center gap-3\">\n      <span className=\"text-lg animate-pulse\">💻</span>\n      <p className=\"text-[11px] font-black text-zinc-500 uppercase tracking-widest\">Détection Mac...</p>\n    </div>\n  );\n\n  if (macUrl) return (\n    <div className=\"mx-5 mt-4 bg-zinc-900/40 border border-zinc-800 rounded-2xl px-3 py-2\">\n      <div className=\"flex items-center gap-2\">\n        <span className=\"text-emerald-400 text-[11px]\">💻</span>\n        <div className=\"flex-1 min-w-0\">\n          <p className=\"text-[10px] font-black text-zinc-400 uppercase tracking-wider\">Mac connecté</p>\n          <p className=\"text-[9px] text-zinc-600 font-mono truncate\">{macUrl}</p>\n        </div>\n        <button onClick={() => { setInput(macUrl); setEditing(true); }} className=\"px-2 py-1 rounded-lg text-[10px] font-black text-zinc-500 active:text-zinc-300\">⚙️</button>\n        <button onClick={clear} className=\"px-2 py-1 rounded-lg text-[10px] font-black text-red-800 active:text-red-400\">✕</button>\n      </div>\n      <a href={`${macUrl}/api/songs`} target=\"_blank\" rel=\"noopener noreferrer\"\n        className=\"block mt-2 text-center py-1.5 bg-blue-900/40 border border-blue-700/40 rounded-xl text-[10px] font-black text-blue-300 active:scale-95\">\n        🔒 Approuver le certificat SSL (1 fois requis)\n      </a>\n    </div>\n  );\n\n  // En mode autonome → ne rien afficher du tout (pas de bandeau Mac)\n  if (autonomous) return null;\n\n  return (\n    <div className=\"mx-5 mt-4 bg-amber-950/30 border border-amber-600/30 rounded-2xl px-4 py-3 flex items-center gap-3\">\n      <span className=\"text-xl shrink-0\">💻</span>\n      <div className=\"flex-1 min-w-0\">\n        <p className=\"text-[12px] font-black text-amber-300\">Mac non configuré</p>\n        <p className=\"text-[10px] text-zinc-500 leading-relaxed\">Même WiFi que ton Mac requis.</p>\n      </div>\n      <button onClick={() => { setInput(''); setEditing(true); }} className=\"shrink-0 px-3 py-2 bg-amber-600 rounded-xl font-black text-[11px] text-white uppercase active:scale-90\">Configurer</button>\n    </div>\n  );\n}\n\nexport default function SongSelector({\n  songs, isOnline, isInstalled, httpsUrl, cachedSongs, cachedCount,\n  cachingId, cacheProgress, cacheError, storage, storageWarning, storageCritical, pendingCount,\n  cacheHealth, missingModules, repairProgress,\n  onSelect, onInstall, onCache, onForceRefresh, onImportFile, onUncache, onClearAll,\n  onViewRecordings, onClearCacheError, onRepairCache,\n}: Props) {\n  const [confirmUncache, setConfirmUncache]       = useState<string | null>(null);\n  const [showRefreshMenu, setShowRefreshMenu]     = useState<string | null>(null);\n  const [showImport, setShowImport]               = useState<string | null>(null);\n  const [importing, setImporting]                 = useState<string | null>(null);\n  const [importingLrc, setImportingLrc]           = useState<string | null>(null); // songId en cours d'import LRC\n\n  const handleLrcImport = (song: Song, e: React.ChangeEvent<HTMLInputElement>) => {\n    const file = e.target.files?.[0];\n    if (!file) return;\n    setImportingLrc(song.id);\n    const reader = new FileReader();\n    reader.onload = async () => {\n      try {\n        const text = reader.result as string;\n        const lines: { time: number; text: string }[] = [];\n        text.split('\\n').forEach(line => {\n          const m = line.match(/\\[(\\d+):(\\d+(?:\\.\\d+)?)\\](.*)/);\n          if (m) lines.push({ time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() });\n        });\n        if (lines.length === 0) {\n          alert('❌ Fichier LRC invalide — aucune ligne avec timestamp trouvée.\\nFormat attendu: [mm:ss.xx] Paroles');\n          setImportingLrc(null);\n          return;\n        }\n        const blob = new Blob([JSON.stringify(lines)], { type: 'application/json' });\n        // Passer par la writeQueue (await) pour éviter conflits avec imports stems simultanés\n        await studioOfflineDB.saveAudio(`lrc_${song.id}`, blob, { songId: song.id, songTitle: song.title, type: 'lrc' });\n        alert(`✅ Paroles importées — ${lines.length} lignes synchronisées pour \"${song.title}\"`);\n        setImportingLrc(null);\n      } catch (err: any) {\n        alert(`❌ Erreur import LRC: ${err?.message || 'Erreur inconnue'}`);\n        setImportingLrc(null);\n      }\n    };\n    reader.onerror = () => {\n      alert('❌ Impossible de lire le fichier');\n      setImportingLrc(null);\n    };\n    reader.readAsText(file);\n    e.target.value = '';\n  };\n  // Cache status pour le panneau d'import: { inst: bool|null, vocal: bool|null }\n  const [stemCacheStatus, setStemCacheStatus]     = useState<Record<string, { inst: boolean|null; vocal: boolean|null }>>({});\n  const [testingAudio, setTestingAudio]           = useState<string | null>(null); // 'songId:inst' | 'songId:vocal'\n  const [loadingAudio, setLoadingAudio]           = useState<string | null>(null); // chargement blob async en cours\n  const audioTestRef                              = useRef<HTMLAudioElement | null>(null);\n  const stemBlobCache                             = useRef<Record<string, Blob>>({});\n\n  const handleFileImport = async (song: Song, type: 'inst' | 'vocal', e: React.ChangeEvent<HTMLInputElement>) => {\n    const file = e.target.files?.[0];\n    if (!file) return;\n    setImporting(`${song.id}:${type}`);\n    try {\n      await onImportFile(song, type, file);\n      // Pré-charger le blob fraîchement importé\n      const fresh = await studioOfflineDB.getAudio(`${type}_${song.id}`).catch(() => null);\n      if (fresh) stemBlobCache.current[`${type}_${song.id}`] = fresh;\n      // Rafraîchir le statut cache après import\n      const hasInst  = !!stemBlobCache.current[`inst_${song.id}`]  || await studioOfflineDB.hasAudio(`inst_${song.id}`).catch(() => false);\n      const hasVocal = !!stemBlobCache.current[`vocal_${song.id}`] || await studioOfflineDB.hasAudio(`vocal_${song.id}`).catch(() => false);\n      setStemCacheStatus(prev => ({ ...prev, [song.id]: { inst: hasInst, vocal: hasVocal } }));\n    }\n    finally { setImporting(null); e.target.value = ''; }\n  };\n\n  // Vérifie la présence réelle dans IndexedDB pour une chanson + pré-charge les blobs\n  const checkStemCache = async (songId: string) => {\n    setStemCacheStatus(prev => ({ ...prev, [songId]: { inst: null, vocal: null } }));\n    const [instBlob, vocalBlob] = await Promise.all([\n      studioOfflineDB.getAudio(`inst_${songId}`).catch(() => null),\n      studioOfflineDB.getAudio(`vocal_${songId}`).catch(() => null),\n    ]);\n    if (instBlob)  stemBlobCache.current[`inst_${songId}`]  = instBlob;\n    if (vocalBlob) stemBlobCache.current[`vocal_${songId}`] = vocalBlob;\n    setStemCacheStatus(prev => ({ ...prev, [songId]: { inst: !!instBlob, vocal: !!vocalBlob } }));\n  };\n\n  // Joue un stem depuis le blob (appelé de façon synchrone depuis le tap)\n  const playStemBlob = (key: string, blob: Blob) => {\n    audioTestRef.current?.pause();\n    if (audioTestRef.current?.src) URL.revokeObjectURL(audioTestRef.current.src);\n\n    const url   = URL.createObjectURL(blob);\n    const audio = new Audio(url);\n    audioTestRef.current = audio;\n    setTestingAudio(key);\n    setLoadingAudio(null);\n\n    const ctx = (window as any).__warmContext as AudioContext | undefined;\n    if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});\n\n    audio.onended = () => { setTestingAudio(null); URL.revokeObjectURL(url); audioTestRef.current = null; };\n    audio.onerror = () => { setTestingAudio(null); URL.revokeObjectURL(url); audioTestRef.current = null; };\n    audio.play().catch(() => {\n      // Fallback AudioContext si autoplay bloqué\n      const actx = (window as any).__warmContext as AudioContext | undefined;\n      if (!actx) { setTestingAudio(null); return; }\n      blob.arrayBuffer()\n        .then(buf => actx.decodeAudioData(buf))\n        .then(decoded => {\n          const src = actx.createBufferSource();\n          src.buffer = decoded;\n          src.connect(actx.destination);\n          src.onended = () => { setTestingAudio(null); audioTestRef.current = null; };\n          src.start(0);\n        }).catch(() => setTestingAudio(null));\n    });\n  };\n\n  // Lit un stem depuis IndexedDB pour le tester.\n  // Si le blob est déjà en mémoire → synchrone (iOS-safe).\n  // Sinon → charge async avec spinner, puis joue automatiquement.\n  const testStemAudio = (songId: string, type: 'inst' | 'vocal') => {\n    const key   = `${songId}:${type}`;\n    const dbKey = `${type}_${songId}`;\n\n    // Stop si déjà en lecture\n    if (testingAudio === key) {\n      audioTestRef.current?.pause();\n      if (audioTestRef.current?.src) URL.revokeObjectURL(audioTestRef.current.src);\n      audioTestRef.current = null;\n      setTestingAudio(null);\n      return;\n    }\n\n    // Annuler chargement en cours si on re-tape\n    if (loadingAudio === key) {\n      setLoadingAudio(null);\n      return;\n    }\n\n    // Blob déjà en mémoire → jouer directement (synchrone, iOS-safe)\n    const cached = stemBlobCache.current[dbKey];\n    if (cached) {\n      playStemBlob(key, cached);\n      return;\n    }\n\n    // Blob absent de la mémoire → charger depuis IndexedDB avec spinner\n    // On montre \"⏳ Chargement...\" pendant la récupération\n    setLoadingAudio(key);\n    studioOfflineDB.getAudio(dbKey)\n      .then(b => {\n        if (!b) { setLoadingAudio(null); return; }\n        stemBlobCache.current[dbKey] = b;\n        // Note: play() ici est async (pas dans le callstack du tap originel).\n        // Sur iOS ça peut être bloqué par autoplay. Si bloqué, l'user devra\n        // retaper — mais au 2e tap le blob sera en cache et ça jouera synchrone.\n        playStemBlob(key, b);\n      })\n      .catch(() => setLoadingAudio(null));\n  };\n\n  // Cleanup audio au démontage\n  useEffect(() => { return () => { audioTestRef.current?.pause(); setLoadingAudio(null); }; }, []);\n\n  const progressColor = (progress: CacheProgress | null) => {\n    if (!progress) return '#22c55e';\n    if (progress.step === 'inst_convert' || progress.step === 'vocal_convert') return '#f97316';\n    if (progress.step === 'done') return '#22c55e';\n    return '#3b82f6';\n  };\n\n  return (\n    <div className=\"min-h-screen bg-[#020202] text-white flex flex-col\">\n\n      {/* Header */}\n      <div className=\"shrink-0 px-5 pt-6 pb-4 border-b border-zinc-900\">\n        <div className=\"flex items-center justify-between mb-1\">\n          <div className=\"flex items-center gap-2\">\n            <div className=\"w-8 h-8 bg-red-600 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(220,38,38,0.4)]\">\n              <Mic size={16} className=\"text-white\"/>\n            </div>\n            <div>\n              <p className=\"font-bebas text-2xl text-white tracking-widest leading-none\">CASH STUDIO MOBILE</p>\n              <p className=\"text-[9px] text-zinc-600 font-black uppercase tracking-widest\">Multi-piste mobile</p>\n            </div>\n          </div>\n          <div className=\"flex items-center gap-2\">\n            {/* Compteur chansons hors-ligne */}\n            {cachedCount > 0 && (\n              <div className=\"flex items-center gap-1 px-2 py-1 bg-emerald-900/20 border border-emerald-600/20 rounded-full\">\n                <HardDrive size={9} className=\"text-emerald-500\"/>\n                <span className=\"text-[9px] font-black text-emerald-400\">{cachedCount}/{songs.length}</span>\n              </div>\n            )}\n            <div className={`flex items-center gap-1.5 px-2 py-1 rounded-full text-[9px] font-black uppercase ${isOnline ? 'bg-emerald-900/30 text-emerald-400' : 'bg-zinc-900 text-zinc-600'}`}>\n              {isOnline ? <Wifi size={10}/> : <WifiOff size={10}/>}\n              {isOnline ? 'WiFi' : 'Hors-ligne'}\n            </div>\n\n            {/* Indicateur santé du cache — visible si incomplet */}\n            {cacheHealth === 'incomplete' && (\n              <button\n                onClick={onRepairCache}\n                className=\"flex items-center gap-1.5 px-2 py-1 rounded-full active:scale-90 transition-all\"\n                style={{ background: '#7c2d1220', border: '1px solid #dc262640' }}>\n                <span className=\"text-[9px]\">⚠️</span>\n                <span className=\"text-[9px] font-black text-amber-500 uppercase\">{missingModules} module{missingModules > 1 ? 's' : ''} manquant{missingModules > 1 ? 's' : ''}</span>\n              </button>\n            )}\n            {cacheHealth === 'repairing' && (\n              <div className=\"flex items-center gap-1.5 px-2 py-1 rounded-full\" style={{ background: '#1e3a5f' }}>\n                <span className=\"text-[9px]\">🔧</span>\n                <span className=\"text-[9px] font-black text-blue-400 uppercase\">Réparation {repairProgress}%</span>\n              </div>\n            )}\n            {cacheHealth === 'ok' && missingModules === 0 && (\n              <div className=\"flex items-center gap-1 px-1.5 py-1 rounded-full\" style={{ background: '#14532d20' }}>\n                <CheckCircle2 size={9} className=\"text-emerald-600\"/>\n              </div>\n            )}\n\n            {pendingCount > 0 && (\n              <button onClick={onViewRecordings} className=\"flex items-center gap-1.5 bg-red-900/30 border border-red-600/30 px-2 py-1 rounded-full active:scale-90 transition-all\">\n                <Radio size={10} className=\"text-red-500 animate-pulse\"/>\n                <span className=\"text-[9px] font-black text-red-400 uppercase\">{pendingCount}</span>\n              </button>\n            )}\n          </div>\n        </div>\n      </div>\n\n      {/* MAC URL CONFIG */}\n      <MacUrlConfig />\n\n      {/* HTTPS warning */}\n      {window.location.protocol === 'http:' && httpsUrl && (\n        <div className=\"mx-5 mt-4 bg-amber-950/30 border border-amber-600/40 rounded-2xl px-4 py-3\">\n          <p className=\"text-[12px] font-black text-amber-400 mb-1\">⚠️ Micro bloqué — Safari exige HTTPS</p>\n          <a href={httpsUrl} className=\"block text-center py-2 bg-amber-600 rounded-xl font-black text-[12px] text-white uppercase tracking-widest\">\n            🔒 Ouvrir en HTTPS\n          </a>\n          <p className=\"text-[10px] text-zinc-600 mt-1.5 text-center\">Accepte le certificat → \"Continuer quand même\"</p>\n        </div>\n      )}\n\n      {/* Bannière PWA */}\n      {!isInstalled ? (\n        <div className=\"mx-5 mt-4 bg-red-950/30 border border-red-600/30 rounded-2xl px-4 py-3 flex items-center gap-3\">\n          <div className=\"w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center shrink-0\"><span className=\"text-xl\">🎤</span></div>\n          <div className=\"flex-1 min-w-0\">\n            <p className=\"text-[12px] font-black text-white\">Installer l'app sur iPhone</p>\n            <p className=\"text-[10px] text-zinc-400 mt-0.5\">Hors-ligne, micro, enregistrements</p>\n          </div>\n          <button onClick={onInstall} className=\"shrink-0 px-3 py-2 bg-red-600 rounded-xl font-black text-[11px] uppercase text-white active:scale-90 transition-all\">\n            Installer\n          </button>\n        </div>\n      ) : (\n        <div className=\"mx-5 mt-4 bg-emerald-950/30 border border-emerald-600/30 rounded-2xl px-4 py-2 flex items-center gap-2\">\n          <CheckCircle2 size={14} className=\"text-emerald-500 shrink-0\"/>\n          <p className=\"text-[11px] text-emerald-400 font-black\">App installée — fonctionne hors-ligne ✓</p>\n        </div>\n      )}\n\n      {/* Panneau de stockage iPhone */}\n      {storage && (\n        <div className={`mx-5 mt-3 rounded-2xl px-4 py-3 border ${storageCritical ? 'bg-red-950/40 border-red-500/50' : storageWarning ? 'bg-amber-950/30 border-amber-600/40' : 'bg-zinc-900/40 border-zinc-800'}`}>\n          <div className=\"flex items-center justify-between mb-2\">\n            <div className=\"flex items-center gap-1.5\">\n              {storageCritical ? <AlertTriangle size={11} className=\"text-red-400\"/> : storageWarning ? <AlertTriangle size={11} className=\"text-amber-400\"/> : <HardDrive size={11} className=\"text-zinc-500\"/>}\n              <p className={`text-[10px] font-black uppercase tracking-widest ${storageCritical ? 'text-red-400' : storageWarning ? 'text-amber-400' : 'text-zinc-500'}`}>\n                {storageCritical ? '🚨 CRITIQUE — iOS va purger' : storageWarning ? '⚠️ Stockage serré' : 'Stockage stems'}\n              </p>\n            </div>\n            <p className={`text-[10px] font-black ${storageCritical ? 'text-red-400' : storageWarning ? 'text-amber-400' : 'text-zinc-400'}`}>\n              {formatMB(storage.quota - storage.used)} libre\n            </p>\n          </div>\n\n          {/* Barre principale */}\n          <div className=\"h-2.5 bg-zinc-800 rounded-full overflow-hidden mb-2\">\n            <div\n              className={`h-full rounded-full transition-all duration-500 ${storageCritical ? 'bg-red-500' : storageWarning ? 'bg-amber-500' : storage.pct > 40 ? 'bg-blue-500' : 'bg-emerald-500'}`}\n              style={{ width: `${Math.min(storage.pct, 100)}%` }}/>\n          </div>\n\n          {/* Détail chiffres */}\n          <div className=\"flex justify-between text-[9px] font-black mb-2\">\n            <span className=\"text-zinc-600\">Utilisé: <span className=\"text-zinc-300\">{formatMB(storage.used)}</span></span>\n            <span className={`font-black ${storageCritical ? 'text-red-400' : storageWarning ? 'text-amber-400' : 'text-zinc-500'}`}>{storage.pct}%</span>\n            <span className=\"text-zinc-600\">Quota: <span className=\"text-zinc-400\">{formatMB(storage.quota)}</span></span>\n          </div>\n\n          {/* Estimation chansons restantes */}\n          {(() => {\n            const avgSongMB = storage.used > 0 && cachedSongs.size > 0\n              ? storage.used / cachedSongs.size\n              : 80 * 1024 * 1024;\n            const freeMB = storage.quota - storage.used;\n            const songsLeft = Math.floor(freeMB / avgSongMB);\n            return (\n              <p className={`text-[9px] font-black mb-2 ${storageCritical ? 'text-red-300' : storageWarning ? 'text-amber-300' : 'text-zinc-500'}`}>\n                {cachedSongs.size} chanson{cachedSongs.size > 1 ? 's' : ''} en cache\n                {songsLeft > 0\n                  ? ` · ~${songsLeft} de plus possible${songsLeft > 1 ? 's' : ''}`\n                  : ' · Plus de place'}\n                {storageCritical ? ' 🚨 iOS risque de purger !' : ''}\n              </p>\n            );\n          })()}\n\n          {/* Avertissements */}\n          {storageCritical && (\n            <div className=\"bg-red-950/60 rounded-xl px-3 py-2 mb-2 border border-red-500/30\">\n              <p className=\"text-[9px] text-red-200 leading-relaxed font-black\">\n                🚨 iOS purge les stems automatiquement quand le stockage est plein. Libère de l'espace ou supprime des chansons.\n              </p>\n            </div>\n          )}\n          {storageWarning && !storageCritical && (\n            <div className=\"bg-amber-950/40 rounded-xl px-3 py-2 mb-2\">\n              <p className=\"text-[9px] text-amber-200 leading-relaxed\">\n                ⚠️ iOS peut commencer à purger des stems. Évite de télécharger plus de chansons pour l'instant.\n              </p>\n            </div>\n          )}\n\n          {/* Boutons libérer */}\n          <div className=\"flex gap-2\">\n            {(storageWarning || storageCritical) && (\n              <button onClick={onClearAll} className={`flex-1 py-1.5 rounded-xl text-[10px] font-black uppercase active:scale-95 ${storageCritical ? 'bg-red-900/50 border border-red-500/50 text-red-300' : 'bg-amber-900/30 border border-amber-600/40 text-amber-400'}`}>\n                🗑 Vider cache ({cachedSongs.size})\n              </button>\n            )}\n            <button\n              onClick={async () => { await studioOfflineDB.clearOldRecordings?.(5); }}\n              className=\"flex-1 py-1.5 bg-zinc-800 border border-zinc-700 rounded-xl text-[10px] font-black text-zinc-400 uppercase active:scale-95\">\n              🎙 Nettoyer prises\n            </button>\n          </div>\n        </div>\n      )}\n\n      {/* Liste chansons */}\n      <div className=\"flex-1 overflow-y-auto px-5 pt-5 pb-28\" style={{ WebkitOverflowScrolling: 'touch' }}>\n        <p className=\"text-[10px] text-zinc-600 font-black uppercase tracking-widest mb-4\">\n          {songs.length} chanson{songs.length > 1 ? 's' : ''} · {cachedCount} hors-ligne\n        </p>\n\n        {songs.length === 0 ? (\n          <div className=\"flex flex-col items-center justify-center py-16 gap-4 opacity-30\">\n            <Music size={48} className=\"text-zinc-700\"/>\n            <p className=\"text-[12px] text-zinc-600 font-black uppercase text-center\">Aucune chanson originale</p>\n          </div>\n        ) : (\n          <div className=\"space-y-3\">\n            {songs.map(s => {\n              const hasProject   = studioService.getProjects().some(p => p.songId === s.id && p.tracks.length > 0);\n              const isCached     = cachedSongs.has(s.id);\n              // Détail du cache pour cette chanson (inst + vocal séparément)\n              const cacheDetail  = stemCacheStatus[s.id]; // { inst: bool|null, vocal: bool|null }\n              const cachePartial = isCached && cacheDetail && !(cacheDetail.inst && cacheDetail.vocal);\n              const isCaching    = cachingId === s.id;\n              const hasError     = cacheError?.songId === s.id;\n              const needsConfirm = confirmUncache === s.id;\n              const showMenu     = showRefreshMenu === s.id;\n              const progress     = isCaching ? cacheProgress : null;\n              const isConverting = progress?.step === 'inst_convert' || progress?.step === 'vocal_convert';\n\n              return (\n                <div key={s.id} className=\"relative\">\n                  <div\n                    role=\"button\"\n                    tabIndex={0}\n                    onPointerDown={(e) => {\n                      // Ignorer si la cible est un bouton/label/input imbriqué\n                      const tag = (e.target as HTMLElement).closest('button, label, input, a');\n                      if (tag) return;\n                      if (showMenu) { setShowRefreshMenu(null); return; }\n                      if (showImport === s.id) { setShowImport(null); return; }\n                      if (!isCaching && !hasError) onSelect(s);\n                    }}\n                    className={`w-full flex items-center gap-4 p-4 bg-zinc-900/60 border rounded-2xl transition-all text-left cursor-pointer select-none ${\n                      isCaching   ? 'border-blue-600/30 cursor-default' :\n                      hasError    ? 'border-red-600/30' :\n                      showMenu    ? 'border-zinc-600' :\n                      'border-zinc-800 active:scale-[0.98] hover:border-zinc-700'\n                    }`}>\n\n                    {/* Pochette */}\n                    {s.posterUrl\n                      ? <img src={s.posterUrl} className=\"w-14 h-14 rounded-xl object-cover shrink-0\" loading=\"lazy\"/>\n                      : <div className=\"w-14 h-14 rounded-xl bg-zinc-800 flex items-center justify-center shrink-0\"><Music size={22} className=\"text-zinc-600\"/></div>\n                    }\n\n                    {/* Infos */}\n                    <div className=\"flex-1 min-w-0\">\n                      <p className=\"text-[15px] font-black text-white truncate\">{s.title}</p>\n                      <p className=\"text-[11px] text-zinc-500 truncate mt-0.5\">{s.artist}</p>\n                      {s.tempo && !isCaching && !hasError && (\n                        <p className=\"text-[10px] text-zinc-700 font-black uppercase mt-1\">{s.tempo} BPM · {s.key}</p>\n                      )}\n\n                      {/* État normal */}\n                      {!isCaching && !hasError && (\n                        <div className=\"flex items-center gap-2 mt-1\">\n                          {hasProject && <p className=\"text-[10px] text-red-400 font-black\">🎛 Projet en cours</p>}\n                          {isCached && !cachePartial && <p className=\"text-[10px] text-emerald-500 font-black\">✓ Hors-ligne</p>}\n                          {cachePartial && <p className=\"text-[10px] text-amber-400 font-black\">⚠ Partiel</p>}\n                        </div>\n                      )}\n\n                      {/* ── Progression ── */}\n                      {isCaching && progress && (\n                        <div className=\"mt-2\">\n                          <div className=\"flex items-center gap-1.5 mb-1.5\">\n                            {isConverting\n                              ? <RefreshCw size={10} className=\"text-orange-400 animate-spin shrink-0\"/>\n                              : progress.step === 'done'\n                              ? <CheckCircle2 size={10} className=\"text-emerald-400 shrink-0\"/>\n                              : <ArrowDownToLine size={10} className=\"text-blue-400 shrink-0\"/>\n                            }\n                            <p className={`text-[11px] font-black truncate ${\n                              isConverting ? 'text-orange-400' :\n                              progress.step === 'done' ? 'text-emerald-400' : 'text-blue-400'\n                            }`}>{progress.label}</p>\n                            <p className=\"text-[10px] text-zinc-600 ml-auto shrink-0\">{progress.pct}%</p>\n                          </div>\n                          <div className=\"h-1.5 bg-zinc-800 rounded-full overflow-hidden\">\n                            <div className=\"h-full rounded-full transition-all duration-300\"\n                              style={{ width: `${progress.pct}%`, background: progressColor(progress) }}/>\n                          </div>\n                          {isConverting && (\n                            <p className=\"text-[9px] text-orange-500/70 mt-1 font-black uppercase tracking-widest\">\n                              Conversion FLAC → MP3 pour iPhone\n                            </p>\n                          )}\n                        </div>\n                      )}\n\n                      {/* ── Erreur + Réessayer ── */}\n                      {hasError && (\n                        <div className=\"mt-2\">\n                          <div className=\"flex items-center gap-1.5 mb-2\">\n                            <AlertCircle size={11} className=\"text-red-400 shrink-0\"/>\n                            <p className=\"text-[11px] text-red-400 font-black truncate\">{cacheError!.message}</p>\n                          </div>\n                          <button\n                            onClick={e => { e.stopPropagation(); onClearCacheError(); onCache(s); }}\n                            className=\"flex items-center gap-1.5 px-3 py-1.5 bg-red-600 rounded-xl text-[11px] font-black text-white uppercase active:scale-95\">\n                            <RotateCcw size={11}/> Réessayer\n                          </button>\n                        </div>\n                      )}\n\n                      {/* ── Menu actualiser ── */}\n                      {showMenu && isCached && !isCaching && (\n                        <div className=\"mt-2 flex gap-2\">\n                          <button\n                            onClick={e => { e.stopPropagation(); setShowRefreshMenu(null); onForceRefresh(s); }}\n                            className=\"flex items-center gap-1.5 px-3 py-1.5 bg-zinc-700 rounded-xl text-[11px] font-black text-white active:scale-95\">\n                            <RefreshCw size={11}/> Actualiser les stems\n                          </button>\n                          <button\n                            onClick={e => { e.stopPropagation(); setShowRefreshMenu(null); onUncache(s.id); }}\n                            className=\"px-3 py-1.5 bg-red-900/40 border border-red-700/40 rounded-xl text-[11px] font-black text-red-400 active:scale-95\">\n                            🗑 Effacer le lien\n                          </button>\n                        </div>\n                      )}\n                    </div>\n\n                    {/* ── Boutons droite ── */}\n                    <div className=\"shrink-0 flex flex-col items-center gap-2\">\n                      <div className=\"w-10 h-10 rounded-full bg-red-600/20 border border-red-600/30 flex items-center justify-center\">\n                        <Mic size={16} className=\"text-red-500\"/>\n                      </div>\n\n                      {isCaching ? (\n                        <div className=\"w-10 h-10 rounded-full bg-blue-900/30 border border-blue-600/30 flex items-center justify-center\">\n                          {isConverting\n                            ? <RefreshCw size={14} className=\"text-orange-400 animate-spin\"/>\n                            : <Loader2 size={14} className=\"animate-spin text-blue-400\"/>\n                          }\n                        </div>\n\n                      ) : hasError ? (\n                        <div className=\"w-10 h-10 rounded-full bg-red-900/30 border border-red-600/30 flex items-center justify-center\">\n                          <AlertCircle size={14} className=\"text-red-400\"/>\n                        </div>\n\n                      ) : isCached ? (\n                        showMenu ? (\n                          <button\n                            onClick={e => { e.stopPropagation(); setShowRefreshMenu(null); }}\n                            className=\"w-10 h-10 rounded-full bg-zinc-700 flex items-center justify-center active:scale-90\">\n                            <RefreshCw size={14} className=\"text-white\"/>\n                          </button>\n                        ) : needsConfirm ? (\n                          <button\n                            onClick={e => { e.stopPropagation(); onUncache(s.id); setConfirmUncache(null); }}\n                            className=\"w-10 h-10 rounded-full bg-red-600 flex items-center justify-center active:scale-90 transition-all\">\n                            <Trash2 size={13} className=\"text-white\"/>\n                          </button>\n                        ) : (\n                          // Long press → menu, tap normal → confirm suppression\n                          // Bouton 📁 toujours visible même si en cache (pour remplacer un stem ou importer LRC)\n                          <div className=\"flex flex-col items-center gap-1.5\">\n                          <button\n                            onClick={e => { e.preventDefault(); e.stopPropagation(); const next = showImport === s.id ? null : s.id; setShowImport(next); if (next) checkStemCache(next); }}\n                            className=\"w-8 h-8 rounded-full flex items-center justify-center active:scale-90 border bg-zinc-800 border-zinc-700\">\n                            <span className=\"text-[12px]\">📁</span>\n                          </button>\n                          <button\n                            onClick={e => {\n                              e.stopPropagation();\n                              setShowRefreshMenu(s.id);\n                              setTimeout(() => setShowRefreshMenu(null), 5000);\n                            }}\n                            className=\"w-10 h-10 rounded-full bg-emerald-900/30 border border-emerald-500/50 flex items-center justify-center active:scale-90 transition-all\">\n                            <CheckCircle2 size={14} className=\"text-emerald-400\"/>\n                          </button>\n                          </div>\n                        )\n                      ) : (\n                        <div className=\"flex flex-col items-center gap-2\">\n                          <button\n                            onClick={e => { e.stopPropagation(); onCache(s); }}\n                          disabled={!isOnline}\n                          title={isOnline ? 'Télécharger pour hors-ligne' : 'Hors-ligne — impossible'}\n                          className={`w-10 h-10 rounded-full flex items-center justify-center transition-all active:scale-90 border ${\n                            !isOnline ? 'bg-zinc-900 border-zinc-800 opacity-30' : 'bg-zinc-800 border-zinc-700 hover:border-zinc-500'\n                          }`}>\n                          <Download size={14} className=\"text-zinc-500\"/>\n                        </button>\n                          <button\n                            onClick={e => { e.preventDefault(); e.stopPropagation(); const next = showImport === s.id ? null : s.id; setShowImport(next); if (next) checkStemCache(next); }}\n                          className=\"w-10 h-10 rounded-full flex items-center justify-center active:scale-90 border bg-zinc-900 border-zinc-800\">\n                          <span className=\"text-[15px]\">📁</span>\n                          </button>\n                        </div>\n                      )}\n                    </div>\n                  </div>\n\n                  {/* Import depuis Fichiers */}\n                  {showImport === s.id && !isCaching && (() => {\n                    const _inst  = s.versions?.find((v: any) => v.trackType === 'Instrumental Stem (Export ZIP)' || v.trackType === TrackType.STEM_INSTRUMENTAL)\n                                || s.versions?.find((v: any) => v.trackType === 'Instrumentale Pure (Copie IA)');\n                    const _vocal = s.versions?.find((v: any) => v.trackType === 'Vocal Stem (Export ZIP)'        || v.trackType === TrackType.STEM_VOCAL);\n                    const _iName = _inst?.fileName  || null;\n                    const _vName = _vocal?.fileName || null;\n                    const cst    = stemCacheStatus[s.id];\n                    const iHas   = cst ? cst.inst   : null;\n                    const vHas   = cst ? cst.vocal  : null;\n                    return (\n                      <div className=\"mx-1 mb-2 bg-zinc-900/90 border border-zinc-700 rounded-2xl px-4 py-3\" onClick={e => e.stopPropagation()}>\n                        <div className=\"flex items-center justify-between mb-3\">\n                          <p className=\"text-[11px] font-black text-zinc-300 uppercase tracking-widest\">📁 Stems — {s.title}</p>\n                          <div className=\"flex items-center gap-2\">\n                            <button onClick={e => { e.stopPropagation(); checkStemCache(s.id); }} className=\"text-[9px] text-zinc-500 font-black active:text-zinc-300 border border-zinc-700 px-2 py-1 rounded-lg\">↺ Vérifier</button>\n                            <button onClick={e => { e.stopPropagation(); setShowImport(null); }} className=\"text-[10px] text-zinc-600 font-black active:text-zinc-400\">✕</button>\n                          </div>\n                        </div>\n                        <StemRow\n                          songId={s.id} type=\"inst\" fileName={_iName} inCache={iHas}\n                          importing={importing} testingAudio={testingAudio} loadingAudio={loadingAudio}\n                          onTest={testStemAudio}\n                          onImport={e => handleFileImport(s, 'inst', e)}\n                        />\n                        <StemRow\n                          songId={s.id} type=\"vocal\" fileName={_vName} inCache={vHas}\n                          importing={importing} testingAudio={testingAudio} loadingAudio={loadingAudio}\n                          onTest={testStemAudio}\n                          onImport={e => handleFileImport(s, 'vocal', e)}\n                        />\n\n                        {/* Import LRC */}\n                        <div className=\"mt-2 pt-3 border-t border-zinc-800\">\n                          <div className=\"flex items-center gap-1.5 mb-2\">\n                            <span className=\"text-[9px] font-black uppercase tracking-widest text-zinc-500\">🎵 Paroles synchronisées (.lrc)</span>\n                          </div>\n                          <label className=\"block\">\n                            <input type=\"file\" accept=\".lrc,.txt\" className=\"hidden\" onChange={e => handleLrcImport(s, e)}/>\n                            <span className={`flex items-center justify-center gap-2 py-2 rounded-xl font-black text-[11px] uppercase active:scale-95 cursor-pointer transition-all ${\n                              importingLrc === s.id ? 'bg-zinc-700 text-zinc-400' : 'bg-purple-900/60 border border-purple-600/40 text-purple-300'\n                            }`}>\n                              {importingLrc === s.id ? '⏳ Import...' : '📄 Importer fichier .lrc'}\n                            </span>\n                          </label>\n                        </div>\n                      </div>\n                    );\n                  })()}\n\n                  {/* Tooltip confirmation suppression */}\n                  {needsConfirm && !showMenu && (\n                    <div className=\"absolute right-4 -bottom-7 z-10 bg-red-900 border border-red-600 px-2 py-1 rounded-lg\">\n                      <p className=\"text-[9px] text-red-200 font-black uppercase\">Appuie encore pour supprimer</p>\n                    </div>\n                  )}\n                </div>\n              );\n            })}\n          </div>\n        )}\n      </div>\n\n      {/* Bouton bas — mes enregistrements */}\n      {studioService.getProjects().length > 0 && (\n        <div className=\"fixed bottom-0 left-0 right-0 p-4 bg-[#020202]/95 backdrop-blur border-t border-zinc-900\">\n          <button\n            onClick={onViewRecordings}\n            className=\"w-full py-4 bg-zinc-900 border border-zinc-700 rounded-2xl font-black text-[13px] uppercase tracking-widest text-white flex items-center justify-center gap-3 active:scale-95 transition-all\">\n            <Radio size={16} className=\"text-red-500\"/>\n            Mes enregistrements\n            {pendingCount > 0 && (\n              <span className=\"bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-full\">{pendingCount} à transférer</span>\n            )}\n          </button>\n        </div>\n      )}\n    </div>\n  );\n}\n"
};
    </script>
</body>
</html>
