neLog:       (fn: (msg: string) => void) => void;\n}\n\n// ── Téléchargement avec progression réelle ────────────────────────────────────\nasync function fetchWithProgress(\n  url: string,\n  onProgress: (pct: number) => void,\n  signal?: AbortSignal,\n): Promise<Blob> {\n  // Timeout 90s — fichiers audio peuvent être volumineux\n  const controller = new AbortController();\n  const timeoutId  = setTimeout(() => controller.abort(), 90_000);\n  const combined   = signal\n    ? (() => { signal.addEventListener('abort', () => controller.abort()); return controller.signal; })()\n    : controller.signal;\n\n  let res: Response;\n  try {\n    res = await fetch(url, { signal: combined });\n  } finally {\n    clearTimeout(timeoutId);\n  }\n\n  if (!res.ok) throw new Error(`Erreur serveur ${res.status}`);\n\n  const contentLength = res.headers.get('Content-Length');\n  const total = contentLength ? parseInt(contentLength, 10) : 0;\n\n  let blob: Blob;\n  if (!total || !res.body) {\n    onProgress(50);\n    blob = await res.blob();\n    onProgress(100);\n  } else {\n    const reader = res.body.getReader();\n    const chunks: Uint8Array[] = [];\n    let received = 0;\n\n    while (true) {\n      const { done, value } = await reader.read();\n      if (done) break;\n      chunks.push(value);\n      received += value.length;\n      onProgress(Math.round((received / total) * 100));\n    }\n\n    const allChunks = new Uint8Array(received);\n    let pos = 0;\n    for (const chunk of chunks) { allChunks.set(chunk, pos); pos += chunk.length; }\n    blob = new Blob([allChunks]);\n  }\n\n  // Vérifier que le blob est bien un fichier audio — pas une page HTML du routeur\n  const blobType = blob.type || '';\n  const isAudio  = blobType.startsWith('audio/') || blobType === 'application/octet-stream' || blobType === '';\n  if (!isAudio && blobType.startsWith('text/')) {\n    throw new Error(`Réponse invalide (${blobType}) — le Mac est peut-être éteint`);\n  }\n\n  return blob;\n}\n\nfunction isIOS(): boolean {\n  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||\n    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);\n}\n\n// iOS Safari supporte FLAC nativement depuis iOS 11 — pas de conversion nécessaire.\nfunction getMediaUrl(fileName: string): string {\n  const _mac = ((window as any).__CC_MAC_URL as string) || '';\n  const _base = _mac.startsWith('http') ? _mac : '';\n  return `${_base}/api/media/${encodeURIComponent(fileName)}`;\n}\n\nfunction getMediaUrlFallbacks(fileName: string): string[] {\n  // Génère des variantes du nom de fichier en cas de 503/404\n  const urls: string[] = [getMediaUrl(fileName)];\n  // Variante sans _compressed\n  const noCompressed = fileName.replace(/_compressed(\\.\\w+)$/, '$1');\n  if (noCompressed !== fileName) urls.push(getMediaUrl(noCompressed));\n  // Variante avec extension différente (.flac <-> .mp3)\n  const withFlac = fileName.replace(/\\.mp3$/i, '.flac');\n  if (withFlac !== fileName) urls.push(getMediaUrl(withFlac));\n  const withMp3 = fileName.replace(/\\.flac$/i, '.mp3');\n  if (withMp3 !== fileName) urls.push(getMediaUrl(withMp3));\n  // Sans _compressed + flac\n  const noCompressedFlac = noCompressed.replace(/\\.mp3$/i, '.flac');\n  if (noCompressedFlac !== noCompressed && noCompressedFlac !== fileName) urls.push(getMediaUrl(noCompressedFlac));\n  return [...new Set(urls)];\n}\n\nfunction needsConversion(_fileName: string): boolean {\n  return false; // iOS lit FLAC nativement — pas de transcoding\n}\n\nexport function useStudioOffline(): OfflineResult {\n  const logRef = useRef<(msg: string) => void>(() => {});\n  const setOfflineLog = useCallback((fn: (msg: string) => void) => { logRef.current = fn; }, []);\n  const log = (msg: string) => logRef.current(msg);\n  const [isOnline, setIsOnline]           = useState(navigator.onLine);\n  const [isInstalled, setIsInstalled]     = useState(false);\n  const [httpsUrl, setHttpsUrl]           = useState('');\n  const [installPrompt, setInstallPrompt] = useState<any>(null);\n  const [cachedSongs, setCachedSongs]     = useState<Set<string>>(new Set());\n  const [cachingId, setCachingId]         = useState<string | null>(null);\n  const [cacheProgress, setCacheProgress] = useState<CacheProgress | null>(null);\n  const [cacheError, setCacheError]       = useState<CacheError | null>(null);\n  const [storage, setStorage]             = useState<StorageInfo | null>(null);\n  const [cacheHealth, setCacheHealth]     = useState<'ok'|'incomplete'|'checking'|'repairing'>('checking');\n  const [missingModules, setMissingModules] = useState(0);\n  const [repairProgress, setRepairProgress] = useState(0);\n\n  // Écouter les messages du SW (CACHE_STATUS, REPAIR_*)\n  useEffect(() => {\n    const handler = (e: MessageEvent) => {\n      if (e.data?.type === 'CACHE_STATUS') {\n        setMissingModules(e.data.missing.length);\n        setCacheHealth(e.data.complete ? 'ok' : 'incomplete');\n      }\n      if (e.data?.type === 'REPAIR_START') {\n        setCacheHealth('repairing');\n        setRepairProgress(0);\n      }\n      if (e.data?.type === 'REPAIR_PROGRESS') {\n        setRepairProgress(Math.round((e.data.repaired / e.data.total) * 100));\n      }\n      if (e.data?.type === 'REPAIR_DONE') {\n        setCacheHealth(e.data.complete ? 'ok' : 'incomplete');\n        setMissingModules(e.data.failed);\n        setRepairProgress(e.data.complete ? 100 : 0);\n      }\n    };\n    navigator.serviceWorker?.addEventListener('message', handler);\n    // Vérifier l'état du cache au montage.\n    // Le contrôleur SW peut ne pas être encore actif au premier rendu (installation\n    // asynchrone). On attend 2s avant de déclarer 'incomplete', ce qui évite\n    // le faux avertissement jaune au démarrage sur iPhone.\n    const checkSW = () => {\n      const sw = navigator.serviceWorker?.controller;\n      if (sw) {\n        sw.postMessage({ type: 'CHECK_CACHE' });\n      } else {\n        // Pas de SW du tout (ex: http sans PWA) → pas d'avertissement inutile\n        setCacheHealth('ok');\n      }\n    };\n    // Vérification immédiate si SW déjà actif, sinon attendre l'activation\n    if (navigator.serviceWorker?.controller) {\n      checkSW();\n    } else {\n      // SW en cours d'activation → attendre\n      const onControllerChange = () => {\n        checkSW();\n        navigator.serviceWorker?.removeEventListener('controllerchange', onControllerChange);\n      };\n      navigator.serviceWorker?.addEventListener('controllerchange', onControllerChange);\n      // Timeout de sécurité : si le SW n'arrive pas en 5s, on considère OK (pas de cache)\n      setTimeout(() => {\n        navigator.serviceWorker?.removeEventListener('controllerchange', onControllerChange);\n        if (!navigator.serviceWorker?.controller) setCacheHealth('ok');\n      }, 5000);\n    }\n    return () => navigator.serviceWorker?.removeEventListener('message', handler);\n  }, []);\n\n  const repairCache = () => {\n    const sw = navigator.serviceWorker?.controller;\n    if (sw) { setCacheHealth('repairing'); sw.postMessage({ type: 'REPAIR_CACHE' }); }\n    else window.location.reload();\n  };\n  const storageWarning = storage ? storage.pct > 90 : false;\n  const cachedCount    = cachedSongs.size;\n\n  const refreshStorage = useCallback(async () => {\n    try { setStorage(await studioOfflineDB.getStorageEstimate()); } catch {}\n  }, []);\n\n  useEffect(() => {\n    const up   = () => setIsOnline(true);\n    const down = () => setIsOnline(false);\n    window.addEventListener('online', up);\n    window.addEventListener('offline', down);\n    return () => { window.removeEventListener('online', up); window.removeEventListener('offline', down); };\n  }, []);\n\n  useEffect(() => {\n    fetch('/api/local-ip').then(r => r.json())\n      .then(d => { if (d.httpsUrl) setHttpsUrl(d.studioUrl || d.httpsUrl + '?mode=studio'); })\n      .catch(() => {});\n  }, []);\n\n  useEffect(() => {\n    const standalone =\n      window.matchMedia('(display-mode: standalone)').matches ||\n      (window.navigator as any).standalone === true;\n    setIsInstalled(standalone);\n    const handler = (e: any) => { e.preventDefault(); setInstallPrompt(e); };\n    window.addEventListener('beforeinstallprompt', handler);\n    return () => window.removeEventListener('beforeinstallprompt', handler);\n  }, []);\n\n  useEffect(() => {\n    studioOfflineDB.getCachedSongIds().then(setCachedSongs).catch(() => {});\n    refreshStorage();\n  }, []);\n\n  const installPWA = useCallback(async () => {\n    if (installPrompt) {\n      installPrompt.prompt();\n      const { outcome } = await installPrompt.userChoice;\n      if (outcome === 'accepted') { setIsInstalled(true); setInstallPrompt(null); }\n    } else {\n      alert('Sur iPhone : bouton Partage ⬆️ → \"Sur l\\'écran d\\'accueil\"');\n    }\n  }, [installPrompt]);\n\n  // Helper : essaie chaque URL en séquence sans for...of+await (compat Babel browser)\n  const tryUrls = (urls: string[], onProgress: (pct: number) => void): Promise<Blob> => {\n    const attempt = (i: number): Promise<Blob> => {\n      if (i >= urls.length) return Promise.reject(new Error('Toutes les URLs ont échoué'));\n      return fetchWithProgress(urls[i], onProgress).catch(() => attempt(i + 1));\n    };\n    return attempt(0);\n  };\n\n  // ── Téléchargement d'un stem individuel ──────────────────────────────────\n  const downloadStem = async (\n    fileName: string,\n    key: string,\n    songId: string,\n    songTitle: string,\n    type: 'instrumental' | 'vocal',\n    baseStep: 'inst' | 'vocal',\n    basePct: number,\n    force: boolean,\n  ): Promise<boolean> => {\n    const alreadyCached = !force && await studioOfflineDB.hasAudio(key);\n\n    if (alreadyCached) {\n      const label = type === 'instrumental' ? '🎸 Instrumental — déjà en cache ✓' : '🎤 Guide vocal — déjà en cache ✓';\n      setCacheProgress({ step: `${baseStep}_download` as any, label, pct: basePct + 47 });\n      await new Promise(r => setTimeout(r, 300));\n      return true;\n    }\n\n    // Vérifier que l'URL Mac est configurée AVANT de tenter le téléchargement\n    const macUrl = ((window as any).__CC_MAC_URL as string) || '';\n    if (!macUrl.startsWith('http')) {\n      throw new Error(`Adresse Mac non configurée — configure l'URL du Mac dans les paramètres pour télécharger les stems`);\n    }\n\n    const urlToFetch = getMediaUrlFallbacks(fileName)[0];\n    log(`⬇️ ${type === 'instrumental' ? '🎸' : '🎤'} Téléchargement: ${fileName}`);\n    log(`   URL: ${urlToFetch}`);\n\n    const converting = needsConversion(fileName);\n    const emoji = type === 'instrumental' ? '🎸' : '🎤';\n    const name  = type === 'instrumental' ? 'Instrumental' : 'Guide vocal';\n\n    // Téléchargement via tryUrls (pas de for...of+await — compat Babel browser)\n    const urls = getMediaUrlFallbacks(fileName);\n    let blob: Blob;\n    if (converting) {\n      setCacheProgress({ step: `${baseStep}_convert` as any, label: `${emoji} ${name} — conversion...`, pct: basePct + 2 });\n      const sim = setInterval(() => {\n        setCacheProgress({ step: `${baseStep}_convert` as any, label: `${emoji} ${name} — conversion...`, pct: basePct + 20 });\n      }, 400);\n      try {\n        blob = await tryUrls(urls, (dlPct) => {\n          clearInterval(sim);\n          setCacheProgress({ step: `${baseStep}_convert` as any, label: `${emoji} ${name} — ${dlPct}%`, pct: basePct + 10 + Math.round(dlPct * 0.35) });\n        });\n      } finally { clearInterval(sim); }\n    } else {\n      setCacheProgress({ step: `${baseStep}_download` as any, label: `${emoji} ${name} — 0%`, pct: basePct + 2 });\n      blob = await tryUrls(urls,\n        (dlPct) => setCacheProgress({ step: `${baseStep}_download` as any, label: `${emoji} ${name} — ${dlPct}%`, pct: basePct + 2 + Math.round(dlPct * 0.45) }),\n      );\n    }\n    await studioOfflineDB.saveAudio(key, blob, { songId, songTitle, type });\n    return true;\n  };\n\n  // ── Cache principal ───────────────────────────────────────────────────────\n  const cacheSongForOffline = useCallback(async (song: Song, allSongs: Song[], force = false) => {\n    if (cachingId) return; // déjà en cours\n    setCachingId(song.id);\n    setCacheProgress({ step: 'inst_download', label: 'Démarrage...', pct: 0 });\n    setCacheError(null);\n\n    try {\n      await studioOfflineDB.saveSongs(allSongs);\n\n      const inst  = song.versions?.find(v => v.trackType === TrackType.STEM_INSTRUMENTAL);\n      const vocal = song.versions?.find(v => v.trackType === TrackType.STEM_VOCAL);\n\n      if (inst?.fileName) {\n        await downloadStem(inst.fileName, `inst_${song.id}`, song.id, song.title, 'instrumental', 'inst', 0, force);\n      }\n      if (vocal?.fileName) {\n        await downloadStem(vocal.fileName, `vocal_${song.id}`, song.id, song.title, 'vocal', 'vocal', 50, force);\n      }\n\n      setCacheProgress({ step: 'done', label: '✓ Prêt hors-ligne', pct: 100 });\n      await new Promise(r => setTimeout(r, 700));\n\n      await studioOfflineDB.markSongCached(song.id);\n      setCachedSongs(prev => new Set([...prev, song.id]));\n      await refreshStorage();\n\n    } catch (e: any) {\n      const msg = !navigator.onLine\n        ? 'WiFi coupé — reconnecte-toi et réessaie'\n        : e.message || 'Erreur inconnue';\n      console.warn('[StudioOffline] Erreur:', msg);\n      setCacheError({ songId: song.id, message: msg });\n      setCacheProgress(null);\n    } finally {\n      setCachingId(null);\n      setCacheProgress(null);\n    }\n  }, [cachingId]);\n\n  // ── Force re-téléchargement (stems corrompus) ─────────────────────────────\n  const forceRefreshSong = useCallback(async (song: Song, allSongs: Song[]) => {\n    // Supprimer les stems existants avant de re-télécharger\n    await studioOfflineDB.deleteAllForSong(song.id).catch(() => {});\n    setCachedSongs(prev => { const s = new Set(prev); s.delete(song.id); return s; });\n    await cacheSongForOffline(song, allSongs, true);\n  }, [cacheSongForOffline]);\n\n  const clearCacheError = useCallback(() => setCacheError(null), []);\n\n  const uncacheSong = useCallback(async (songId: string) => {\n    await studioOfflineDB.deleteAllForSong(songId).catch(() => {});\n    setCachedSongs(prev => { const s = new Set(prev); s.delete(songId); return s; });\n    await refreshStorage();\n  }, []);\n\n  const clearAllCache = useCallback(async () => {\n    await studioOfflineDB.clearAllAudio().catch(() => {});\n    setCachedSongs(new Set());\n    await refreshStorage();\n  }, []);\n\n  const importFileToCache = useCallback(async (song: Song, type: 'inst' | 'vocal', file: File) => {\n    const key = type === 'inst' ? `inst_${song.id}` : `vocal_${song.id}`;\n    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);\n    const rawType = file.type || 'audio/flac';\n    // iOS ne supporte pas FLAC/WebM/OGG — forcer audio/mp4 pour que <audio> puisse lire\n    const blobType = isIOS && !rawType.includes('mp4') && !rawType.includes('mpeg') && !rawType.includes('aac')\n      ? 'audio/mp4' : rawType;\n    log(`📂 Import manuel: ${file.name} (${(file.size/1024).toFixed(0)} Ko) → clé: ${key} type: ${blobType}`);\n    const blob = new Blob([await file.arrayBuffer()], { type: blobType });\n    await studioOfflineDB.saveAudio(key, blob, { songId: song.id, songTitle: song.title, type: type === 'inst' ? 'instrumental' : 'vocal' });\n    log(`✅ ${type === 'inst' ? '🎸' : '🎤'} Sauvegardé dans IndexedDB: ${key} (${(blob.size/1024).toFixed(0)} Ko)`);\n    // Si les deux stems existent maintenant, marquer la chanson comme cachée\n    const hasInst  = await studioOfflineDB.hasAudio(`inst_${song.id}`).catch(() => false);\n    const hasVocal = await studioOfflineDB.hasAudio(`vocal_${song.id}`).catch(() => false);\n    const inst  = song.versions?.find((v: any) => v.trackType === TrackType.STEM_INSTRUMENTAL);\n    const vocal = song.versions?.find((v: any) => v.trackType === TrackType.STEM_VOCAL);\n    const needsInst  = !!inst?.fileName;\n    const needsVocal = !!vocal?.fileName;\n    log(`   inst=${hasInst} vocal=${hasVocal} (requis: inst=${needsInst} vocal=${needsVocal})`);\n    if ((!needsInst || hasInst) && (!needsVocal || hasVocal)) {\n      await studioOfflineDB.markSongCached(song.id);\n      setCachedSongs(prev => new Set([...prev, song.id]));\n      log(`✅ ${song.title} marquée Hors-ligne — les deux stems sont en cache`);\n    }\n    await refreshStorage();\n  }, [refreshStorage]);\n\n  return {\n    isOnline, isInstalled, httpsUrl, installPrompt,\n    cachedSongs, cachedCount, cachingId, cacheProgress, cacheError,\n    storage, storageWarning,\n    cacheHealth, missingModules, repairProgress,\n    installPWA, cacheSongForOffline, forceRefreshSong,\n    uncacheSong, clearAllCache, clearCacheError, repairCache,\n    importFileToCache, setOfflineLog,\n  };\n}\n",
  "components/StudioMobile/useStudioRecorder.ts": "/**\n * useStudioRecorder.ts — v7.8\n *\n * LOGIQUE DE SÉLECTION MICRO — 3 SETUPS RÉELS :\n *\n * Setup 1 — Micro cravate (récepteur dans prise Lightning/USB-C) + écouteurs BT\n *   → iOS voit le récepteur comme \"External Microphone\" ou \"Headset Microphone\"\n *   → PRIORITÉ 1 : sélectionné automatiquement en mode Auto\n *   → Les écouteurs BT restent en A2DP (pas de HFP car micro = filaire externe)\n *\n * Setup 2 — Carte son V8 (USB-C) + micro condensateur + écouteurs filaires sur V8\n *   → iOS voit la V8 comme interface USB (label: \"USB Audio\", \"V8\", etc.)\n *   → PRIORITÉ 1 : sélectionnée automatiquement\n *   → Zéro HFP, qualité maximale\n *\n * Setup 3 — Aucun externe, écouteurs BT uniquement\n *   → PRIORITÉ 2 : forcer Built-in iPhone pour garder les écouteurs en A2DP\n *\n * Mode Manuel : sélection utilisateur TOUJOURS respectée, aucune surcharge.\n */\nimport { useState, useRef, useCallback, useEffect } from 'react';\nimport { studioService, ReverbType, MobileRecording, TrackProject } from '../../services/StudioService';\nimport { Song } from '../../types';\nimport { TrackPreset } from './studio.types';\n\nfunction labelFromDeviceId(deviceId: string): string {\n  if (deviceId === 'default') return '🎙 Micro par défaut';\n  if (deviceId === 'communications') return '🎙 Micro communications';\n  return `🎙 Micro ${deviceId.slice(0, 6)}...`;\n}\n\nfunction classifyDevice(label: string): 'bluetooth' | 'external' | 'builtin' | 'unknown' {\n  if (/airpods|bluetooth|buds|jbl|beats|bose|sony|plantronics|jabra|poly|sennheiser|samsung galaxy buds|anker|soundcore/i.test(label)) return 'bluetooth';\n  if (/external microphone|headset microphone|usb audio|usb mic|rode|dji|v8|focusrite|scarlett|behringer|zoom|tascam|interface|audio codec/i.test(label)) return 'external';\n  if (/built.?in|internal|iphone microphone|microphone intégré/i.test(label)) return 'builtin';\n  return 'unknown';\n}\n\nexport interface AudioDevice {\n  deviceId: string;\n  label: string;\n  category: 'bluetooth' | 'external' | 'builtin' | 'unknown';\n}\n\nexport type AutoSelectReason = 'external' | 'builtin_hfp' | 'default' | 'manual';\n\ninterface RecorderOptions {\n  reverb: ReverbType;\n  currentPreset: TrackPreset;\n  instUrl: string | null;\n  vocalGuideUrl: string | null;\n  vocalGuideVol: number;\n  vocalGuideVolRef: React.RefObject<number>;\n  instRef: React.RefObject<HTMLAudioElement>;\n  vocalGuideRef: React.RefObject<HTMLAudioElement>;\n  backingTracks?: { dataUrl: string; gain: number; pan: number; trackIndex?: number }[];\n  sections?: any[];\n  onLog?: (msg: string) => void;\n  takeSlot?: 'A' | 'B' | 'C';\n}\n\ninterface RecorderResult {\n  isRecording: boolean;\n  isSaving: boolean;\n  duration: number;\n  analyser: AnalyserNode | null;\n  vuLevel: number;\n  monitoring: boolean;\n  permError: boolean;\n  audioDevices: AudioDevice[];\n  selectedDevice: string | null;\n  setSelectedDevice: (id: string | null) => void;\n  refreshDevices: () => Promise<void>;\n  punchIn: number | null;\n  punchOut: number | null;\n  setPunchIn: (v: number | null) => void;\n  setPunchOut: (v: number | null) => void;\n  setPermError: (v: boolean) => void;\n  toggleMonitoring: () => void;\n  preWarmMic: () => Promise<void>;\n  startRecording: (song: Song, project: TrackProject) => Promise<void>;\n  stopRecording: (song: Song, project: TrackProject, onSaved: (rec: MobileRecording, updatedProject: TrackProject | null) => void) => void;\n  vocalGainNodeRef: React.RefObject<GainNode | null>;\n  autoSelectReason: AutoSelectReason;\n  activeDeviceLabel: string;\n}\n\nfunction resolveAutoDevice(\n  devices: AudioDevice[],\n  log: (m: string) => void,\n): { deviceId: string | undefined; reason: AutoSelectReason; label: string } {\n  const external = devices.find(d => d.category === 'external');\n  const builtin  = devices.find(d => d.category === 'builtin');\n  const hasBT    = devices.some(d => d.category === 'bluetooth');\n\n  // Priorité 1 : micro externe filaire/USB (cravate, V8)\n  if (external) {\n    log(`✅ AUTO → Externe : \"${external.label}\"`);\n    return { deviceId: external.deviceId, reason: 'external', label: external.label };\n  }\n\n  // Priorité 2 : Bluetooth détecté → forcer builtin pour garder A2DP\n  if (hasBT) {\n    if (builtin) {\n      log(`🛡 AUTO → Builtin forcé (${builtin.label}) — A2DP protégé`);\n      return { deviceId: builtin.deviceId, reason: 'builtin_hfp', label: builtin.label };\n    }\n    // BT sans builtin identifiable → undefined, iOS prend intégré par défaut\n    log('🛡 AUTO → Défaut iOS (BT présent — builtin introuvable)');\n    return { deviceId: undefined, reason: 'builtin_hfp', label: 'Micro iPhone' };\n  }\n\n  // Pas de BT, pas d'externe → défaut iOS\n  log('AUTO → Défaut iOS');\n  return { deviceId: undefined, reason: 'default', label: 'Micro iPhone' };\n}\n\nexport function useStudioRecorder(opts: RecorderOptions): RecorderResult {\n  const optsRef = useRef(opts);\n  useEffect(() => { optsRef.current = opts; }); // sync every render, no deps\n  const [isRecording, setIsRecording]   = useState(false);\n  const [isSaving, setIsSaving]         = useState(false);\n  const [duration, setDuration]         = useState(0);\n  const [analyser, setAnalyser]         = useState<AnalyserNode | null>(null);\n  const [vuLevel, setVuLevel]           = useState<number>(0);\n  const [monitoring, setMonitoring]     = useState(false);\n  const [permError, setPermError]       = useState(false);\n  const [audioDevices, setAudioDevices] = useState<AudioDevice[]>([]);\n  const [selectedDevice, setSelectedDevice] = useState<string | null>(null);\n  const [punchIn, setPunchIn]   = useState<number | null>(null);\n  const [punchOut, setPunchOut] = useState<number | null>(null);\n  const [autoSelectReason, setAutoSelectReason] = useState<AutoSelectReason>('default');\n  const [activeDeviceLabel, setActiveDeviceLabel] = useState<string>('');\n\n  const punchInRef  = useRef<number | null>(null);\n  const punchOutRef = useRef<number | null>(null);\n  useEffect(() => { punchInRef.current  = punchIn;  }, [punchIn]);\n  useEffect(() => { punchOutRef.current = punchOut; }, [punchOut]);\n\n  const audioDevicesRef = useRef<AudioDevice[]>([]);\n\n  const refreshDevices = useCallback(async () => {\n    if (!navigator.mediaDevices?.enumerateDevices) return;\n    try {\n      const raw = await navigator.mediaDevices.enumerateDevices();\n      const mics: AudioDevice[] = raw\n        .filter(d => d.kind === 'audioinput')\n        .map(d => ({\n          deviceId: d.deviceId,\n          label: d.label || labelFromDeviceId(d.deviceId),\n          category: classifyDevice(d.label || ''),\n        }));\n      setAudioDevices(mics);\n      audioDevicesRef.current = mics;\n      const ext = mics.find(m => m.category === 'external');\n      const bt  = mics.find(m => m.category === 'bluetooth');\n      if (ext) optsRef.current.onLog?.(`🎙 Externe détecté : ${ext.label}`);\n      if (bt)  optsRef.current.onLog?.(`🎧 Bluetooth : ${bt.label}`);\n    } catch {}\n  }, []);\n\n  const backingRefsRef = useRef<HTMLAudioElement[]>([]);\n  useEffect(() => {\n    return () => { backingRefsRef.current.forEach(el => { el.pause(); el.src = ''; }); backingRefsRef.current = []; };\n  }, []);\n  useEffect(() => {\n    refreshDevices();\n    navigator.mediaDevices?.addEventListener?.('devicechange', refreshDevices);\n    return () => navigator.mediaDevices?.removeEventListener?.('devicechange', refreshDevices);\n  }, [refreshDevices]);\n\n  const recorderRef         = useRef<MediaRecorder | null>(null);\n  const audioCtxRef         = useRef<AudioContext | null>(null);\n  const chunksRef           = useRef<Blob[]>([]);\n  const streamRef           = useRef<MediaStream | null>(null);\n  const timerRef            = useRef<any>(null);\n  const monitorGainRef      = useRef<GainNode | null>(null);\n  const sourceNodeRef       = useRef<MediaStreamAudioSourceNode | null>(null);\n  const monitorConnectedRef = useRef(false);\n  const stopWorkletRef      = useRef<(() => Blob) | null>(null);\n  const vocalGainNodeRef    = useRef<GainNode | null>(null);\n  const durationRef         = useRef(0);\n  const syncDuration = (d: number) => { durationRef.current = d; };\n\n  const permissionGrantedRef = useRef(false);\n  const preWarmMic = useCallback(async () => {\n    if (permissionGrantedRef.current) return;\n    try {\n      const AudioCtx = window.AudioContext || (window as any).webkitAudioContext;\n      let ctx = (window as any).__warmContext as AudioContext | undefined;\n      if (!ctx || ctx.state === 'closed') {\n        ctx = new AudioCtx({ latencyHint: 'interactive' });\n        (window as any).__warmContext = ctx;\n        (window as any).__warmWorkletLoaded = null;\n      }\n      if (ctx.state === 'suspended') await ctx.resume();\n      // Buffer silencieux 1 sample → stabilise AVAudioSession\n      const buf = ctx.createBuffer(1, 1, ctx.sampleRate);\n      const src = ctx.createBufferSource(); src.buffer = buf;\n      const mute = ctx.createGain(); mute.gain.value = 0;\n      src.connect(mute); mute.connect(ctx.destination); src.start();\n      // getUserMedia → acquiert permission + énumère les vrais labels\n      const s = await navigator.mediaDevices.getUserMedia({\n        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },\n        video: false,\n      });\n      s.getTracks().forEach(t => t.stop());\n      permissionGrantedRef.current = true;\n      optsRef.current.onLog?.(`✅ Warm-up OK | ${ctx.sampleRate}Hz`);\n      await refreshDevices(); // Maintenant les labels sont disponibles\n    } catch (e: any) {\n      optsRef.current.onLog?.(`⚠️ Warm-up : ${e.message}`);\n      setPermError(true);\n    }\n  }, [refreshDevices]);\n\n  const startRecording = useCallback(async (song: Song, project: TrackProject) => {\n    if (!song) return;\n    try {\n      optsRef.current.onLog?.('═══ TAP REC ═══');\n      const pIn  = punchInRef.current;\n      const pOut = punchOutRef.current;\n\n      // 1. Stems de référence\n      const startStem = (el: HTMLAudioElement, t: number, key: 'inst' | 'vocal') => {\n        el.pause();\n        el.currentTime = t;\n        el.play().catch(() => {\n          // Fallback AudioContext — nécessaire sur iOS pour FLAC/MP4 hors interaction directe\n          const ctx = (window as any).__warmContext as AudioContext | undefined;\n          if (!ctx || !el.src) return;\n          fetch(el.src).then(r => r.arrayBuffer()).then(buf => ctx.decodeAudioData(buf)).then(decoded => {\n            const bsrc = ctx.createBufferSource();\n            bsrc.buffer = decoded;\n            bsrc.connect(ctx.destination);\n            if (key === 'inst') {\n              // Tracker pour sync paroles\n              (window as any).__instCtxStartTime  = ctx.currentTime;\n              (window as any).__instCtxOffset     = t;\n              (window as any).__instCtxActive     = true;\n              bsrc.onended = () => { (window as any).__instCtxActive = false; };\n            }\n            bsrc.start(0, t); // démarrer à l'offset punchIn\n          }).catch(() => {});\n        });\n      };\n      if (optsRef.current.instRef.current && optsRef.current.instUrl)             startStem(optsRef.current.instRef.current, pIn ?? 0, 'inst');\n      if (optsRef.current.vocalGuideRef.current && optsRef.current.vocalGuideUrl) startStem(optsRef.current.vocalGuideRef.current, pIn ?? 0, 'vocal');\n\n      if (optsRef.current.backingTracks && optsRef.current.backingTracks.length > 0) {\n        backingRefsRef.current.forEach(el => { el.pause(); el.src = ''; });\n        backingRefsRef.current = [];\n        const sections: any[] = (optsRef.current as any).sections ?? [];\n        const activeSec = pIn !== null ? sections.find((s: any) => Math.abs(s.startSec - pIn) < 2) : null;\n        for (const bt of optsRef.current.backingTracks) {\n          if (activeSec && bt.trackIndex !== undefined && !activeSec.activeHarmonies.includes(bt.trackIndex)) continue;\n          let gain = bt.gain ?? 0.4;\n          if (activeSec && bt.trackIndex !== undefined) { const sv = activeSec.harmonyVolumes?.[bt.trackIndex]; if (sv !== undefined) gain = sv * 0.6; }\n          const el = new Audio(bt.dataUrl); el.playsInline = true; el.currentTime = pIn ?? 0; el.play().catch(() => {});\n          backingRefsRef.current.push(el);\n        }\n      }\n\n      // 2. Résoudre le device micro\n      const currentDevices = audioDevicesRef.current;\n      let effectiveDeviceId: string | undefined;\n      let reason: AutoSelectReason;\n      let deviceLabel: string;\n\n      if (selectedDevice !== null) {\n        // Sélection manuelle → TOUJOURS respectée, jamais surchargée\n        effectiveDeviceId = selectedDevice;\n        reason = 'manual';\n        const found = currentDevices.find(d => d.deviceId === selectedDevice);\n        deviceLabel = found?.label ?? `Device ${selectedDevice.slice(0, 8)}`;\n        optsRef.current.onLog?.(`🎙 MANUEL → \"${deviceLabel}\"`);\n        // Avertissement si l'utilisateur a sélectionné un micro BT manuellement\n        if (found?.category === 'bluetooth') {\n          optsRef.current.onLog?.('⚠️ Micro BT sélectionné manuellement — iOS peut basculer en HFP (son téléphonie). Préférer \"Micro int.\" si qualité dégradée.');\n        }\n      } else {\n        const resolved = resolveAutoDevice(currentDevices, optsRef.current.onLog ?? (() => {}));\n        effectiveDeviceId = resolved.deviceId;\n        reason = resolved.reason;\n        deviceLabel = resolved.label;\n      }\n\n      setAutoSelectReason(reason);\n      setActiveDeviceLabel(deviceLabel);\n\n      // 3. Capture DRY\n      optsRef.current.onLog?.(`🎤 Capture DRY → \"${deviceLabel}\"`);\n      const result = await studioService.startRecordingPro({\n        reverb: 'none' as any, saturation: 0, compression: false, gainL: 1.0, gainR: 1.0,\n        deviceId: effectiveDeviceId,\n      }, (level) => setVuLevel(level), optsRef.current.onLog);\n\n      refreshDevices();\n      const { recorder, chunks, context, stream, analyser: an, monitorGain, stopWorklet } = result;\n\n      if (stream) {\n        const track = stream.getAudioTracks()[0]; const s = track.getSettings();\n        optsRef.current.onLog?.(`🎵 Stream : ${s.sampleRate ?? '?'}Hz · ${s.channelCount ?? '?'}ch`);\n      }\n      if (context) optsRef.current.onLog?.(`🎵 AudioContext : ${context.sampleRate}Hz ${context.sampleRate >= 44000 ? '✅' : '⚠️'}`);\n\n      stopWorkletRef.current      = stopWorklet ?? null;\n      recorderRef.current         = recorder;\n      chunksRef.current           = chunks;\n      audioCtxRef.current         = context;\n      streamRef.current           = stream;\n      monitorGainRef.current      = monitorGain;\n      sourceNodeRef.current       = (result as any).sourceNode ?? null;\n      monitorConnectedRef.current = false;\n\n      setAnalyser(an);\n      setIsRecording(true);\n      setIsSaving(false);\n      setDuration(0);\n      durationRef.current = 0;\n      setPermError(false);\n      optsRef.current.onLog?.(`✅ REC — ${deviceLabel}`);\n\n      timerRef.current = setInterval(() => {\n        setDuration(d => {\n          const next = d + 1; syncDuration(next);\n          if (pOut !== null && next >= (pOut - (pIn ?? 0))) { recorderRef.current?.stop(); clearInterval(timerRef.current!); }\n          return next;\n        });\n      }, 1000);\n\n    } catch (e: any) {\n      optsRef.current.onLog?.(`❌ Erreur REC : ${e.message}`);\n      if (/Permission|denied|NotAllowed/i.test(e.message)) setPermError(true);\n      else alert('Erreur micro : ' + e.message);\n    }\n  }, [selectedDevice, refreshDevices]);\n\n  const stopRecording = useCallback((\n    song: Song, project: TrackProject,\n    onSaved: (rec: MobileRecording, updatedProject: TrackProject | null) => void,\n  ) => {\n    if ((!recorderRef.current && !stopWorkletRef.current) || !song || !project) return;\n    clearInterval(timerRef.current);\n    optsRef.current.instRef.current?.pause();\n    optsRef.current.vocalGuideRef.current?.pause();\n    backingRefsRef.current.forEach(el => { el.pause(); el.currentTime = 0; });\n    backingRefsRef.current = [];\n    if (monitorConnectedRef.current && monitorGainRef.current && audioCtxRef.current) {\n      try { monitorGainRef.current.disconnect(audioCtxRef.current.destination); } catch {}\n      monitorConnectedRef.current = false;\n    }\n    setMonitoring(false);\n\n    // ── LIBÉRATION IMMÉDIATE DES RESSOURCES AUDIO ─────────────────────\n    // Déconnecter sourceNode et stopper le stream AVANT handleSave\n    // pour libérer iOS de AVAudioSession PlayAndRecord immédiatement.\n    // Sans ça, iOS garde la session ouverte pendant tout le traitement\n    // du blob, dégradant la lecture des stems pendant plusieurs secondes.\n    if (sourceNodeRef.current) {\n      try { sourceNodeRef.current.disconnect(); } catch {}\n      sourceNodeRef.current = null;\n    }\n    streamRef.current?.getTracks().forEach(t => t.stop());\n    streamRef.current = null;\n    const isWarmCtx = audioCtxRef.current === (window as any).__warmContext;\n    if (!isWarmCtx && audioCtxRef.current) {\n      audioCtxRef.current.close().catch(() => {});\n      audioCtxRef.current = null;\n    }\n    vocalGainNodeRef.current = null;\n    setAnalyser(null);\n    optsRef.current.onLog?.('🔓 Session micro fermée — stems restaurés');\n\n    const handleSave = async (workletBlob?: Blob) => {\n      setIsRecording(false); setIsSaving(true);\n      try {\n        // ── Construire le blob audio ──────────────────────────────────────\n        let blob: Blob;\n        if (workletBlob && workletBlob.size > 0) {\n          blob = workletBlob;\n          optsRef.current.onLog?.(`💾 Blob AudioWorklet: ${(workletBlob.size / 1024).toFixed(0)} Ko WAV`);\n        } else if (chunksRef.current.length > 0) {\n          blob = new Blob(chunksRef.current, { type: chunksRef.current[0]?.type || 'audio/mp4' });\n          optsRef.current.onLog?.(`💾 Blob MediaRecorder: ${(blob.size / 1024).toFixed(0)} Ko | chunks=${chunksRef.current.length}`);\n        } else {\n          // Aucune donnée — enregistrement trop court ou erreur capture\n          optsRef.current.onLog?.('❌ Blob vide — aucune donnée capturée. Durée suffisante?');\n          return;\n        }\n\n        if (blob.size < 1000) {\n          optsRef.current.onLog?.(`⚠️ Blob suspect: ${blob.size} bytes — trop petit, probablement corrompu`);\n        }\n\n        // sourceNode et stream déjà libérés ci-dessus (avant handleSave)\n\n        const id = `REC-${Date.now()}`;\n        const safeTitle = song.title.replace(/\\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');\n        const ext = workletBlob ? 'wav' : (chunksRef.current[0]?.type?.includes('mp4') ? 'mp4' : 'webm');\n        const fileName = `${safeTitle}_T${optsRef.current.currentPreset.index}_${Date.now()}.${ext}`;\n\n        optsRef.current.onLog?.(`💾 Sauvegarde: ${fileName}`);\n        const dataUrl = await studioService.blobToDataUrl(blob);\n        optsRef.current.onLog?.(`✅ dataUrl: ${(dataUrl.length / 1024).toFixed(0)} Ko`);\n\n        const rec: MobileRecording = {\n          id, songId: song.id, songTitle: song.title, artist: song.artist || '',\n          duration: durationRef.current, recordedAt: Date.now(), dataUrl, transferred: false,\n          fileName, trackIndex: optsRef.current.currentPreset.index, trackLabel: optsRef.current.currentPreset.label,\n          takeSlot: optsRef.current.currentPreset.index === 0 ? (optsRef.current.takeSlot ?? 'A') : undefined,\n          pitchShift: optsRef.current.currentPreset.pitch, gain: optsRef.current.currentPreset.gain,\n          pan: optsRef.current.currentPreset.pan, projectId: project.id,\n        };\n        studioService.saveRecordingLocally(rec);\n        const updatedProject = studioService.addTrackToProject(project.id, rec);\n        optsRef.current.onLog?.(`✅ Prise sauvegardée | trackIndex=${optsRef.current.currentPreset.index}`);\n        onSaved(rec, updatedProject);\n      } catch(e: any) {\n        optsRef.current.onLog?.(`❌ Erreur sauvegarde: ${e.message}`);\n      } finally { setIsSaving(false); }\n    };\n\n    if (stopWorkletRef.current) { const wavBlob = stopWorkletRef.current(); stopWorkletRef.current = null; handleSave(wavBlob); }\n    else if (recorderRef.current) { recorderRef.current.onstop = () => handleSave(); recorderRef.current.stop(); }\n  }, []);\n\n  const toggleMonitoring = useCallback(() => {\n    setMonitoring(v => {\n      const next = !v;\n      const gain = monitorGainRef.current; const ctx = audioCtxRef.current;\n      if (gain && ctx) {\n        if (next && !monitorConnectedRef.current) { gain.gain.value = 0.8; try { gain.connect(ctx.destination); } catch {} monitorConnectedRef.current = true; }\n        else if (!next && monitorConnectedRef.current) { try { gain.disconnect(ctx.destination); } catch {} monitorConnectedRef.current = false; }\n      }\n      return next;\n    });\n  }, []);\n\n  return {\n    isRecording, isSaving, duration, analyser, vuLevel, monitoring, permError,\n    audioDevices, selectedDevice, setSelectedDevice, refreshDevices,\n    punchIn, punchOut, setPunchIn, setPunchOut,\n    setPermError, toggleMonitoring, preWarmMic, startRecording, stopRecording,\n    vocalGainNodeRef, autoSelectReason, activeDeviceLabel,\n  };\n}\n",
  "components/StudioMobile/RecordScreen.tsx": "/**\n * RecordScreen.tsx — v7.8\n *\n * UI de sélection micro pour 3 setups :\n *   Setup 1 : Micro cravate (récepteur Lightning/USB-C) + écouteurs BT → badge \"Externe ✓\"\n *   Setup 2 : Carte son V8 (USB-C) + micro condensateur → badge \"V8 ✓\"\n *   Setup 3 : Aucun externe, écouteurs BT → badge \"Builtin (A2DP protégé)\"\n *\n * Mode Auto : priorité externe > builtin-si-BT > défaut iOS\n * Mode Manuel : sélection toujours respectée, avertissement si BT choisi manuellement\n */\nimport React, { useEffect, useRef, useState, useCallback } from 'react';\nimport { ChevronLeft, Mic, Square, Headphones, AlertCircle, Layers, Loader2, VolumeX, Radio, RefreshCw, Wifi } from 'lucide-react';\nimport { ReverbType, TrackProject } from '../../services/StudioService';\nimport { Song } from '../../types';\nimport { TRACK_PRESETS, TrackPreset, REVERB_LABELS, REVERB_TYPES, formatTime, SectionMarker, SECTION_COLORS } from './studio.types';\nimport VUMeter from './VUMeter';\nimport { AudioDevice, AutoSelectReason } from './useStudioRecorder';\n\ninterface Props {\n  selected: Song; project: TrackProject | null; currentPreset: TrackPreset; reverb: ReverbType;\n  isRecording: boolean; isSaving: boolean; duration: number; analyser: AnalyserNode | null;\n  vuLevel: number; monitoring: boolean; permError: boolean; httpsUrl: string;\n  instUrl: string | null; instLoading: boolean; instCached: boolean;\n  vocalGuideUrl: string | null; vocalLoading: boolean; vocalCached: boolean;\n  vocalGuideVol: number; showLyrics: boolean;\n  instRef: React.RefObject<HTMLAudioElement>; vocalGuideRef: React.RefObject<HTMLAudioElement>;\n  getInstPlaybackTime: () => number;\n  onBack: () => void; onGoMixer: () => void; onPresetChange: (preset: TrackPreset) => void;\n  onReverbChange: (r: ReverbType) => void; onStartRecording: () => void; onStopRecording: () => void;\n  takeSlot: 'A' | 'B' | 'C'; onTakeSlotChange: (slot: 'A' | 'B' | 'C') => void;\n  slotTakes: { A?: any; B?: any; C?: any };\n  onToggleMonitor: () => void; onVocalVolumeChange: (v: number) => void; onToggleLyrics: () => void;\n  onPreviewStems: () => void; onPreWarmMic: () => Promise<void>; isPreviewing: boolean;\n  audioDevices: AudioDevice[]; selectedDevice: string | null; onSelectDevice: (id: string | null) => void;\n  onRefreshDevices: () => void; punchIn: number | null; punchOut: number | null;\n  onSetPunchIn: (v: number | null) => void; onSetPunchOut: (v: number | null) => void;\n  stemDuration: number; sections: SectionMarker[];\n  autoSelectReason: AutoSelectReason;\n  activeDeviceLabel: string;\n}\n\nfunction parseLyricsWithChords(raw: string): { text: string; isChord: boolean; isSection: boolean }[] {\n  return raw.split('\\\n').map(line => {\n    const isChord = /^[\\s][A-G][#b]?[^\\s,!?.]{0,6}(\\s+[A-G][#b]?[^\\s,!?.]{0,6})\\s*$/.test(line);\n    const isSection = /^[.+]$|^(Couplet|Refrain|Pont|Intro|Outro|Verse|Chorus|Bridge)/i.test(line.trim());\n    return { text: line, isChord, isSection };\n  }).filter(l => !l.isChord && l.text.trim() !== '');\n}\nfunction parseLrcFile(raw: string): Array<{ time: number; text: string }> {\n  const lines: Array<{ time: number; text: string }> = [];\n  for (const line of raw.split('\\\n')) {\n    const m = line.match(/^\\[(\\d+):(\\d+(?:[.:]?\\d+)?)\\]\\s*(.*)/);\n    if (!m) continue;\n    const mins = parseInt(m[1], 10); const secs = parseFloat(m[2]); const text = m[3].trim();\n    if (text) lines.push({ time: mins * 60 + secs, text });\n  }\n  return lines.sort((a, b) => a.time - b.time);\n}\n\n// Raccourcit le label d'un device pour l'affichage dans un bouton compact\nfunction shortLabel(label: string, category: string): string {\n  if (/external microphone/i.test(label)) return 'Micro ext.';\n  if (/built.?in microphone|iphone microphone|microphone intégré/i.test(label)) return 'Micro int.';\n  if (/headset microphone/i.test(label)) return 'Casque';\n  if (/usb audio codec/i.test(label)) return 'USB Audio';\n  if (/v8/i.test(label)) return 'V8';\n  if (/airpods/i.test(label)) return 'AirPods';\n  if (category === 'bluetooth') return label.replace(/microphone|mic|audio/gi, '').trim().slice(0, 14) || 'BT';\n  if (category === 'external') return label.slice(0, 14);\n  return label.replace(/microphone|mic/gi, '').trim().slice(0, 12) || label.slice(0, 10);\n}\n\n// Couleur et icône selon la catégorie + raison auto\nfunction deviceStyle(dev: AudioDevice, isSelected: boolean, isAuto: boolean, autoReason: AutoSelectReason, presetColor: string) {\n  if (dev.category === 'bluetooth') {\n    return {\n      bg:     isSelected ? '#7c3aed20' : '#1a1a1a',\n      border: isSelected ? '#7c3aed' : '#2a2a2a',\n      color:  isSelected ? '#a78bfa' : '#52525b',\n      icon:   '🎧',\n    };\n  }\n  if (dev.category === 'external') {\n    return {\n      bg:     isSelected ? '#16a34a20' : '#1a1a1a',\n      border: isSelected ? '#16a34a' : '#2a2a2a',\n      color:  isSelected ? '#4ade80' : '#52525b',\n      icon:   '🎙',\n    };\n  }\n  if (dev.category === 'builtin') {\n    const isHfpProtect = isAuto && autoReason === 'builtin_hfp';\n    return {\n      bg:     isSelected ? (isHfpProtect ? '#92400e20' : presetColor + '20') : '#1a1a1a',\n      border: isSelected ? (isHfpProtect ? '#d97706' : presetColor) : '#2a2a2a',\n      color:  isSelected ? (isHfpProtect ? '#fbbf24' : presetColor) : '#52525b',\n      icon:   '📱',\n    };\n  }\n  return { bg: isSelected ? presetColor + '20' : '#1a1a1a', border: isSelected ? presetColor : '#2a2a2a', color: isSelected ? presetColor : '#52525b', icon: '🎙' };\n}\n\nexport default function RecordScreen({\n  selected, project, currentPreset, reverb, isRecording, isSaving, duration, analyser, vuLevel,\n  monitoring, permError, httpsUrl, instUrl, instLoading, instCached, vocalGuideUrl, vocalLoading, vocalCached,\n  vocalGuideVol, showLyrics, instRef, vocalGuideRef, getInstPlaybackTime,\n  takeSlot, onTakeSlotChange, slotTakes,\n  onBack, onGoMixer, onPresetChange, onReverbChange,\n  onStartRecording, onStopRecording, onToggleMonitor, onVocalVolumeChange, onToggleLyrics,\n  onPreviewStems, isPreviewing, onPreWarmMic,\n  audioDevices, selectedDevice, onSelectDevice, onRefreshDevices,\n  punchIn, punchOut, onSetPunchIn, onSetPunchOut, stemDuration, sections,\n  autoSelectReason, activeDeviceLabel,\n}: Props) {\n  const localVolRef = useRef<number>(vocalGuideVol);\n  const [localVol, setLocalVol] = useState<number>(vocalGuideVol);\n  useEffect(() => { localVolRef.current = vocalGuideVol; setLocalVol(vocalGuideVol); }, [vocalGuideVol]);\n\n  const handleVolChange = useCallback((v: number) => {\n    localVolRef.current = v; setLocalVol(v); onVocalVolumeChange(v);\n    // .volume est read-only sur iOS — le volume est géré via GainNode dans useStudioAudio\n    // On appelle setVocalGuideVol qui passe par updateVocalVol → setVolumeIOS\n    // Pas d'assignation directe .volume ici\n  }, [onVocalVolumeChange, vocalGuideRef]);\n\n  const [lrcIndex, setLrcIndex] = useState(0);\n  const [serverLrc, setServerLrc] = useState<Array<{ time: number; text: string }> | null>(null);\n  const [serverLrcLoading, setServerLrcLoading] = useState(false);\n  const lyricsScrollRef = useRef<HTMLDivElement>(null);\n\n  useEffect(() => {\n    setServerLrc(null); setLrcIndex(0); if (!selected) return;\n    const lrcVersion = selected.versions?.find(v => (v as any).fileName?.toLowerCase().endsWith('.lrc'));\n    if (!lrcVersion) return;\n    const url = `/api/media/${encodeURIComponent((lrcVersion as any).fileName as string)}`;\n    setServerLrcLoading(true);\n    fetch(url).then(r => r.ok ? r.text() : null).then(txt => { if (txt) { const p = parseLrcFile(txt); if (p.length > 0) setServerLrc(p); } }).catch(() => {}).finally(() => setServerLrcLoading(false));\n  }, [selected?.id]);\n\n  const lrcLines = selected.lrcData || serverLrc || selected.lrcDense || [];\n  const staticLines = selected.lyricsWithChords ? parseLyricsWithChords(selected.lyricsWithChords) : [];\n  const hasLrc = lrcLines.length > 0;\n\n  useEffect(() => {\n    if (!hasLrc) return;\n    const iv = setInterval(() => {\n      const t = getInstPlaybackTime();\n      if (t <= 0) return;\n      let idx = 0;\n      for (let i = 0; i < lrcLines.length; i++) { if (lrcLines[i].time <= t) idx = i; else break; }\n      setLrcIndex(idx);\n    }, 150);\n    return () => clearInterval(iv);\n  }, [hasLrc, lrcLines, getInstPlaybackTime]);\n\n  useEffect(() => {\n    if (!lyricsScrollRef.current) return;\n    const active = lyricsScrollRef.current.querySelector('[data-active=\"true\"]') as HTMLElement;\n    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });\n  }, [lrcIndex]);\n\n  const trackCount = project?.tracks.length || 0;\n\n  // Analyser l'état actuel des devices pour les avertissements\n  const hasExternalMic = audioDevices.some(d => d.category === 'external');\n  const hasBluetooth   = audioDevices.some(d => d.category === 'bluetooth');\n  const selectedDev    = audioDevices.find(d => d.deviceId === selectedDevice);\n  const selectedIsBT   = selectedDev?.category === 'bluetooth';\n\n  // Badge statut auto-sélection\n  function renderAutoStatusBadge() {\n    if (isRecording) {\n      const color = autoSelectReason === 'external' ? '#4ade80'\n        : autoSelectReason === 'builtin_hfp' ? '#fbbf24'\n        : '#a1a1aa';\n      const icon = autoSelectReason === 'external' ? '🎙'\n        : autoSelectReason === 'builtin_hfp' ? '🛡'\n        : '📱';\n      return (\n        <div className=\"mx-4 mb-2 rounded-xl px-3 py-2 flex items-center gap-2\" style={{ background: color + '15', border: `1px solid ${color}50` }}>\n          <span style={{ fontSize: 11 }}>{icon}</span>\n          <span className=\"text-[9px] font-black uppercase tracking-wider\" style={{ color }}>{activeDeviceLabel}</span>\n          {autoSelectReason === 'builtin_hfp' && <span className=\"text-[8px] font-black ml-auto\" style={{ color: '#fbbf24' }}>A2DP ✓</span>}\n          {autoSelectReason === 'external' && <span className=\"text-[8px] font-black ml-auto\" style={{ color: '#4ade80' }}>HD ✓</span>}\n        </div>\n      );\n    }\n    return null;\n  }\n\n  return (\n    <div className=\"min-h-screen flex flex-col\" style={{ background: '#0a0a0a' }}>\n      {/* Header */}\n      <div className=\"shrink-0 flex items-center gap-3 px-4 pt-5 pb-3\" style={{ borderBottom: '1px solid #1a1a1a' }}>\n        <button onClick={onBack} className=\"w-9 h-9 rounded-xl flex items-center justify-center active:scale-90\" style={{ background: '#1a1a1a' }}>\n          <ChevronLeft size={18} className=\"text-zinc-400\" />\n        </button>\n        <div className=\"flex-1 min-w-0\">\n          <p className=\"font-bebas text-lg text-white tracking-widest leading-none truncate\">{selected.title}</p>\n          <p className=\"text-[9px] text-zinc-600 font-black uppercase truncate\">{selected.artist}</p>\n        </div>\n        <div className=\"shrink-0 px-3 py-1.5 rounded-xl\" style={{ background: isRecording ? '#dc262620' : '#1a1a1a', border: `1px solid ${isRecording ? '#dc2626' : '#2a2a2a'}` }}>\n          <p className=\"font-bebas text-2xl tracking-widest tabular-nums leading-none\" style={{ color: isRecording ? '#ef4444' : '#71717a' }}>{formatTime(duration)}</p>\n        </div>\n        {trackCount > 0 && (\n          <button onClick={onGoMixer} className=\"flex items-center gap-1.5 px-3 py-2 rounded-xl active:scale-90\" style={{ background: '#1a1a1a', border: '1px solid #2a2a2a' }}>\n            <Layers size={13} className=\"text-zinc-400\" /><span className=\"text-[11px] font-black text-zinc-300\">{trackCount}</span>\n          </button>\n        )}\n      </div>\n\n      {/* Erreur permission */}\n      {permError && (\n        <div className=\"mx-4 mt-3 rounded-2xl px-4 py-3 flex items-start gap-3\" style={{ background: '#dc262615', border: '1px solid #dc262640' }}>\n          <AlertCircle size={15} className=\"text-red-500 shrink-0 mt-0.5\" />\n          <div>\n            <p className=\"text-[12px] text-red-400 font-black mb-1\">Accès micro refusé</p>\n            {httpsUrl\n              ? <><p className=\"text-[11px] text-zinc-400 mb-2\">Safari iOS exige HTTPS.</p><a href={httpsUrl} className=\"block text-center py-2 bg-red-600 rounded-xl font-black text-[11px] text-white\">🔒 Ouvrir en HTTPS</a></>\n              : <p className=\"text-[11px] text-zinc-400\">Réglages → Safari → Microphone → Autoriser</p>}\n          </div>\n        </div>\n      )}\n\n      {/* Badge statut pendant l'enregistrement */}\n      {renderAutoStatusBadge()}\n\n      <div className=\"flex-1 flex flex-col overflow-hidden\">\n        {/* Sélection piste */}\n        {/* ── Sélecteur A/B/C — Voix principale uniquement ── */}\n        {currentPreset.index === 0 && (\n          <div className=\"shrink-0 px-4 pt-3 pb-2\">\n            <p className=\"text-[9px] text-zinc-700 font-black uppercase tracking-widest mb-2\">Prise</p>\n            <div className=\"flex gap-2\">\n              {(['A', 'B', 'C'] as const).map(slot => {\n                const hasTake = !!slotTakes[slot];\n                const isActive = takeSlot === slot;\n                return (\n                  <button key={slot}\n                    onClick={() => !isRecording && !isSaving && onTakeSlotChange(slot)}\n                    disabled={isRecording || isSaving}\n                    className=\"flex-1 py-2 rounded-xl font-black text-[13px] transition-all active:scale-95 disabled:opacity-40 flex flex-col items-center gap-1\"\n                    style={{\n                      background: isActive ? currentPreset.color + '20' : '#141414',\n                      border: `2px solid ${isActive ? currentPreset.color : hasTake ? '#22c55e40' : '#222'}`,\n                    }}>\n                    <span style={{ color: isActive ? currentPreset.color : hasTake ? '#22c55e' : '#52525b' }}>{slot}</span>\n                    <span className=\"text-[7px] font-black\" style={{ color: hasTake ? '#22c55e' : '#3f3f46' }}>\n                      {hasTake ? '● PRISE' : 'vide'}\n                    </span>\n                  </button>\n                );\n              })}\n            </div>\n          </div>\n        )}\n\n        <div className=\"shrink-0 px-4 pt-4 pb-2\">\n          <p className=\"text-[9px] text-zinc-700 font-black uppercase tracking-widest mb-2\">Piste</p>\n          <div className=\"flex gap-2 overflow-x-auto pb-1\" style={{ scrollbarWidth: 'none' }}>\n            {TRACK_PRESETS.map(preset => {\n              const hasTrack = project?.tracks.some(t => t.trackIndex === preset.index);\n              const isActive = currentPreset.index === preset.index;\n              return (\n                <button key={preset.index} onClick={() => !isRecording && !isSaving && onPresetChange(preset)} disabled={isRecording || isSaving}\n                  className=\"shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl transition-all active:scale-95\"\n                  style={{ background: isActive ? preset.color + '20' : '#141414', border: `1px solid ${isActive ? preset.color + '60' : '#222'}`, minWidth: 72 }}>\n                  <span className=\"text-lg leading-none\">{preset.emoji}</span>\n                  <span className=\"text-[9px] font-black whitespace-nowrap\" style={{ color: isActive ? preset.color : '#52525b' }}>\n                    {preset.label.replace('Harmonie ', '+').replace('Voix principale', 'Voix').replace('Double tracking', 'Double').replace('Octave bas', 'Oct↓')}\n                  </span>\n                  {hasTrack && <span className=\"text-[7px] font-black\" style={{ color: '#22c55e' }}>✓</span>}\n                </button>\n              );\n            })}\n          </div>\n        </div>\n\n        {/* Zone principale */}\n        <div className=\"shrink-0 mx-4 rounded-2xl overflow-hidden\" style={{ background: '#111', border: `1px solid ${isRecording ? currentPreset.color + '40' : '#1e1e1e'}` }}>\n\n          {/* ── SÉLECTION MICRO ────────────────────────────────────────────── */}\n          {audioDevices.length > 0 && (\n            <div className=\"px-4 pt-3 pb-3\" style={{ borderBottom: '1px solid #1a1a1a' }}>\n              <div className=\"flex items-center gap-2 mb-2\">\n                <Radio size={9} className=\"text-zinc-600 shrink-0\" />\n                <span className=\"text-[8px] font-black uppercase tracking-widest text-zinc-700\">Micro</span>\n                {/* Avertissement BT sélectionné manuellement */}\n                {selectedIsBT && !isRecording && (\n                  <span className=\"text-[8px] font-black ml-2 px-1.5 py-0.5 rounded\" style={{ background: '#7c3aed20', color: '#c4b5fd' }}>\n                    ⚠️ BT → son téléphonie possible\n                  </span>\n                )}\n                <button onClick={onRefreshDevices} disabled={isRecording}\n                  className=\"shrink-0 w-5 h-5 flex items-center justify-center rounded-lg active:scale-90 disabled:opacity-30 ml-auto\"\n                  style={{ background: '#1a1a1a' }}>\n                  <RefreshCw size={8} className=\"text-zinc-600\" />\n                </button>\n              </div>\n\n              <div className=\"flex gap-1.5 overflow-x-auto pb-0.5\" style={{ scrollbarWidth: 'none' }}>\n                {/* Bouton Auto */}\n                <button\n                  onClick={() => !isRecording && onSelectDevice(null)}\n                  disabled={isRecording}\n                  className=\"shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded-xl transition-all active:scale-90 disabled:opacity-40\"\n                  style={{\n                    background: selectedDevice === null ? '#3b82f620' : '#141414',\n                    border: `1px solid ${selectedDevice === null ? '#3b82f6' : '#222'}`,\n                    minWidth: 52,\n                  }}>\n                  <span className=\"text-[9px]\">⚡</span>\n                  <span className=\"text-[8px] font-black uppercase\" style={{ color: selectedDevice === null ? '#60a5fa' : '#52525b' }}>Auto</span>\n                  {selectedDevice === null && (\n                    <span className=\"text-[6px] font-black\" style={{ color: '#3b82f6aa' }}>\n                      {autoSelectReason === 'external' ? 'EXT' : autoSelectReason === 'builtin_hfp' ? 'HFP🛡' : 'DEF'}\n                    </span>\n                  )}\n                </button>\n\n                {/* Devices disponibles */}\n                {audioDevices.map(dev => {\n                  const isSelected = selectedDevice === dev.deviceId;\n                  const isAutoSelected = selectedDevice === null; // En mode auto, aucun bouton device n'est \"actif\"\n                  const style = deviceStyle(dev, isSelected, isAutoSelected, autoSelectReason, currentPreset.color);\n                  const label = shortLabel(dev.label, dev.category);\n                  return (\n                    <button\n                      key={dev.deviceId}\n                      onClick={() => !isRecording && onSelectDevice(dev.deviceId)}\n                      disabled={isRecording}\n                      className=\"shrink-0 flex flex-col items-center gap-0.5 px-2.5 py-1.5 rounded-xl transition-all active:scale-90 disabled:opacity-40\"\n                      style={{ background: style.bg, border: `1px solid ${style.border}`, minWidth: 52 }}\n                      title={dev.label}>\n                      <span className=\"text-[9px]\">{style.icon}</span>\n                      <span className=\"text-[8px] font-black uppercase text-center leading-tight max-w-[60px] truncate\" style={{ color: style.color }}>\n                        {label}\n                      </span>\n                      {dev.category === 'bluetooth' && (\n                        <span className=\"text-[6px] font-black\" style={{ color: '#7c3aed80' }}>BT</span>\n                      )}\n                      {dev.category === 'external' && (\n                        <span className=\"text-[6px] font-black\" style={{ color: '#16a34a' }}>EXT</span>\n                      )}\n                    </button>\n                  );\n                })}\n              </div>\n\n              {/* Résumé du setup détecté — affiché seulement avant l'enregistrement */}\n              {!isRecording && !isSaving && (\n                <div className=\"mt-2 flex items-center gap-1.5 flex-wrap\">\n                  {hasExternalMic && (\n                    <span className=\"text-[8px] font-black px-2 py-0.5 rounded-full\" style={{ background: '#16a34a20', color: '#4ade80', border: '1px solid #16a34a40' }}>\n                      🎙 Externe détecté — qualité HD\n                    </span>\n                  )}\n                  {hasBluetooth && !hasExternalMic && selectedDevice === null && (\n                    <span className=\"text-[8px] font-black px-2 py-0.5 rounded-full\" style={{ background: '#92400e20', color: '#fbbf24', border: '1px solid #92400e40' }}>\n                      🎧 BT → Micro iPhone auto (A2DP protégé)\n                    </span>\n                  )}\n                  {hasBluetooth && !hasExternalMic && selectedIsBT && (\n                    <span className=\"text-[8px] font-black px-2 py-0.5 rounded-full\" style={{ background: '#7c3aed20', color: '#c4b5fd', border: '1px solid #7c3aed40' }}>\n                      ⚠️ Micro BT actif — qualité peut être réduite (HFP)\n                    </span>\n                  )}\n                  {!hasBluetooth && !hasExternalMic && (\n                    <span className=\"text-[8px] font-black px-2 py-0.5 rounded-full\" style={{ background: '#1a1a1a', color: '#52525b', border: '1px solid #222' }}>\n                      📱 Micro iPhone\n                    </span>\n                  )}\n                </div>\n              )}\n            </div>\n          )}\n\n          {/* VU Meter */}\n          <div className=\"px-4 pt-4 pb-2\">\n            <div className=\"flex items-center justify-between mb-2\">\n              <p className=\"text-[9px] text-zinc-700 font-black uppercase tracking-widest\">Niveau</p>\n              {isRecording && <div className=\"flex items-center gap-1.5\"><div className=\"w-2 h-2 rounded-full bg-red-500 animate-pulse\" /><span className=\"text-[9px] font-black text-red-400 uppercase tracking-widest\">REC</span></div>}\n            </div>\n            <VUMeter analyser={analyser} vuLevel={vuLevel} active={isRecording} />\n          </div>\n\n          {/* Stems */}\n          <div className=\"flex gap-2 px-4 pb-3 flex-wrap items-center\">\n            {instLoading\n              ? <div className=\"flex items-center gap-1.5 px-2 py-1 rounded-lg\" style={{ background: '#1a1a1a' }}><Loader2 size={9} className=\"text-zinc-600 animate-spin\" /><span className=\"text-[9px] text-zinc-600 font-black\">Instrum...</span></div>\n              : instUrl\n                ? <div className=\"flex items-center gap-1.5 px-2 py-1 rounded-lg\" style={{ background: instCached ? '#1e3a5f' : '#2a1f00', border: `1px solid ${instCached ? '#1d4ed880' : '#92400e80'}` }}>\n                    <Headphones size={9} className={instCached ? 'text-blue-400' : 'text-amber-500'} />\n                    <span className={`text-[9px] font-black uppercase ${instCached ? 'text-blue-400' : 'text-amber-500'}`}>\n                      INSTRUM {instCached ? '📦' : '🌐'}\n                    </span>\n                  </div>\n                : null\n            }\n            {vocalLoading\n              ? <div className=\"flex items-center gap-1.5 px-2 py-1 rounded-lg\" style={{ background: '#1a1a1a' }}><Loader2 size={9} className=\"text-zinc-600 animate-spin\" /><span className=\"text-[9px] text-zinc-600 font-black\">Guide...</span></div>\n              : vocalGuideUrl\n                ? <div className=\"flex items-center gap-1.5 px-2 py-1 rounded-lg\" style={{ background: vocalCached ? '#1e3a1e' : '#2a1f00', border: `1px solid ${vocalCached ? '#16a34a80' : '#92400e80'}` }}>\n                    <Mic size={9} className={vocalCached ? 'text-emerald-400' : 'text-amber-500'} />\n                    <span className={`text-[9px] font-black uppercase ${vocalCached ? 'text-emerald-400' : 'text-amber-500'}`}>\n                      GUIDE {vocalCached ? '📦' : '🌐'}\n                    </span>\n                  </div>\n                : null\n            }\n            {(instUrl || vocalGuideUrl) && !isRecording && !isSaving && (() => {\n              const allCached = (!instUrl || instCached) && (!vocalGuideUrl || vocalCached);\n              const noneCached = (instUrl && !instCached) || (vocalGuideUrl && !vocalCached);\n              return (\n                <button\n                  onClick={onPreviewStems}\n                  className=\"ml-auto flex items-center gap-1.5 px-3 py-1 rounded-lg active:scale-90 transition-all\"\n                  style={{\n                    background: isPreviewing ? '#7c3aed20' : allCached ? '#0f2a0f' : noneCached ? '#2a1800' : '#1a1a1a',\n                    border: `1px solid ${isPreviewing ? '#7c3aed80' : allCached ? '#16a34a60' : noneCached ? '#d9770660' : '#2a2a2a'}`,\n                  }}>\n                  {isPreviewing\n                    ? <Square size={9} fill=\"currentColor\" className=\"text-violet-400\" />\n                    : <Headphones size={9} className={allCached ? 'text-emerald-400' : noneCached ? 'text-amber-500' : 'text-zinc-400'} />\n                  }\n                  <span className=\"text-[9px] font-black uppercase\" style={{ color: isPreviewing ? '#a78bfa' : allCached ? '#4ade80' : noneCached ? '#f59e0b' : '#71717a' }}>\n                    {isPreviewing ? 'Stop' : allCached ? 'Écouter 📦' : noneCached ? 'Écouter 🌐' : 'Écouter'}\n                  </span>\n                </button>\n              );\n            })()}\n          </div>\n\n          {/* Sections punch */}\n          {sections.length > 0 && !isRecording && (\n            <div className=\"px-4 pb-2\" style={{ borderTop: '1px solid #1a1a1a', paddingTop: 10 }}>\n              <div className=\"flex items-center gap-1.5 mb-2\"><span className=\"text-[8px] font-black text-zinc-600 uppercase tracking-widest\">Section →</span></div>\n              <div className=\"flex gap-1.5 flex-wrap\">\n                {[...sections].sort((a, b) => a.startSec - b.startSec).map(sec => {\n                  const color = SECTION_COLORS[sec.label as keyof typeof SECTION_COLORS] ?? '#71717a';\n                  const isActive = punchIn === sec.startSec && punchOut === sec.endSec;\n                  return (\n                    <button key={sec.id} onClick={() => { if (isActive) { onSetPunchIn(null); onSetPunchOut(null); } else { onSetPunchIn(sec.startSec); onSetPunchOut(sec.endSec); } }}\n                      className=\"flex flex-col items-start px-2.5 py-1.5 rounded-xl active:scale-90 transition-all\" style={{ background: isActive ? color + '25' : '#111', border: `1px solid ${isActive ? color + '80' : '#222'}`, minWidth: 60 }}>\n                      <span className=\"text-[9px] font-black uppercase\" style={{ color: isActive ? color : '#52525b' }}>{sec.label}</span>\n                      <span className=\"text-[7px] tabular-nums\" style={{ color: isActive ? color + 'cc' : '#3f3f46' }}>{formatTime(sec.startSec)}→{formatTime(sec.endSec)}</span>\n                    </button>\n                  );\n                })}\n              </div>\n            </div>\n          )}\n\n          {/* Punch In/Out */}\n          {(instUrl || vocalGuideUrl) && !isRecording && (\n            <div className=\"px-4 pb-3 flex items-center gap-2\" style={{ borderTop: '1px solid #1a1a1a', paddingTop: 10 }}>\n              <span className=\"text-[9px] text-zinc-600 font-black uppercase shrink-0\">Punch</span>\n              <div className=\"flex items-center gap-1 flex-1\">\n                <span className=\"text-[8px] text-zinc-700 font-black uppercase w-4\">IN</span>\n                <input type=\"range\" min=\"0\" max={stemDuration > 0 ? stemDuration : 300} step=\"1\" value={punchIn ?? 0}\n                  onChange={e => { const v = parseFloat(e.target.value); onSetPunchIn(v === 0 ? null : v); }} disabled={isRecording}\n                  className=\"flex-1 h-1 rounded-full appearance-none cursor-pointer\"\n                  style={{ accentColor: '#f97316', background: `linear-gradient(to right, #f97316 ${stemDuration > 0 ? ((punchIn ?? 0) / stemDuration) * 100 : 0}%, #1e1e1e ${stemDuration > 0 ? ((punchIn ?? 0) / stemDuration) * 100 : 0}%)` }} />\n                <span className=\"text-[8px] font-black w-7 text-right\" style={{ color: punchIn ? '#f97316' : '#3f3f46' }}>{punchIn ? formatTime(punchIn) : '--'}</span>\n              </div>\n              <span className=\"text-zinc-800 text-[10px]\">→</span>\n              <div className=\"flex items-center gap-1 flex-1\">\n                <span className=\"text-[8px] text-zinc-700 font-black uppercase w-5\">OUT</span>\n                <input type=\"range\" min=\"0\" max={stemDuration > 0 ? stemDuration : 300} step=\"1\" value={punchOut ?? (stemDuration || 300)}\n                  onChange={e => { const v = parseFloat(e.target.value); onSetPunchOut(v >= (stemDuration || 300) ? null : v); }} disabled={isRecording}\n                  className=\"flex-1 h-1 rounded-full appearance-none cursor-pointer\"\n                  style={{ accentColor: '#ef4444', background: `linear-gradient(to right, #1e1e1e ${stemDuration > 0 ? ((punchOut ?? stemDuration) / stemDuration) * 100 : 100}%, #ef4444 ${stemDuration > 0 ? ((punchOut ?? stemDuration) / stemDuration) * 100 : 100}%)` }} />\n                <span className=\"text-[8px] font-black w-7 text-right\" style={{ color: punchOut ? '#ef4444' : '#3f3f46' }}>{punchOut ? formatTime(punchOut) : '--'}</span>\n              </div>\n              {(punchIn || punchOut) && <button onClick={() => { onSetPunchIn(null); onSetPunchOut(null); }} className=\"text-[8px] font-black text-zinc-700 active:text-zinc-400 px-1\">✕</button>}\n            </div>\n          )}\n\n          {/* Volume guide vocal */}\n          {vocalGuideUrl && (\n            <div className=\"px-4 pb-3 flex items-center gap-3\" style={{ borderTop: '1px solid #1e1e1e', paddingTop: 10 }}>\n              <Mic size={12} className=\"text-emerald-400 shrink-0\" />\n              <span className=\"text-[9px] text-zinc-600 font-black uppercase w-10 shrink-0\">Guide</span>\n              <input type=\"range\" min=\"0\" max=\"1\" step=\"0.05\" value={localVol}\n                onChange={e => handleVolChange(parseFloat(e.target.value))}\n                className=\"flex-1 h-1 rounded-full appearance-none cursor-pointer\"\n                style={{ accentColor: '#22c55e', background: `linear-gradient(to right, #22c55e ${localVol * 100}%, #27272a ${localVol * 100}%)` }} />\n              <span className=\"text-[10px] font-black text-emerald-400 w-8 text-right shrink-0\">{Math.round(localVol * 100)}%</span>\n              {localVol === 0 && <VolumeX size={11} className=\"text-zinc-700 shrink-0\" />}\n            </div>\n          )}\n        </div>\n\n        {/* Boutons actions */}\n        <div className=\"shrink-0 px-4 py-4\">\n          {/* Reverb (post-prod uniquement, masqué pendant REC) */}\n          {!isRecording && !isSaving && (\n            <div className=\"flex items-center gap-2 mb-4\">\n              <span className=\"text-[9px] text-zinc-700 font-black uppercase w-16 shrink-0\">Reverb (post)</span>\n              <div className=\"flex gap-1.5 flex-1\">\n                {REVERB_TYPES.map(r => (\n                  <button key={r} onClick={() => onReverbChange(r)} disabled={isRecording || isSaving}\n                    className=\"flex-1 py-1.5 rounded-lg font-black text-[9px] uppercase tracking-wider transition-all\"\n                    style={{ background: reverb === r ? currentPreset.color : '#141414', color: reverb === r ? '#fff' : '#52525b', border: `1px solid ${reverb === r ? currentPreset.color + '80' : '#222'}` }}>\n                    {REVERB_LABELS[r]}\n                  </button>\n                ))}\n              </div>\n            </div>\n          )}\n\n          {/* Boutons Monitoring + REC */}\n          <div className=\"flex items-center justify-center gap-6\">\n            <button onClick={onToggleMonitor} className=\"flex flex-col items-center gap-1.5 active:scale-90 transition-all\">\n              <div className=\"w-12 h-12 rounded-2xl flex items-center justify-center\" style={{ background: monitoring ? '#1e3a5f' : '#141414', border: `1px solid ${monitoring ? '#3b82f6' : '#222'}` }}>\n                <Headphones size={20} style={{ color: monitoring ? '#3b82f6' : '#52525b' }} />\n              </div>\n              <span className=\"text-[8px] font-black uppercase tracking-wider\" style={{ color: monitoring ? '#3b82f6' : '#3f3f46' }}>{monitoring ? 'Écoute ON' : 'Écoute'}</span>\n            </button>\n\n            {isSaving\n              ? <div className=\"w-24 h-24 rounded-full flex flex-col items-center justify-center gap-1\" style={{ background: '#141414', border: '2px solid #27272a' }}>\n                  <Loader2 size={24} className=\"text-zinc-500 animate-spin\" />\n                  <span className=\"text-[8px] font-black text-zinc-600 uppercase\">Sauvegarde</span>\n                </div>\n              : isRecording\n              ? <button onClick={onStopRecording} className=\"w-24 h-24 rounded-full flex items-center justify-center active:scale-90 transition-all\" style={{ background: '#fff', boxShadow: '0 0 40px rgba(255,255,255,0.15)' }}>\n                  <Square size={32} className=\"text-black\" fill=\"currentColor\" />\n                </button>\n              : <button onClick={async () => { await onPreWarmMic(); onStartRecording(); }} className=\"w-24 h-24 rounded-full flex items-center justify-center active:scale-90 transition-all\" style={{ background: currentPreset.color, boxShadow: `0 0 30px ${currentPreset.color}50` }}>\n                  <Mic size={36} className=\"text-white\" />\n                </button>\n            }\n\n            <div className=\"w-12 h-12 flex flex-col items-center gap-1.5 justify-center\">\n              {isRecording && <><div className=\"w-2 h-2 rounded-full bg-red-500 animate-pulse\" /><span className=\"text-[8px] font-black text-red-400 uppercase tabular-nums\">{formatTime(duration)}</span></>}\n            </div>\n          </div>\n\n          <p className=\"text-center text-[10px] font-black uppercase tracking-widest mt-3\" style={{ color: isRecording ? currentPreset.color : '#3f3f46' }}>\n            {isSaving ? '⏳ Traitement...' : isRecording ? `● ${currentPreset.emoji} ${currentPreset.label}` : `${currentPreset.emoji} ${currentPreset.label}`}\n          </p>\n        </div>\n\n        {/* Paroles */}\n        {(hasLrc || staticLines.length > 0) && showLyrics && (\n          <div className=\"flex flex-col overflow-hidden mx-4 mb-4 rounded-2xl\" style={{ background: '#080808', border: '1px solid #222', height: 260, flexShrink: 0 }}>\n            <div className=\"shrink-0 flex items-center justify-between px-4 py-2.5\" style={{ borderBottom: '1px solid #1e1e1e' }}>\n              <div className=\"flex items-center gap-2\">\n                <span className=\"text-[9px] text-zinc-600 font-black uppercase tracking-widest\">Paroles</span>\n                {serverLrcLoading && <span className=\"text-[8px] text-zinc-600 font-black uppercase animate-pulse\">● chargement...</span>}\n                {hasLrc && !serverLrcLoading && <span className=\"text-[8px] font-black uppercase\" style={{ color: '#16a34a' }}>● {selected.lrcData ? 'Sync' : serverLrc ? 'LRC' : 'Gemini'}</span>}\n              </div>\n              <button onClick={onToggleLyrics} className=\"px-3 py-1 rounded-lg text-[9px] font-black uppercase active:scale-90\" style={{ background: '#1a1a1a', color: '#52525b' }}>Masquer</button>\n            </div>\n            <div ref={lyricsScrollRef} className=\"overflow-y-auto px-5 py-4\" style={{ WebkitOverflowScrolling: 'touch', flex: 1, minHeight: 0 }}>\n              {hasLrc\n                ? <div className=\"space-y-3\">{lrcLines.map((line, i) => {\n                    const isActive = i === lrcIndex; const isPast = i < lrcIndex; const isNext = i === lrcIndex + 1; const isAfterNext = i === lrcIndex + 2;\n                    if (isPast || (!isActive && !isNext && !isAfterNext)) return null;\n                    return (\n                      <p key={i} data-active={isActive ? 'true' : 'false'} className=\"transition-all duration-300 leading-snug\"\n                        style={{ fontSize: isActive ? 26 : isNext ? 20 : 14, fontWeight: isActive ? 900 : isNext ? 700 : 400, color: isActive ? '#ffffff' : isNext ? '#d4d4d8' : '#52525b', textShadow: isActive ? '0 0 28px rgba(255,255,255,0.3)' : 'none', transform: isActive ? 'translateX(6px)' : 'none', marginBottom: isActive ? 16 : isNext ? 12 : 6 }}>\n                        {line.text}\n                      </p>\n                    );\n                  })}</div>\n                : <div className=\"space-y-2\">{staticLines.map((line, i) => (\n                    <p key={i} className=\"leading-relaxed\"\n                      style={{ fontSize: line.isSection ? 11 : 19, fontWeight: line.isSection ? 900 : 600, color: line.isSection ? '#ef4444' : '#e4e4e7', textTransform: line.isSection ? 'uppercase' : 'none', letterSpacing: line.isSection ? '0.2em' : 'normal', marginTop: line.isSection ? 20 : 0, opacity: line.isSection ? 0.8 : 1 }}>\n                      {line.text}\n                    </p>\n                  ))}</div>\n              }\n              <div style={{ height: 40 }} />\n            </div>\n          </div>\n        )}\n        {(hasLrc || staticLines.length > 0) && !showLyrics && (\n          <button onClick={onToggleLyrics} className=\"shrink-0 mx-4 mb-4 py-3 rounded-xl text-[11px] font-black uppercase tracking-widest active:scale-95 transition-all\" style={{ background: '#141414', border: '1px solid #333', color: '#a1a1aa' }}>\n            🎵 Afficher les paroles\n          </button>\n        )}\n      </div>\n    </div>\n  );\n}\n",
  "components/StudioMobile/VUMeter.tsx": "/**\n * VUMeter.tsx — VU-mètre réel via AnalyserNode\n * Alimenté par MediaStreamSource → AnalyserNode (jamais connecté à destination).\n * Le basculement AVAudioSession est déjà absorbé au démarrage — pas de dégradation.\n */\nimport React, { useRef, useEffect } from 'react';\n\ninterface Props {\n  analyser: AnalyserNode | null;\n  active:   boolean;\n  vuLevel?: number; // ignoré — conservé pour compatibilité\n}\n\nexport default function VUMeter({ analyser, active }: Props) {\n  const canvasRef = useRef<HTMLCanvasElement>(null);\n  const rafRef    = useRef<number>(0);\n\n  useEffect(() => {\n    const canvas = canvasRef.current;\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d')!;\n\n    if (!active || !analyser) {\n      ctx.clearRect(0, 0, canvas.width, canvas.height);\n      // Barres éteintes quand inactif\n      const bars = 20;\n      const w    = canvas.width / bars - 1;\n      for (let i = 0; i < bars; i++) {\n        ctx.fillStyle = '#1a1a1a';\n        const h = canvas.height * (0.4 + 0.6 * (i / bars));\n        ctx.fillRect(i * (w + 1), canvas.height - h, w, h);\n      }\n      return;\n    }\n\n    const dataArray = new Uint8Array(analyser.frequencyBinCount);\n\n    const draw = () => {\n      analyser.getByteFrequencyData(dataArray);\n\n      // RMS sur les fréquences vocales (bins 2-30 environ sur 44kHz/fftSize 256)\n      let sum = 0;\n      const end = Math.min(30, dataArray.length);\n      for (let i = 2; i < end; i++) sum += dataArray[i] * dataArray[i];\n      const rms   = Math.sqrt(sum / (end - 2)) / 255;\n      const level = Math.min(1, rms * 2.5);\n\n      ctx.clearRect(0, 0, canvas.width, canvas.height);\n      const bars = 20;\n      const w    = canvas.width / bars - 1;\n\n      for (let i = 0; i < bars; i++) {\n        const threshold = i / bars;\n        const lit       = threshold < level;\n        const isHot     = i > bars * 0.8;\n        const isMid     = i > bars * 0.6;\n        ctx.fillStyle   = lit\n          ? (isHot ? '#ef4444' : isMid ? '#eab308' : '#22c55e')\n          : '#1a1a1a';\n        const h = canvas.height * (0.4 + 0.6 * (i / bars));\n        ctx.fillRect(i * (w + 1), canvas.height - h, w, h);\n      }\n\n      rafRef.current = requestAnimationFrame(draw);\n    };\n\n    draw();\n    return () => cancelAnimationFrame(rafRef.current);\n  }, [active, analyser]);\n\n  return (\n    <canvas\n      ref={canvasRef}\n      width={280}\n      height={60}\n      className=\"w-full rounded-xl\"\n      style={{ background: '#0a0a0a', maxWidth: 320 }}\n    />\n  );\n}\n",
